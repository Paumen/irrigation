system_metadata:
  area: Netherlands, Wijchen
location_descriptions:
  house: indoor — main residence
  shed: indoor — outbuilding housing the pump start relay
  well: outdoor — underground water-supply shaft; the surface pump sits on a platform roughly halfway down, above the water line, drawing up through the suction hose. A brass foot valve + strainer was bought 2026-06 for the hose end (NOT yet confirmed fitted); before that the hose end was open and drained back on every pump stop, losing prime
  valve_box: outdoor — in-ground enclosure containing the manifold and 4 zone solenoid valves
  in_ground: outdoor — buried in lawn/garden
control_paths:
- via:
  - touchscreen
  to: controller
- via:
  - mobile_app
  - home_wifi
  to: controller
- via:
  - mobile_app
  - rainmachine_cloud
  - home_wifi
  to: controller
system_design_choices:
  backflow_preventer: well is isolated from drinking water
  master_valve: pump is controller-triggered and provides the leak-limiting shutoff a master valve would add
  manual_shutoff_valve: pump on/off is the primary shutoff.
  zone_1_head_mix_rationale: rotor for lawn, MP rotators for flower beds (different precipitation rates)
cable_runs:
  controller_to_valve_box: 10
  controller_to_relay: 10
