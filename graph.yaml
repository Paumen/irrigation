schema: irrigation-graph
fail_axis: [broken, clogged, misconfigured]

kinds:

  supply:        {fail: [clogged]}
  joint:         {max_pressure_bar: 10, fail: [broken, misconfigured]}
  tee:           {max_pressure_bar: 10, bends: 1, fail: [broken]}
  swing.34x34:   {max_pressure_bar: 10.2, bore_mm: 19, bends: 4, fail: [broken]}   # 3/4" x 3/4"
  swing.34x12:   {max_pressure_bar: 10.2, bore_mm: 13, bends: 4, fail: [broken]}   # 3/4" x 1/2"
  hose.32:       {outer_diameter_mm: 32, wall_thickness_mm: 3,   material: LDPE, max_pressure_bar: 6.3, fail: [broken, clogged]}
  hose.25:       {outer_diameter_mm: 25, wall_thickness_mm: 2.7, material: LDPE, max_pressure_bar: 6,   fail: [broken, clogged]}
  hose.16:       {outer_diameter_mm: 16, wall_thickness_mm: 3,   material: LDPE, max_pressure_bar: 6.3, fail: [broken, clogged]}
  cap:           {max_pressure_bar: 10, fail: [broken]}
  nozzle.stream: {fail: [clogged, misconfigured]}
  conductor:     {fail: [broken]}
  splice:        {fail: [broken, misconfigured]}

  pump.well:
    in: foot_valve
    out: outlet
    max_m3h: 3.8
    bar: 4.8
    parts:
      foot_valve: {to: [suction], fail: [broken, clogged]}
      suction:    {to: [impeller], fail: [clogged]}
      impeller:   {to: [outlet], fail: [broken]}
      mech_seal:  {to: [], acts: [impeller], fail: [broken]}
      outlet:     {}

  manifold:
    in: inlet
    out: outlet
    max_m3h: 7
    max_pressure_bar: 10
    bends: 1
    parts:
      inlet:      {to: [outlet, body, inlet_seal, port_seal]}
      inlet_seal: {to: [], fail: [broken, misconfigured]}
      port_seal:  {to: [], fail: [broken, misconfigured]}
      body:       {to: [], fail: [broken]}
      outlet:     {}

  valve.auto:
    in: inlet
    out: outlet
    min_bar: 1.5
    max_bar: 10.3
    min_m3h: 0.1
    max_m3h: 9.0
    parts:
      inlet:           {to: [diaphragm, metering_port, inlet_thread, body]}
      inlet_thread:    {to: [], fail: [broken, misconfigured]}
      diaphragm:       {to: [seat], fail: [broken]}
      seat:            {to: [outlet], fail: [broken, clogged]}
      metering_port:   {to: [chamber], fail: [clogged]}
      chamber:         {to: [solenoid_entry, bleed_screw], acts: [diaphragm]}
      bleed_screw:     {to: [], fail: [broken, misconfigured], ops: [closed, open]}
      solenoid_entry:  {to: [plunger], fail: [clogged]}
      plunger:         {to: [solenoid_exhaust], fail: [broken, clogged]}
      solenoid_exhaust: {to: [outlet], fail: [clogged]}
      coil:            {ohm: [20, 60], acts: [plunger], fail: [broken], ops: [auto, bleed]}
      spring:          {acts: [diaphragm], fail: [broken]}
      flow_control:    {acts: [diaphragm], fail: [broken, misconfigured], ops: [open, throttled, shut]}
      bonnet:          {to: [], acts: [chamber], fail: [broken, misconfigured]}
      oring:           {to: [], acts: [solenoid_entry], fail: [broken]}
      body:            {to: [], acts: [seat], fail: [broken]}
      outlet_nut:      {to: [], fail: [broken, misconfigured]}
      outlet:          {}

  valve.manual:
    in: inlet
    out: outlet
    parts:
      inlet:        {to: [seat, inlet_thread, body]}
      inlet_thread: {to: [], fail: [broken, misconfigured]}
      seat:         {to: [outlet], fail: [broken, clogged]}
      handle:       {acts: [seat], fail: [misconfigured], ops: [closed, open]}
      body:         {to: [], fail: [broken]}
      outlet:       {}

  head.rotor:
    in: inlet_thread
    parts:
      inlet_thread:   {to: [body], fail: [broken, misconfigured]}
      body:           {to: [riser, check_valve], fail: [broken]}
      check_valve:    {to: [], fail: [broken]}
      riser:          {to: [filter]}
      riser_seal:     {to: [], acts: [riser], fail: [broken]}
      retract_spring: {acts: [riser], fail: [broken]}
      gear:           {acts: [riser], fail: [broken, clogged]}
      filter:         {to: [nozzle], fail: [clogged]}
      nozzle:         {to: [], fail: [clogged, misconfigured]}
      arc:            {acts: [nozzle], fail: [misconfigured]}
      flow_control:   {acts: [nozzle], ops: [open, throttled, shut]}

  head.spray:
    in: inlet_thread
    reg_bar: 2.76
    parts:
      inlet_thread:   {to: [body], fail: [broken, misconfigured]}
      body:           {to: [regulator, check_valve, cap], fail: [broken]}
      cap:            {to: [], fail: [broken]}
      check_valve:    {to: [], fail: [broken]}
      regulator:      {to: [riser], fail: [broken]}
      riser:          {to: [nozzle]}
      wiper_seal:     {to: [], acts: [riser], fail: [broken]}
      retract_spring: {acts: [riser], fail: [broken]}
      flush_plug:     {acts: [nozzle], fail: [misconfigured]}
      nozzle:         {to: [], fail: [clogged, misconfigured]}

flow:
  well:      {kind: supply, to: [pump]}
  pump:      {kind: pump.well, to: [mj1], h_m: 7.2}
  mj1:       {kind: joint, to: [mhose]}
  mhose:     {kind: hose.32, to: [mj2], length_m: 20}
  mj2:       {kind: joint, to: [mani]}
  mani:      {kind: manifold, to: [Z1.j1, Z2.j1, Z3.j1, Z4.j1, Z5.j1, Z6.cap], h_m: 11.2}

  Z1.j1:    {kind: joint, to: [Z1.valve]}
  Z1.valve: {kind: valve.auto, to: [Z1.j2], h_m: 11.2}
  Z1.j2:    {kind: joint, to: [Z1.hose1]}
  Z1.hose1: {kind: hose.25, to: [Z1.tee1], length_m: 8}
  Z1.tee1:  {kind: tee, to: [Z1.hose2, Z1.hose3]}
  Z1.hose2: {kind: hose.25, to: [Z1.j3], length_m: 7}
  Z1.j3:    {kind: joint, to: [Z1.sw1]}
  Z1.sw1:   {kind: swing.34x12, to: [Z1.head1]}
  Z1.head1: {kind: head.spray, nozzle: MP3000, arc: 270, h_m: 10.5}
  Z1.hose3: {kind: hose.25, to: [Z1.tee2], length_m: 3}
  Z1.tee2:  {kind: tee, to: [Z1.sw2, Z1.hose4]}
  Z1.sw2:   {kind: swing.34x34, to: [Z1.head2]}
  Z1.head2: {kind: head.rotor, nozzle: "4.0 blue", arc: 170, h_m: 11.6}
  Z1.hose4: {kind: hose.25, to: [Z1.j4], length_m: 17}
  Z1.j4:    {kind: joint, to: [Z1.sw3]}
  Z1.sw3:   {kind: swing.34x12, to: [Z1.head3]}
  Z1.head3: {kind: head.spray, nozzle: MP2000, arc: 180, h_m: 11.4}

  Z2.j1:    {kind: joint, to: [Z2.valve]}
  Z2.valve: {kind: valve.auto, to: [Z2.j2], h_m: 11.2}
  Z2.j2:    {kind: joint, to: [Z2.hose1]}
  Z2.hose1: {kind: hose.25, to: [Z2.tee1], length_m: 2}
  Z2.tee1:  {kind: tee, to: [Z2.hose2, Z2.hose3]}
  Z2.hose2: {kind: hose.25, to: [Z2.j3], length_m: 1}
  Z2.j3:    {kind: joint, to: [Z2.sw1]}
  Z2.sw1:   {kind: swing.34x34, to: [Z2.head1]}
  Z2.head1: {kind: head.rotor, nozzle: "2.5 blue", arc: 150, h_m: 11.1}
  Z2.hose3: {kind: hose.25, to: [Z2.j4], length_m: 9}
  Z2.j4:    {kind: joint, to: [Z2.sw2]}
  Z2.sw2:   {kind: swing.34x34, to: [Z2.head2]}
  Z2.head2: {kind: head.rotor, nozzle: "5.0 blue", arc: 270, h_m: 11.2}

  Z3.j1:    {kind: joint, to: [Z3.valve]}
  Z3.valve: {kind: valve.auto, to: [Z3.j2], h_m: 11.2}
  Z3.j2:    {kind: joint, to: [Z3.hose1]}
  Z3.hose1: {kind: hose.25, to: [Z3.tee1], length_m: 20}
  Z3.tee1:  {kind: tee, to: [Z3.hose2, Z3.hose3]}
  Z3.hose2: {kind: hose.25, to: [Z3.j3], length_m: 3}
  Z3.j3:    {kind: joint, to: [Z3.sw1]}
  Z3.sw1:   {kind: swing.34x34, to: [Z3.head1]}
  Z3.head1: {kind: head.rotor, nozzle: "5.0 blue", arc: 270, h_m: 10.2}
  Z3.hose3: {kind: hose.25, to: [Z3.j4], length_m: 12}
  Z3.j4:    {kind: joint, to: [Z3.sw2]}
  Z3.sw2:   {kind: swing.34x34, to: [Z3.head2]}
  Z3.head2: {kind: head.rotor, nozzle: "2.5 blue", arc: 180, h_m: 10.5}

  Z4.j1:    {kind: joint, to: [Z4.valve]}
  Z4.valve: {kind: valve.auto, to: [Z4.j2], h_m: 11.2}
  Z4.j2:    {kind: joint, to: [Z4.hose1]}
  Z4.hose1: {kind: hose.25, to: [Z4.tee1], length_m: 9}
  Z4.tee1:  {kind: tee, to: [Z4.hose2, Z4.hose3]}
  Z4.hose2: {kind: hose.25, to: [Z4.j3], length_m: 2}
  Z4.j3:    {kind: joint, to: [Z4.sw1]}
  Z4.sw1:   {kind: swing.34x12, to: [Z4.head1]}
  Z4.head1: {kind: head.spray, nozzle: MP3000, arc: 270, h_m: 11.3}
  Z4.hose3: {kind: hose.25, to: [Z4.tee2], length_m: 8}
  Z4.tee2:  {kind: tee, to: [Z4.hose4, Z4.hose5]}
  Z4.hose4: {kind: hose.25, to: [Z4.sw2], length_m: 6}
  Z4.sw2:   {kind: swing.34x12, to: [Z4.head2]}
  Z4.head2: {kind: head.spray, nozzle: MP1000, arc: 210, h_m: 12.0}
  Z4.hose5: {kind: hose.25, to: [Z4.j4], length_m: 19}
  Z4.j4:    {kind: joint, to: [Z4.sw3]}
  Z4.sw3:   {kind: swing.34x12, to: [Z4.head3]}
  Z4.head3: {kind: head.spray, nozzle: MP2000, arc: 270, h_m: 12.0}

  Z5.j1:     {kind: joint, to: [Z5.hose1]}
  Z5.hose1:  {kind: hose.16, to: [Z5.j2], length_m: 10}
  Z5.j2:     {kind: joint, to: [Z5.hose2]}
  Z5.hose2:  {kind: hose.16, to: [Z5.valve], length_m: 10}
  Z5.valve:  {kind: valve.manual, to: [Z5.hose3], h_m: 12.2}
  Z5.hose3:  {kind: hose.16, to: [Z5.nozzle], length_m: 10}
  Z5.nozzle: {kind: nozzle.stream, h_m: 12.2}

  Z6.cap:    {kind: cap}

circuit:
  mains: {volt: 230, to: [ctrl.psu, relay.line]}

  ctrl.psu:    {to: [ctrl.fw], fail: [broken]}
  ctrl.fw:     {to: [ctrl.tr1, ctrl.tr2, ctrl.tr3, ctrl.tr4, ctrl.trpmv], fail: [broken]}
  ctrl.sched:  {acts: [ctrl.fw], fail: [misconfigured]}
  ctrl.screen: {acts: [ctrl.fw], fail: [broken]}
  ctrl.wifi:   {acts: [ctrl.fw], fail: [broken]}
  ctrl.cloud:  {acts: [ctrl.fw], fail: [broken]}

  ctrl.tr1:   {to: [ctrl.ts1], fail: [broken]}
  ctrl.tr2:   {to: [ctrl.ts2], fail: [broken]}
  ctrl.tr3:   {to: [ctrl.ts3], fail: [broken]}
  ctrl.tr4:   {to: [ctrl.ts4], fail: [broken]}
  ctrl.trpmv: {to: [ctrl.tpmv], fail: [broken]}

  ctrl.ts1:  {to: [cond.s1], fail: [broken, misconfigured]}
  ctrl.ts2:  {to: [cond.s2], fail: [broken, misconfigured]}
  ctrl.ts3:  {to: [cond.s3], fail: [broken, misconfigured]}
  ctrl.ts4:  {to: [cond.s4], fail: [broken, misconfigured]}
  ctrl.tpmv: {to: [cond.rsig], fail: [broken, misconfigured]}
  ctrl.tcom: {to: [ctrl.psu], fail: [broken, misconfigured]}
  ctrl.trcom: {to: [ctrl.psu], fail: [broken, misconfigured]}

  cond.s1: {kind: conductor, to: [splice.Z1]}
  cond.s2: {kind: conductor, to: [splice.Z2]}
  cond.s3: {kind: conductor, to: [splice.Z3]}
  cond.s4: {kind: conductor, to: [splice.Z4]}

  splice.Z1: {kind: splice, to: [Z1.valve.coil]}
  splice.Z2: {kind: splice, to: [Z2.valve.coil]}
  splice.Z3: {kind: splice, to: [Z3.valve.coil]}
  splice.Z4: {kind: splice, to: [Z4.valve.coil]}

  Z1.valve.coil: {to: [splice.Z1c]}
  Z2.valve.coil: {to: [splice.Z2c]}
  Z3.valve.coil: {to: [splice.Z3c]}
  Z4.valve.coil: {to: [splice.Z4c]}

  splice.Z1c: {kind: splice, to: [cond.common]}
  splice.Z2c: {kind: splice, to: [cond.common]}
  splice.Z3c: {kind: splice, to: [cond.common]}
  splice.Z4c: {kind: splice, to: [cond.common]}

  cond.common: {kind: conductor, to: [ctrl.tcom]}

  cond.rsig:       {kind: conductor, to: [relay.coil]}
  relay.coil:      {to: [cond.rcom], acts: [relay.contactor], fail: [broken]}
  cond.rcom:       {kind: conductor, to: [ctrl.trcom]}
  relay.line:      {to: [relay.contactor], fail: [broken]}
  relay.contactor: {to: [pump.motor], fail: [broken, clogged]}

  pump.capacitor: {acts: [pump.motor], fail: [broken]}
  pump.motor:     {acts: [pump.impeller], fail: [broken]}
