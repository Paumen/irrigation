  Z2.joint2: {kind: joint, to: [Z2.hose1], h_m: 11.2}
  Z2.hose1:  {kind: hose.25, to: [Z2.tee1], length_m: 2, h_m: 11.18}
  Z2.tee1:   {kind: tee, to: [Z2.hose2, Z2.hose3], h_m: 11.17}
  Z2.hose2:  {kind: hose.25, to: [Z2.joint3], length_m: 1, h_m: 11.12}
  Z2.joint3: {kind: joint, to: [Z2.swing1], h_m: 11.1}
  Z2.swing1: {kind: swing.34x34, to: [Z2.head1], h_m: 11.1}
