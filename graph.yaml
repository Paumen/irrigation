category:
  emitter: {requires_one: [nozzle, bore_mm]}
  fitting: {loss: k, requires: [k, max_bar], optional: [bends, bore_mm]}
  hose: {loss: hz, requires: [inner_diameter_mm, hz_c, max_bar], instance_requires: [l_m]}
  pump: {requires: [max_outlet_bar]}
  relay: {}
  source: {}
  tank: {requires: [volume_l]}
  transform: {requires: [v_outlet]}
  valve: {loss: Kv_else_k, requires_one: [Kv, k]}
  wiring: {}

components:

  control.controller:
    ports: [ac_line_1, ac_line_2, common_1, port_1, port_2, port_3, port_4, port_5, port_6, common_2, port_7, port_8, port_9, port_10, port_11, port_12]
    model: "RainMachine HD-12 TOUCH"
    parts:
      ac_line_1: {fail: [broken, misconfigured]}
      ac_line_2: {fail: [broken, misconfigured]}
      common_1: {fail: [broken, misconfigured]}
      port_1: {fail: [broken, misconfigured]}
      common_2: {fail: [broken, misconfigured]}
      port_7: {fail: [broken, misconfigured]}
      port_8: {fail: [broken, misconfigured]}
      port_9: {fail: [broken, misconfigured]}
      port_10: {fail: [broken, misconfigured]}

  emitter.rotor:
    ports: [inlet_thread]
    model: "Hunter I-20-04-SS"
    inlet_thread_conn: {size: '3/4"', gender: F, type: BSP, sealant: teflon}
    parts:
      inlet_thread: {to: [body/riser, body/check_valve], fail: [broken, misconfigured]}
      body:
        fail: [broken]
        parts:
          check_valve: {fail: [broken]}
          riser: {to: [body/filter]}
          riser_seal: {seal: [body/riser], water: pressurized, fail: [broken]}
          retract_spring: {drive: [body/riser], fail: [broken]}
          gear: {drive: [body/riser], fail: [broken, clogged]}
          filter: {to: [body/nozzle], fail: [clogged]}
          nozzle: {fail: [clogged, misconfigured]}
          arc: {condition: [body/nozzle], fail: [misconfigured]}
          flo_stop: {fail: [misconfigured]}

  emitter.spray:
    ports: [inlet_thread]
    regulated_bar: 2.76
    model: "Hunter Pro-Spray PRS40"
    inlet_thread_conn: {size: '1/2"', gender: F, type: BSP, sealant: teflon}
    parts:
      inlet_thread: {to: [body/regulator, body/check_valve, body/cap], fail: [broken, misconfigured]}
      body:
        fail: [broken]
        parts:
          cap: {fail: [broken]}
          check_valve: {fail: [broken]}
          regulator: {to: [body/riser], fail: [broken]}
          riser: {to: [body/nozzle]}
          wiper_seal: {seal: [body/riser], water: pressurized, fail: [broken]}
          retract_spring: {drive: [body/riser], fail: [broken]}
          flush_plug: {seal: [body/nozzle], fail: [misconfigured]}
          nozzle: {fail: [clogged, misconfigured]}

  emitter.stream: {ports: [inlet], bore_mm: 12, cd: 0.97, fail: [clogged, misconfigured], inlet_conn: {size: '1/2"', gender: F, type: BSP, sealant: teflon}}

  fitting.cap:
    ports: [inlet]
    k: 0
    max_bar: 10
    inlet_conn: {size: '1"', gender: M, type: BSP, sealant: teflon}   # CONFIRM (matches manifold outlet)
    parts:
      inlet: {}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      body: {fail: [broken]}
  fitting.coupling:
    ports: [inlet, outlet]
    max_bar: 10
    k: 0.1
    note: "generic adapter; exact end sizes/types vary per instance - typical: BSP male thread x LDPE compression"
    inlet_conn:  {size: varies, gender: varies, type: "BSP/compression", sealant: "teflon (thread) or compression-ring (LDPE)"}
    outlet_conn: {size: varies, gender: varies, type: "BSP/compression", sealant: "teflon (thread) or compression-ring (LDPE)"}
    parts:
      inlet: {to: [outlet]}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      outlet_seal: {seal: [outlet], fail: [broken, misconfigured]}
      body: {fail: [broken]}
      outlet: {}
  fitting.manifold:
    ports: [inlet, outlet_1, outlet_2, outlet_3, outlet_4, outlet_5, outlet_6]
    bore_mm: 25
    max_bar: 10
    bends: 1
    k: 1.5
    model: "LEV 6-way distributor"
    material: "hard plastic"
    connection: '1" swivel nut female thread'
    inlet_conn:  {size: '1"', gender: F, type: swivel-union, sealant: flat-washer}
    outlet_conn:  {size: '1"', gender: F, type: swivel-union, sealant: flat-washer}
    parts:
      inlet: {to: [outlet_1, outlet_2, outlet_3, outlet_4, outlet_5, outlet_6]}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      outlet_1_seal: {seal: [outlet_1], fail: [broken, misconfigured]}
      outlet_2_seal: {seal: [outlet_2], fail: [broken, misconfigured]}
      outlet_3_seal: {seal: [outlet_3], fail: [broken, misconfigured]}
      outlet_4_seal: {seal: [outlet_4], fail: [broken, misconfigured]}
      outlet_5_seal: {seal: [outlet_5], fail: [broken, misconfigured]}
      outlet_6_seal: {seal: [outlet_6], fail: [broken, misconfigured]}
      body: {fail: [broken]}
      outlet_1: {}
      outlet_2: {}
      outlet_3: {}
      outlet_4: {}
      outlet_5: {}
      outlet_6: {}
  fitting.sj34x12:
    ports: [inlet, outlet]
    max_bar: 10.2
    bends: 4
    bore_mm: 13
    k: 3.5
    inlet_thread: '3/4"'
    outlet_thread: '1/2"'
    model: "Hunter sj 3/4x1/2"
    inlet_conn:  {size: '3/4"', gender: M, type: BSP, sealant: teflon}
    outlet_conn: {size: '1/2"', gender: M, type: BSP, sealant: teflon}
    parts:
      inlet: {to: [outlet]}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      outlet_seal: {seal: [outlet], fail: [broken, misconfigured]}
      body: {fail: [broken]}
      outlet: {}
  fitting.sj34x34:
    ports: [inlet, outlet]
    max_bar: 10.2
    bends: 4
    bore_mm: 19
    k: 2.5
    inlet_thread: '3/4"'
    outlet_thread: '3/4"'
    model: "Hunter sj 3/4x3/4"
    inlet_conn:  {size: '3/4"', gender: M, type: BSP, sealant: teflon}
    outlet_conn: {size: '3/4"', gender: M, type: BSP, sealant: teflon}
    parts:
      inlet: {to: [outlet]}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      outlet_seal: {seal: [outlet], fail: [broken, misconfigured]}
      body: {fail: [broken]}
      outlet: {}
  fitting.tee:
    ports: [inlet, outlet_1, outlet_2]
    max_bar: 10
    bends: 1
    k: 0.9
    note: "LDPE compression tee; end size = pipe OD per instance"
    inlet_conn:    {size: "LDPE OD", gender: compression, type: compression, sealant: compression-ring}
    outlet_1_conn: {size: "LDPE OD", gender: compression, type: compression, sealant: compression-ring}
    outlet_2_conn: {size: "LDPE OD", gender: compression, type: compression, sealant: compression-ring}
    parts:
      inlet: {to: [outlet_1, outlet_2]}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      outlet_1_seal: {seal: [outlet_1], fail: [broken, misconfigured]}
      outlet_2_seal: {seal: [outlet_2], fail: [broken, misconfigured]}
      body: {fail: [broken]}
      outlet_1: {}
      outlet_2: {}

  fitting.strainer_basket:
    ports: [inlet, outlet]
    material: plastic
    max_bar: 6
    k: 1.0
    note: "coarse suction strainer basket at well inlet"
    inlet_conn:  {size: "open mesh", gender: none, type: submerged-basket, sealant: none}
    outlet_conn: {size: "fits over foot-valve strainer", gender: slip, type: clip-on, sealant: none}
    parts:
      inlet: {to: [outlet]}
      mesh: {to: [outlet], fail: [clogged]}
      body: {fail: [broken]}
      outlet: {}

  fitting.hosetail_brass:
    ports: [inlet, outlet]
    material: brass
    max_bar: 10
    k: 0.9
    note: "hose tail: foot-valve outlet -> suction hose (suction side, must be air-tight)"
    inlet_conn:  {size: '1"', gender: M, type: BSP, sealant: teflon}
    outlet_conn: {size: "25 mm", gender: barb, type: hose-tail, sealant: hose-clamp}
    parts:
      inlet: {to: [outlet]}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      outlet_seal: {seal: [outlet], fail: [broken, misconfigured]}
      body: {fail: [broken]}
      outlet: {}

  fitting.hosetail_plastic:
    ports: [inlet, outlet]
    material: "PP (polypropylene)"
    max_bar: 6
    k: 0.9
    note: "hose tail: suction hose -> pump suction (suction side, must be air-tight)"
    inlet_conn:  {size: "25 mm", gender: barb, type: hose-tail, sealant: hose-clamp}
    outlet_conn: {size: '1"', gender: M, type: BSP, sealant: teflon}
    parts:
      inlet: {to: [outlet]}
      inlet_seal: {seal: [inlet], fail: [broken, misconfigured]}
      outlet_seal: {seal: [outlet], fail: [broken, misconfigured]}
      body: {fail: [broken]}
      outlet: {}

  hose.ldpe16: {ports: [inlet, outlet], material: ldpe, roughness_mm: 0.0015, hz_c: 150, outer_diameter_mm: 16, wall_mm: 3, inner_diameter_mm: 10, max_bar: 6.3, fail: [broken, clogged], inlet_conn: {size: "16 mm OD", gender: slip, type: compression-insert, sealant: compression-ring}, outlet_conn: {size: "16 mm OD", gender: slip, type: compression-insert, sealant: compression-ring}}
  hose.ldpe25: {ports: [inlet, outlet], material: ldpe, roughness_mm: 0.0015, hz_c: 150, outer_diameter_mm: 25, wall_mm: 2.7, inner_diameter_mm: 19.6, max_bar: 6, fail: [broken, clogged], inlet_conn: {size: "25 mm OD", gender: slip, type: compression-insert, sealant: compression-ring}, outlet_conn: {size: "25 mm OD", gender: slip, type: compression-insert, sealant: compression-ring}}
  hose.ldpe32: {ports: [inlet, outlet], material: ldpe, roughness_mm: 0.0015, hz_c: 150, outer_diameter_mm: 32, wall_mm: 3, inner_diameter_mm: 26, max_bar: 6.3, fail: [broken, clogged], inlet_conn: {size: "32 mm OD", gender: slip, type: compression-insert, sealant: compression-ring}, outlet_conn: {size: "32 mm OD", gender: slip, type: compression-insert, sealant: compression-ring}}
  hose.suction: {ports: [inlet, outlet], outer_diameter_mm: 25, wall_mm: 1.0, inner_diameter_mm: 24, material: "PVC spiral-reinforced", roughness_mm: 0.0015, hz_c: 150, max_bar: 5, fail: [broken, clogged, misconfigured], inlet_conn: {size: "25 mm barb", gender: slip, type: hose-over-barb, sealant: hose-clamp}, outlet_conn: {size: "25 mm barb", gender: slip, type: hose-over-barb, sealant: hose-clamp}}
  hose.metal: {ports: [inlet, outlet], material: "stainless steel braided flex", roughness_mm: 0.015, hz_c: 130, outer_diameter_mm: 32, wall_mm: 1.5, inner_diameter_mm: 25, max_bar: 10, fail: [broken, clogged], inlet_conn: {size: '1"', gender: swivel-F, type: swivel-union, sealant: flat-washer}, outlet_conn: {size: '1"', gender: swivel-F, type: swivel-union, sealant: flat-washer}}

  pump.jet:
    ports: [suction, outlet, inlet_tank, motor/line, motor/neutral, motor/earth]
    model: "AQUAJET 132 M"
    protection_class: I
    max_outlet_bar: 4.7
    parts:
      suction: {to: [body/venturi], conn: {size: '1"', gender: F, type: BSP, sealant: teflon}}
      inlet_tank: {to: [outlet], conn: {size: '1"', gender: F, type: BSP, sealant: teflon}}
      outlet: {conn: {size: '1"', gender: F, type: BSP, sealant: teflon}}
      body:
        fail: [broken]
        parts:
          venturi: {to: [body/impeller], fail: [clogged]}
          impeller: {to: [body/diffuser], fail: [broken, clogged]}
          diffuser: {to: [outlet], fail: [broken, clogged]}
          mech_seal: {seal: [body/impeller], water: pressurized, fail: [broken]}
          priming_cap: {seal: [suction], fail: [broken, misconfigured]}
      motor:
        drive: [body/impeller]
        fail: [broken]
        parts:
          line: {to: [motor/winding], fail: [broken, misconfigured]}
          winding: {to: [motor/neutral], fail: [broken]}
          capacitor: {condition: [motor/winding], fail: [broken]}
          thermal_protector: {condition: [motor/winding], fail: [broken, misconfigured]}
          neutral: {fail: [broken, misconfigured]}
          earth: {fail: [broken]}

  relay.pumpstart:
    ports: [coil_in, coil_common, line, load_outlet, neutral, earth]
    model: "Hunter PSR-22"
    coil_energized_closes: contact
    parts:
      coil_in: {to: [coil], fail: [broken, misconfigured]}
      coil: {to: [coil_common], drive: [contact], fail: [broken]}
      coil_common: {fail: [broken, misconfigured]}
      contact: {to: [load_outlet], fail: [broken]}
      line: {to: [contact], fail: [broken, misconfigured]}
      load_outlet: {fail: [broken, misconfigured]}
      neutral: {fail: [broken, misconfigured]}
      earth: {fail: [broken]}

  source.socket:
    ports: [line, neutral, earth]
    parts:
      line: {fail: [broken]}
      neutral: {fail: [broken]}
      earth: {fail: [broken]}

  source.well: {ports: [outlet], fail: [clogged, depleted]}

  tank.diaphragm:
    ports: [outlet]
    model: "20 L diaphragm tank"
    volume_l: 20
    parts:
      outlet: {conn: {size: '1"', gender: M, type: BSP, sealant: flat-washer}}
      air_charge: {drive: [bladder]}
      shell: {fail: [broken]}
      bladder: {drive: [air_charge], water: pressurized, fail: [broken]}
      pre_charge: {fail: [broken, misconfigured]}

  transform.plug:
    ports: [line, neutral, outlet_1, outlet_2]
    v_outlet: 24
    protection_class: II
    parts:
      line: {to: [winding], fail: [broken, misconfigured]}
      neutral: {fail: [broken, misconfigured]}
      winding: {to: [neutral], condition: [outlet_1, outlet_2], fail: [broken]}
      outlet_1: {fail: [broken]}
      outlet_2: {fail: [broken]}

  valve.auto:
    ports: [inlet, outlet, solenoid/24v_1, solenoid/24v_2]
    max_bar: 10.3
    min_bar: 1.5
    Kv: 6.0
    model: "Hunter PGV-101G"
    inlet_conn:  {size: '1"', gender: F, type: BSP, sealant: teflon}
    outlet_conn: {size: '1"', gender: F, type: BSP, sealant: teflon}
    parts:
      inlet: {to: [diaphragm, diaphragm/metering_port]}
      sol_port: {to: [solenoid/entry], water: pressurized}
      outlet: {}
      body:
        fail: [broken]
        parts:
          seat: {to: [outlet], fail: [broken, clogged]}
          inlet_thread: {fail: [broken, misconfigured]}
          outlet_nut: {fail: [broken, misconfigured]}
      diaphragm:
        to: [body/seat]
        water: pressurized
        fail: [broken]
        parts:
          spring: {drive: [diaphragm], fail: [broken]}
          metering_port: {to: [bonnet/chamber], fail: [clogged]}
      bonnet:
        water: pressurized
        fail: [broken, misconfigured]
        parts:
          chamber: {to: [sol_port, bonnet/bleed_screw], drive: [diaphragm]}
          bleed_screw: {fail: [broken, misconfigured]}
          flow_control: {condition: [diaphragm], fail: [broken, misconfigured]}
      solenoid:
        model: "Hunter 458200 (24 VAC)"
        parts:
          entry: {to: [solenoid/plunger], fail: [clogged]}
          plunger: {to: [solenoid/exhaust], fail: [broken, clogged]}
          exhaust: {to: [outlet], fail: [clogged]}
          24v_1: {to: [solenoid/coil], fail: [broken]}
          coil: {ohm: [20, 60], to: [solenoid/24v_2], drive: [solenoid/plunger], fail: [broken]}
          24v_2: {fail: [broken]}

  valve.foot:
    ports: [strainer, outlet]
    max_bar: 10
    k: 2.5
    model: 'brass foot valve 1" with strainer'
    material: brass
    strainer_conn: {size: "open brass strainer", gender: none, type: submerged, sealant: none}
    outlet_conn:   {size: '1"', gender: F, type: BSP, sealant: teflon}
    parts:
      strainer: {to: [seat], fail: [clogged]}
      seat: {to: [outlet], fail: [broken, clogged]}
      spring: {drive: [seat], fail: [broken]}
      outlet: {}

  valve.manual:
    ports: [inlet, outlet]
    Kv: 6.0
    inlet_conn:  {size: '1/2"', gender: F, type: BSP, sealant: teflon}
    outlet_conn: {size: '1/2"', gender: F, type: BSP, sealant: teflon}
    parts:
      inlet: {to: [body/seat]}
      outlet: {}
      body:
        fail: [broken]
        parts:
          seat: {to: [outlet], fail: [broken, clogged]}
          inlet_thread: {fail: [broken, misconfigured]}
          handle: {drive: [body/seat], fail: [misconfigured]}

  wiring.splice: {ports: [inlet, outlet_1, outlet_2], fail: [broken, misconfigured]}
  wiring.230v:
    ports: [line/inlet, line/outlet, neutral/inlet, neutral/outlet, earth/inlet, earth/outlet]
    fail: [broken, misconfigured]
    parts:
      line: {fail: [broken, misconfigured]}
      neutral: {fail: [broken, misconfigured]}
      earth: {fail: [broken, misconfigured]}
  wiring.24v: {ports: [inlet, outlet], fail: [broken, misconfigured ]}

water:
  W1_source.well: {to: [W1_fitting.strainer_basket], h_m: 5.5}
  W1_fitting.strainer_basket: {to: [W1_valve.foot/strainer], h_m: 4.8}
  W1_valve.foot: {to: [W1_fitting.hosetail_brass], h_m: 4.8}
  W1_fitting.hosetail_brass: {to: [W1_hose.suction], h_m: 4.8}
  W1_hose.suction: {to: [W1_fitting.hosetail_plastic], l_m: 4.5, h_m: 4.8}
  W1_fitting.hosetail_plastic: {to: [W1_pump.jet/suction], h_m: 8.2}
  W1_hose.ldpe32: {to: [W1_fitting.coupling_1], l_m: 1, h_m: 8.2}
  W1_pump.jet: {to: {outlet: [W1_fitting.coupling_2], inlet_tank: [W1_hose.metal]}, h_m: 8.2}
  W1_hose.metal: {to: [W1_tank.diaphragm/outlet], l_m: 0.5, h_m: 8.2}
  W1_tank.diaphragm: {h_m: 8.2}
  W1_fitting.coupling_2: {to: [W1_hose.ldpe32], h_m: 8.2}
  W1_fitting.coupling_1: {to: [P1_hose.ldpe32], h_m: 8.2}

  P1_hose.ldpe32: {to: [P1_fitting.coupling], l_m: 20, h_m: 8.2}

  V1_fitting.coupling: {to: [V1_fitting.manifold], h_m: 11.2}
  V1_fitting.manifold:
    to:
      outlet_1: [Z2_fitting.coupling_1]
      outlet_2: [Z3_fitting.coupling_1]
      outlet_3: [Z5_fitting.coupling_1]
      outlet_4: [Z4_fitting.coupling_1]
      outlet_5: [Z1_fitting.coupling_1]
      outlet_6: [Z6_fitting.cap]
    h_m: 11.2

  Z2_emitter.rotor: {nozzle: "4.0 blue", arc: 170, h_m: 11.6}
  Z2_emitter.spray_1: {nozzle: MP3000, arc: 270, h_m: 10.5}
  Z2_emitter.spray_2: {nozzle: MP2000, arc: 180, h_m: 11.4}
  Z2_fitting.coupling_1: {to: [Z2_valve.auto], h_m: 11.2}
  Z2_fitting.coupling_2: {to: [Z2_hose.ldpe25_1], h_m: 11.2}
  Z2_fitting.coupling_3: {to: [Z2_fitting.sj34x12_1], h_m: 10.5}
  Z2_fitting.coupling_4: {to: [Z2_fitting.sj34x12_2], h_m: 11.4}
  Z2_fitting.sj34x12_1: {to: [Z2_emitter.spray_1], h_m: 10.5}
  Z2_fitting.sj34x12_2: {to: [Z2_emitter.spray_2], h_m: 11.4}
  Z2_fitting.sj34x34: {to: [Z2_emitter.rotor], h_m: 11.6}
  Z2_fitting.tee_1: {to: {outlet_1: [Z2_hose.ldpe25_2], outlet_2: [Z2_hose.ldpe25_3]}, h_m: 11.2}
  Z2_fitting.tee_2: {to: {outlet_1: [Z2_fitting.sj34x34], outlet_2: [Z2_hose.ldpe25_4]}, h_m: 11.4}
  Z2_hose.ldpe25_1: {to: [Z2_fitting.tee_1], l_m: 8, h_m: 11.2}
  Z2_hose.ldpe25_2: {to: [Z2_fitting.coupling_3], l_m: 7, h_m: 10.7}
  Z2_hose.ldpe25_3: {to: [Z2_fitting.tee_2], l_m: 3, h_m: 11.4}
  Z2_hose.ldpe25_4: {to: [Z2_fitting.coupling_4], l_m: 17, h_m: 11.3}
  Z2_valve.auto: {to: [Z2_fitting.coupling_2], h_m: 11.2}

  Z3_emitter.rotor_1: {nozzle: "2.5 blue", arc: 150, h_m: 11.1}
  Z3_emitter.rotor_2: {nozzle: "5.0 blue", arc: 270, h_m: 11.2}
  Z3_fitting.coupling_1: {to: [Z3_valve.auto], h_m: 11.2}
  Z3_fitting.coupling_2: {to: [Z3_hose.ldpe25_1], h_m: 11.2}
  Z3_fitting.coupling_3: {to: [Z3_fitting.sj34x34_1], h_m: 11.1}
  Z3_fitting.coupling_4: {to: [Z3_fitting.sj34x34_2], h_m: 11.2}
  Z3_fitting.sj34x34_1: {to: [Z3_emitter.rotor_1], h_m: 11.1}
  Z3_fitting.sj34x34_2: {to: [Z3_emitter.rotor_2], h_m: 11.2}
  Z3_fitting.tee: {to: {outlet_1: [Z3_hose.ldpe25_2], outlet_2: [Z3_hose.ldpe25_3]}, h_m: 11.2}
  Z3_hose.ldpe25_1: {to: [Z3_fitting.tee], l_m: 2, h_m: 11.2}
  Z3_hose.ldpe25_2: {to: [Z3_fitting.coupling_3], l_m: 1, h_m: 11.1}
  Z3_hose.ldpe25_3: {to: [Z3_fitting.coupling_4], l_m: 9, h_m: 11.2}
  Z3_valve.auto: {to: [Z3_fitting.coupling_2], h_m: 11.2}

