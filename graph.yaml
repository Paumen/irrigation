      line: {to: [transform/line], fail: [broken, misconfigured]}
      neutral: {to: [transform/neutral], fail: [broken, misconfigured]}
      transform:
        v_outlet: 24
        protection_class: II
        parts:
          line: {to: [transform/winding], fail: [broken, misconfigured]}
          neutral: {fail: [broken, misconfigured]}
          winding: {to: [transform/neutral], condition: [transform/outlet_1, transform/outlet_2], fail: [broken]}
          outlet_1: {to: [ac_line_1], fail: [broken]}
          outlet_2: {to: [ac_line_2], fail: [broken]}
      ac_line_1: {fail: [broken, misconfigured]}
      ac_line_2: {fail: [broken, misconfigured]}
      common_1: {fail: [broken, misconfigured]}
      port_1: {fail: [broken, misconfigured]}
      port_2: {fail: [broken, misconfigured]}
      port_3: {fail: [broken, misconfigured]}
      port_4: {fail: [broken, misconfigured]}
      port_5: {fail: [broken, misconfigured]}
      port_6: {fail: [broken, misconfigured]}
      common_2: {fail: [broken, misconfigured]}
      port_7: {fail: [broken, misconfigured]}
      port_8: {fail: [broken, misconfigured]}
      port_9: {fail: [broken, misconfigured]}
      port_10: {fail: [broken, misconfigured]}
      port_11: {fail: [broken, misconfigured]}
