circuit:

  grid_socket:    {kind: socket.earthed, to: {l: wire1, n: wire2, pe: wire3}}
  wire1:      {kind: wire, voltage: high, to: [relay.line_in]}
  wire2:   {kind: wire, voltage: high, to: [relay.neutral]}
  wire3:     {kind: wire, voltage: high, to: [relay.earth]}
  relay:          {kind: relay, to: {load_out: wire4, neutral: wire5, earth: wire6, coil_com: wire12}}
  wire4:      {kind: wire, voltage: high, to: [pump.l]}
  wire5:   {kind: wire, voltage: high, to: [pump.n]}
  wire6:     {kind: wire, voltage: high, to: [pump.pe]}

  adapter_socket:         {kind: socket, to: {l: wire7, n: wire8}}
  wire7:    {kind: wire, voltage: high, to: [adapter.ac_l]}
  wire8: {kind: wire, voltage: high, to: [adapter.ac_n]}
  adapter:                {kind: adapter, to: {out_1: wire9, out_2: wire10}}
  wire9:       {kind: wire, voltage: low, to: [controller.ac_1]}
  wire10:       {kind: wire, voltage: low, to: [controller.ac_2]}

  controller:   {kind: controller, to: {mv: wire11, zone_1: wire13, zone_2: wire14, zone_3: wire15, zone_4: wire16, c_2: wire17}}
  wire11: {kind: wire, voltage: low, port: controller.bottom, to: [relay.coil_in]}
  wire12: {kind: wire, voltage: low, port: controller.bottom, to: [controller.c_1]}

  wire13: {kind: wire, voltage: low, to: [splice1]}
  wire14: {kind: wire, voltage: low, to: [splice2]}
  wire15: {kind: wire, voltage: low, to: [splice3]}
  wire16: {kind: wire, voltage: low, to: [splice4]}

  splice1: {kind: splice, to: [Z1.valve.coil]}
  splice2: {kind: splice, to: [Z2.valve.coil]}
  splice3: {kind: splice, to: [Z3.valve.coil]}
  splice4: {kind: splice, to: [Z4.valve.coil]}

  wire17:    {kind: wire, voltage: low, to: [splice5]}
  splice5:   {kind: splice, to: [Z1.valve.coil, wire18]}
  wire18: {kind: wire, voltage: low, to: [splice6]}
  splice6:   {kind: splice, to: [Z2.valve.coil, wire19]}
  wire19: {kind: wire, voltage: low, to: [splice7]}
  splice7:   {kind: splice, to: [Z3.valve.coil, wire20]}
  wire20: {kind: wire, voltage: low, to: [splice8]}
  splice8:   {kind: splice, to: [Z4.valve.coil]}
