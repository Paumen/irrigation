electrical:

  S1_source.socket:
    to:
      line: [S1_wiring.230v_1/line/inlet]
      neutral: [S1_wiring.230v_1/neutral/inlet]
      earth: [S1_wiring.230v_1/earth/inlet]
  S1_wiring.230v_1:
    to:
      line/outlet: [S1_relay.pumpstart/line]
      neutral/outlet: [S1_relay.pumpstart/neutral]
      earth/outlet: [S1_relay.pumpstart/earth]
  S1_relay.pumpstart:
    to:
      load_outlet: [S1_wiring.230v_2/line/inlet]
      neutral: [S1_wiring.230v_2/neutral/inlet]
      earth: [S1_wiring.230v_2/earth/inlet]
      coil_common: [S1_wiring.24v_2]
  S1_wiring.230v_2:
    to:
      line/outlet: [W1_source.socket/line]
      neutral/outlet: [W1_source.socket/neutral]
      earth/outlet: [W1_source.socket/earth]

  W1_source.socket:
    to:
      line: [W1_pump.jet/motor/line]
      neutral: [W1_pump.jet/motor/neutral]
      earth: [W1_pump.jet/motor/earth]

  H1_source.socket:
    to:
      line: [H1_wiring.230v_1/line/inlet]
      neutral: [H1_wiring.230v_1/neutral/inlet]
  H1_wiring.230v_1:
    to:
      line/outlet: [H1_control.controller/line]
      neutral/outlet: [H1_control.controller/neutral]

  H1_control.controller:
    to:
      port_1: [S1_wiring.24v_1]
      port_7: [P1_wiring.24v/signal_1/inlet]
      port_8: [P1_wiring.24v/signal_2/inlet]
      port_9: [P1_wiring.24v/signal_3/inlet]
      port_10: [P1_wiring.24v/signal_4/inlet]
  S1_wiring.24v_1: {to: [S1_relay.pumpstart/coil_in]}
  S1_wiring.24v_2: {to: [H1_control.controller/common_1]}

  # home-run bundle: 4 signal cores (1 per zone) + shared common, controller -> valve box
  P1_wiring.24v:
    to:
      signal_1/outlet: [Z2_wiring.splice]
      signal_2/outlet: [Z3_wiring.splice]
      signal_3/outlet: [Z5_wiring.splice]
      signal_4/outlet: [Z4_wiring.splice]
      common/outlet: [H1_control.controller/common_2]
  Z2_wiring.splice: {to: {outlet_1: [Z2_valve.auto/solenoid/24v_2]}}
  Z3_wiring.splice: {to: {outlet_1: [Z3_valve.auto/solenoid/24v_2]}}
  Z5_wiring.splice: {to: {outlet_1: [Z5_valve.auto/solenoid/24v_2]}}
  Z4_wiring.splice: {to: {outlet_1: [Z4_valve.auto/solenoid/24v_2]}}

  Z2_valve.auto: {to: {solenoid/24v_1: [V1_wiring.splice_1]}}
  Z3_valve.auto: {to: {solenoid/24v_1: [V1_wiring.splice_2/outlet_2]}}
  Z5_valve.auto: {to: {solenoid/24v_1: [V1_wiring.splice_3/outlet_2]}}
  Z4_valve.auto: {to: {solenoid/24v_1: [V1_wiring.splice_4/outlet_2]}}
  V1_wiring.splice_1: {to: {outlet_1: [V1_wiring.24v_1]}}
  V1_wiring.24v_1: {to: [V1_wiring.splice_2]}
  V1_wiring.splice_2: {to: {outlet_1: [V1_wiring.24v_2]}}
  V1_wiring.24v_2: {to: [V1_wiring.splice_3]}
  V1_wiring.splice_3: {to: {outlet_1: [V1_wiring.24v_3]}}
  V1_wiring.24v_3: {to: [V1_wiring.splice_4]}
  V1_wiring.splice_4: {to: {outlet_1: [P1_wiring.24v/common/inlet]}}
