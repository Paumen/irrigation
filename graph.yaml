
# Single source of truth for the sim. Three sections:
#   kinds   - component types. Leaf kinds are atomic; assembly kinds carry a `parts:`
#             tree. In an assembly, a sub-node is EITHER a void (a fluid/electrical
#             state - has no `fail:`) OR a part (solid, replaceable - carries `fail:`).
#             A sub-assembly node is its own major component (carries its `fail:`/`acts:`)
#             and nests the serviceable parts inside it. Cross-sub-assembly references
#             use the dotted path; bus voids at the kind's top level are bare names.
#   flow    - the hydraulic network (array `to:` edges, tree rooted at the well).
#   circuit - the electrical network as { parts, wires }: parts are multi-terminal
#             components with internal continuity; wires are the cables between ports.

kinds:

  supply:        {fail: [clogged]}
  splice:        {fail: [broken, misconfigured]}
  wire:          {fail: [broken]}

  # fittings: passive plumbing connectors. joint/tee/cap are zero-length (junctions);
  # the swing joints are short flexible risers (hydraulically pipes).
  fitting.joint:       {max_pressure_bar: 10, k_minor: 0.1, fail: [broken, misconfigured]}
  fitting.tee:         {max_pressure_bar: 10, bends: 1, k_minor: 0.9, fail: [broken, misconfigured]}
  fitting.cap:         {max_pressure_bar: 10, fail: [broken]}
  fitting.swing.34x34: {max_pressure_bar: 10.2, bore_mm: 19, bends: 4, k_minor: 2.5, model: "Hunter SJ 3/4x3/4", fail: [broken]}
  fitting.swing.34x12: {max_pressure_bar: 10.2, bore_mm: 13, bends: 4, k_minor: 3.5, model: "Hunter SJ 3/4x1/2", fail: [broken]}

  hose.32:       {outer_diameter_mm: 32, wall_thickness_mm: 3,   inner_diameter_mm: 26,   material: LDPE, roughness_mm: 0.0015, hazen_williams_c: 150, max_pressure_bar: 6.3, fail: [broken, clogged]}
  hose.25:       {outer_diameter_mm: 25, wall_thickness_mm: 2.7, inner_diameter_mm: 19.6, material: LDPE, roughness_mm: 0.0015, hazen_williams_c: 150, max_pressure_bar: 6,   fail: [broken, clogged]}
  hose.16:       {outer_diameter_mm: 16, wall_thickness_mm: 3,   inner_diameter_mm: 10,   material: LDPE, roughness_mm: 0.0015, hazen_williams_c: 150, max_pressure_bar: 6.3, fail: [broken, clogged]}
  hose.suction:  {outer_diameter_mm: 30, wall_thickness_mm: 2.4, inner_diameter_mm: 25,   material: PVC spiral-reinforced, roughness_mm: 0.0015, hazen_williams_c: 150, max_pressure_bar: 4, fail: [broken, clogged]}
  nozzle.stream: {bore_mm: 10, cd: 0.97, discharge: open_hose_end, fail: [clogged, misconfigured]}

  # The jet pump: a wet end (hydraulic_end) and a dry end (motor), siblings under one
  # assembly. suction/outlet are the hydraulic bus voids. The single dry/wet coupling is
  # motor -> hydraulic_end.impeller (the shaft spins the impeller).
  pump:
    in: suction
    out: outlet
    model: AQUAJET 132 M
    max_output_bar: 4.7
    parts:
      suction:  {to: [hydraulic_end.venturi, hydraulic_end.impeller]}
      outlet:   {}
      hydraulic_end:
        fail: [broken]
        parts:
          venturi:     {to: [suction], fail: [clogged]}
          impeller:    {to: [diffuser], fail: [broken, clogged]}
          diffuser:    {to: [outlet], fail: [broken, clogged]}
          mech_seal:   {acts: [impeller], fail: [broken]}
          priming_cap: {acts: [suction], fail: [broken, misconfigured]}
      motor:
        fail: [broken]
        acts: [hydraulic_end.impeller]
        parts:
          l:                {to: [winding], fail: [broken, misconfigured]}
          winding:          {to: [n], fail: [broken]}
          capacitor:        {acts: [winding], fail: [broken]}
          thermal_protector: {acts: [winding], fail: [broken, misconfigured]}
          n:                {fail: [broken, misconfigured]}
          pe:               {fail: [broken]}

  # 20 L diaphragm pressure tank, tee'd off the discharge. water_side/air_charge are
  # voids (states); only shell:broken is visible to a steady-state solve (a leak) -
  # bladder/pre_charge faults are cycling effects.
  tank:
    model: 20 L diaphragm tank
    parts:
      water_side: {}
      air_charge: {acts: [bladder]}
      shell:      {fail: [broken]}
      bladder:    {acts: [air_charge], fail: [broken]}
      pre_charge: {fail: [broken, misconfigured]}

  manifold:
    in: inlet
    out: [out_1, out_2, out_3, out_4, out_5, out_6]
    bore_mm: 25
    max_pressure_bar: 10
    bends: 1
    k_minor: 1.5
    model: LEV 6-way distributor
    material: hard plastic
    connection: '1" swivel nut female thread'
    parts:
      inlet:       {to: [out_1, out_2, out_3, out_4, out_5, out_6, body, inlet_seal]}
      inlet_seal:  {acts: [inlet], fail: [broken, misconfigured]}
      port_seal_1: {acts: [out_1], fail: [broken, misconfigured]}
      port_seal_2: {acts: [out_2], fail: [broken, misconfigured]}
      port_seal_3: {acts: [out_3], fail: [broken, misconfigured]}
      port_seal_4: {acts: [out_4], fail: [broken, misconfigured]}
      port_seal_5: {acts: [out_5], fail: [broken, misconfigured]}
      port_seal_6: {acts: [out_6], fail: [broken, misconfigured]}
      body:        {fail: [broken]}
      out_1:       {}
      out_2:       {}
      out_3:       {}
      out_4:       {}
      out_5:       {}
      out_6:       {}

  socket.earthed:
    parts:
      l:  {fail: [broken]}
      n:  {fail: [broken]}
      pe: {fail: [broken]}

  socket:
    parts:
      l: {fail: [broken]}
      n: {fail: [broken]}

  adapter:
    parts:
      ac_l:    {to: [winding], fail: [broken, misconfigured]}
      ac_n:    {fail: [broken, misconfigured]}
      winding: {to: [ac_n], acts: [out_1, out_2], fail: [broken]}
      out_1:   {fail: [broken]}
      out_2:   {fail: [broken]}

  controller:
    model: RainMachine HD-16 TOUCH
    pump_lead_s: 5
    parts:
      ac_1:   {to: [logic], fail: [broken, misconfigured]}
      ac_2:   {to: [logic], fail: [broken, misconfigured]}
      logic:  {to: [zone_1, zone_2, zone_3, zone_4, mv], fail: [broken, misconfigured]}
      zone_1: {fail: [broken, misconfigured]}
      zone_2: {fail: [broken, misconfigured]}
      zone_3: {fail: [broken, misconfigured]}
      zone_4: {fail: [broken, misconfigured]}
      mv:     {fail: [broken, misconfigured]}
      c_1:    {to: [c_2], fail: [broken, misconfigured]}
      c_2:    {fail: [broken, misconfigured]}

  relay:
    model: Hunter PSR-22
    coil_energized_closes: contact
    parts:
      coil_in:  {to: [coil],     fail: [broken, misconfigured]}
      coil:     {to: [coil_com], acts: [contact], fail: [broken]}
      coil_com: {fail: [broken, misconfigured]}
      contact:  {to: [load_out], fail: [broken]}
      line_in:  {to: [contact],  fail: [broken, misconfigured]}
      load_out: {fail: [broken, misconfigured]}
      neutral:  {fail: [broken, misconfigured]}
      earth:    {fail: [broken]}

  # The automatic valve. inlet/chamber/sol_port/outlet are the hydraulic bus voids; the
  # solid parts (body, diaphragm, bonnet, solenoid) bound and act on them. The solenoid
  # is the pilot cartridge - its own subsystem, with its electrical leads reached from
  # the circuit as Z*.valve.solenoid.lead_1 / .lead_2.
  valve.auto:
    in: inlet
    out: outlet
    max_pressure_bar: 10.3
    min_operating_bar: 1.5
    Kv: 6.0
    model: Hunter PGV-101G
    parts:
      inlet:    {to: [diaphragm, diaphragm.metering_port, body.inlet_thread]}
      chamber:  {to: [sol_port, bonnet.bleed_screw], acts: [diaphragm]}
      sol_port: {to: [solenoid.entry]}
      outlet:   {}
      body:
        fail: [broken]
        acts: [seat]
        parts:
          seat:         {to: [outlet], fail: [broken, clogged]}
          inlet_thread: {fail: [broken, misconfigured]}
          outlet_nut:   {fail: [broken, misconfigured]}
      diaphragm:
        to: [body.seat]
        fail: [broken]
        parts:
          spring:        {acts: [diaphragm], fail: [broken]}
          metering_port: {to: [chamber], fail: [clogged]}
      bonnet:
        acts: [chamber]
        fail: [broken, misconfigured]
        parts:
          bleed_screw:  {fail: [broken, misconfigured]}
          flow_control: {acts: [diaphragm], fail: [broken, misconfigured]}
      solenoid:
        in: entry
        out: exhaust
        model: Hunter 458200 (24 VAC)
        parts:
          entry:   {to: [plunger], fail: [clogged]}
          plunger: {to: [exhaust], fail: [broken, clogged]}
          exhaust: {to: [outlet], fail: [clogged]}
          lead_1:  {to: [coil], fail: [broken]}
          coil:    {ohm: [20, 60], to: [lead_2], acts: [plunger], fail: [broken]}
          lead_2:  {fail: [broken]}

  valve.foot:
    in: strainer
    out: outlet
    max_pressure_bar: 10
    k_minor: 2.5
    model: 'brass foot valve 1" with strainer'
    parts:
      strainer: {to: [seat], fail: [clogged]}
      seat:     {to: [outlet], fail: [broken, clogged]}
      spring:   {acts: [seat], fail: [broken]}
      outlet:   {}

  valve.manual:
    in: inlet
    out: outlet
    Kv: 6.0
    parts:
      inlet:    {to: [body.seat, body.inlet_thread]}
      outlet:   {}
      body:
        fail: [broken]
        parts:
          seat:         {to: [outlet], fail: [broken, clogged]}
          inlet_thread: {fail: [broken, misconfigured]}
      handle:   {acts: [body.seat], fail: [misconfigured]}

  head.rotor:
    in: inlet_thread
    model: Hunter I-20-04-SS
    parts:
      inlet_thread:   {to: [body], fail: [broken, misconfigured]}
      body:           {to: [riser, check_valve], fail: [broken]}
      check_valve:    {fail: [broken]}
      riser:          {to: [filter]}
      riser_seal:     {acts: [riser], fail: [broken]}
      retract_spring: {acts: [riser], fail: [broken]}
      gear:           {acts: [riser], fail: [broken, clogged]}
      filter:         {to: [nozzle], fail: [clogged]}
      nozzle:         {fail: [clogged, misconfigured]}
      arc:            {acts: [nozzle], fail: [misconfigured]}
      flow_stop:      {acts: [nozzle]}

  head.spray:
    in: inlet_thread
    regulated_bar: 2.76
    model: Hunter Pro-Spray PRS40
    parts:
      inlet_thread:   {to: [body], fail: [broken, misconfigured]}
      body:           {to: [regulator, check_valve, cap], fail: [broken]}
      cap:            {fail: [broken]}
      check_valve:    {fail: [broken]}
      regulator:      {to: [riser], fail: [broken]}
      riser:          {to: [nozzle]}
      wiper_seal:     {acts: [riser], fail: [broken]}
      retract_spring: {acts: [riser], fail: [broken]}
      flush_plug:     {acts: [nozzle], fail: [misconfigured]}
      nozzle:         {fail: [clogged, misconfigured]}

flow:
  well:      {kind: supply, to: [footvalve], h_m: 5.5}
  footvalve: {kind: valve.foot, to: [hose1], h_m: 4.8}
  hose1:     {kind: hose.suction, to: [pump], length_m: 4.5, h_m: 4.8}
  pump:      {kind: pump, to: [joint1], h_m: 8.2}
  joint1:    {kind: fitting.tee, to: [tank, hose2], h_m: 8.2}
  tank:      {kind: tank, h_m: 8.2}
  hose2:     {kind: hose.32, to: [joint2], length_m: 1, h_m: 8.2}
  joint2:    {kind: fitting.joint, to: [hose3], h_m: 8.2}
  hose3:     {kind: hose.32, to: [joint3], length_m: 20, h_m: 8.2}
  joint3:    {kind: fitting.joint, to: [manifold], h_m: 11.2}
  manifold:  {kind: manifold, to: [Z1.joint1, Z2.joint1, Z3.joint1, Z4.joint1, Z5.joint1, Z6.cap], h_m: 11.2}

  Z1.joint1: {kind: fitting.joint, to: [Z1.valve], h_m: 11.2}
  Z1.valve:  {kind: valve.auto, to: [Z1.joint2], h_m: 11.2}
  Z1.joint2: {kind: fitting.joint, to: [Z1.hose1], h_m: 11.2}
  Z1.hose1:  {kind: hose.25, to: [Z1.tee1], length_m: 8, h_m: 11.2}
  Z1.tee1:   {kind: fitting.tee, to: [Z1.hose2, Z1.hose3], h_m: 11.19}
  Z1.hose2:  {kind: hose.25, to: [Z1.joint3], length_m: 7, h_m: 10.66}
  Z1.joint3: {kind: fitting.joint, to: [Z1.swing1], h_m: 10.5}
  Z1.swing1: {kind: fitting.swing.34x12, to: [Z1.head1], h_m: 10.5}
  Z1.head1:  {kind: head.spray, nozzle: MP3000, arc: 270, h_m: 10.5}
  Z1.hose3:  {kind: hose.25, to: [Z1.tee2], length_m: 3, h_m: 11.41}
  Z1.tee2:   {kind: fitting.tee, to: [Z1.swing2, Z1.hose4], h_m: 11.44}
  Z1.swing2: {kind: fitting.swing.34x34, to: [Z1.head2], h_m: 11.6}
  Z1.head2:  {kind: head.rotor, nozzle: "4.0 blue", arc: 170, h_m: 11.6}
  Z1.hose4:  {kind: hose.25, to: [Z1.joint4], length_m: 17, h_m: 11.34}
  Z1.joint4: {kind: fitting.joint, to: [Z1.swing3], h_m: 11.4}
  Z1.swing3: {kind: fitting.swing.34x12, to: [Z1.head3], h_m: 11.4}
  Z1.head3:  {kind: head.spray, nozzle: MP2000, arc: 180, h_m: 11.4}

  Z2.joint1: {kind: fitting.joint, to: [Z2.valve], h_m: 11.2}
  Z2.valve:  {kind: valve.auto, to: [Z2.joint2], h_m: 11.2}
  Z2.joint2: {kind: fitting.joint, to: [Z2.hose1], h_m: 11.2}
  Z2.hose1:  {kind: hose.25, to: [Z2.tee1], length_m: 2, h_m: 11.18}
  Z2.tee1:   {kind: fitting.tee, to: [Z2.hose2, Z2.hose3], h_m: 11.17}
  Z2.hose2:  {kind: hose.25, to: [Z2.joint3], length_m: 1, h_m: 11.12}
  Z2.joint3: {kind: fitting.joint, to: [Z2.swing1], h_m: 11.1}
  Z2.swing1: {kind: fitting.swing.34x34, to: [Z2.head1], h_m: 11.1}
  Z2.head1:  {kind: head.rotor, nozzle: "2.5 blue", arc: 150, h_m: 11.1}
  Z2.hose3:  {kind: hose.25, to: [Z2.joint4], length_m: 9, h_m: 11.2}
  Z2.joint4: {kind: fitting.joint, to: [Z2.swing2], h_m: 11.2}
  Z2.swing2: {kind: fitting.swing.34x34, to: [Z2.head2], h_m: 11.2}
  Z2.head2:  {kind: head.rotor, nozzle: "5.0 blue", arc: 270, h_m: 11.2}

  Z3.joint1: {kind: fitting.joint, to: [Z3.valve], h_m: 11.2}
  Z3.valve:  {kind: valve.auto, to: [Z3.joint2], h_m: 11.2}
  Z3.joint2: {kind: fitting.joint, to: [Z3.hose1], h_m: 11.2}
  Z3.hose1:  {kind: hose.25, to: [Z3.tee1], length_m: 20, h_m: 10.87}
  Z3.tee1:   {kind: fitting.tee, to: [Z3.hose2, Z3.hose3], h_m: 10.55}
  Z3.hose2:  {kind: hose.25, to: [Z3.joint3], length_m: 3, h_m: 10.27}
  Z3.joint3: {kind: fitting.joint, to: [Z3.swing1], h_m: 10.2}
  Z3.swing1: {kind: fitting.swing.34x34, to: [Z3.head1], h_m: 10.2}
  Z3.head1:  {kind: head.rotor, nozzle: "5.0 blue", arc: 270, h_m: 10.2}
  Z3.hose3:  {kind: hose.25, to: [Z3.joint4], length_m: 12, h_m: 10.63}
  Z3.joint4: {kind: fitting.joint, to: [Z3.swing2], h_m: 10.5}
  Z3.swing2: {kind: fitting.swing.34x34, to: [Z3.head2], h_m: 10.5}
  Z3.head2:  {kind: head.rotor, nozzle: "2.5 blue", arc: 180, h_m: 10.5}

  Z4.joint1: {kind: fitting.joint, to: [Z4.valve], h_m: 11.2}
  Z4.valve:  {kind: valve.auto, to: [Z4.joint2], h_m: 11.2}
  Z4.joint2: {kind: fitting.joint, to: [Z4.hose1], h_m: 11.2}
  Z4.hose1:  {kind: hose.25, to: [Z4.tee1], length_m: 9, h_m: 11.3}
  Z4.tee1:   {kind: fitting.tee, to: [Z4.hose2, Z4.hose3], h_m: 11.4}
  Z4.hose2:  {kind: hose.25, to: [Z4.joint3], length_m: 2, h_m: 11.29}
  Z4.joint3: {kind: fitting.joint, to: [Z4.swing1], h_m: 11.3}
  Z4.swing1: {kind: fitting.swing.34x12, to: [Z4.head1], h_m: 11.3}
  Z4.head1:  {kind: head.spray, nozzle: MP3000, arc: 270, h_m: 11.3}
  Z4.hose3:  {kind: hose.25, to: [Z4.tee2], length_m: 8, h_m: 11.57}
  Z4.tee2:   {kind: fitting.tee, to: [Z4.hose4, Z4.hose5], h_m: 11.68}
  Z4.hose4:  {kind: hose.25, to: [Z4.swing2], length_m: 6, h_m: 11.9}
  Z4.swing2: {kind: fitting.swing.34x12, to: [Z4.head2], h_m: 12.0}
  Z4.head2:  {kind: head.spray, nozzle: MP1000, arc: 210, h_m: 12.0}
  Z4.hose5:  {kind: hose.25, to: [Z4.joint4], length_m: 19, h_m: 11.79}
  Z4.joint4: {kind: fitting.joint, to: [Z4.swing3], h_m: 12.0}
  Z4.swing3: {kind: fitting.swing.34x12, to: [Z4.head3], h_m: 12.0}
  Z4.head3:  {kind: head.spray, nozzle: MP2000, arc: 270, h_m: 12.0}

  Z5.joint1: {kind: fitting.joint, to: [Z5.hose1], h_m: 11.2}
  Z5.hose1:  {kind: hose.16, to: [Z5.joint2], length_m: 10, h_m: 11.45}
  Z5.joint2: {kind: fitting.joint, to: [Z5.hose2], h_m: 11.7}
  Z5.hose2:  {kind: hose.16, to: [Z5.valve], length_m: 10, h_m: 11.95}
  Z5.valve:  {kind: valve.manual, to: [Z5.hose3], h_m: 12.2}
  Z5.hose3:  {kind: hose.16, to: [Z5.nozzle], length_m: 10, h_m: 12.2}
  Z5.nozzle: {kind: nozzle.stream, h_m: 12.2}

  Z6.cap:    {kind: fitting.cap, h_m: 11.2}

# Electrical network. parts = multi-terminal components (internal continuity via each
# port's `to:`); wires = named cables between ports (`from`/`to`). The four zone
# solenoids live inside their valves (flow side) and are reached here as
# Z*.valve.solenoid.lead_1 (feed) / .lead_2 (common return). The pump motor likewise is
# pump.motor.{l,n,pe}. `acts:` is control coupling, never galvanic - never a wire.
circuit:
  parts:
    grid_socket:    {kind: socket.earthed}
    adapter_socket: {kind: socket}
    adapter:        {kind: adapter}
    controller:     {kind: controller}
    relay:          {kind: relay}
    # common-return terminal block: one tap per zone, bridged only by the chain wires
    splice:
      com_1: {fail: [broken]}
      com_2: {fail: [broken]}
      com_3: {fail: [broken]}
      com_4: {fail: [broken]}

  wires:
    grid_live:            {from: grid_socket.l,  to: relay.line_in}
    grid_neutral:         {from: grid_socket.n,  to: relay.neutral}
    grid_earth:           {from: grid_socket.pe, to: relay.earth}

    pump_live:            {from: relay.load_out, to: pump.motor.l}
    pump_neutral:         {from: relay.neutral,  to: pump.motor.n}
    pump_earth:           {from: relay.earth,    to: pump.motor.pe}

    adapter_socket_live:  {from: adapter_socket.l, to: adapter.ac_l}
    adapter_socket_neut:  {from: adapter_socket.n, to: adapter.ac_n}
    adapter_supply_1:     {from: adapter.out_1,    to: controller.ac_1}
    adapter_supply_2:     {from: adapter.out_2,    to: controller.ac_2}

    signal_relay:         {from: controller.mv,      to: relay.coil_in}
    relay_return:         {from: relay.coil_com,     to: controller.c_1}

    signal_1:             {from: controller.zone_1,  to: Z1.valve.solenoid.lead_1}
    signal_2:             {from: controller.zone_2,  to: Z2.valve.solenoid.lead_1}
    signal_3:             {from: controller.zone_3,  to: Z3.valve.solenoid.lead_1}
    signal_4:             {from: controller.zone_4,  to: Z4.valve.solenoid.lead_1}

    common_return:        {from: controller.c_2,           to: splice.com_4}
    common_chain_34:      {from: splice.com_4,             to: splice.com_3}
    common_chain_23:      {from: splice.com_3,             to: splice.com_2}
    common_chain_12:      {from: splice.com_2,             to: splice.com_1}
    common_lead_1:        {from: splice.com_1,             to: Z1.valve.solenoid.lead_2}
    common_lead_2:        {from: splice.com_2,             to: Z2.valve.solenoid.lead_2}
    common_lead_3:        {from: splice.com_3,             to: Z3.valve.solenoid.lead_2}
    common_lead_4:        {from: splice.com_4,             to: Z4.valve.solenoid.lead_2}
