<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Irrigation Sim — Map + Detail</title>
<style>
  :root{
    --bg:#f3f6f4; --panel:#ffffff; --ink:#1d2620; --muted:#69756d;
    --line:#d4ddd6; --accent:#1f7a5a; --accent2:#2e9e76;
    --red:#d64545; --amber:#d99412; --green:#2e9e76; --blue:#3b7fd0;
    --wire:#caa23a; --shadow:0 1px 3px rgba(20,40,30,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%;
    display:flex; flex-direction:column; max-width:430px; margin:0 auto;
    height:100dvh; overflow:hidden;
  }
  .banner{
    background:repeating-linear-gradient(45deg,#ffe9a8,#ffe9a8 10px,#ffe3 0,#ffe3 20px);
    background-color:#ffe9a8;
    color:#6b5200; font-size:12px; font-weight:700; text-align:center;
    padding:5px 8px; letter-spacing:.3px; flex:0 0 auto; border-bottom:1px solid #e3cf86;
  }
  /* ---- MAP (top ~55%) ---- */
  #mapWrap{
    flex:0 0 55%; position:relative; background:var(--panel);
    border-bottom:2px solid var(--line); overflow:hidden;
  }
  #map{width:100%; height:100%; display:block; touch-action:manipulation;}
  .maptitle{
    position:absolute; top:6px; left:8px; font-size:10px; font-weight:700;
    color:var(--muted); letter-spacing:.5px; text-transform:uppercase;
    background:rgba(255,255,255,.7); padding:2px 6px; border-radius:6px;
  }
  .legend{
    position:absolute; top:6px; right:8px; font-size:9px; color:var(--muted);
    background:rgba(255,255,255,.75); padding:3px 6px; border-radius:6px; line-height:1.5;
  }
  .legend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:middle}
  /* ---- DETAIL (bottom ~45%) ---- */
  #detail{
    flex:1 1 45%; background:var(--panel); overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:10px 12px 22px; position:relative;
  }
  .d-head{display:flex; align-items:center; gap:8px; margin:0 0 4px}
  .d-title{font-size:17px; font-weight:700; margin:0}
  .d-sub{font-size:12px; color:var(--muted); margin:0 0 8px}
  .chip{
    font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px;
    border:1px solid transparent; white-space:nowrap;
  }
  .chip.green{background:#e3f5ec;color:#1c6e4f;border-color:#bfe6d3}
  .chip.red{background:#fbe4e4;color:#a82e2e;border-color:#f0c4c4}
  .chip.amber{background:#fcefd6;color:#8a5e07;border-color:#f0dcae}
  .chip.grey{background:#eef1ef;color:#5d6963;border-color:#dde3df}
  .d-big{
    background:linear-gradient(180deg,#fbfdfc,#f4f8f6); border:1px solid var(--line);
    border-radius:12px; padding:8px; margin:8px 0; display:flex; justify-content:center;
  }
  .stat-row{display:flex; gap:8px; margin:8px 0; flex-wrap:wrap}
  .stat{
    flex:1 1 0; min-width:74px; background:#f6f9f7; border:1px solid var(--line);
    border-radius:10px; padding:6px 8px;
  }
  .stat b{display:block; font-size:16px; line-height:1.1}
  .stat span{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.3px}
  .range{height:8px; border-radius:6px; background:#e7ece9; position:relative; margin:4px 0 2px; overflow:hidden}
  .range>i{position:absolute; top:0; bottom:0; border-radius:6px; background:linear-gradient(90deg,#d64545,#d99412,#2e9e76)}
  .range>b{position:absolute; top:-3px; width:3px; height:14px; background:#1d2620; border-radius:2px; transform:translateX(-50%)}
  .rangelab{display:flex; justify-content:space-between; font-size:9px; color:var(--muted)}
  .ctl-group{margin:12px 0 4px}
  .ctl-label{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin:0 0 6px}
  .seg{display:flex; border:1px solid var(--line); border-radius:9px; overflow:hidden; background:#fff}
  .seg button{
    flex:1; border:0; background:#fff; padding:8px 4px; font-size:12px; font-weight:600;
    color:var(--ink); border-right:1px solid var(--line); cursor:pointer; transition:.12s;
  }
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--accent); color:#fff}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eef2f0; gap:8px}
  .toggle-row:last-child{border-bottom:0}
  .toggle-row .lab{font-size:13px}
  .toggle-row .lab small{display:block; color:var(--muted); font-size:10px}
  .sw{position:relative; width:42px; height:24px; flex:0 0 auto}
  .sw input{opacity:0; width:0; height:0; position:absolute}
  .sw label{position:absolute; inset:0; background:#ccd4cf; border-radius:24px; cursor:pointer; transition:.15s}
  .sw label:after{content:""; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s; box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .sw input:checked + label{background:var(--accent)}
  .sw input:checked + label:after{transform:translateX(18px)}
  .sw.danger input:checked + label{background:var(--red)}
  .hint{font-size:11px; color:var(--muted); line-height:1.5}
  .sumgrid{display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:6px}
  .sumcard{border:1px solid var(--line); border-radius:10px; padding:8px; background:#fafcfb}
  .sumcard .z{font-weight:700; font-size:13px}
  .sumcard .s{font-size:10px; margin-top:2px}
  .sumcard.tap{cursor:pointer}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .fault-banner{background:#fbe4e4; border:1px solid #f0c4c4; color:#a82e2e; font-size:12px; border-radius:9px; padding:7px 9px; margin:8px 0; font-weight:600}
  kbd{background:#eef2f0; border:1px solid var(--line); border-radius:4px; padding:0 4px; font-size:10px; font-family:inherit}
</style>
</head>
<body>
<div class="banner">⚠️ MOCKUP · fake data · no real solver</div>

<div id="mapWrap">
  <div class="maptitle">System map · tap a part</div>
  <div class="legend">
    <i style="background:linear-gradient(90deg,#d64545,#2e9e76)"></i>flow/pressure<br>
    <i style="background:var(--wire)"></i>energized 24V/relay
  </div>
  <svg id="map" viewBox="0 0 390 360" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div id="detail"></div>

<script>
"use strict";
/* ============================================================
   FAKE MODEL — no real solver. All numbers invented.
   ============================================================ */

// Per-zone fake hydraulic "design" flows (m3/h) at each head when fully open.
const HEADS = {
  Z2:[{n:"Rotor BL4.0",arc:170,q:0.90},{n:"Spray MP3000",arc:270,q:0.70},{n:"Spray MP2000",arc:180,q:0.45}],
  Z3:[{n:"Rotor BL2.5",arc:150,q:0.54},{n:"Rotor BL5.0",arc:270,q:1.14}],
  Z5:[{n:"Rotor BL5.0",arc:270,q:1.14},{n:"Rotor BL2.5",arc:180,q:0.54}],
  Z4:[{n:"Spray MP3000",arc:240,q:0.70},{n:"Spray MP1000",arc:90,q:0.30},{n:"Spray MP2000",arc:180,q:0.45},{n:"Spray MP3000",arc:300,q:0.70}],
};
const AUTO = ["Z2","Z3","Z5","Z4"];

// ---- Mutable command + fault state ----
const S = {
  plugCtrl:true,        // 230V plug -> controller
  plugPump:true,        // 230V plug -> pump
  pumpRelay:true,       // MV pump-start commanded by controller
  // per auto-zone
  zones:{},             // built below
  selected:null,        // selected component id
  t:0,                  // animation tick
};
AUTO.forEach(z=>{
  S.zones[z]={
    signal:false,        // controller energizes 24V signal to this zone
    wireCut:false,       // signal wire cut
    solenoidDead:false,  // dead solenoid
    bleed:false,         // bleed screw open (manual open)
    throttle:"open",     // open | 3/4 | 1/2 | shut
    clog:{},             // headIndex -> 0|25|50|100
  };
  HEADS[z].forEach((h,i)=>S.zones[z].clog[i]=0);
});
const MANUAL = {open:false}; // Z1 manual valve handle

const THR = {open:1.0,"3/4":0.75,"1/2":0.5,shut:0.0};

/* ---- DERIVED STATE ---- */
function pumpRunning(){ return S.plugPump && S.pumpRelay && S.plugCtrl; }
function controllerPowered(){ return S.plugCtrl; }

// zone watering derivation -> returns {state, q, reason}
function zoneState(z){
  const Zd=S.zones[z];
  const sigEnergized = controllerPowered() && Zd.signal;
  const wireOk = !Zd.wireCut;
  const solOk = !Zd.solenoidDead;
  const notShut = Zd.throttle!=="shut";
  const pump = pumpRunning();
  // valve physically open if: (signal reaches solenoid OK and pump on) OR bleed open
  const elecOpen = sigEnergized && wireOk && solOk;
  const physicallyOpen = (elecOpen && pump && notShut) || (Zd.bleed && notShut);

  let q=0, heads=[];
  const thr = THR[Zd.throttle];
  if(physicallyOpen){
    HEADS[z].forEach((h,i)=>{
      const clog=Zd.clog[i]||0;
      let f = h.q*thr*(1-clog/100);
      // mild pump-pressure factor when many zones open
      heads.push(f);
      q+=f;
    });
    q=Math.round(q*100)/100;
  } else {
    HEADS[z].forEach(()=>heads.push(0));
  }

  let state, sclass, reason;
  if(physicallyOpen){ state="WATERING"; sclass="green"; reason="valve open, flow at heads"; }
  else if(sigEnergized && !pump){ state="COMMANDED · NO PUMP"; sclass="amber"; reason="signal on but pump not running"; }
  else if(sigEnergized && (!wireOk||!solOk)){ state="COMMANDED · NOT OPENING"; sclass="red"; reason = !wireOk?"signal wire cut":"solenoid dead"; }
  else if(sigEnergized && !notShut){ state="COMMANDED · THROTTLED SHUT"; sclass="red"; reason="flow throttle is shut"; }
  else if(Zd.bleed && notShut){ state="BLEED-OPEN (manual)"; sclass="amber"; reason="opened via bleed screw"; }
  else { state="IDLE"; sclass="grey"; reason="no command"; }

  return {state,sclass,reason,q,heads,elecOpen,physicallyOpen,sigEnergized,pump};
}

// flow->colour ramp (0..maxq)
function flowColour(f,max){
  if(f<=0) return "#c2ccc6";
  const t=Math.min(1,f/max);
  // red(0)->amber(.5)->green(1)
  const a=[214,69,69], b=[217,148,18], c=[46,158,118];
  let r,g,bl;
  if(t<0.5){const k=t/0.5; r=a[0]+(b[0]-a[0])*k; g=a[1]+(b[1]-a[1])*k; bl=a[2]+(b[2]-a[2])*k;}
  else{const k=(t-0.5)/0.5; r=b[0]+(c[0]-b[0])*k; g=b[1]+(c[1]-b[1])*k; bl=b[2]+(c[2]-b[2])*k;}
  return `rgb(${r|0},${g|0},${bl|0})`;
}

/* ============================================================
   MAP RENDER  (compact, fixed shape)
   ============================================================ */
const SVG="http://www.w3.org/2000/svg";
const map=document.getElementById("map");

// fixed geometry coords on a 390x360 canvas
const G = {
  // supply chain (left column, top)
  well:{x:42,y:300}, foot:{x:42,y:255}, pump:{x:42,y:205}, feedTop:{x:42,y:150},
  ctrl:{x:330,y:60},
  plugCtrl:{x:368,y:30}, plugPump:{x:368,y:215},
  // manifold vertical bar
  manTop:{x:150,y:96}, manBot:{x:150,y:300},
};
// manifold ports y positions (6 ports)
const PORT_Z = ["Z2","Z3","Z5","Z4","Z1","Z6"];
const portY = i => 110 + i*36;

function el(tag,attrs,parent){
  const e=document.createElementNS(SVG,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}
function selectable(node,id){
  node.style.cursor="pointer";
  node.addEventListener("click",ev=>{ev.stopPropagation();select(id);});
}

function renderMap(){
  map.innerHTML="";
  const max=2.6; // fake max zone flow for colour scale
  const pump=pumpRunning();

  // ---- WIRING BAND (behind) : controller -> each auto valve solenoid ----
  AUTO.forEach((z,i)=>{
    const zs=zoneState(z);
    const live = zs.sigEnergized; // energized signal leaves controller
    const path=el("path",{
      d:`M ${G.ctrl.x} ${G.ctrl.y+14} C 300 ${portY(i)-30}, 260 ${portY(i)-6}, ${G.manTop.x+44} ${portY(i)-6}`,
      fill:"none", stroke: live?"var(--wire)":"#e2e6e3",
      "stroke-width": live?2.4:1.6, "stroke-linecap":"round",
      "stroke-dasharray": live?"5 5":"2 6",
      class: live?"wire live":"wire"
    },map);
    if(live){ path.style.strokeDashoffset = (-S.t*0.6)%10; }
  });
  // pump-start relay wire controller -> pump (MV)
  {
    const live = S.pumpRelay && controllerPowered();
    const p=el("path",{
      d:`M ${G.ctrl.x-6} ${G.ctrl.y+16} C 120 120, 70 160, ${G.pump.x} ${G.pump.y-18}`,
      fill:"none", stroke: live?"#b07fd0":"#e2e6e3", "stroke-width": live?2.2:1.4,
      "stroke-dasharray": live?"5 5":"2 6","stroke-linecap":"round"
    },map);
    if(live) p.style.strokeDashoffset=(-S.t*0.6)%10;
    el("text",{x:95,y:138,"font-size":7,fill:"#9a73b8"},map).textContent="pump-start (MV)";
  }

  // ---- 230V plugs ----
  drawPlug(G.plugCtrl,"plugCtrl",S.plugCtrl,"230V");
  drawPlug(G.plugPump,"plugPump",S.plugPump,"230V");
  // plug grid lines
  el("line",{x1:G.plugCtrl.x,y1:G.plugCtrl.y+6,x2:G.ctrl.x+16,y2:G.ctrl.y-4,stroke:S.plugCtrl?"#b88":"#ddd","stroke-width":1.4},map);
  el("line",{x1:G.plugPump.x,y1:G.plugPump.y+6,x2:G.pump.x+16,y2:G.pump.y,stroke:S.plugPump?"#b88":"#ddd","stroke-width":1.4},map);

  // ---- SUPPLY PIPE: well -> foot -> pump -> feed -> manifold ----
  // determine supply flow = sum of watering zones
  let supplyQ=0; AUTO.forEach(z=>supplyQ+=zoneState(z).q);
  if(MANUAL.open && S.zones) {} // manual not metered
  const supplyCol = flowColour(pump?Math.max(0.2,supplyQ):0, max);

  // vertical well->pump
  pipe(G.well.x,G.well.y,G.foot.x,G.foot.y,supplyCol, pump&&supplyQ>0,4);
  pipe(G.foot.x,G.foot.y,G.pump.x,G.pump.y,supplyCol, pump&&supplyQ>0,4);
  // pump -> feedTop -> across -> manifold bottom-ish
  pipe(G.pump.x,G.pump.y,G.feedTop.x,G.feedTop.y,supplyCol, pump&&supplyQ>0,4);
  // feed ~20m to manifold (horizontal then up into manifold)
  pipe(G.feedTop.x,G.feedTop.y,G.manBot.x,G.manBot.y-4,supplyCol, pump&&supplyQ>0,4);
  el("text",{x:88,y:144,"font-size":7,fill:"var(--muted)"},map).textContent="~20 m feed";

  // ---- MANIFOLD BAR ----
  const manW=10;
  const manRect=el("rect",{x:G.manTop.x-manW/2,y:G.manTop.y,width:manW,height:G.manBot.y-G.manTop.y,rx:5,
    fill: pump?supplyCol:"#c2ccc6", stroke:"#0003","stroke-width":.5},map);
  selectable(manRect,"manifold");
  el("text",{x:G.manTop.x,y:G.manTop.y-5,"font-size":8,"text-anchor":"middle",fill:"var(--muted)","font-weight":700},map).textContent="MANIFOLD";

  // droplets on supply when flowing
  if(pump&&supplyQ>0){ drawDroplets([[G.well.x,G.well.y],[G.pump.x,G.pump.y],[G.feedTop.x,G.feedTop.y],[G.manBot.x,G.manBot.y]],supplyCol); }

  // ---- ZONE ROWS off each manifold port ----
  PORT_Z.forEach((z,i)=>{
    const y=portY(i);
    const isAuto=AUTO.includes(z);
    const isManual=z==="Z1";
    const isCap=z==="Z6";
    let zs = isAuto?zoneState(z):null;
    const watering = zs?zs.physicallyOpen:false;
    const lateralCol = isAuto?flowColour(watering?zs.q:0,max):(isManual&&MANUAL.open?"#3b7fd0":"#c2ccc6");

    // port tick
    el("rect",{x:G.manTop.x+manW/2-1,y:y-2.5,width:7,height:5,rx:1,fill:"#7d8a83"},map);
    // lateral pipe to valve
    const vx=G.manTop.x+44;
    pipe(G.manTop.x+manW/2+6,y,vx-10,y,lateralCol, watering||(isManual&&MANUAL.open),3);

    // valve glyph
    drawValve(vx,y,z,isAuto,isManual,isCap,zs);

    // heads (fan wedges) to the right
    if(isAuto){
      const hx=vx+20;
      drawHeads(hx,y,z,zs,max);
    } else if(isManual){
      // hand line
      const hl=el("line",{x1:vx+10,y1:y,x2:vx+58,y2:y,stroke:MANUAL.open?"#3b7fd0":"#c2ccc6","stroke-width":3,"stroke-linecap":"round","stroke-dasharray":"1 5"},map);
      el("text",{x:vx+34,y:y-7,"font-size":7,"text-anchor":"middle",fill:"var(--muted)"},map).textContent="hand line";
    } else if(isCap){
      el("circle",{cx:vx+12,cy:y,r:4,fill:"#b9c2bc"},map);
      el("text",{x:vx+30,y:y+3,"font-size":7,fill:"var(--muted)"},map).textContent="capped";
    }
    // zone label
    el("text",{x:vx,y:y-12,"font-size":9,"text-anchor":"middle",fill:"var(--ink)","font-weight":700},map).textContent=z;

    // selection highlight ring
    if(S.selected===z){
      el("rect",{x:vx-13,y:y-13,width:120,height:26,rx:8,fill:"none",stroke:"var(--accent)","stroke-width":2,"stroke-dasharray":"4 3",opacity:.9},map);
    }
  });

  // controller glyph
  drawController();

  // pump glyph
  drawPump();

  // selection ring for supply parts handled in their draw fns via S.selected
  highlightSelected();
}

function pipe(x1,y1,x2,y2,col,flowing,w){
  el("line",{x1,y1,x2,y2,stroke:col,"stroke-width":w,"stroke-linecap":"round"},map);
}
function drawDroplets(pts,col){
  // animate small circles along polyline
  let total=0; const segs=[];
  for(let i=0;i<pts.length-1;i++){const dx=pts[i+1][0]-pts[i][0],dy=pts[i+1][1]-pts[i][1];const L=Math.hypot(dx,dy);segs.push({a:pts[i],b:pts[i+1],L});total+=L;}
  const n=4;
  for(let k=0;k<n;k++){
    let d=((S.t*1.4 + k*total/n)%total);
    for(const s of segs){ if(d<=s.L){const t=d/s.L; const x=s.a[0]+(s.b[0]-s.a[0])*t, y=s.a[1]+(s.b[1]-s.a[1])*t; el("circle",{cx:x,cy:y,r:1.8,fill:"#fff",opacity:.85},map); break;} d-=s.L; }
  }
}
function drawValve(vx,y,z,isAuto,isManual,isCap,zs){
  if(isCap) return;
  const g=el("g",{},map);
  const open = isAuto?(zs&&zs.physicallyOpen):(isManual&&MANUAL.open);
  const fault = isAuto && zs && (zs.state.indexOf("NOT OPENING")>=0);
  const commanded = isAuto && zs && zs.sigEnergized;
  const body=el("rect",{x:vx-9,y:y-7,width:18,height:14,rx:3,
    fill: open?"#dff0e7":(fault?"#fbe4e4":"#eef2f0"),
    stroke: open?"var(--green)":(fault?"var(--red)":(commanded?"var(--amber)":"#9aa49e")),
    "stroke-width": (commanded||open||fault)?1.8:1},g);
  // valve triangle (open/closed indicator)
  el("path",{d:open?`M ${vx-4} ${y-3} L ${vx+4} ${y} L ${vx-4} ${y+3} Z`:`M ${vx-3} ${y-3} L ${vx-3} ${y+3} L ${vx+3} ${y+3} L ${vx+3} ${y-3} Z`,
    fill: open?"var(--green)":"#9aa49e"},g);
  // solenoid cap for auto
  if(isAuto){ el("rect",{x:vx-3,y:y-12,width:6,height:5,rx:1,fill: (zs&&zs.solenoidDead)?"var(--red)":((zs&&zs.elecOpen)?"var(--wire)":"#b9c2bc")},g);}
  selectable(g,z);
}
function drawHeads(hx,y,z,zs,max){
  HEADS[z].forEach((h,i)=>{
    const f=zs.heads[i];
    const clog=S.zones[z].clog[i];
    const col=flowColour(f,1.2);
    const cx=hx+i*16, cy=y;
    // wedge: fan scaled by flow (radius)
    const r = 4 + (f/1.2)*9; // 4..13
    const half=(h.arc/2)*Math.PI/180;
    const a0=-half, a1=half;
    const x0=cx+Math.cos(a0)*r, y0=cy+Math.sin(a0)*r;
    const x1=cx+Math.cos(a1)*r, y1=cy+Math.sin(a1)*r;
    const large=h.arc>180?1:0;
    const wedge=el("path",{
      d:`M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z`,
      fill: f>0?col:"#e3e8e5", opacity:f>0?.85:.5,
      stroke: clog>0?"var(--red)":"none","stroke-width":clog>0?1:0
    },map);
    el("circle",{cx,cy,r:1.6,fill:"#5d6963"},map);
  });
}
function drawController(){
  const g=el("g",{},map);
  const pwr=controllerPowered();
  el("rect",{x:G.ctrl.x-16,y:G.ctrl.y-12,width:32,height:26,rx:5,fill: pwr?"#eaf3fb":"#eef2f0",stroke:pwr?"var(--blue)":"#9aa49e","stroke-width":1.6},g);

/* ============================================================
   DETAIL PANE
   ============================================================ */
const D=document.getElementById("detail");

function select(id){ S.selected=id; renderAll(); }

function rangeBar(val,min,max,unit){
  const t=Math.max(0,Math.min(1,(val-min)/(max-min)));
  return `<div class="range"><i style="left:0;right:0"></i><b style="left:${t*100}%"></b></div>
    <div class="rangelab"><span>${min}${unit}</span><span><b>${val}${unit}</b></span><span>${max}${unit}</span></div>`;
}
function segCtl(opts,cur,onpick){
  const id="seg"+Math.random().toString(36).slice(2,7);
  setTimeout(()=>{
    document.querySelectorAll("#"+id+" button").forEach(b=>{
      b.onclick=()=>onpick(b.dataset.v);
    });
  },0);
  return `<div class="seg" id="${id}">`+opts.map(o=>`<button data-v="${o}" class="${o===cur?'on':''}">${o}</button>`).join("")+`</div>`;
}
function swCtl(checked,onchg,danger){
  const id="sw"+Math.random().toString(36).slice(2,7);
  setTimeout(()=>{const i=document.getElementById(id); if(i) i.onchange=()=>onchg(i.checked);},0);
  return `<span class="sw ${danger?'danger':''}"><input type="checkbox" id="${id}" ${checked?'checked':''}><label for="${id}"></label></span>`;
}

function renderDetail(){
  const id=S.selected;
  if(!id){ D.innerHTML=summaryHTML(); bindSummary(); return; }
  if(AUTO.includes(id)) return renderZone(id);
  if(id==="manifold") return renderManifold();
  if(id==="pump") return renderPump();
  if(id==="controller") return renderController();
  if(id==="well") return simpleDetail("Well","Water source","Static head ~4 m · supplies the foot valve.","No commandable controls. Source for the jet pump suction line.");
  if(id==="foot") return simpleDetail("Strainer / foot valve","Suction inlet","Keeps prime, screens debris.","No commandable controls here. Inject a clog fault from the pump view to model suction restriction (mockup).");
  if(id==="plugCtrl") return renderPlug("plugCtrl","Controller 230V plug","Mains feed to the controller (O1).");
  if(id==="plugPump") return renderPlug("plugPump","Pump 230V plug","Mains feed to the jet pump motor.");
}

function summaryHTML(){
  const cards=AUTO.map(z=>{
    const zs=zoneState(z);
    const col=zs.sclass==="green"?"var(--green)":zs.sclass==="red"?"var(--red)":zs.sclass==="amber"?"var(--amber)":"#9aa49e";
    return `<div class="sumcard tap" data-z="${z}">
      <div class="z">${z} <span style="float:right;font-weight:700;font-size:11px">${zs.q.toFixed(2)} m³/h</span></div>
      <div class="s"><span class="dot" style="background:${col}"></span>${zs.state}</div>
    </div>`;
  }).join("");
  let total=0; AUTO.forEach(z=>total+=zoneState(z).q);
  const pump=pumpRunning();
  return `<div class="d-head"><h2 class="d-title">System overview</h2>
      <span class="chip ${pump?'green':'grey'}">${pump?'PUMP RUNNING':'PUMP OFF'}</span></div>
    <p class="d-sub">Nothing selected — derived zone states. Tap any part on the map (or a card) to open its controls.</p>
    <div class="stat-row">
      <div class="stat"><b>${total.toFixed(2)}</b><span>total flow m³/h</span></div>
      <div class="stat"><b>${AUTO.filter(z=>zoneState(z).physicallyOpen).length}</b><span>zones watering</span></div>
      <div class="stat"><b>${pump?'~3.4':'0.0'}</b><span>pump bar (fake)</span></div>
    </div>
    <p class="ctl-label" style="margin-top:10px">Derived zone states</p>
    <div class="sumgrid">${cards}</div>
    <p class="hint" style="margin-top:10px"><b>Watering</b> is computed, never switched: controller signal energized AND wiring intact AND solenoid OK AND pump running AND throttle not shut. Add faults inside a component to see <kbd>COMMANDED · NOT OPENING</kbd>.</p>`;
}
function bindSummary(){
  D.querySelectorAll(".sumcard").forEach(c=>c.onclick=()=>select(c.dataset.z));
}

function renderZone(z){
  const Zd=S.zones[z]; const zs=zoneState(z);
  const col=zs.sclass==="green"?"green":zs.sclass==="red"?"red":zs.sclass==="amber"?"amber":"grey";
  // big rendering: valve + heads
  const big=zoneBigSVG(z,zs);
  let faultBanner="";
  if(zs.state.indexOf("NOT OPENING")>=0) faultBanner=`<div class="fault-banner">⚠ ${z} commanded but NOT opening — ${zs.reason}.</div>`;
  else if(zs.state.indexOf("NO PUMP")>=0) faultBanner=`<div class="fault-banner">⚠ ${z} signal energized but pump not running.</div>`;

  const maxQ=HEADS[z].reduce((s,h)=>s+h.q,0);

  // head controls (clog faults + flo-stop is here too via per head)
  const headCtls=HEADS[z].map((h,i)=>{
    const clog=Zd.clog[i];
    return `<div class="ctl-group" style="margin:8px 0 0">
      <p class="ctl-label" style="margin-bottom:4px">${h.n} · ${h.arc}° · ${zs.heads[i].toFixed(2)} m³/h</p>
      <div data-clog="${z}|${i}">${segCtl(["clear","25%","50%","full"],clogLabel(clog),v=>{S.zones[z].clog[i]=clogVal(v);renderAll();})}</div>
      <p class="hint" style="margin:3px 0 0">Nozzle clog fault</p>
    </div>`;
  }).join("");

  D.innerHTML=`
    <div class="d-head"><h2 class="d-title">${z} · auto valve</h2><span class="chip ${col}">${zs.state}</span></div>
    <p class="d-sub">${zs.reason}</p>
    ${faultBanner}
    <div class="d-big">${big}</div>
    <div class="stat-row">
      <div class="stat"><b>${zs.q.toFixed(2)}</b><span>zone flow m³/h</span></div>
      <div class="stat"><b>${HEADS[z].length}</b><span>heads</span></div>
      <div class="stat"><b>${zs.physicallyOpen?'OPEN':'CLOSED'}</b><span>valve</span></div>
    </div>
    <p class="ctl-label">Capability range (fake)</p>
    ${rangeBar(zs.q.toFixed(2)*1,0,maxQ.toFixed(2)*1," m³/h")}

    <div class="ctl-group">
      <p class="ctl-label">Controller signal to ${z} (24V)</p>
      <div class="toggle-row"><div class="lab">Energize zone signal<small>O1 → ${z} solenoid</small></div>${swCtl(Zd.signal,v=>{Zd.signal=v;renderAll();})}</div>
    </div>

    <div class="ctl-group">
      <p class="ctl-label">Flow throttle</p>
      ${segCtl(["open","3/4","1/2","shut"],Zd.throttle,v=>{Zd.throttle=v;renderAll();})}
    </div>

    <div class="ctl-group">
      <div class="toggle-row"><div class="lab">Bleed screw open<small>manually opens valve, ignores solenoid</small></div>${swCtl(Zd.bleed,v=>{Zd.bleed=v;renderAll();})}</div>
    </div>

    <p class="ctl-label" style="margin-top:14px;color:var(--red)">Inject faults</p>
    <div class="ctl-group" style="margin-top:4px">
      <div class="toggle-row"><div class="lab">Cut signal wire<small>break controller→solenoid run</small></div>${swCtl(Zd.wireCut,v=>{Zd.wireCut=v;renderAll();},true)}</div>
      <div class="toggle-row"><div class="lab">Dead solenoid<small>coil open / burnt</small></div>${swCtl(Zd.solenoidDead,v=>{Zd.solenoidDead=v;renderAll();},true)}</div>
    </div>
    <p class="ctl-label" style="margin-top:10px">Heads — flow & nozzle-clog faults</p>
    ${headCtls}
  `;
}
function clogLabel(v){return v===0?"clear":v===25?"25%":v===50?"50%":"full";}
function clogVal(v){return v==="clear"?0:v==="25%"?25:v==="50%"?50:100;}

function zoneBigSVG(z,zs){
  // big valve on left, heads fanning right
  const W=300,H=130;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:300px">`;
  const vx=42,vy=H/2;
  // feed pipe
  const fcol=flowColour(zs.physicallyOpen?zs.q:0,3);
  s+=`<line x1="6" y1="${vy}" x2="${vx-16}" y2="${vy}" stroke="${fcol}" stroke-width="6" stroke-linecap="round"/>`;
  // valve body
  const open=zs.physicallyOpen, fault=zs.sclass==="red";
  s+=`<rect x="${vx-16}" y="${vy-16}" width="32" height="32" rx="6" fill="${open?'#dff0e7':(fault?'#fbe4e4':'#eef2f0')}" stroke="${open?'#2e9e76':(fault?'#d64545':'#9aa49e')}" stroke-width="2.4"/>`;
  s+=`<rect x="${vx-6}" y="${vy-26}" width="12" height="10" rx="2" fill="${zs.solenoidDead?'#d64545':(zs.elecOpen?'#caa23a':'#b9c2bc')}"/>`;
  s+=`<text x="${vx}" y="${vy+30}" font-size="8" text-anchor="middle" fill="#69756d">valve ${open?'OPEN':'CLOSED'}</text>`;
  // arc heads
  HEADS[z].forEach((h,i)=>{
    const cx=120+ (i%2)*110, cy= (i<2)?vy-30:vy+34;
    const f=zs.heads[i], clog=S.zones[z].clog[i];
    const r=10+(f/1.2)*26;
    const col=flowColour(f,1.2);
    const half=(h.arc/2)*Math.PI/180,a0=-half,a1=half;
    const x0=cx+Math.cos(a0)*r,y0=cy+Math.sin(a0)*r,x1=cx+Math.cos(a1)*r,y1=cy+Math.sin(a1)*r;
    const large=h.arc>180?1:0;
    s+=`<path d="M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z" fill="${f>0?col:'#e3e8e5'}" opacity="${f>0?.8:.45}" stroke="${clog>0?'#d64545':'none'}" stroke-width="${clog>0?1.5:0}"/>`;
    s+=`<circle cx="${cx}" cy="${cy}" r="2.4" fill="#5d6963"/>`;
    s+=`<text x="${cx}" y="${cy+ (i<2?-r-3:r+11)}" font-size="7" text-anchor="middle" fill="#69756d">${h.n.split(' ')[1]}</text>`;
    // connector
    s+=`<line x1="${vx+16}" y1="${vy}" x2="${cx}" y2="${cy}" stroke="${f>0?col:'#dde3df'}" stroke-width="${f>0?3:1.5}" stroke-linecap="round"/>`;
  });
  s+=`</svg>`;
  return s;
}

function renderManifold(){
  let total=0;AUTO.forEach(z=>total+=zoneState(z).q);
  let s=`<svg viewBox="0 0 240 150" width="100%" style="max-width:240px">`;
  s+=`<rect x="40" y="14" width="16" height="124" rx="8" fill="${pumpRunning()?flowColour(Math.max(.2,total),2.6):'#c2ccc6'}" stroke="#0003"/>`;
  PORT_Z.forEach((z,i)=>{
    const y=24+i*20; const isAuto=AUTO.includes(z);
    const zs=isAuto?zoneState(z):null;
    const watering=zs?zs.physicallyOpen:(z==="Z1"&&MANUAL.open);
    const col=isAuto?flowColour(watering?zs.q:0,1.6):(z==="Z1"&&MANUAL.open?"#3b7fd0":"#c2ccc6");
    s+=`<line x1="56" y1="${y}" x2="120" y2="${y}" stroke="${col}" stroke-width="4" stroke-linecap="round"/>`;
    s+=`<circle cx="128" cy="${y}" r="6" fill="${z==='Z6'?'#b9c2bc':(watering?'#dff0e7':'#eef2f0')}" stroke="${watering?'#2e9e76':'#9aa49e'}" stroke-width="1.6"/>`;
    s+=`<text x="150" y="${y+3}" font-size="9" fill="#1d2620" font-weight="700">${z}</text>`;
    s+=`<text x="180" y="${y+3}" font-size="8" fill="#69756d">${isAuto?(watering?zs.q.toFixed(2)+' m³/h':'idle'):(z==='Z1'?'manual':'capped')}</text>`;
  });
  s+=`</svg>`;
  D.innerHTML=`<div class="d-head"><h2 class="d-title">Manifold</h2><span class="chip ${pumpRunning()?'green':'grey'}">${pumpRunning()?'PRESSURIZED':'NO SUPPLY'}</span></div>
    <p class="d-sub">6 stacked ports → Z2 Z3 Z5 Z4 (auto), Z1 (manual), Z6 (capped stub).</p>
    <div class="d-big">${s}</div>
    <div class="stat-row">
      <div class="stat"><b>${total.toFixed(2)}</b><span>delivered m³/h</span></div>
      <div class="stat"><b>6</b><span>ports</span></div>
      <div class="stat"><b>${pumpRunning()?'~3.2':'0.0'}</b><span>inlet bar (fake)</span></div>
    </div>
    <p class="hint">The manifold itself has no commandable controls. Open a zone valve, the manual handle, or the pump to change distribution. Z6 is a capped stub — never discharges.</p>`;
}

function renderPump(){
  const run=pumpRunning();
  let total=0;AUTO.forEach(z=>total+=zoneState(z).q);
  let s=`<svg viewBox="0 0 240 120" width="100%" style="max-width:240px">`;
  s+=`<circle cx="120" cy="60" r="38" fill="${run?'#dff0e7':'#eef2f0'}" stroke="${run?'#2e9e76':'#9aa49e'}" stroke-width="3"/>`;
  const imp=`<path d="M120 38 L138 72 L102 72 Z" fill="${run?'#2e9e76':'#9aa49e'}" ${run?'style="transform-origin:120px 60px;animation:spin 1.2s linear infinite"':''}/>`;
  s+=imp;
  s+=`<line x1="20" y1="60" x2="82" y2="60" stroke="${run?flowColour(Math.max(.2,total),2.6):'#c2ccc6'}" stroke-width="7" stroke-linecap="round"/>`;
  s+=`<line x1="158" y1="60" x2="220" y2="60" stroke="${run?flowColour(Math.max(.2,total),2.6):'#c2ccc6'}" stroke-width="7" stroke-linecap="round"/>`;
  s+=`<text x="40" y="50" font-size="8" fill="#69756d">suction</text><text x="178" y="50" font-size="8" fill="#69756d">discharge</text>`;
  s+=`</svg>`;
  D.innerHTML=`<div class="d-head"><h2 class="d-title">Jet pump</h2><span class="chip ${run?'green':'grey'}">${run?'RUNNING':'STOPPED'}</span></div>
    <p class="d-sub">DAB AQUAJET 132 M · started by the controller's pump-start relay (MV) over the 230V plug.</p>
    <div class="d-big">${s}</div>
    <div class="stat-row">
      <div class="stat"><b>${run?'~3.4':'0.0'}</b><span>head bar (fake)</span></div>
      <div class="stat"><b>${run?total.toFixed(2):'0.00'}</b><span>delivered m³/h</span></div>
      <div class="stat"><b>${run?'~1.1':'0.0'}</b><span>kW (fake)</span></div>
    </div>
    <p class="ctl-label">Capability — jet curve (fake)</p>
    ${rangeBar(run?Math.min(3.6,Math.max(0.2,total)).toFixed(2)*1:0,0,3.6," m³/h")}
    <div class="ctl-group">
      <p class="ctl-label">Pump-start relay (MV)</p>
      <div class="toggle-row"><div class="lab">Controller commands pump start<small>O1 → MV relay → motor contactor</small></div>${swCtl(S.pumpRelay,v=>{S.pumpRelay=v;renderAll();})}</div>
    </div>
    <p class="hint">Pump runs only when its 230V plug is on, the controller is powered, and the MV relay is commanded. Toggle the plug in the pump-plug view.</p>`;
}

function renderController(){
  const pwr=controllerPowered();
  const rows=AUTO.map(z=>{
    const Zd=S.zones[z];const zs=zoneState(z);
    return `<div class="toggle-row"><div class="lab">${z} signal output<small>${zs.sigEnergized?'energized':'off'} · 24V</small></div>${swCtl(Zd.signal,v=>{Zd.signal=v;renderAll();})}</div>`;
  }).join("");
  let s=`<svg viewBox="0 0 220 110" width="100%" style="max-width:220px">`;
  s+=`<rect x="60" y="18" width="100" height="74" rx="8" fill="${pwr?'#eaf3fb':'#eef2f0'}" stroke="${pwr?'#3b7fd0':'#9aa49e'}" stroke-width="2.4"/>`;
  s+=`<text x="110" y="40" font-size="11" text-anchor="middle" font-weight="700" fill="#1d2620">CONTROLLER</text>`;
  s+=`<text x="110" y="54" font-size="9" text-anchor="middle" fill="#69756d">O1</text>`;
  AUTO.forEach((z,i)=>{const live=zoneState(z).sigEnergized;s+=`<circle cx="${74+i*24}" cy="78" r="4" fill="${live?'#caa23a':'#cdd5d0'}"/>`;});
  s+=`<circle cx="110" cy="92" r="4" fill="${S.pumpRelay&&pwr?'#b07fd0':'#cdd5d0'}"/><text x="120" y="96" font-size="7" fill="#69756d">MV</text>`;
  s+=`</svg>`;
  D.innerHTML=`<div class="d-head"><h2 class="d-title">Controller (O1)</h2><span class="chip ${pwr?'green':'red'}">${pwr?'POWERED':'NO MAINS'}</span></div>
    <p class="d-sub">Energizes per-zone 24V solenoid signals and the pump-start relay (MV).</p>
    <div class="d-big">${s}</div>
    <div class="ctl-group">
      <p class="ctl-label">Per-zone signal outputs (24V)</p>

    </div>
    <div class="ctl-group">
      <div class="toggle-row"><div class="lab">Pump-start relay (MV)<small>commands the jet pump contactor</small></div>${swCtl(S.pumpRelay,v=>{S.pumpRelay=v;renderAll();})}</div>

    <p class="hint">These outputs are the only zone "commands" in the system. Whether a zone actually waters is derived downstream (wiring, solenoid, pump, throttle).</p>`;
}

function renderPlug(id,title,sub){
