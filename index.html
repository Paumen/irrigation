<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Irrigation Diagnostic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=14" />
  </head>
  <body>
    <main x-data="app" x-cloak>
      <section class="schematic-card">
        <figure>
          <svg
            viewBox="0 0 700 420"
            preserveAspectRatio="xMidYMid meet"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <marker
                id="arr-water"
                viewBox="0 0 10 10"
                refX="9"
                refY="5"
                markerWidth="5"
                markerHeight="5"
                orient="auto-start-reverse"
              ></marker>
              <marker
                id="arr-ctrl"
                viewBox="0 0 10 10"
                refX="9"
                refY="5"
                markerWidth="5"
                markerHeight="5"
                orient="auto-start-reverse"
              ></marker>
              <marker
                id="arr-mains"
                viewBox="0 0 10 10"
                refX="9"
                refY="5"
                markerWidth="5"
                markerHeight="5"
                orient="auto-start-reverse"
              ></marker>
            </defs>

            <g data-flow="wifi">
              <line x1="142" y1="36" x2="194" y2="36" class="line" />
              <g transform="translate(160.5 33) scale(0.015625)">
                <path :d="ICONS['ms:wifi'].d" fill="currentColor" />
              </g>
            </g>

            <g data-flow="ctrl">
              <line x1="324" y1="36" x2="376" y2="36" class="line" marker-end="url(#arr-ctrl)" />
              <path d="M 259 92 V 200 H 285" class="line" marker-end="url(#arr-ctrl)" />
            </g>
            <g data-flow="ctrl">
              <g transform="translate(330 18) scale(0.625)">
                <path :d="ICONS['mdi:lightning-bolt-outline'].d" fill="currentColor" />
              </g>
              <text x="348" y="32" text-anchor="start" class="flow-label">24V</text>
            </g>
            <g data-flow="ctrl">
              <g transform="translate(226 96) scale(0.625)">
                <path :d="ICONS['mdi:lightning-bolt-outline'].d" fill="currentColor" />
              </g>
              <text x="244" y="110" text-anchor="start" class="flow-label">24V</text>
            </g>

            <line
              data-flow="mains"
              x1="506"
              y1="36"
              x2="558"
              y2="36"
              class="line"
              marker-end="url(#arr-mains)"
            />
            <g data-flow="mains">
              <g transform="translate(509 33) scale(0.015625)">
                <path :d="ICONS['ms:bolt'].d" fill="currentColor" />
              </g>
              <text x="525" y="32" text-anchor="start" class="flow-label">230V</text>
            </g>

            <g data-flow="water">
              <path d="M 623 92 V 145 H 350 V 170" class="line" marker-end="url(#arr-water)" />
              <path d="M 623 92 V 145 H 350 V 170" class="hose-highlight" />
            </g>
            <g data-flow="water">
              <g transform="translate(357 130) scale(0.625)">
                <path :d="ICONS['mdi:water-outline'].d" fill="currentColor" />
              </g>
              <text x="375" y="144" text-anchor="start" class="flow-label">H₂O</text>
            </g>

            <g data-flow="lateral">
              <path d="M 389 242 V 290 H 623 V 340" class="line" marker-end="url(#arr-water)" />
              <path d="M 389 242 V 290 H 623 V 340" class="hose-highlight" />
            </g>

            <g
              @click="pipFromEvent($event)"
              @keydown.enter.prevent="pipFromEvent($event)"
              @keydown.space.prevent="pipFromEvent($event)"
              x-html="renderDiagram()"
            ></g>
          </svg>

          <figcaption>
            <span><span class="swatch" data-flow="water" aria-hidden="true"></span> water</span>
            <span
              ><span class="swatch" data-flow="mains" aria-hidden="true"></span> 230V mains</span
            >
            <span
              ><span class="swatch" data-flow="ctrl" aria-hidden="true"></span> 24V control</span
            >
            <span><span class="swatch" data-flow="wifi" aria-hidden="true"></span> Wi-Fi</span>
          </figcaption>
        </figure>
      </section>

      <section class="form-card" aria-labelledby="form-heading">
        <header class="section-title section-title--bar">
          <h2 id="form-heading">Diagnostic</h2>
          <button type="button" data-tone="mute" @click="$refs.reset.showModal()">Reset</button>
          <button
            type="button"
            data-tone="mute"
            data-shape="square"
            @click="moveBy(-1)"
            :disabled="isFirst"
            aria-label="Previous question"
            title="Previous"
          >
            ‹
          </button>
          <button
            type="button"
            data-tone="mute"
            data-shape="square"
            @click="moveBy(1)"
            :disabled="isLast"
            aria-label="Next question"
            title="Next"
          >
            ›
          </button>
        </header>
        <form @submit.prevent>
          <header>
            <h2 x-text="activeQuestion.text"></h2>
          </header>

          <template x-if="activeQuestion.type === 'matrix'">
            <div class="matrix-scroll">
              <table :style="`--sp-cols: ${activeQuestion.columns.length}`">
                <tr>
                  <th></th>
                  <template x-for="c in activeQuestion.columns" :key="c.id">
                    <th scope="col" :title="c.label" x-text="c.label"></th>
                  </template>
                </tr>
                <template x-for="row in activeQuestion.rows" :key="row.id">
                  <tr>
                    <th scope="row" x-text="row.label"></th>
                    <template x-for="c in activeQuestion.columns" :key="c.id">
                      <td>
                        <label :aria-label="`${row.label}: ${c.label}`">
                          <input
                            type="radio"
                            :name="`${activeQuestion.id}-${row.id}`"
                            :checked="rowAns(row.id) === c.id"
                            @change="setMatrixCell(row.id, c.id)"
                          />
                        </label>
                      </td>
                    </template>
                  </tr>
                </template>
              </table>
            </div>
          </template>

          <template x-if="activeQuestion.type !== 'matrix'">
            <div class="option-grid">
              <template x-for="(opt, i) in activeQuestion.options" :key="i">
                <label class="option">
                  <input
                    type="radio"
                    :name="`q-${activeQuestion.id}`"
                    :checked="activeAnswer === i"
                    @change="handleAnswer(i)"
                  />
                  <span x-text="opt.label"></span>
                </label>
              </template>
            </div>
          </template>

          <template x-if="activeQuestion.type === 'matrix'">
            <footer>
              <button type="button" data-tone="mute" @click="moveBy(1)" :disabled="isLast">Skip</button>
              <button type="button" @click="moveBy(1)" :disabled="isLast">Next ›</button>
            </footer>
          </template>
        </form>

        <nav aria-label="Stages">
          <template x-for="s in STAGES" :key="s">
            <button
              type="button"
              @click="pickStage(s)"
              :aria-current="activeStage === s ? 'step' : null"
            >
              <span class="stage-info">
                <span x-text="STAGE_LABELS[s]"></span>
                <small x-text="`${stageProgress[s].answered}/${stageProgress[s].total}`"></small>
              </span>
              <span class="bar"><span :style="`width: ${stagePct(s)}%`"></span></span>
            </button>
          </template>
        </nav>
      </section>

      <section class="rank-card" aria-labelledby="rank-heading">
        <h2 id="rank-heading" class="section-title">Root-cause</h2>
        <ol>
          <template x-for="r in ranked.slice(0, 5)" :key="r.id">
            <li>
              <button
                type="button"
                class="rank-row"
                :class="activeRC === r.id ? 'active' : ''"
                :data-sev="severityLevel(rankPct(r))"
                @click="activeRC = r.id"
              >
                <code x-text="r.id"></code>
                <span class="root-cause-label" x-text="RC[r.id].label"></span>
                <span class="bar"><span :style="`width: ${barWidth(r)}`"></span></span>
                <span class="percent" x-text="`${rankPct(r)}%`"></span>
              </button>
            </li>
          </template>
        </ol>
        <template x-if="rankedRest.length > 0">
          <details>
            <summary data-shape="ghost" x-text="`all ${ranked.length} ranked`"></summary>
            <ol start="6">
              <template x-for="r in rankedRest" :key="r.id">
                <li>
                  <button
                    type="button"
                    class="rank-row"
                    :class="activeRC === r.id ? 'active' : ''"
                    :data-sev="severityLevel(rankPct(r))"
                    @click="activeRC = r.id"
                  >
                    <code x-text="r.id"></code>
                    <span class="root-cause-label" x-text="RC[r.id].label"></span>
                    <span class="bar"><span :style="`width: ${barWidth(r)}`"></span></span>
                    <span class="percent" x-text="`${rankPct(r)}%`"></span>
                  </button>
                </li>
              </template>
            </ol>
          </details>
        </template>
      </section>

      <section class="rec-card" aria-labelledby="rec-heading">
        <h2 id="rec-heading" class="section-title">Recommended Next</h2>
        <template x-if="recommendations.length === 0">
          <p class="recommendation-empty">No questions left to differentiate top suspects.</p>
        </template>
        <template x-if="recommendations.length > 0">
          <ol>
            <template x-for="rec in recommendations" :key="rec.q.id">
              <li>
                <button type="button" class="recommendation" @click="activeQuestionId = rec.q.id">
                  <span class="stage" x-text="STAGE_LABELS[rec.q.stage]"></span>
                  <span class="discriminator" x-text="`D = ${rec.D.toFixed(2)}`"></span>
                  <span class="recommendation-text" x-text="rec.q.text"></span>
                </button>
              </li>
            </template>
          </ol>
        </template>
      </section>

      <dialog
        x-ref="reset"
        aria-labelledby="reset-title"
        @click="if ($event.target === $refs.reset) $refs.reset.close()"
      >
        <h3 id="reset-title">Start over?</h3>
        <p>
          This clears every answer and returns you to the first question. You can&rsquo;t undo this.
        </p>
        <footer>
          <button type="button" autofocus @click="$refs.reset.close()">Keep my answers</button>
          <button type="button" data-tone="danger" @click="doReset(); $refs.reset.close()">
            Reset everything
          </button>
        </footer>
      </dialog>
    </main>

    <script src="data.js?v=11"></script>
    <script src="icons.js?v=11"></script>
    <script src="app.js?v=11"></script>
    <script defer src="https://unpkg.com/alpinejs@3.15.12/dist/cdn.min.js"></script>
  </body>
</html>
