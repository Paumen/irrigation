<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Irrigation Diagnostic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Nunito+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=50" />
  </head>
  <body>
    <main x-data="app" x-cloak>
      <details data-card="schematic" open>
        <summary>Schematic</summary>
        <figure>
          <svg
            viewBox="0 -22 700 344"
            preserveAspectRatio="xMidYMid meet"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g x-html="renderDiagram()"></g>
          </svg>
        </figure>
      </details>

      <details data-card="form" open>
        <summary>
          <span>Diagnostic</span>
          <button
            type="button"
            data-tone="mute"
            :disabled="!hasAnswers"
            @click.stop="$refs.reset.showModal()"
          >
            Reset
          </button>
          <button
            type="button"
            data-tone="mute"
            data-shape="square"
            @click.stop="moveBy(-1)"
            :disabled="isFirst"
            aria-label="Previous question"
            title="Previous"
          >
            ‹
          </button>
          <button
            type="button"
            data-tone="mute"
            data-shape="square"
            @click.stop="moveBy(1)"
            :disabled="isLast"
            aria-label="Next question"
            title="Next"
          >
            ›
          </button>
        </summary>
        <form @submit.prevent>
          <header>
            <h2 x-text="activeQuestion.text"></h2>
          </header>

          <template x-if="activeQuestion.type === 'matrix'">
            <div data-q="matrix">
              <table :style="`--sp-cols: ${activeQuestion.columns.length}`">
                <tr>
                  <th></th>
                  <template x-for="c in activeQuestion.columns" :key="c.id">
                    <th scope="col" :title="c.label" x-text="c.label"></th>
                  </template>
                </tr>
                <template x-for="row in activeQuestion.rows" :key="row.id">
                  <tr>
                    <th scope="row" x-text="row.label"></th>
                    <template x-for="c in activeQuestion.columns" :key="c.id">
                      <td>
                        <label :aria-label="`${row.label}: ${c.label}`">
                          <input
                            type="radio"
                            :name="`${activeQuestion.id}-${row.id}`"
                            :checked="rowAns(row.id) === c.id"
                            @change="setMatrixCell(row.id, c.id)"
                          />
                        </label>
                      </td>
                    </template>
                  </tr>
                </template>
              </table>
            </div>
          </template>

          <template x-if="activeQuestion.type === 'dates'">
            <div data-q="dates">
              <table
                style="--sp-cols: 2; grid-template-columns: minmax(110px, max-content) auto auto"
              >
                <template x-for="row in activeQuestion.rows" :key="row.id">
                  <tr>
                    <th scope="row" x-text="row.label"></th>
                    <td x-text="hwDateLabel(row.id)"></td>
                    <td x-text="hwBucketLabel(row.id)"></td>
                  </tr>
                </template>
              </table>
              <footer>
                <button
                  type="button"
                  data-tone="mute"
                  @click="moveBy(1, { markComplete: true })"
                  :disabled="isLast || isAnswered(activeQuestionId)"
                >
                  Skip
                </button>
                <button type="button" data-tone="mute" @click="goToSysInfo()">
                  No — update dates
                </button>
                <button
                  type="button"
                  @click="confirmDates()"
                  :aria-current="isAnswered(activeQuestionId) ? 'true' : null"
                >
                  Yes — confirm
                </button>
              </footer>
            </div>
          </template>

          <template x-if="activeQuestion.type === 'options'">
            <div data-q="options">
              <template x-for="(opt, i) in activeQuestion.options" :key="i">
                <label class="option">
                  <input
                    type="radio"
                    :name="`q-${activeQuestion.id}`"
                    :checked="activeAnswer === i"
                    @change="handleAnswer(i)"
                  />
                  <template x-if="opt.icon">
                    <svg
                      viewBox="0 0 24 24"
                      fill="currentColor"
                      x-html="OPT_ICONS[opt.icon] || ''"
                    ></svg>
                  </template>
                  <span x-text="opt.label"></span>
                </label>
              </template>
            </div>
          </template>

          <template x-if="activeQuestion.type === 'matrix'">
            <footer>
              <button
                type="button"
                data-tone="mute"
                @click="moveBy(1)"
                :disabled="isLast || isAnswered(activeQuestionId)"
              >
                Skip
              </button>
              <button type="button" @click="moveBy(1, { markComplete: true })" :disabled="isLast">
                Next ›
              </button>
            </footer>
          </template>
        </form>

        <nav aria-label="Stages">
          <template x-for="s in STAGES" :key="s">
            <button
              type="button"
              @click="pickStage(s)"
              :aria-current="activeStage === s ? 'step' : null"
            >
              <span x-text="STAGE_LABELS[s]"></span>
              <span x-text="`${stageProgress[s].answered}/${stageProgress[s].total}`"></span>
              <span class="bar"><span :style="`width: ${stagePct(s)}%`"></span></span>
            </button>
          </template>
        </nav>
      </details>

      <details data-card="rank" open>
        <summary>Root-cause</summary>
        <div x-data="seeMore(3)">
          <ol>
            <template x-for="(r, i) in ranked" :key="r.id">
              <li x-show="visible(i)">
                <div
                  class="rank-row"
                  :style="`--accent-vt-rc: rc-${r.id}; --c-sev-t: ${severityT(r.pct).toFixed(3)}`"
                >
                  <code x-text="r.id"></code>
                  <span x-text="RC[r.id].label"></span>
                  <span class="bar"><span :style="`width: ${barWidth(r)}`"></span></span>
                  <span class="percent" x-text="`${rankPct(r)}%`"></span>
                </div>
              </li>
            </template>
          </ol>
          <template x-if="hasMore(ranked.length)">
            <button
              type="button"
              data-shape="ghost"
              @click="toggle()"
              x-text="label(ranked.length)"
            ></button>
          </template>
        </div>
      </details>

      <details data-card="rec" open>
        <summary>Recommended next check</summary>
        <div x-data="seeMore(2)">
          <template x-if="recommendations.length > 0">
            <ol>
              <template x-for="(rec, i) in recommendations" :key="rec.q.id">
                <li x-show="visible(i)">
                  <button
                    type="button"
                    @click="goTo(rec.q.id)"
                    :aria-current="activeQuestionId === rec.q.id ? 'true' : null"
                  >
                    <small x-text="STAGE_LABELS[rec.q.stage]"></small>
                    <span class="discriminator" x-text="`D = ${rec.D.toFixed(2)}`"></span>
                    <span x-text="rec.q.text"></span>
                  </button>
                </li>
              </template>
            </ol>
          </template>
          <template x-if="hasMore(recommendations.length)">
            <button
              type="button"
              data-shape="ghost"
              @click="toggle()"
              x-text="label(recommendations.length)"
            ></button>
          </template>
        </div>
      </details>

      <details data-card="sysinfo">
        <summary><span>System Info</span></summary>
        <div>
          <dl>
            <dt>Zone flow</dt>
            <dd x-text="SYSTEM.zoneFlow"></dd>
          </dl>
          <table
            style="--sp-cols: 3; grid-template-columns: minmax(110px, max-content) minmax(0, 1fr) auto auto"
          >
            <template x-for="row in hwRows" :key="row.id">
              <tr>
                <th scope="row" x-text="row.label"></th>
                <td>
                  <input
                    type="text"
                    :value="hwModelLabel(row.id)"
                    @input="setHwModel(row.id, $event.target.value)"
                    :aria-label="`${row.label} description`"
                  />
                </td>
                <td>
                  <input
                    type="date"
                    :max="todayISO"
                    :value="hwDates[row.id] || ''"
                    @input="setHwDate(row.id, $event.target.value)"
                    :aria-label="`${row.label} install or replacement date`"
                  />
                </td>
                <td x-text="hwAgeYearsLabel(row.id)"></td>
              </tr>
            </template>
          </table>
        </div>
      </details>

      <dialog
        x-ref="reset"
        aria-labelledby="reset-title"
        @click="if ($event.target === $refs.reset) $refs.reset.close()"
      >
        <h2 id="reset-title">Start over?</h2>
        <p>
          This clears every answer and returns you to the first question. You can&rsquo;t undo this.
        </p>
        <footer>
          <button type="button" autofocus @click="$refs.reset.close()">Keep my answers</button>
          <button type="button" data-tone="danger" @click="doReset(); $refs.reset.close()">
            Reset everything
          </button>
        </footer>
      </dialog>
    </main>

    <script src="data.js?v=21"></script>
    <script src="icons.js?v=15"></script>
    <script src="app.js?v=44"></script>
    <script defer src="https://unpkg.com/alpinejs@3.15.12/dist/cdn.min.js"></script>
  </body>
</html>
