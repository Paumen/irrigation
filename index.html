<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Irrigation Diagnostic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f2e6;
    --paper-2:#f1ead8;
    --paper-3:#e9dfc8;
    --ink:#1a2238;
    --ink-2:#2c3852;
    --ink-3:#4a5878;
    --rust:#b14a26;
    --rust-2:#7a2f15;
    --rust-soft:#ecc8b1;
    --grid:rgba(26,34,56,.07);
    --hairline:rgba(26,34,56,.30);
    --hairline-soft:rgba(26,34,56,.18);
    --good:#3f7a4a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
  body{
    font-family:"Nunito Sans", sans-serif;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: -1px -1px;
    padding: 16px 12px 56px;
    -webkit-font-smoothing: antialiased;
  }
  .mono{font-family:"JetBrains Mono", ui-monospace, monospace; font-feature-settings:"tnum"; font-variant-numeric: tabular-nums;}
  .narrow{font-family:"Nunito Sans", sans-serif; text-transform: uppercase; letter-spacing:.08em; font-weight:800;}
  .frame{
    max-width: 1180px;
    margin: 0 auto;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    position: relative;
  }
  .frame::before{
    content:"";
    position:absolute; inset:6px;
    border: .5px solid var(--hairline-soft);
    pointer-events:none;
    z-index: 0;
  }

  /* ─── HEADER (stamp only) ─────────────────────────── */
  .stampbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 16px;
    border-bottom: 1.5px solid var(--ink);
    gap: 12px;
    position: relative; z-index: 1;
  }
  .stampbar .stamp{
    font-family:"JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .12em;
    color: var(--ink-2);
    text-transform: uppercase;
  }
  .stampbar .stamp b{color:var(--rust); margin-right:8px}
  .stampbar .actions{display:flex; gap:6px;}
  .btn{
    font-family:"JetBrains Mono", monospace;
    font-size: 10.5px; letter-spacing:.1em; text-transform: uppercase;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 5px 12px;
    cursor: pointer;
    line-height: 1;
  }
  .btn:hover{ background: var(--paper-2); }
  .btn.danger{ color: var(--rust-2); border-color: var(--rust-2); }
  .btn.danger:hover{ background: rgba(177,74,38,.08); }

  section.sec{ padding: 8px 12px; border-bottom: 1px dashed var(--hairline); position: relative; z-index: 1;}
  section.sec:last-child{border-bottom:none;}
  .sec-h{ display:flex; align-items:baseline; gap:10px; margin: 0 0 12px; }
  .sec-h .num{
    font-family:"JetBrains Mono", monospace; font-size: 11px;
    background: var(--ink); color: var(--paper);
    padding: 3px 8px; letter-spacing: .12em;
  }
  .sec-h h2{
    font-family:"Nunito Sans", sans-serif; text-transform: uppercase;
    letter-spacing: .08em; font-weight: 800; margin:0;
    font-size: 15px;
  }
  .sec-h .rule{flex:1; height:0; border-top: 1px solid var(--ink);}

  /* ─── SCHEMATIC ─────────────────────────────────── */
  .schem-wrap{
    border: 1px solid var(--hairline);
    background:
      repeating-linear-gradient(0deg, transparent 0 23px, rgba(26,34,56,.04) 23px 24px),
      repeating-linear-gradient(90deg, transparent 0 23px, rgba(26,34,56,.04) 23px 24px),
      var(--paper-2);
    padding: 12px;
    position: relative;
  }
  .schem-wrap svg{display:block; width:100%; height:auto;}
  .schem-stamps{
    position:absolute; right:18px; top:14px;
    text-align:right;
    font-family:"JetBrains Mono", monospace;
    font-size: 9.5px;
    letter-spacing: .12em;
    color: var(--ink-2);
    text-transform: uppercase;
    line-height: 1.6;
  }
  .schem-stamps b{color:var(--rust); display:block;}
  .schem-legend{
    display:flex; flex-wrap:wrap; gap: 8px 18px;
    margin-top: 10px;
    font-family:"JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-2);
    align-items:center;
  }
  .schem-legend .swatch{ display:inline-block; width: 28px; height: 4px; vertical-align: middle; margin-right: 6px;}
  .schem-legend .swatch.dashed{ background: repeating-linear-gradient(90deg, var(--rust) 0 5px, transparent 5px 8px); height: 2px;}
  .schem-legend .swatch.dotted{ background: repeating-linear-gradient(90deg, #7a8aa3 0 3px, transparent 3px 5px, #7a8aa3 5px 6px, transparent 6px 8px); height: 2px;}
  .schem-legend .swatch.water{ background: var(--ink); height: 4px;}
  .schem-legend .swatch.zone{ background: var(--rust); height: 2px;}
  .schem-legend .grad{
    display:inline-block; width: 96px; height: 8px;
    background: linear-gradient(90deg, #3f7a4a, #b6bdc9, #ecc8b1, #c47554, #7a2f15);
    border: .5px solid var(--ink);
    vertical-align: middle;
    margin: 0 6px;
  }
  .schem-legend .pip{
    display:inline-flex; align-items:center; justify-content:center;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--paper); border: 1px solid var(--ink);
    font-family:"JetBrains Mono", monospace; font-weight: 700; font-size: 9px;
    color: var(--ink); margin-right: 4px;
  }

  /* ─── 3-COLUMN WORKBENCH ──────────────────────────── */
  .work{
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }
  @media (min-width: 1080px){
    .work{ grid-template-columns: minmax(0, 1fr) 360px; }
  }

  .panel{
    border: 1px solid var(--ink);
    background: var(--paper);
    position: relative;
  }
  .panel > .hd{
    background: var(--ink);
    color: var(--paper);
    padding: 6px 10px;
    font-family:"Nunito Sans", sans-serif;
    text-transform: uppercase; letter-spacing: .1em;
    font-weight: 800; font-size: 12px;
    display:flex; justify-content:space-between; align-items:center;
    gap: 8px;
  }
  .panel > .hd .id{
    font-family:"JetBrains Mono", monospace;
    background: var(--rust); color: var(--paper);
    padding: 1px 6px; font-size: 10px; letter-spacing: .1em;
    font-weight: 700;
  }
  .panel > .hd .meta{
    font-family:"JetBrains Mono", monospace;
    font-weight: 500; font-size: 10px;
    color: var(--paper); opacity: .85; letter-spacing: .08em;
  }
  .panel > .bd{ padding: 10px 12px; }

  /* ─── STAGE TABS ─────────────────────────────────── */
  .stages{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    border: 1px solid var(--ink);
    background: var(--paper);
    margin-bottom: 6px;
  }
  .stages button{
    appearance:none; background:transparent;
    border:none; border-right: 1px solid var(--ink);
    padding: 1px 8px;
    cursor: pointer;
    text-align:left;
    position: relative;
    overflow: hidden;
    font-family:"JetBrains Mono", monospace;
    color: var(--ink);
  }
  .stages button:last-child{border-right:none;}
  .stages button .label{
    display:flex; align-items:center; justify-content:space-between;
    gap:6px;
    position: relative; z-index: 1;
  }
  .stages button .label .nm{ font-family:"Nunito Sans", sans-serif; text-transform: uppercase; font-weight:800; letter-spacing:.08em; font-size:10px; }
  .stages button .label .ct{ font-size: 9px; color: var(--ink-2); letter-spacing: .04em;}
  .stages button .fill{
    position:absolute; left:0; top:0; bottom:0; height:auto;
    background: rgba(177,74,38,.32);
    transition: width .25s;
    z-index: 0;
  }
  .stages button > *:not(.fill){ position: relative; z-index: 1;}
  .stages button.active{ background: var(--ink); color: var(--paper); }
  .stages button.active .label .ct{ color: var(--paper); opacity:.85; }
  .stages button.active .fill{ background: rgba(177,74,38,.45); }

  /* ─── QUESTION LIST (left rail) ──────────────────── */
  .qlist{
    max-height: 460px; overflow-y: auto;
  }
  .qlist .qrow{
    appearance:none; background:transparent; border:0;
    width:100%; text-align:left;
    display:grid; grid-template-columns: 50px 1fr; gap: 6px;
    padding: 6px 10px;
    cursor:pointer;
    border-bottom: 1px dotted var(--hairline-soft);
    border-left: 3px solid transparent;
    color: var(--ink);
    font-family: "Nunito Sans", sans-serif;
  }
  .qlist .qrow:hover{ background: var(--paper-2); }
  .qlist .qrow.active{
    background: var(--paper-2);
    border-left-color: var(--rust);
  }
  .qlist .qrow .qid{
    font-family:"JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-2); padding-top: 2px;
    letter-spacing: .04em;
  }
  .qlist .qrow.answered .qid{ color: var(--good); font-weight: 700; }
  .qlist .qrow .qtxt{ font-size: 12px; line-height: 1.3; }

  /* ─── QUESTION PANEL ─────────────────────────────── */
  .qhead{
    display:flex; justify-content:space-between; align-items:center;
    gap: 8px; margin-bottom: 10px;
  }
  .qhead .meta{
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    font-family:"JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-2); letter-spacing: .06em; text-transform: uppercase;
  }
  .qhead .meta .qid{ background: var(--ink); color: var(--paper); padding: 2px 6px;}
  .qhead .meta .stage{ border: 1px solid var(--hairline); padding: 1px 6px;}
  .qnav{ display:flex; gap: 4px; }
  .qnav button{
    appearance:none; background: var(--paper); border: 1px solid var(--ink);
    width: 28px; height: 26px; cursor:pointer;
    font-family:"JetBrains Mono", monospace; font-weight: 700;
    color: var(--ink);
    display:inline-flex; align-items:center; justify-content:center;
    font-size: 14px;
    box-sizing: border-box;
  }
  .qhead .btn.danger{
    height: 26px; padding: 0 10px;
    display:inline-flex; align-items:center;
    box-sizing: border-box;
  }
  .qnav button:disabled{ opacity:.35; cursor: not-allowed;}
  .qnav button.x{ color: var(--rust-2); border-color: var(--rust-2); }

  .qtitle{
    font-family:"Nunito Sans", sans-serif;
    font-size: 16px; line-height: 1.3; font-weight: 700;
    color: var(--ink);
    margin: 4px 0 12px;
    letter-spacing: -0.005em;
  }
  .qfreeze{
    display:inline-flex; align-items:center; gap:6px;
    font-family:"JetBrains Mono", monospace; font-size: 11px;
    color: var(--ink-2); margin-bottom: 10px;
    background: var(--paper-2); padding: 4px 8px; border: 1px solid var(--hairline);
  }
  .qfreeze input{ accent-color: var(--rust); width: 14px; height: 14px;}
  .opts{ display:flex; flex-direction:column; gap: 6px;}
  .opt{
    appearance:none;
    background: var(--paper);
    border: 1px solid var(--hairline);
    padding: 9px 12px;
    text-align:left;
    cursor: pointer;
    display:grid; grid-template-columns: 22px 1fr;
    gap: 8px; align-items: center;
    color: var(--ink);
    font-family:"Nunito Sans", sans-serif;
    font-size: 13.5px; line-height: 1.3;
    transition: background .12s;
  }
  .opt:hover{ background: var(--paper-2); }
  .opt .dot{
    font-family:"JetBrains Mono", monospace; font-size: 13px;
    color: var(--ink-2); text-align:center;
  }
  .opt.selected{
    background: var(--paper);
    border: 1.5px solid var(--ink);
    box-shadow: 3px 3px 0 0 var(--ink);
    transform: translate(-1px,-1px);
  }
  .opt.selected .dot{ color: var(--rust); font-weight: 700;}

  /* ─── RANKING + RECOMMENDATIONS ─────────────────── */
  .recs{ display:flex; flex-direction: column; gap: 6px;}
  .rec{
    appearance:none; background: var(--paper);
    border: 1px solid var(--hairline);
    border-left: 3px solid var(--rust);
    padding: 7px 10px;
    cursor: pointer; text-align: left;
    color: var(--ink);
  }
  .rec:hover{ background: var(--paper-2); }
  .rec .top{
    display:flex; align-items:baseline; gap:8px;
    font-family:"JetBrains Mono", monospace;
    font-size: 10.5px; letter-spacing: .04em;
  }
  .rec .top .id{ color: var(--rust-2); font-weight: 700;}
  .rec .top .stg{ color: var(--ink-2); }
  .rec .top .d{ margin-left:auto; color: var(--ink-3); }
  .rec .qq{
    font-family:"Nunito Sans", sans-serif;
    font-size: 12.5px; line-height: 1.3;
    margin-top: 3px;
  }
  .rec.empty{
    border-left-color: var(--hairline);
    color: var(--ink-2);
    font-style: italic;
    font-size: 11.5px;
    padding: 8px 10px;
    text-align:center;
  }

  .rank{ display:flex; flex-direction:column; gap: 2px;}
  .rank-row{
    appearance:none; background:transparent; border:0;
    display:grid;
    grid-template-columns: 50px 1fr 50px;
    gap: 10px; align-items: center;
    padding: 6px 8px;
    cursor: pointer;
    text-align:left;
    border-bottom: 1px dotted var(--hairline-soft);
    color: var(--ink);
  }
  .rank-row:hover, .rank-row.active{ background: var(--paper-2); }
  .rank-row.active{ outline: 1px solid var(--ink); }
  .rank-row .n{ font-family:"JetBrains Mono", monospace; font-size: 10px; color: var(--ink-2); text-align:right;}
  .rank-row .id{ font-family:"JetBrains Mono", monospace; font-size: 10.5px; font-weight: 700; color: var(--ink); }
  .rank-row .label{ font-size: 12px; line-height: 1.25; color: var(--ink); font-family:"Nunito Sans", sans-serif;}
  .rank-row .pct{ font-family:"JetBrains Mono", monospace; font-size: 10.5px; text-align:right; font-weight: 600;}
  .rank-row .bar{
    height: 4px; margin-top: 3px; background: var(--paper-2);
    border: .5px solid var(--hairline);
    overflow: hidden;
  }
  .rank-row .bar > div{ height: 100%; }
  .rank-more{
    appearance: none; background: transparent; border: 0;
    font-family:"JetBrains Mono", monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--ink-2); padding: 6px;
    cursor: pointer; text-align:left;
  }
  .rank-more:hover{ color: var(--rust); }

  /* ─── footer ─────────────────────────────────────── */
  footer.tb{
    display:grid; grid-template-columns: 1fr 1fr 1fr;
    border-top: 1.5px solid var(--ink);
    font-family:"JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    position: relative; z-index: 1;
  }
  footer.tb div{ padding: 8px 12px; border-right: 1px solid var(--hairline);}
  footer.tb div:last-child{border-right:none}
  footer.tb b{ display:block; color:var(--rust); margin-bottom:2px;}

  /* ─── MOBILE: clamp diagram to ~1/3 viewport ──────── */
  @media (max-width: 760px){
    body{ padding: 10px 6px 36px;}
    .stampbar{ padding: 8px 12px; }
    .schem-wrap{ padding: 8px;}
    .schem-wrap svg{
      max-height: 33vh;
      width: 100%;
      object-fit: contain;
    }
    .schem-stamps{ display:none; }
    .schem-legend{ font-size: 9.5px; gap: 4px 12px;}
    section.sec{ padding: 14px 12px;}
    .qlist{ max-height: 220px; }
    footer.tb{ grid-template-columns: 1fr;}
    footer.tb div{ border-right: none; border-bottom: 1px solid var(--hairline);}
    .qtitle{ font-size: 15px; }
  }
  @media (max-width: 420px){
    .stages button .label .nm{ font-size: 10px;}
    .stages button .label .ct{ font-size: 9px;}
    .stages button{ padding: 6px;}
  }
</style>
</head>
<body>

<div class="frame">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="irrigation.jsx"></script>

</body>
</html>
