<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Irrigation Diagnostic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=28" />
  </head>
  <body>
    <main x-data="app" x-cloak>
     <details data-card="schematic" open>
        <summary class="section-title">Schematic</summary>
        <figure>
          <svg
            viewBox="0 -22 700 344"
            preserveAspectRatio="xMidYMid meet"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <marker
                id="arr-water"
                viewBox="0 0 10 10"
                refX="9"
                refY="5"
                markerWidth="5"
                markerHeight="5"
                orient="auto-start-reverse"
              ></marker>
              <marker
                id="arr-ctrl"
                viewBox="0 0 10 10"
                refX="9"
                refY="5"
                markerWidth="5"
                markerHeight="5"
                orient="auto-start-reverse"
              ></marker>
              <marker
                id="arr-mains"
                viewBox="0 0 10 10"
                refX="9"
                refY="5"
                markerWidth="5"
                markerHeight="5"
                orient="auto-start-reverse"
              ></marker>
            </defs>

            <g data-flow="wifi" :class="isHighlighted('wifi') ? 'flow-highlight' : ''">
              <line x1="122" y1="60" x2="295" y2="60" class="line" />
              <g :transform="iconTransform('ms:wifi', 208, 46, 28)">
                <path :d="ICONS['ms:wifi'].d" fill="currentColor" />
              </g>
            </g>

            <g data-flow="ctrl" :class="isHighlighted('ctrl') ? 'flow-highlight' : ''">
              <line x1="395" y1="60" x2="568" y2="60" class="line" marker-end="url(#arr-ctrl)" />
              <line x1="345" y1="100" x2="345" y2="180" class="line" marker-end="url(#arr-ctrl)" />
            </g>
            <g data-flow="ctrl">
              <g :transform="iconTransform('mdi:lightning-bolt-outline', 470, 46, 28)">
                <path :d="ICONS['mdi:lightning-bolt-outline'].d" fill="currentColor" />
              </g>
              <text x="486" y="46" text-anchor="start" class="flow-label">24V</text>
            </g>
            <g data-flow="ctrl">
              <g :transform="iconTransform('mdi:lightning-bolt-outline', 290, 140, 28)">
                <path :d="ICONS['mdi:lightning-bolt-outline'].d" fill="currentColor" />
              </g>
              <text x="306" y="140" text-anchor="start" class="flow-label">24V</text>
            </g>

            <line
              data-flow="mains"
              x1="618"
              y1="100"
              x2="618"
              y2="180"
              class="line"
              :class="isHighlighted('mains') ? 'flow-highlight' : ''"
              marker-end="url(#arr-mains)"
            />
            <g data-flow="mains">
              <g :transform="iconTransform('ms:bolt', 563, 140, 28)">
                <path :d="ICONS['ms:bolt'].d" fill="currentColor" />
              </g>
              <text x="579" y="140" text-anchor="start" class="flow-label">230V</text>
            </g>

            <g data-flow="water" :class="isHighlighted('water') ? 'flow-highlight' : ''">
              <line x1="568" y1="220" x2="395" y2="220" class="line" marker-end="url(#arr-water)" />
              <line x1="568" y1="220" x2="395" y2="220" class="hose-highlight" />
            </g>
            <g data-flow="water">
              <g :transform="iconTransform('mdi:water-outline', 470, 234, 28)">
                <path :d="ICONS['mdi:water-outline'].d" fill="currentColor" />
              </g>
              <text x="486" y="234" text-anchor="start" class="flow-label">H₂O</text>
            </g>

            <g data-flow="lateral" :class="isHighlighted('lateral') ? 'flow-highlight' : ''">
              <line x1="295" y1="220" x2="122" y2="220" class="line" marker-end="url(#arr-water)" />
              <line x1="295" y1="220" x2="122" y2="220" class="hose-highlight" />
            </g>
            <g data-flow="lateral">
              <g :transform="iconTransform('mdi:water-outline', 198, 234, 28)">
                <path :d="ICONS['mdi:water-outline'].d" fill="currentColor" />
              </g>
              <text x="214" y="234" text-anchor="start" class="flow-label">H₂O</text>
            </g>

            <g
              @click="pipFromEvent($event)"
              @keydown.enter.prevent="pipFromEvent($event)"
              @keydown.space.prevent="pipFromEvent($event)"
              x-html="renderDiagram()"
            ></g>
          </svg>

          
        </figure>
      </details>
      
      <details data-card="form" open>
        <summary class="section-title">
          Diagnostic
          <button type="button" data-tone="mute" data-size="sm" @click.stop="$refs.reset.showModal()">Reset</button>
          <button
            type="button"
            data-tone="mute"
            data-size="sm"
            data-shape="square"
            @click.stop="moveBy(-1)"
            :disabled="isFirst"
            aria-label="Previous question"
            title="Previous"
          >
            ‹
          </button>
          <button
            type="button"
            data-tone="mute"
            data-size="sm"
            data-shape="square"
            @click.stop="moveBy(1)"
            :disabled="isLast"
            aria-label="Next question"
            title="Next"
          >
            ›
          </button>
        </summary>
        <form @submit.prevent>
          <header>
            <h2 x-text="activeQuestion.text"></h2>
          </header>

          <template x-if="activeQuestion.type === 'matrix'">
            <div class="matrix-scroll">
              <table :style="`--sp-cols: ${activeQuestion.columns.length}`">
                <tr>
                  <th></th>
                  <template x-for="c in activeQuestion.columns" :key="c.id">
                    <th scope="col" :title="c.label" x-text="c.label"></th>
                  </template>
                </tr>
                <template x-for="row in activeQuestion.rows" :key="row.id">
                  <tr>
                    <th scope="row" x-text="row.label"></th>
                    <template x-for="c in activeQuestion.columns" :key="c.id">
                      <td>
                        <label :aria-label="`${row.label}: ${c.label}`">
                          <input
                            type="radio"
                            :name="`${activeQuestion.id}-${row.id}`"
                            :checked="rowAns(row.id) === c.id"
                            @change="setMatrixCell(row.id, c.id)"
                          />
                        </label>
                      </td>
                    </template>
                  </tr>
                </template>
              </table>
            </div>
          </template>

          <template x-if="activeQuestion.type === 'sliders'">
            <div class="sliders-grid">
              <template x-for="row in activeQuestion.rows" :key="row.id">
                <div
                  class="slider-row"
                  :data-active="sliderVal(row.id) > 0 ? 'true' : null"
                  :style="`--fill: ${(sliderVal(row.id) / (row.steps.length - 1)) * 100}%`"
                >
                  <span x-text="row.label"></span>
                  <input
                    type="range"
                    :min="0"
                    :max="row.steps.length - 1"
                    step="1"
                    :value="sliderVal(row.id)"
                    @input="setSliderVal(row.id, $event.target.value)"
                    :aria-label="row.label"
                    :list="`ticks-${activeQuestion.id}-${row.id}`"
                  />
                  <datalist :id="`ticks-${activeQuestion.id}-${row.id}`">
                    <template x-for="(st, si) in row.steps" :key="si">
                      <option :value="si"></option>
                    </template>
                  </datalist>
                  <span class="slider-value" x-text="row.steps[sliderVal(row.id)].label"></span>
                </div>
              </template>
            </div>
          </template>

          <template x-if="activeQuestion.type === 'options'">
            <div class="option-grid">
              <template x-for="(opt, i) in activeQuestion.options" :key="i">
                <label class="option" :data-has-icon="opt.icon ? 'true' : null">
                  <input
                    type="radio"
                    :name="`q-${activeQuestion.id}`"
                    :checked="activeAnswer === i"
                    @change="handleAnswer(i)"
                  />
                  <template x-if="opt.icon">
                    <svg viewBox="0 0 24 24" class="opt-icon" fill="currentColor" x-html="OPT_ICONS[opt.icon] || ''"></svg>
                  </template>
                  <span x-text="opt.label"></span>
                </label>
              </template>
            </div>
          </template>

          <template x-if="activeQuestion.type === 'matrix' || activeQuestion.type === 'sliders'">
            <footer>
              <button type="button" data-tone="mute" @click="moveBy(1)" :disabled="isLast">Skip</button>
              <button type="button" @click="moveBy(1, { markComplete: true })" :disabled="isLast">Next ›</button>
            </footer>
          </template>
        </form>

        <nav aria-label="Stages">
          <template x-for="s in STAGES" :key="s">
            <button
              type="button"
              @click="pickStage(s)"
              :aria-current="activeStage === s ? 'step' : null"
              :data-complete="isStageComplete(s) ? 'true' : null"
            >
              <span class="stage-info">
                <span class="stage-name">
                  <span x-text="STAGE_LABELS[s]"></span>
                  <span class="stage-check" aria-hidden="true">✓</span>
                </span>
                <span x-text="`${stageProgress[s].answered}/${stageProgress[s].total}`"></span>
              </span>
              <span class="bar"><span :style="`width: ${stagePct(s)}%`"></span></span>
            </button>
          </template>
        </nav>
      </details>

      

      <details data-card="rank" open>
        <summary class="section-title">Root-cause</summary>
        <div x-data="seeMore(3)">
          <ol>
            <template x-for="(r, i) in ranked" :key="r.id">
              <li x-show="visible(i)">
                <button
                  type="button"
                  class="rank-row"
                  :class="activeRC === r.id ? 'active' : ''"
                  :style="`--vt-rc: rc-${r.id}; --sev-t: ${severityT(r.pct).toFixed(3)}; --sev-t-fg: ${severityTFg(r.pct).toFixed(3)}`"
                  @click="activeRC = r.id"
                >
                  <code x-text="r.id"></code>
                  <span x-text="RC[r.id].label"></span>
                  <span class="bar"><span :style="`width: ${barWidth(r)}`"></span></span>
                  <span class="percent" x-text="`${rankPct(r)}%`"></span>
                </button>
              </li>
            </template>
          </ol>
          <template x-if="ranked.length > 3">
            <button
              type="button"
              class="see-more-btn"
              data-shape="ghost"
              @click="toggle()"
              x-text="label(ranked.length)"
            ></button>
          </template>
        </div>
      </details>

      <details data-card="rec" open>
        <summary class="section-title">Recommended next check</summary>
        <div x-data="seeMore(2)">
          <template x-if="recommendations.length > 0">
            <ol>
              <template x-for="(rec, i) in recommendations" :key="rec.q.id">
                <li x-show="visible(i)">
                  <button type="button" class="recommendation" @click="goTo(rec.q.id)">
                    <span class="stage" x-text="STAGE_LABELS[rec.q.stage]"></span>
                    <span class="discriminator" x-text="`D = ${rec.D.toFixed(2)}`"></span>
                    <span class="recommendation-text" x-text="rec.q.text"></span>
                  </button>
                </li>
              </template>
            </ol>
          </template>
          <template x-if="recommendations.length > 2">
            <button
              type="button"
              class="see-more-btn"
              data-shape="ghost"
              @click="toggle()"
              x-text="label(recommendations.length)"
            ></button>
          </template>
        </div>
      </details>

      <dialog
        x-ref="reset"
        aria-labelledby="reset-title"
        @click="if ($event.target === $refs.reset) $refs.reset.close()"
      >
        <h3 id="reset-title">Start over?</h3>
        <p>
          This clears every answer and returns you to the first question. You can&rsquo;t undo this.
        </p>
        <footer>
          <button type="button" autofocus @click="$refs.reset.close()">Keep my answers</button>
          <button type="button" data-tone="danger" @click="doReset(); $refs.reset.close()">
            Reset everything
          </button>
        </footer>
      </dialog>
    </main>

    <script src="data.js?v=14"></script>
    <script src="icons.js?v=12"></script>
    <script src="app.js?v=24"></script>
    <script defer src="https://unpkg.com/alpinejs@3.15.12/dist/cdn.min.js"></script>
  </body>
</html>
