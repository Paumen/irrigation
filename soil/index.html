<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Soil Balance — Wijchen</title>
    <link rel="stylesheet" href="PAUMEN.css" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap"
    />
    <style>
      /* Graph-specific layout. Colour/metaphor lives on the inline SVG as
         presentation attributes; this is only the full-bleed scroll frame. */
      [data-graph] {
        justify-self: stretch;
        inline-size: 100vw;
        margin-inline: calc(50% - 50vw);
        overflow-x: auto;
        overflow-y: hidden;
        overscroll-behavior-x: contain;
        -webkit-overflow-scrolling: touch;
      }

      [data-graph] svg {
        display: block;
        block-size: auto;
      }

      [data-day] {
        cursor: pointer;
      }

      [data-day]:focus-visible {
        outline: var(--xs) solid var(--accent);
      }

      [data-legend] {
        display: flex;
        flex-wrap: wrap;
        gap: var(--m);
        color: var(--text-mute);
        font-size: var(--s);
      }

      [data-legend] li {
        display: inline-flex;
        align-items: center;
        gap: var(--xs);
      }
    </style>
  </head>
  <body>
    <header data-colspan="12">
      <hgroup data-colspan="12">
        <h1>Soil Balance</h1>
        <p data-skin="mute" data-el="site">Vormersesluisweg 3A, Wijchen</p>
      </hgroup>
    </header>

    <form data-colspan="12" data-el="controls">
      <section data-colspan="6">
        <label for="planting" data-colspan="12">Planting</label>
        <select id="planting" data-el="planting" data-colspan="12"></select>
      </section>

      <section data-colspan="6">
        <label for="soil" data-colspan="12">Soil</label>
        <select id="soil" data-el="soil" data-colspan="12"></select>
      </section>

      <section data-colspan="6">
        <label for="sun" data-colspan="12">Sun exposure</label>
        <select id="sun" data-el="sun" data-colspan="12"></select>
      </section>

      <section data-colspan="6">
        <label for="minutes" data-colspan="12">Watering (minutes)</label>
        <input
          id="minutes"
          data-el="minutes"
          data-colspan="12"
          type="number"
          inputmode="numeric"
          min="0"
          max="600"
          step="5"
        />
        <p data-colspan="12" data-skin="mute" data-el="dose"></p>
      </section>

      <section data-colspan="12">
        <button type="button" data-el="reset" data-colspan="6" data-skin="ghost">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              d="M5 12a7 7 0 1 1 2 4.9"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path
              d="M4 7v4h4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Reset waterings
        </button>
      </section>
    </form>

    <p data-el="status" data-state="loading" data-colspan="12">
      Loading weather…
    </p>

    <figure data-graph data-el="graph" data-colspan="12" hidden></figure>

    <ul data-legend data-colspan="12">
      <li>
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <circle cx="8" cy="8" r="3.4" fill="#f3b94d" />
        </svg>
        Sun &amp; heat dry the soil
      </li>
      <li>
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <path d="M8 3 C11 8 11 11 8 12 C5 11 5 8 8 3 Z" fill="#6db4e6" />
        </svg>
        Rain adds water
      </li>
      <li>
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <path d="M8 2 C12 8 12 12 8 13 C4 12 4 8 8 2 Z" fill="#2f7fb0" />
          <circle
            cx="8"
            cy="9"
            r="6.2"
            fill="none"
            stroke="#2f7fb0"
            stroke-width="1.2"
          />
        </svg>
        You watered (tap a day)
      </li>
      <li>
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <rect x="3" y="4" width="10" height="9" rx="1.5" fill="#5aa9d6" />
        </svg>
        Soil moisture held
      </li>
    </ul>

    <footer data-colspan="12">
      <p data-skin="mute" data-colspan="12">
        Weather from
        <a href="https://open-meteo.com/" rel="noopener">Open-Meteo</a>. Plans
        are not saved — reload resets everything.
      </p>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
