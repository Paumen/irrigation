<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Soil Balance — Wijchen</title>
  <style>
    :root {
      --bg: #eef1ee;
      --card: #ffffff;
      --ink: #20302a;
      --muted: #97a39c;
      --faint: #c4ccc7;
      --line: #eaefeb;
      --accent: #1f9d63;
      --accent-weak: #e8f5ee;
      --water-top: #dcecf7;
      --water-bot: #a8d0ea;
      --water-line: #72add6;
      --rain: #5a9fd6;
      --et: #d2a06f;
      --refill: #c97f6f;
      --soil: #f4eee4;
      --soil-line: #e6dcca;
      --sun: #f4c64f;
      --bloom: #e78aa6;
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app { max-width: 480px; margin: 0 auto; padding: 16px 14px 40px; }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(28, 44, 36, 0.05), 0 6px 20px rgba(28, 44, 36, 0.04);
    }

    /* Header */
    .head-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .head h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; }
    .head .site { color: var(--muted); font-size: 12px; text-align: right; padding-top: 3px; }

    .figures { display: flex; gap: 10px; }
    .fig {
      flex: 1; text-align: center;
      background: #f6f8f6; border-radius: 14px; padding: 12px 6px;
    }
    .fig--hero { background: var(--accent-weak); }
    .fig-num { display: block; font-size: 21px; font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
    .fig-num.warn { color: var(--refill); }
    .fig-num.good { color: var(--accent); }
    .fig-lab { display: block; font-size: 10px; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }

    /* Chart */
    .chart-head { display: flex; align-items: center; justify-content: space-between; margin: -2px 2px 10px; }
    .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    svg.graph { width: 100%; height: auto; display: block; overflow: visible; }
    .graph text { font-family: inherit; }
    .graph .g-temp { font-size: 8.5px; fill: var(--muted); }
    .graph .g-day { font-size: 9px; fill: var(--muted); font-variant-numeric: tabular-nums; }
    .graph .g-day.on { font-weight: 800; fill: var(--accent); }
    .graph .g-wd { font-size: 7px; fill: var(--faint); }
    .graph .g-refill { font-size: 8px; fill: var(--refill); font-weight: 700; paint-order: stroke; stroke: #fff; stroke-width: 2.6px; stroke-linejoin: round; }
    .graph .g-pct { font-size: 11px; font-weight: 800; fill: var(--ink); paint-order: stroke; stroke: #fff; stroke-width: 2.8px; stroke-linejoin: round; }
    .graph .hit { fill: transparent; cursor: pointer; }
    .graph .hit:hover { fill: rgba(31, 157, 99, 0.08); }

    .legend { list-style: none; display: flex; flex-wrap: wrap; gap: 14px; margin: 12px 2px 0; padding: 0; font-size: 11.5px; color: var(--muted); }
    .legend li { display: flex; align-items: center; gap: 6px; }
    .legend .sw { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
    .legend .sw.rain { background: var(--rain); }
    .legend .sw.et { background: var(--et); }
    .legend .sw.water { background: var(--accent); border-radius: 50% 50% 50% 0; transform: rotate(45deg); }
    .legend .sw.refill { width: 14px; height: 0; border-top: 2px dashed var(--refill); border-radius: 0; }
    .tip { margin: 10px 2px 0; font-size: 12px; color: var(--muted); }

    /* Controls */
    .ctrl { margin-bottom: 16px; }
    .ctrl:last-child { margin-bottom: 0; }
    .ctrl-lab { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 9px; }

    .seg { display: flex; gap: 4px; background: #f1f4f1; border-radius: 12px; padding: 4px; }
    .seg-btn {
      flex: 1; appearance: none; border: 0; border-radius: 9px;
      background: transparent; color: var(--ink); font: inherit; font-size: 13px;
      padding: 9px 4px; cursor: pointer; min-height: 38px; transition: background 0.12s, color 0.12s, box-shadow 0.12s;
    }
    .seg-btn.on { background: var(--accent); color: #fff; font-weight: 600; box-shadow: 0 1px 2px rgba(31, 157, 99, 0.35); }

    .stepper-row { display: flex; align-items: center; gap: 14px; }
    .stepper { display: inline-flex; align-items: center; background: #f1f4f1; border-radius: 12px; padding: 4px; }
    .stepper button {
      appearance: none; border: 0; background: #fff; color: var(--ink);
      font-size: 19px; line-height: 1; width: 40px; height: 38px; border-radius: 9px; cursor: pointer;
      box-shadow: 0 1px 2px rgba(28, 44, 36, 0.08);
    }
    .stepper button:active { background: #eef1ee; }
    .stepper-val { min-width: 70px; text-align: center; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stepper-val small { font-weight: 500; color: var(--muted); }
    .dose { color: var(--muted); font-size: 13px; }
    .dose b { color: var(--ink); font-weight: 700; }

    /* States */
    .state { text-align: center; padding: 52px 18px; }
    .state .spinner {
      width: 30px; height: 30px; margin: 0 auto 16px; border-radius: 50%;
      border: 3px solid var(--line); border-top-color: var(--accent); animation: spin 0.9s linear infinite;
    }
    .state.error h2 { color: var(--refill); margin: 0 0 8px; font-size: 17px; }
    .state.error p { color: var(--muted); font-size: 13px; margin: 6px 0; }
    .btn { appearance: none; border: 0; background: var(--accent); color: #fff; font: inherit; font-weight: 600; padding: 11px 20px; border-radius: 11px; cursor: pointer; margin-top: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main id="app"></main>

  <script type="module">
    import { compute, fetchWeather, PLANTINGS, SOILS, DEFAULTS, SITE } from "./soil.js";

    // ----- chosen, spec-unspecified control details (easy to tweak) -----
    const STEP_MINUTES = 5;
    const MIN_MINUTES = 5;

    // ----- in-memory state only; resets on reload (SCO-4) -----
    const state = {
      phase: "loading",
      weather: null,
      error: null,
      controls: { ...DEFAULTS, watered: [] },
    };

    // ----- display formatting (UIX-6: round at display only) -----
    const clamp01 = (x) => (x < 0 ? 0 : x > 1 ? 1 : x);
    const pct = (f) => Math.round(clamp01(f) * 100);
    const mm1 = (x) => (Math.round(x * 10) / 10).toFixed(1);
    const degC = (t) => (t == null ? "—" : String(Math.round(t)));
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    const WD = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
    const parseUTC = (s) => {
      if (!s) return null;
      const [Y, M, D] = s.split("-").map(Number);
      return new Date(Date.UTC(Y, M - 1, D));
    };
    const dayNum = (s) => { const d = parseUTC(s); return d ? String(d.getUTCDate()) : ""; };
    const weekday = (s) => { const d = parseUTC(s); return d ? WD[d.getUTCDay()] : ""; };

    function nextText(nw) {
      if (nw.days === 0) return "now";
      if (nw.beyondHorizon) return ">14 days";
      return "+" + nw.days + (nw.days === 1 ? " day" : " days");
    }

    // ----- chart geometry -----
    const VW = 480;
    const PLOT_L = 36, PLOT_R = 446;
    const TEMP_Y = 15, BAR_BASE = 78, BAR_TOP = 38;
    const Y_SURFACE = 94, Y_FLOOR = 298, MOIST_H = Y_FLOOR - Y_SURFACE;
    const Y_DAY = 316, Y_WD = 328;
    const f1 = (n) => (Math.round(n * 10) / 10).toString();
    const levelY = (f) => Y_FLOOR - clamp01(f) * MOIST_H;

    function sunSvg() {
      const cx = 462, cy = 20, r = 7;
      let rays = "";
      for (let k = 0; k < 8; k++) {
        const a = (k * Math.PI) / 4;
        rays += `<line x1="${f1(cx + Math.cos(a) * (r + 2.5))}" y1="${f1(cy + Math.sin(a) * (r + 2.5))}" x2="${f1(cx + Math.cos(a) * (r + 6))}" y2="${f1(cy + Math.sin(a) * (r + 6))}" stroke="var(--sun)" stroke-width="1.6" stroke-linecap="round"/>`;
      }
      return `<g opacity="0.9">${rays}<circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--sun)"/></g>`;
    }

    function plantSvg(type) {
      const bx = 16, sy = Y_SURFACE;
      const roots = `<g stroke="var(--et)" stroke-width="1.1" fill="none" opacity="0.32" stroke-linecap="round">` +
        `<path d="M${bx} ${sy} L ${bx} ${sy + 42}"/>` +
        `<path d="M${bx} ${sy + 6} C ${bx - 4} ${sy + 16}, ${bx - 7} ${sy + 24}, ${bx - 8} ${sy + 36}"/>` +
        `<path d="M${bx} ${sy + 8} C ${bx + 4} ${sy + 16}, ${bx + 7} ${sy + 24}, ${bx + 9} ${sy + 34}"/></g>`;
      let top;
      if (type === "Turf") {
        top = `<g stroke="var(--accent)" stroke-width="2" stroke-linecap="round" fill="none">` +
          `<path d="M${bx - 6} ${sy} Q ${bx - 8} ${sy - 11} ${bx - 7} ${sy - 16}"/>` +
          `<path d="M${bx - 2} ${sy} Q ${bx - 3} ${sy - 14} ${bx - 2} ${sy - 20}"/>` +
          `<path d="M${bx + 2} ${sy} Q ${bx + 3} ${sy - 13} ${bx + 4} ${sy - 18}"/>` +
          `<path d="M${bx + 6} ${sy} Q ${bx + 8} ${sy - 10} ${bx + 8} ${sy - 14}"/></g>`;
      } else if (type === "Shrubs") {
        top = `<g fill="var(--accent)">` +
          `<circle cx="${bx - 5}" cy="${sy - 8}" r="7"/><circle cx="${bx + 5}" cy="${sy - 8}" r="7"/><circle cx="${bx}" cy="${sy - 15}" r="8"/></g>`;
      } else {
        top = `<g>` +
          `<path d="M${bx} ${sy} L ${bx} ${sy - 20}" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>` +
          `<path d="M${bx} ${sy - 10} C ${bx - 9} ${sy - 11} ${bx - 11} ${sy - 18} ${bx - 11} ${sy - 18} C ${bx - 4} ${sy - 18} ${bx} ${sy - 13} ${bx} ${sy - 10} Z" fill="var(--accent)"/>` +
          `<g fill="var(--bloom)"><circle cx="${bx}" cy="${sy - 30}" r="3"/><circle cx="${bx - 4}" cy="${sy - 26}" r="3"/><circle cx="${bx + 4}" cy="${sy - 26}" r="3"/><circle cx="${bx - 3}" cy="${sy - 22}" r="3"/><circle cx="${bx + 3}" cy="${sy - 22}" r="3"/></g>` +
          `<circle cx="${bx}" cy="${sy - 25}" r="2.3" fill="var(--sun)"/></g>`;
      }
      return roots + top;
    }

    function dropSvg(x, y) {
      return `<path d="M ${f1(x)} ${y - 6} Q ${f1(x + 4.5)} ${y} ${f1(x)} ${y + 4.5} Q ${f1(x - 4.5)} ${y} ${f1(x)} ${y - 6} Z" fill="var(--accent)"/>`;
    }

    function graphSvg(r) {
      const days = r.days;
      const n = days.length;
      const colW = (PLOT_R - PLOT_L) / n;
      const colX = (i) => PLOT_L + i * colW;
      const colCx = (i) => PLOT_L + i * colW + colW / 2;
      const rainMax = Math.max(1, ...days.map((d) => d.rain));
      const etMax = Math.max(0.5, ...days.map((d) => d.et));
      const barRange = BAR_BASE - BAR_TOP;
      const todayW = days.findIndex((d) => d.isToday);
      const s = [];

      // soil band + surface line
      s.push(`<rect x="0" y="${Y_SURFACE}" width="${VW}" height="${Y_FLOOR - Y_SURFACE}" fill="var(--soil)"/>`);
      s.push(`<line x1="0" y1="${Y_SURFACE}" x2="${VW}" y2="${Y_SURFACE}" stroke="var(--soil-line)" stroke-width="1"/>`);

      // scene: sun + single planting vignette (UIX-2)
      s.push(sunSvg());
      s.push(plantSvg(r.planting));

      // faint today guide
      if (todayW >= 0)
        s.push(`<line x1="${f1(colCx(todayW))}" y1="${BAR_TOP - 6}" x2="${f1(colCx(todayW))}" y2="${Y_FLOOR}" stroke="var(--ink)" stroke-width="1" opacity="0.10" stroke-dasharray="2 3"/>`);

      // stepped moisture fill (UIX-1)
      let d = `M ${f1(PLOT_L)} ${Y_FLOOR}`;
      for (let i = 0; i < n; i++) {
        const ly = levelY(days[i].levelFraction);
        d += ` L ${f1(colX(i))} ${f1(ly)} L ${f1(colX(i + 1))} ${f1(ly)}`;
      }
      d += ` L ${f1(PLOT_R)} ${Y_FLOOR} Z`;
      s.push(`<path d="${d}" fill="url(#water)"/>`);
      // top stroke following the steps
      let line = "";
      for (let i = 0; i < n; i++) {
        const ly = levelY(days[i].levelFraction);
        line += (i === 0 ? `M ${f1(colX(0))} ${f1(ly)}` : ` L ${f1(colX(i))} ${f1(ly)}`) + ` L ${f1(colX(i + 1))} ${f1(ly)}`;
      }
      s.push(`<path d="${line}" fill="none" stroke="var(--water-line)" stroke-width="1.4" stroke-linejoin="round"/>`);

      // refill threshold (UIX-4)
      const ty = levelY(r.thresholdFraction);
      s.push(`<line x1="${PLOT_L}" y1="${f1(ty)}" x2="${PLOT_R}" y2="${f1(ty)}" stroke="var(--refill)" stroke-width="1.4" stroke-dasharray="5 4"/>`);
      s.push(`<text x="${PLOT_R}" y="${f1(ty - 5)}" text-anchor="end" class="g-refill">Refill ${pct(r.thresholdFraction)}%</text>`);

      // weather marks + watering, per day (UIX-3)
      for (let i = 0; i < n; i++) {
        const d0 = days[i], X = colCx(i);
        if (d0.rain > 0) {
          const h = (d0.rain / rainMax) * barRange;
          s.push(`<rect x="${f1(X - 5)}" y="${f1(BAR_BASE - h)}" width="4" height="${f1(h)}" rx="1.5" fill="var(--rain)"/>`);
        }
        const eh = (d0.et / etMax) * barRange;
        s.push(`<rect x="${f1(X + 1)}" y="${f1(BAR_BASE - eh)}" width="4" height="${f1(eh)}" rx="1.5" fill="var(--et)"/>`);
        s.push(`<text x="${f1(X)}" y="${TEMP_Y}" text-anchor="middle" class="g-temp">${degC(d0.tempMax)}</text>`);
        if (d0.watered) s.push(dropSvg(X, Y_SURFACE - 7));
      }

      // today dot + percent (UIX-4)
      if (todayW >= 0) {
        const ly = levelY(days[todayW].levelFraction);
        s.push(`<text x="${f1(colCx(todayW))}" y="${f1(ly - 9)}" text-anchor="middle" class="g-pct">${pct(days[todayW].levelFraction)}%</text>`);
        s.push(`<circle cx="${f1(colCx(todayW))}" cy="${f1(ly)}" r="4" fill="var(--accent)" stroke="#fff" stroke-width="2"/>`);
      }

      // x labels
      for (let i = 0; i < n; i++) {
        const d0 = days[i], X = colCx(i);
        s.push(`<text x="${f1(X)}" y="${Y_DAY}" text-anchor="middle" class="g-day${d0.isToday ? " on" : ""}">${dayNum(d0.date)}</text>`);
        s.push(`<text x="${f1(X)}" y="${Y_WD}" text-anchor="middle" class="g-wd">${weekday(d0.date)}</text>`);
      }

      // click-to-water hit areas (CTR-4)
      for (let i = 0; i < n; i++) {
        const d0 = days[i];
        const tip = `${d0.date} — ${pct(d0.levelFraction)}%${d0.watered ? " (watered)" : ""}. Tap to ${d0.watered ? "undo" : "water"}.`;
        s.push(`<rect class="hit" x="${f1(colX(i))}" y="${BAR_TOP - 8}" width="${f1(colW)}" height="${f1(Y_FLOOR - (BAR_TOP - 8))}" rx="3" data-action="water" data-index="${d0.index}"><title>${esc(tip)}</title></rect>`);
      }

      return `<svg viewBox="0 0 ${VW} 336" class="graph" role="img" aria-label="Soil moisture across ${n} days; tap a day to toggle watering">` +
        `<defs><linearGradient id="water" x1="0" y1="0" x2="0" y2="1">` +
        `<stop offset="0" stop-color="var(--water-top)"/><stop offset="1" stop-color="var(--water-bot)"/></linearGradient></defs>` +
        s.join("") + `</svg>`;
    }

    // ----- views -----
    function seg(action, options, current) {
      return `<div class="seg" role="group">` + options.map((o) =>
        `<button type="button" class="seg-btn${o === current ? " on" : ""}" data-action="${action}" data-value="${esc(o)}" aria-pressed="${o === current}">${esc(o)}</button>`
      ).join("") + `</div>`;
    }

    function headerView(r) {
      const nw = r.nextWatering;
      const cls = nw.days === 0 ? " warn" : nw.beyondHorizon ? " good" : "";
      return `<header class="card head">` +
        `<div class="head-top"><h1>Soil moisture</h1><span class="site">${esc(SITE.name)}</span></div>` +
        `<div class="figures">` +
        `<div class="fig fig--hero"><span class="fig-num">${pct(r.today.levelFraction)}%</span><span class="fig-lab">Today</span></div>` +
        `<div class="fig"><span class="fig-num${cls}">${nextText(nw)}</span><span class="fig-lab">Next watering</span></div>` +
        `<div class="fig"><span class="fig-num">${degC(r.today.tempMax)}°</span><span class="fig-lab">Max today</span></div>` +
        `</div></header>`;
    }

    function controlsView(r) {
      return `<section class="card controls">` +
        `<div class="ctrl"><span class="ctrl-lab">Planting</span>${seg("planting", Object.keys(PLANTINGS), state.controls.planting)}</div>` +
        `<div class="ctrl"><span class="ctrl-lab">Soil</span>${seg("soil", Object.keys(SOILS), state.controls.soil)}</div>` +
        `<div class="ctrl"><span class="ctrl-lab">Watering duration</span>` +
        `<div class="stepper-row"><div class="stepper">` +
        `<button type="button" data-action="minutes" data-delta="${-STEP_MINUTES}" aria-label="Decrease minutes">−</button>` +
        `<span class="stepper-val">${state.controls.wateringMinutes} <small>min</small></span>` +
        `<button type="button" data-action="minutes" data-delta="${STEP_MINUTES}" aria-label="Increase minutes">+</button>` +
        `</div><span class="dose"><b>${mm1(r.dose)} mm</b> per watered day</span></div>` +
        `</div></section>`;
    }

    function readyView(r) {
      return headerView(r) +
        `<section class="card">` +
        `<div class="chart-head"><span class="eyebrow">16-day outlook</span><span class="eyebrow">0% wilting · 100% full</span></div>` +
        graphSvg(r) +
        `<ul class="legend">` +
        `<li><i class="sw rain"></i>Rain</li><li><i class="sw et"></i>ET loss</li>` +
        `<li><i class="sw water"></i>Watering</li><li><i class="sw refill"></i>Refill line</li></ul>` +
        `<p class="tip">Tap any day to water it; tap again to undo.</p>` +
        `</section>` +
        controlsView(r);
    }

    function loadingView() {
      return `<div class="card state"><div class="spinner"></div><p>Loading weather…</p></div>`;
    }

    function errorView(err) {
      return `<div class="card state error">` +
        `<h2>Weather unavailable</h2>` +
        `<p>${esc((err && err.message) || "Unknown error")}</p>` +
        `<p>No soil estimate is shown without live weather — nothing stale or guessed.</p>` +
        `<button type="button" class="btn" data-action="retry">Try again</button></div>`;
    }

    // ----- render + events -----
    const app = document.getElementById("app");

    function render() {
      if (state.phase === "loading") { app.innerHTML = loadingView(); return; }
      if (state.phase === "error") { app.innerHTML = errorView(state.error); return; }
      app.innerHTML = readyView(compute(state.controls, state.weather));
    }

    function toggleWater(idx) {
      const w = state.controls.watered;
      const at = w.indexOf(idx);
      if (at >= 0) w.splice(at, 1); else w.push(idx);
    }

    app.addEventListener("click", (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      switch (t.dataset.action) {
        case "retry": load(); break;
        case "planting": state.controls.planting = t.dataset.value; render(); break;
        case "soil": state.controls.soil = t.dataset.value; render(); break;
        case "minutes":
          state.controls.wateringMinutes = Math.max(MIN_MINUTES, state.controls.wateringMinutes + Number(t.dataset.delta));
          render();
          break;
        case "water": toggleWater(Number(t.dataset.index)); render(); break;
      }
    });

    async function load() {
      state.phase = "loading";
      render();
      try {
        state.weather = await fetchWeather();
        state.phase = "ready";
        state.error = null;
      } catch (err) {
        state.phase = "error";
        state.error = err;
      }
      render();
    }

    load();
  </script>
</body>
</html>
