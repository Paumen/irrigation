<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Soil Balance</title>
<style>
  :root {
    --bg: #f6f8f4;
    --card: #ffffff;
    --ink: #1f2a22;
    --muted: #6b7a6f;
    --line: #e3e9e0;
    --accent: #3f7d5c;
    --accent-soft: #e6f1ea;
    --rain: #4a89c8;
    --loss: #b0683a;
    --shadow: 0 1px 2px rgba(31,42,34,.06), 0 4px 16px rgba(31,42,34,.06);
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 24px) env(safe-area-inset-left);
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px 14px 0; }

  header.app { padding: 6px 2px 12px; }
  header.app .site { font-size: 13px; color: var(--muted); }
  header.app h1 { font-size: 20px; margin: 2px 0 0; font-weight: 650; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 14px;
  }

  /* ---- current state (interpretable, not a verdict) ---- */
  .now { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .now .big { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .now .big small { font-size: 14px; font-weight: 500; color: var(--muted); }
  .now .pct { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .tank { height: 8px; border-radius: 99px; background: var(--line); overflow: hidden; margin-bottom: 14px; }
  .tank > i { display: block; height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s ease; }

  svg.chart { width: 100%; height: 200px; display: block; touch-action: pan-y; cursor: pointer; }
  svg.chart text { font: 10px -apple-system, sans-serif; fill: var(--muted); }

  /* ---- selected-day breakdown (why it changed — UIX-3) ---- */
  .dayinfo { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px; }
  .dayinfo .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .dayinfo .head b { font-size: 15px; }
  .dayinfo .head span { font-size: 12px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; font-variant-numeric: tabular-nums; }
  .chip {
    display: inline-flex; align-items: baseline; gap: 5px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--line); border-radius: 9px; padding: 6px 9px;
  }
  .chip small { color: var(--muted); font-size: 11px; }
  .chip.pos b { color: var(--accent); }
  .chip.neg b { color: var(--loss); }
  .chip.eq { background: var(--accent-soft); border-color: var(--accent-soft); }
  .wbtn {
    margin-top: 12px; width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--accent);
    background: var(--accent); color: #fff; font: inherit; font-weight: 650; cursor: pointer; font-size: 15px;
  }
  .wbtn.on { background: var(--card); color: var(--accent); }
  .wbtn:active { transform: scale(.99); }

  /* ---- controls ---- */
  .sec-title { font-size: 12px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 0 2px 10px; font-weight: 600; }
  .ctrl-row { margin-bottom: 14px; }
  .ctrl-row:last-child { margin-bottom: 0; }
  .ctrl-row > label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; }
  .seg {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 6px;
    background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 4px;
  }
  .seg button {
    appearance: none; border: 0; background: transparent; color: var(--ink);
    font: inherit; font-size: 13px; padding: 9px 4px; border-radius: 9px; cursor: pointer; line-height: 1.15;
  }
  .seg button small { display: block; color: var(--muted); font-size: 10.5px; margin-top: 2px; }
  .seg button[aria-pressed="true"] { background: var(--card); color: var(--accent); box-shadow: var(--shadow); font-weight: 650; }
  .seg button[aria-pressed="true"] small { color: var(--accent); opacity: .8; }

  .stepper { display: flex; gap: 8px; }
  .stepper button {
    flex: 0 0 48px; font-size: 22px; font-weight: 600; border: 1px solid var(--line);
    background: var(--card); color: var(--accent); border-radius: 12px; cursor: pointer;
  }
  .stepper button:active { background: var(--accent-soft); }
  .stepper .val { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 12px; background: var(--bg); }
  .stepper .val b { font-size: 20px; font-variant-numeric: tabular-nums; }
  .stepper .val span { font-size: 11px; color: var(--muted); }

  .foot { text-align: center; color: var(--muted); font-size: 11.5px; margin: 4px 0 2px; }

  .state { text-align: center; padding: 40px 20px; }
  .state .em { font-size: 30px; }
  .state h2 { font-size: 18px; margin: 10px 0 6px; }
  .state p { color: var(--muted); margin: 0; font-size: 14px; }
  .state.err .em { color: #cc4b37; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <header class="app">
    <div class="site" id="siteName">…</div>
    <h1>Soil water balance</h1>
  </header>

  <div class="card state" id="loading">
    <div class="em">🌱</div>
    <h2>Reading the forecast…</h2>
    <p>14 days behind, today, and the outlook ahead.</p>
  </div>
  <div class="card state err" id="error" hidden>
    <div class="em">⚠️</div>
    <h2>Weather unavailable</h2>
    <p>Couldn't load the forecast, so there's nothing reliable to show.
       No estimates are shown in its place — try again later.</p>
  </div>

  <main id="app" hidden>

    <section class="card">
      <div class="now">
        <div class="big" id="nowLevel">—</div>
        <div class="pct" id="nowPct">—</div>
      </div>
      <div class="tank"><i id="nowFill"></i></div>

      <svg class="chart" id="chart" preserveAspectRatio="none" aria-label="Soil water across the window"></svg>

      <div class="dayinfo" id="dayinfo"></div>
    </section>

    <section class="card">
      <div class="sec-title">Garden</div>
      <div class="ctrl-row">
        <label>Planting</label>
        <div class="seg" id="plantingSeg"></div>
      </div>
      <div class="ctrl-row">
        <label>Soil</label>
        <div class="seg" id="soilSeg"></div>
      </div>
      <div class="ctrl-row">
        <label>Watering duration <span id="doseHint" style="color:var(--accent)"></span></label>
        <div class="stepper">
          <button id="minDown" aria-label="Less">−</button>
          <div class="val"><b id="minVal">60</b><span>minutes per watering</span></div>
          <button id="minUp" aria-label="More">+</button>
        </div>
      </div>
    </section>

    <p class="foot" id="foot"></p>
  </main>

</div>

<script>
"use strict";

/* ---- Precomputed constants (no water-flow maths in the browser) ---- */
const SPRINKLER_RATE = 0.063;   // mm/min gross, BL4.0 / 180° I-20  (DAT-2)
const RAIN_EFF = 0.8;           // LOG-3
const IRR_EFF  = 0.9;           // LOG-3
const TODAY_ISO = "2026-06-21"; // mockup "now"

const PLANTINGS = {             // CTR-3
  turf:      { label: "Turf",       kc: 0.85, root: 0.15 },
  flowerbed: { label: "Flower bed", kc: 0.90, root: 0.30 },
  shrubs:    { label: "Shrubs",     kc: 0.70, root: 0.50 },
};
const SOILS = {                 // CTR-4  (plant-available water, mm·m⁻¹)
  sand:      { label: "Sand",       aw: 60  },
  sandyloam: { label: "Sandy loam", aw: 130 },
  loam:      { label: "Loam",       aw: 170 },
  clay:      { label: "Clay",       aw: 190 },
};

const state = {                  // CTR-5 defaults
  planting: "flowerbed",
  soil: "sandyloam",
  minutes: 60,
  watered: new Set(),            // ISO date strings
};

let WEATHER = null;              // raw inputs only: {date, weekday, tempMax, et0, rain}
let SITE = null;
let selectedIso = TODAY_ISO;

const $ = (id) => document.getElementById(id);
const r1 = (n) => (Math.round(n * 10) / 10).toFixed(1);   // UIX-4: 1 decimal mm
const r0 = (n) => Math.round(n);                          // UIX-4: integer °C
const degHi = (v) => (v == null ? "—" : r0(v) + "°C");    // guard missing forecast temp
const degSm = (v) => (v == null ? "—" : r0(v) + "°");

/* ---------- data ---------- */
async function boot() {
  try {
    const res = await fetch("example_data.json", { cache: "no-store" });
    if (!res.ok) throw new Error("http " + res.status);
    const data = await res.json();
    SITE = data.site;
    WEATHER = (data.series || []).map((d) => ({
      date: d.date, weekday: d.weekday, tempMax: d.tempMax, et0: d.et0, rain: d.rain,
    }));
    if (!WEATHER.length) throw new Error("empty series");
    if (!WEATHER.some((d) => d.date === selectedIso)) selectedIso = WEATHER[0].date;
    $("siteName").textContent = SITE.name;
    $("loading").hidden = true;
    $("app").hidden = false;
    buildControls();
    $("chart").addEventListener("click", onChartTap);
    render();
  } catch (e) {
    $("loading").hidden = true;
    $("error").hidden = false;     // DAT-3: explicit unavailable state, no fallback
  }
}

/* ---------- the balance (LOG-1..3) ---------- */
function compute() {
  const p = PLANTINGS[state.planting];
  const s = SOILS[state.soil];
  const tankSize = s.aw * p.root;              // LOG-1 / LOG-2: TAW
  const dose = SPRINKLER_RATE * state.minutes; // CTR-1
  let start = tankSize;                         // begin full
  const series = WEATHER.map((d) => {
    const loss = d.et0 * p.kc;                              // LOG-2
    const applied = state.watered.has(d.date) ? dose : 0;  // CTR-1/CTR-2
    const rainGain = d.rain * RAIN_EFF;                     // LOG-3
    const irrGain = applied * IRR_EFF;                      // LOG-3
    let level = start + rainGain + irrGain - loss;          // LOG-1
    level = Math.max(0, Math.min(tankSize, level));
    const row = { ...d, start, loss, applied, rainGain, irrGain, level };
    start = level;
    return row;
  });
  return { tankSize, dose, kc: p.kc, root: p.root, aw: s.aw, series };
}

/* ---------- controls ---------- */
function buildControls() {
  const seg = (host, dict, get, set) => {
    host.innerHTML = "";
    for (const [k, v] of Object.entries(dict)) {
      const b = document.createElement("button");
      b.dataset.k = k;
      b.innerHTML = v.html;
      b.onclick = () => { set(k); render(); };
      host.appendChild(b);
    }
  };
  seg($("plantingSeg"),
    Object.fromEntries(Object.entries(PLANTINGS).map(([k, v]) =>
      [k, { html: `${v.label}<small>Kc ${v.kc} · ${v.root} m</small>` }])),
    () => state.planting, (k) => state.planting = k);
  seg($("soilSeg"),
    Object.fromEntries(Object.entries(SOILS).map(([k, v]) =>
      [k, { html: `${v.label}<small>${v.aw} mm·m⁻¹</small>` }])),
    () => state.soil, (k) => state.soil = k);
  $("minDown").onclick = () => { state.minutes = Math.max(0, state.minutes - 15); render(); };
  $("minUp").onclick   = () => { state.minutes += 15; render(); };
}

/* ---------- chart geometry (fixed coord space; viewBox scales it) ---------- */
const W = 520, H = 200, padL = 28, padR = 8, padT = 10, padB = 18;
const iw = W - padL - padR, ih = H - padT - padB;
const xOf = (i, n) => padL + (n <= 1 ? iw / 2 : (i / (n - 1)) * iw);

function onChartTap(ev) {
  const m = compute(), n = m.series.length;
  const rect = ev.currentTarget.getBoundingClientRect();
  const vbX = ((ev.clientX - rect.left) / rect.width) * W;        // client px → viewBox x
  let i = Math.round((vbX - padL) / (iw / Math.max(1, n - 1)));
  i = Math.max(0, Math.min(n - 1, i));
  selectedIso = m.series[i].date;
  render();
}

/* ---------- render ---------- */
function render() {
  const m = compute();
  document.querySelectorAll("#plantingSeg button").forEach((b) =>
    b.setAttribute("aria-pressed", b.dataset.k === state.planting));
  document.querySelectorAll("#soilSeg button").forEach((b) =>
    b.setAttribute("aria-pressed", b.dataset.k === state.soil));
  $("minVal").textContent = state.minutes;
  $("doseHint").textContent = `→ +${r1(m.dose)} mm per watering`;

  renderNow(m);
  renderChart(m);
  renderDayInfo(m);

  const w = state.watered.size;
  $("foot").textContent =
    `${m.series.length} days · ${w} watering${w === 1 ? "" : "s"} planned · resets on reload`;
}

function renderNow(m) {
  const row = m.series.find((d) => d.date === TODAY_ISO) || m.series[0];
  const frac = m.tankSize ? row.level / m.tankSize : 0;
  $("nowLevel").innerHTML = `${r1(row.level)} <small>of ${r1(m.tankSize)} mm available</small>`;
  $("nowPct").textContent = `${r0(frac * 100)}% of full · today`;
  $("nowFill").style.width = Math.max(1, frac * 100) + "%";
}

function renderChart(m) {
  const svg = $("chart");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  const n = m.series.length, tank = m.tankSize || 1;
  const x = (i) => xOf(i, n);
  const y = (v) => padT + (1 - v / tank) * ih;

  let s = "";
  // capacity band: 0 → full, the soil's water reservoir (UIX-2)
  s += `<rect x="${padL}" y="${y(tank).toFixed(1)}" width="${iw}" height="${(y(0) - y(tank)).toFixed(1)}" fill="var(--bg)"/>`;
  s += `<line x1="${padL}" y1="${y(tank).toFixed(1)}" x2="${padL + iw}" y2="${y(tank).toFixed(1)}" stroke="var(--line)"/>`;
  s += `<line x1="${padL}" y1="${y(0).toFixed(1)}" x2="${padL + iw}" y2="${y(0).toFixed(1)}" stroke="var(--line)"/>`;
  s += `<text x="${padL - 4}" y="${y(tank) + 3}" text-anchor="end">${r0(tank)}</text>`;
  s += `<text x="${padL - 4}" y="${y(0)}" text-anchor="end">0</text>`;

  // "now" divider
  const ti = m.series.findIndex((d) => d.date === TODAY_ISO);
  if (ti >= 0) {
    const tx = x(ti).toFixed(1);
    s += `<line x1="${tx}" y1="${padT}" x2="${tx}" y2="${padT + ih}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 3" opacity=".55"/>`;
    s += `<text x="${tx}" y="${padT + 8}" text-anchor="middle" fill="var(--accent)">now</text>`;
  }

  // level line + soft fill
  let line = "", area = `M ${x(0).toFixed(1)} ${y(0).toFixed(1)} `;
  m.series.forEach((d, i) => {
    const px = x(i).toFixed(1), py = y(d.level).toFixed(1);
    line += (i ? "L" : "M") + ` ${px} ${py} `;
    area += `L ${px} ${py} `;
  });
  area += `L ${x(n - 1).toFixed(1)} ${y(0).toFixed(1)} Z`;
  s += `<path d="${area}" fill="var(--accent)" opacity=".10"/>`;
  s += `<path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  // watered-day markers
  m.series.forEach((d, i) => {
    if (state.watered.has(d.date))
      s += `<circle cx="${x(i).toFixed(1)}" cy="${y(d.level).toFixed(1)}" r="3.4" fill="#fff" stroke="var(--accent)" stroke-width="2"/>`;
  });
  // selected day: vertical guide + dot
  const si = m.series.findIndex((d) => d.date === selectedIso);
  if (si >= 0) {
    const sx = x(si).toFixed(1);
    s += `<line x1="${sx}" y1="${padT}" x2="${sx}" y2="${padT + ih}" stroke="var(--ink)" stroke-width="1" opacity=".18"/>`;
    s += `<circle cx="${sx}" cy="${y(m.series[si].level).toFixed(1)}" r="5" fill="var(--accent)" stroke="#fff" stroke-width="2"/>`;
  }
  svg.innerHTML = s;
}

function renderDayInfo(m) {
  const row = m.series.find((d) => d.date === selectedIso) || m.series[0];
  const isWatered = state.watered.has(row.date);
  const future = row.date > TODAY_ISO;
  const when = row.date === TODAY_ISO ? "Today" : (future ? "Planned" : "Past");

  const chip = (cls, label, val, sub) =>
    `<span class="chip ${cls}"><span>${label}</span><b>${val}</b>${sub ? `<small>${sub}</small>` : ""}</span>`;

  // why the level changed that day (UIX-3): start → +rain → +water → −ET → end
  $("dayinfo").innerHTML =
    `<div class="head">
       <b>${row.weekday} · ${row.date}</b>
       <span>${when} · high ${degHi(row.tempMax)}</span>
     </div>
     <div class="chips">
       ${chip("", "Start", r1(row.start), "mm")}
       ${chip("pos", "Rain", "+" + r1(row.rainGain), `${r1(row.rain)}×0.8`)}
       ${chip(isWatered ? "pos" : "", "Water", (isWatered ? "+" : "") + r1(row.irrGain), isWatered ? `${r1(m.dose)}×0.9` : "off")}
       ${chip("neg", "ET", "−" + r1(row.loss), `${r1(row.et0)}×${m.kc}`)}
       ${chip("eq", "End", r1(row.level), row.level === 0 ? "empty" : (row.level === m.tankSize ? "full" : "mm"))}
     </div>
     <button class="wbtn ${isWatered ? "on" : ""}" id="toggleWater">
       ${isWatered ? "Remove watering on this day" : "Water this day (+" + r1(m.dose) + " mm)"}
     </button>`;

  $("toggleWater").onclick = () => {           // CTR-2: fast reversible
    if (state.watered.has(row.date)) state.watered.delete(row.date);
    else state.watered.add(row.date);
    render();
  };
}

boot();
</script>
</body>
</html>
