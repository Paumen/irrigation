<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Soil Balance — Wijchen</title>
  <style>
    :root {
      --bg: #eef3f6;
      --card: #ffffff;
      --ink: #23303a;
      --muted: #65737e;
      --line: #dfe7ec;
      --accent: #1f7fb8;
      --water-top: #aaddf3;
      --water-bot: #4faedd;
      --rain: #3d7fc4;
      --et: #e08a2b;
      --watering: #0fae9c;
      --threshold: #d9534f;
      --sky: #e2f3fc;
      --soil: #cda782;
      --soil-deep: #976f49;
      --plant: #3fa45a;
      --flower: #e96a9a;
      --sun: #f6c64b;
      --today: #fff1bf;
      --today-line: #e0a800;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    #app {
      max-width: 600px;
      margin: 0 auto;
      padding: 12px 12px 32px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 1px 2px rgba(20, 40, 60, 0.04);
    }

    /* Header */
    .head h1 { margin: 0; font-size: 19px; }
    .head .site { margin: 2px 0 12px; color: var(--muted); font-size: 13px; }
    .figures { display: flex; gap: 10px; }
    .fig {
      flex: 1; text-align: center;
      background: #f4f8fb; border: 1px solid var(--line);
      border-radius: 12px; padding: 10px 6px;
    }
    .fig-num { display: block; font-size: 22px; font-weight: 700; line-height: 1.1; }
    .fig-lab { display: block; font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .03em; }

    /* Graph */
    .graph-card { padding: 10px; }
    svg.graph { width: 100%; height: auto; display: block; touch-action: manipulation; }
    .graph .g-temp { font-size: 9px; fill: var(--ink); }
    .graph .g-day { font-size: 9px; fill: var(--ink); }
    .graph .g-day.on { font-weight: 700; fill: var(--accent); }
    .graph .g-wd { font-size: 7px; fill: var(--muted); }
    .graph .g-thr { font-size: 8px; fill: var(--threshold); font-weight: 600; }
    .graph .g-today { font-size: 7px; font-weight: 700; fill: var(--today-line); letter-spacing: .08em; }
    .graph .g-pct {
      font-size: 12px; font-weight: 800; fill: #0b3a52;
      paint-order: stroke; stroke: #ffffff; stroke-width: 2.4px; stroke-linejoin: round;
    }
    .graph .hit { fill: transparent; cursor: pointer; }
    .graph .hit:hover { fill: rgba(31, 127, 184, 0.10); }

    .legend { list-style: none; display: flex; flex-wrap: wrap; gap: 12px; margin: 10px 2px 0; padding: 0; font-size: 12px; color: var(--muted); }
    .legend li { display: flex; align-items: center; gap: 6px; }
    .legend .sw { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .legend .sw.rain { background: var(--rain); }
    .legend .sw.et { background: var(--et); }
    .legend .sw.water { background: var(--watering); border-radius: 50% 50% 50% 0; transform: rotate(45deg); }
    .legend .sw.thr { width: 14px; height: 0; border-top: 2px dashed var(--threshold); border-radius: 0; }
    .tip { margin: 8px 2px 0; font-size: 12px; color: var(--muted); }

    /* Controls */
    .ctrl { margin-bottom: 14px; }
    .ctrl:last-child { margin-bottom: 0; }
    .ctrl > label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 7px; }

    .seg { display: flex; border: 1px solid var(--accent); border-radius: 10px; overflow: hidden; }
    .seg-btn {
      flex: 1; appearance: none; border: 0; border-left: 1px solid var(--accent);
      background: #fff; color: var(--accent); font: inherit; font-size: 13px;
      padding: 9px 4px; cursor: pointer; min-height: 40px;
    }
    .seg-btn:first-child { border-left: 0; }
    .seg-btn.on { background: var(--accent); color: #fff; font-weight: 600; }

    .stepper { display: inline-flex; align-items: center; gap: 0; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    .stepper button {
      appearance: none; border: 0; background: #f4f8fb; color: var(--ink);
      font-size: 20px; width: 46px; height: 44px; cursor: pointer;
    }
    .stepper button:active { background: #e7eef3; }
    .stepper-val { min-width: 78px; text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; }
    .dose { margin: 8px 0 0; }
    .muted { color: var(--muted); font-size: 12px; }

    /* States */
    .state { text-align: center; padding: 48px 16px; }
    .state.error h2 { color: var(--threshold); margin: 0 0 8px; }
    .btn { appearance: none; border: 0; background: var(--accent); color: #fff; font: inherit; font-weight: 600; padding: 10px 18px; border-radius: 10px; cursor: pointer; margin-top: 10px; }
    .spinner {
      width: 34px; height: 34px; margin: 0 auto 14px; border-radius: 50%;
      border: 4px solid var(--line); border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main id="app"></main>

  <script type="module">
    import { compute, fetchWeather, PLANTINGS, SOILS, DEFAULTS, SITE } from "./soil.js";

    // ----- chosen, spec-unspecified control details (easy to tweak) -----
    const STEP_MINUTES = 5;
    const MIN_MINUTES = 5;

    // ----- in-memory state only; resets on reload (SCO-4) -----
    const state = {
      phase: "loading",            // 'loading' | 'ready' | 'error'
      weather: null,
      error: null,
      controls: { ...DEFAULTS, watered: [] },
    };

    // ----- display formatting (UIX-6: round at display only) -----
    const clamp01 = (x) => (x < 0 ? 0 : x > 1 ? 1 : x);
    const pct = (f) => Math.round(clamp01(f) * 100);
    const mm1 = (x) => (Math.round(x * 10) / 10).toFixed(1);
    const degC = (t) => (t == null ? "—" : String(Math.round(t)));
    const esc = (s) =>
      String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    const WD = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
    const parseUTC = (s) => { const [Y, M, D] = s.split("-").map(Number); return new Date(Date.UTC(Y, M - 1, D)); };
    const dayNum = (s) => String(parseUTC(s).getUTCDate());
    const weekday = (s) => WD[parseUTC(s).getUTCDay()];

    function nextText(nw) {
      if (nw.days === 0) return "now";
      if (nw.beyondHorizon) return ">14 days";
      return "+" + nw.days + (nw.days === 1 ? " day" : " days");
    }

    // ----- SVG graph geometry -----
    const VW = 480, VH = 380, PAD = 8;
    const COLW = (VW - 2 * PAD) / 16;
    const SUN = { cx: 26, cy: 18, r: 8 };
    const TEMP_Y = 44, BAR_TOP = 54, BAR_BASE = 138;
    const SOIL_TOP = 152, SOIL_BOT = 322, SOIL_H = SOIL_BOT - SOIL_TOP;
    const LABEL_Y1 = 338, LABEL_Y2 = 351;
    const colX = (i) => PAD + i * COLW;
    const colCx = (i) => PAD + i * COLW + COLW / 2;
    const levelY = (f) => SOIL_TOP + (1 - clamp01(f)) * SOIL_H;
    const f1 = (n) => n.toFixed(1);

    function sunSvg() {
      let rays = "";
      for (let k = 0; k < 8; k++) {
        const a = (k * Math.PI) / 4;
        const x1 = SUN.cx + Math.cos(a) * (SUN.r + 2), y1 = SUN.cy + Math.sin(a) * (SUN.r + 2);
        const x2 = SUN.cx + Math.cos(a) * (SUN.r + 6), y2 = SUN.cy + Math.sin(a) * (SUN.r + 6);
        rays += `<line x1="${f1(x1)}" y1="${f1(y1)}" x2="${f1(x2)}" y2="${f1(y2)}" stroke="var(--sun)" stroke-width="1.5"/>`;
      }
      return `<g>${rays}<circle cx="${SUN.cx}" cy="${SUN.cy}" r="${SUN.r}" fill="var(--sun)"/></g>`;
    }

    function rootPx(rootDepth) {
      return Math.min(SOIL_H * 0.9, (rootDepth / 0.6) * SOIL_H * 0.95);
    }

    function rootsSvg(X, top, depth) {
      const tip = top + depth;
      return `<g stroke="var(--soil-deep)" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round">` +
        `<line x1="${f1(X)}" y1="${top}" x2="${f1(X)}" y2="${f1(tip)}"/>` +
        `<line x1="${f1(X)}" y1="${top}" x2="${f1(X - 6)}" y2="${f1(top + depth * 0.6)}"/>` +
        `<line x1="${f1(X)}" y1="${top}" x2="${f1(X + 6)}" y2="${f1(top + depth * 0.55)}"/></g>`;
    }

    function plantSvg(type, X, top) {
      if (type === "Turf") {
        return `<g stroke="var(--plant)" stroke-width="2" stroke-linecap="round" fill="none">` +
          `<line x1="${f1(X - 5)}" y1="${top}" x2="${f1(X - 7)}" y2="${top - 10}"/>` +
          `<line x1="${f1(X)}" y1="${top}" x2="${f1(X)}" y2="${top - 13}"/>` +
          `<line x1="${f1(X + 5)}" y1="${top}" x2="${f1(X + 7)}" y2="${top - 10}"/></g>`;
      }
      if (type === "Shrubs") {
        return `<g fill="var(--plant)">` +
          `<circle cx="${f1(X - 4)}" cy="${top - 6}" r="5"/>` +
          `<circle cx="${f1(X + 4)}" cy="${top - 6}" r="5"/>` +
          `<circle cx="${f1(X)}" cy="${top - 11}" r="6"/></g>`;
      }
      // Flower bed (default)
      return `<g>` +
        `<line x1="${f1(X)}" y1="${top}" x2="${f1(X)}" y2="${top - 12}" stroke="var(--plant)" stroke-width="2"/>` +
        `<circle cx="${f1(X)}" cy="${top - 17}" r="3" fill="var(--flower)"/>` +
        `<circle cx="${f1(X - 3)}" cy="${top - 15}" r="2.4" fill="var(--flower)"/>` +
        `<circle cx="${f1(X + 3)}" cy="${top - 15}" r="2.4" fill="var(--flower)"/>` +
        `<circle cx="${f1(X)}" cy="${top - 13}" r="2.4" fill="var(--flower)"/>` +
        `<circle cx="${f1(X)}" cy="${top - 15.5}" r="1.5" fill="var(--sun)"/></g>`;
    }

    function dropSvg(X, y) {
      return `<path d="M ${f1(X)} ${y - 6} Q ${f1(X + 5)} ${y} ${f1(X)} ${y + 5} Q ${f1(X - 5)} ${y} ${f1(X)} ${y - 6} Z" fill="var(--watering)"/>`;
    }

    function graphSvg(r) {
      const days = r.days;
      const thrFrac = r.thresholdFraction;
      const todayW = days.findIndex((d) => d.isToday);
      const rainMax = Math.max(1, ...days.map((d) => d.rain));
      const etMax = Math.max(0.5, ...days.map((d) => d.et));
      const barRange = BAR_BASE - BAR_TOP;
      const rdepth = rootPx(r.rootDepth);
      const s = [];

      // sky + sun
      s.push(`<rect x="0" y="0" width="${VW}" height="${SOIL_TOP}" fill="var(--sky)"/>`);
      s.push(sunSvg());

      // today highlight band (behind)
      if (todayW >= 0)
        s.push(`<rect x="${f1(colX(todayW))}" y="0" width="${f1(COLW)}" height="${SOIL_BOT}" fill="var(--today)" opacity="0.55"/>`);

      // soil
      s.push(`<rect x="0" y="${SOIL_TOP}" width="${VW}" height="${SOIL_H}" fill="var(--soil)"/>`);

      // stepped water fill (UIX-1: continuous, bottom-up, no gaps)
      let d = `M ${PAD} ${SOIL_BOT}`;
      for (let i = 0; i < 16; i++) {
        const ly = levelY(days[i].levelFraction);
        d += ` L ${f1(colX(i))} ${f1(ly)} L ${f1(colX(i + 1))} ${f1(ly)}`;
      }
      d += ` L ${f1(colX(16))} ${SOIL_BOT} Z`;
      s.push(`<path d="${d}" fill="url(#water)"/>`);

      // threshold marker (UIX-4)
      const ty = levelY(thrFrac);
      s.push(`<line x1="${PAD}" y1="${f1(ty)}" x2="${VW - PAD}" y2="${f1(ty)}" stroke="var(--threshold)" stroke-width="1.5" stroke-dasharray="5 4"/>`);
      s.push(`<text x="${VW - PAD - 2}" y="${f1(ty - 4)}" text-anchor="end" class="g-thr">refill at ${pct(thrFrac)}%</text>`);

      // per-day: roots, plant, bars, temp, watering droplet
      for (let i = 0; i < 16; i++) {
        const d0 = days[i], X = colCx(i);
        s.push(rootsSvg(X, SOIL_TOP, rdepth));
        s.push(plantSvg(r.planting, X, SOIL_TOP));
        if (d0.rain > 0) {
          const h = (d0.rain / rainMax) * barRange;
          s.push(`<rect x="${f1(X - 10)}" y="${f1(BAR_BASE - h)}" width="8" height="${f1(h)}" rx="1" fill="var(--rain)"/>`);
        }
        const eh = (d0.et / etMax) * barRange;
        s.push(`<rect x="${f1(X + 2)}" y="${f1(BAR_BASE - eh)}" width="8" height="${f1(eh)}" rx="1" fill="var(--et)"/>`);
        s.push(`<text x="${f1(X)}" y="${TEMP_Y}" text-anchor="middle" class="g-temp">${degC(d0.tempMax)}</text>`);
        if (d0.watered) s.push(dropSvg(X, SOIL_TOP - 7));
      }

      // today outline + percent label (UIX-4)
      if (todayW >= 0) {
        s.push(`<rect x="${f1(colX(todayW))}" y="0" width="${f1(COLW)}" height="${SOIL_BOT}" fill="none" stroke="var(--today-line)" stroke-width="1.5"/>`);
        s.push(`<text x="${f1(colCx(todayW))}" y="10" text-anchor="middle" class="g-today">TODAY</text>`);
        const ly = levelY(days[todayW].levelFraction);
        s.push(`<text x="${f1(colCx(todayW))}" y="${f1(ly - 4)}" text-anchor="middle" class="g-pct">${pct(days[todayW].levelFraction)}%</text>`);
      }

      // day labels
      for (let i = 0; i < 16; i++) {
        const d0 = days[i], X = colCx(i);
        s.push(`<text x="${f1(X)}" y="${LABEL_Y1}" text-anchor="middle" class="g-day${d0.isToday ? " on" : ""}">${dayNum(d0.date)}</text>`);
        s.push(`<text x="${f1(X)}" y="${LABEL_Y2}" text-anchor="middle" class="g-wd">${weekday(d0.date)}</text>`);
      }

      // click-to-water hit areas on top (CTR-4)
      for (let i = 0; i < 16; i++) {
        const d0 = days[i];
        const tip = `${d0.date} — ${pct(d0.levelFraction)}%${d0.watered ? " (watered)" : ""}. Tap to ${d0.watered ? "undo" : "water"}.`;
        s.push(`<rect class="hit" x="${f1(colX(i))}" y="0" width="${f1(COLW)}" height="${SOIL_BOT}" data-action="water" data-index="${d0.index}"><title>${esc(tip)}</title></rect>`);
      }

      return `<svg viewBox="0 0 ${VW} ${VH}" class="graph" role="img" aria-label="Soil moisture across 16 days; tap a day to toggle watering">` +
        `<defs><linearGradient id="water" x1="0" y1="0" x2="0" y2="1">` +
        `<stop offset="0" stop-color="var(--water-top)"/><stop offset="1" stop-color="var(--water-bot)"/>` +
        `</linearGradient></defs>${s.join("")}</svg>`;
    }

    // ----- views -----
    function seg(action, options, current) {
      return `<div class="seg" role="group">` + options.map((o) =>
        `<button type="button" class="seg-btn${o === current ? " on" : ""}" data-action="${action}" data-value="${esc(o)}" aria-pressed="${o === current}">${esc(o)}</button>`
      ).join("") + `</div>`;
    }

    function headerView(r) {
      return `<header class="card head">` +
        `<h1>Soil moisture</h1>` +
        `<p class="site">${esc(SITE.name)}</p>` +
        `<div class="figures">` +
        `<div class="fig"><span class="fig-num">${pct(r.today.levelFraction)}%</span><span class="fig-lab">today</span></div>` +
        `<div class="fig"><span class="fig-num">${nextText(r.nextWatering)}</span><span class="fig-lab">next watering</span></div>` +
        `<div class="fig"><span class="fig-num">${degC(r.today.tempMax)}°</span><span class="fig-lab">max today</span></div>` +
        `</div></header>`;
    }

    function controlsView(r) {
      return `<section class="card controls">` +
        `<div class="ctrl"><label>Planting</label>${seg("planting", Object.keys(PLANTINGS), state.controls.planting)}</div>` +
        `<div class="ctrl"><label>Soil</label>${seg("soil", Object.keys(SOILS), state.controls.soil)}</div>` +
        `<div class="ctrl"><label>Watering duration</label>` +
        `<div class="stepper">` +
        `<button type="button" data-action="minutes" data-delta="${-STEP_MINUTES}" aria-label="Decrease minutes">−</button>` +
        `<span class="stepper-val">${state.controls.wateringMinutes} min</span>` +
        `<button type="button" data-action="minutes" data-delta="${STEP_MINUTES}" aria-label="Increase minutes">+</button>` +
        `</div>` +
        `<p class="dose muted">${mm1(r.dose)} mm applied per watered day</p>` +
        `</div></section>`;
    }

    function readyView(r) {
      return headerView(r) +
        `<section class="card graph-card">` + graphSvg(r) +
        `<ul class="legend">` +
        `<li><i class="sw rain"></i>Rain</li>` +
        `<li><i class="sw et"></i>ET loss</li>` +
        `<li><i class="sw water"></i>Watering</li>` +
        `<li><i class="sw thr"></i>Refill line</li>` +
        `</ul>` +
        `<p class="tip">Tap any day to water it; tap again to undo.</p>` +
        `</section>` +
        controlsView(r);
    }

    function loadingView() {
      return `<div class="state"><div class="spinner"></div><p>Loading weather…</p></div>`;
    }

    function errorView(err) {
      return `<div class="state error card">` +
        `<h2>Weather unavailable</h2>` +
        `<p>${esc((err && err.message) || "Unknown error")}</p>` +
        `<p class="muted">No soil estimate is shown without live weather — nothing stale or guessed.</p>` +
        `<button type="button" class="btn" data-action="retry">Try again</button>` +
        `</div>`;
    }

    // ----- render + events -----
    const app = document.getElementById("app");

    function render() {
      if (state.phase === "loading") { app.innerHTML = loadingView(); return; }
      if (state.phase === "error") { app.innerHTML = errorView(state.error); return; }
      app.innerHTML = readyView(compute(state.controls, state.weather));
    }

    function toggleWater(idx) {
      const w = state.controls.watered;
      const at = w.indexOf(idx);
      if (at >= 0) w.splice(at, 1); else w.push(idx);
    }

    app.addEventListener("click", (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      switch (t.dataset.action) {
        case "retry": load(); break;
        case "planting": state.controls.planting = t.dataset.value; render(); break;
        case "soil": state.controls.soil = t.dataset.value; render(); break;
        case "minutes":
          state.controls.wateringMinutes = Math.max(MIN_MINUTES, state.controls.wateringMinutes + Number(t.dataset.delta));
          render();
          break;
        case "water": toggleWater(Number(t.dataset.index)); render(); break;
      }
    });

    async function load() {
      state.phase = "loading";
      render();
      try {
        state.weather = await fetchWeather();
        state.phase = "ready";
        state.error = null;
      } catch (err) {
        state.phase = "error";
        state.error = err;
      }
      render();
    }

    load();
  </script>
</body>
</html>
