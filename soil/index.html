<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Soil-Balance — Wijchen</title>
    <link rel="stylesheet" href="PAUMEN.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap"
    />
    <style>
      /* ── Warm, earthy skin: override the PAUMEN tokens for a paper/cream
         look with a deep-green brand accent and a terracotta alert colour.
         (This \3c style> is unlayered, so it wins over PAUMEN's @layer tokens.) */
      :root {
        color-scheme: light;

        --accent: oklch(46% 0.085 150);
        --accent-hue: 150;
        --danger-hue: 33;
        --color-danger: oklch(52% 0.15 33);
        --neutral: oklch(94% 0.022 84);
        --neutral-mute: oklch(97.5% 0.016 86);
        --neutral-edge: oklch(85% 0.03 82);
        --text: oklch(34% 0.035 145);
        --text-mute: oklch(53% 0.025 92);
        --text-on-accent: oklch(97% 0.02 130);
        --track: oklch(89% 0.025 82);
        --pill: oklch(99% 0.008 86);
        --font-serif: "Georgia", "Times New Roman", serif;
        --font-mono: ui-monospace, "Cascadia Code", "Menlo", "Consolas", monospace;
      }

      body {
        font-family: Nunito, system-ui, sans-serif;
        gap: var(--l);
      }

      [data-el="head"] {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: var(--s);
      }

      [data-el="head"] h1 {
        font-size: var(--xl);
        font-weight: 800;
        color: var(--accent);
        letter-spacing: -0.01em;
      }

      [data-el="subtitle"] {
        color: var(--text-mute);
        font-size: var(--m);
      }

      /* ── Verdict card ───────────────────────────────────────────────── */
      [data-el="card"] {
        display: grid;
        gap: var(--s);
        background: var(--neutral-mute);
        border: 1px solid var(--neutral-edge);
        border-radius: var(--l);
        padding: var(--m);
        box-shadow: 0 1px 3px oklch(0% 0 0 / 0.06);
      }

      [data-el="refillLabel"] {
        display: inline-flex;
        align-items: center;
        gap: var(--xs);
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.09em;
        font-size: var(--s);
        color: var(--text-mute);
      }

      [data-el="verdict"] {
        font-family: var(--font-serif);
        font-size: var(--xl);
        font-weight: 400;
        line-height: 1.05;
      }

      [data-el="card"] hr {
        inline-size: 100%;
        block-size: 1px;
        border: none;
        background: var(--neutral-edge);
        margin-block: var(--xs);
      }

      [data-el="moisture"] {
        color: var(--text-mute);
        font-size: var(--m);
      }

      [data-el="moisture"] b {
        font-family: var(--font-serif);
        font-size: var(--l);
        margin-inline-end: var(--xs);
      }

      [data-el="card"][data-mood="dry"] :is([data-el="verdict"], [data-el="moisture"] b) {
        color: var(--color-danger);
      }

      [data-el="card"][data-mood="ok"] :is([data-el="verdict"], [data-el="moisture"] b) {
        color: var(--accent);
      }

      /* ── Graph: full-bleed, horizontally scrollable ─────────────────── */
      [data-graph] {
        justify-self: stretch;
        inline-size: 100vw;
        margin-inline: calc(50% - 50vw);
        overflow: auto hidden;
        overscroll-behavior-x: contain;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
      }

      [data-graph] svg {
        display: block;
        block-size: auto;
      }

      [data-graph]::-webkit-scrollbar {
        block-size: 8px;
      }

      [data-graph]::-webkit-scrollbar-thumb {
        background: var(--neutral-edge);
        border-radius: 999px;
      }

      [data-day] {
        cursor: pointer;
      }

      [data-day]:focus-visible {
        outline: var(--xs) solid var(--accent);
      }

      /* ── Legend ─────────────────────────────────────────────────────── */
      [data-legend] {
        display: flex;
        flex-wrap: wrap;
        gap: var(--m);
        color: var(--text-mute);
        font-size: var(--s);
      }

      [data-legend] li {
        display: inline-flex;
        align-items: center;
        gap: var(--xs);
      }

      /* ── Controls: segmented pill toggles + stepper ─────────────────── */
      [data-el="controls"] {
        gap: var(--m);
      }

      [data-row] {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--s);
        grid-column: span 12;
      }

      [data-rowlabel] {
        flex: 0 0 auto;
        inline-size: 5.5rem;
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: var(--s);
        color: var(--text-mute);
      }

      [data-toggle],
      [data-stepper] {
        flex: 1 1 12rem;
        display: inline-flex;
        align-items: stretch;
        gap: 0;
        min-inline-size: 0;
        background: var(--track);
        border: 1px solid var(--neutral-edge);
        border-radius: 999px;
        padding: 0.25rem;
        overflow-x: auto;
        scrollbar-width: none;
      }

      [data-toggle]::-webkit-scrollbar,
      [data-stepper]::-webkit-scrollbar {
        display: none;
      }

      [data-toggle] input[type="radio"] {
        position: absolute;
        inline-size: 0;
        block-size: 0;
        margin: 0;
        padding: 0;
        opacity: 0;
        pointer-events: none;
      }

      [data-toggle] label {
        flex: 1 1 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        padding: 0.4rem 0.6rem;
        border-radius: 999px;
        color: var(--text-mute);
        font-size: 0.82rem;
        cursor: pointer;
        transition:
          background-color 0.15s ease,
          color 0.15s ease;
      }

      [data-toggle] label:hover {
        color: var(--text);
      }

      [data-toggle] input:checked + label {
        background: var(--pill);
        color: var(--accent);
        font-weight: 700;
        box-shadow: 0 1px 3px oklch(0% 0 0 / 0.16);
      }

      [data-toggle] input:focus-visible + label {
        outline: var(--xs) solid var(--accent);
        outline-offset: -2px;
      }

      [data-stepper] {
        flex: 0 1 12rem;
        justify-content: space-between;
        align-items: center;
        padding: 0.2rem;
      }

      [data-stepper] button {
        flex: 0 0 auto;
        inline-size: 2rem;
        block-size: 2rem;
        padding: 0;
        border: 1px solid var(--neutral-edge);
        border-radius: 999px;
        background: var(--pill);
        color: var(--accent);
        font-weight: 700;
        font-size: var(--l);
        line-height: 1;
      }

      [data-stepper] output {
        flex: 1 1 auto;
        text-align: center;
        font-weight: 700;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      [data-el="reset"] {
        grid-column: span 12;
        justify-self: start;
        border: none;
        background: transparent;
        color: var(--text-mute);
        padding-inline: 0;
        gap: var(--xs);
      }

      [data-el="reset"]:hover:not(:disabled) {
        color: var(--color-danger);
        background: transparent;
      }

      footer p {
        color: var(--text-mute);
        font-size: var(--s);
      }
    </style>
  </head>
  <body>
    <header data-el="head" data-colspan="12">
      <h1>Soil-Balance</h1>
      <p data-el="subtitle">Flower bed · Wijchen</p>
    </header>

    <article data-el="card" data-colspan="12" data-mood="ok" hidden>
      <p data-el="refillLabel">
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <circle data-el="dot" cx="7" cy="7" r="5" fill="currentColor" />
        </svg>
        <output data-el="refillText">At refill point</output>
      </p>
      <h2 data-el="verdict">—</h2>
      <hr />
      <p data-el="moisture"></p>
      <figure data-el="bar"></figure>
    </article>

    <p data-el="status" data-state="loading" data-colspan="12">
      Loading weather…
    </p>

    <figure data-graph data-el="graph" data-colspan="12" hidden></figure>

    <ul data-legend data-colspan="12">
      <li>
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <circle cx="7" cy="7" r="5" fill="#c2643a" />
        </svg>
        loss
      </li>
      <li>
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <circle cx="7" cy="7" r="5" fill="#3f7fae" />
        </svg>
        rain
      </li>
      <li>
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <circle cx="7" cy="7" r="5" fill="#1fb6c9" />
        </svg>
        watering
      </li>
      <li>
        <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
          <circle cx="7" cy="7" r="5" fill="#2f9aa0" />
        </svg>
        water held
      </li>
    </ul>

    <form data-el="controls" data-colspan="12">
      <section data-row>
        <p data-rowlabel>Planting</p>
        <fieldset data-toggle data-el="planting"></fieldset>
      </section>

      <section data-row>
        <p data-rowlabel>Soil</p>
        <fieldset data-toggle data-el="soil"></fieldset>
      </section>

      <section data-row>
        <p data-rowlabel>Exposure</p>
        <fieldset data-toggle data-el="sun"></fieldset>
      </section>

      <section data-row>
        <p data-rowlabel>Duration</p>
        <fieldset data-stepper>
          <button type="button" data-el="durMinus" aria-label="Less watering">
            −
          </button>
          <output data-el="durOut">60 min</output>
          <button type="button" data-el="durPlus" aria-label="More watering">
            +
          </button>
        </fieldset>
      </section>

      <button type="button" data-el="reset">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path
            d="M5 12a7 7 0 1 1 2 4.9"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
          <path
            d="M4 7v4h4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Reset waterings
      </button>
    </form>

    <footer data-colspan="12">
      <p data-colspan="12">
        Weather from
        <a href="https://open-meteo.com/" rel="noopener">Open-Meteo</a>. Tap any
        day to plan a watering — nothing is saved, reload resets everything.
      </p>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
