<svg xmlns="http://www.w3.org/2000/svg" width="560" height="1040" font-family="system-ui, sans-serif">
  <rect width="560" height="1040" fill="#e9ebef"/>
  <text x="280" y="28" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Soil-Balance — single mobile screen (reading of UIX-1…7 + controls)</text>

  <!-- phone frame -->
  <rect x="40" y="44" width="480" height="968" rx="36" fill="#ffffff" stroke="#bcc2cb" stroke-width="3"/>
  <rect x="220" y="58" width="120" height="18" rx="9" fill="#dfe3e9"/><!-- notch -->

  <!-- ===== header ===== -->
  <text x="64" y="108" font-size="12" font-weight="700" fill="#3a4858">Soil balance</text>
  <text x="64" y="124" font-size="9" fill="#9aa3b0">Vormersesluisweg 3A, Wijchen · flower bed on sandy loam</text>

  <!-- next-watering counter (UIX-5) -->
  <rect x="64" y="138" width="200" height="56" rx="10" fill="#eef6ee"/>
  <text x="78" y="160" font-size="10" fill="#6f8a6f">Next watering in</text>
  <text x="78" y="184" font-size="22" font-weight="800" fill="#2e7d32">+2 days</text>

  <!-- today level % (UIX-4) -->
  <rect x="272" y="138" width="224" height="56" rx="10" fill="#eef3fb"/>
  <text x="286" y="160" font-size="10" fill="#6a7c95">Today's soil moisture</text>
  <text x="286" y="184" font-size="22" font-weight="800" fill="#2f6fb0">62%</text>
  <text x="484" y="160" font-size="9" text-anchor="end" fill="#9aa3b0">21°C</text>
  <text x="484" y="184" font-size="8" text-anchor="end" fill="#aab2bd">0% wilt · 100% full</text>

  <!-- ===== graph block ===== -->
  <!-- sky -->
  <rect x="64" y="206" width="432" height="160" fill="#f3f8ff"/>
  <!-- sun (UIX-2) -->
  <circle cx="456" cy="240" r="14" fill="#ffe08a" stroke="#f0c24a"/>
  <g stroke="#f0c24a" stroke-width="2">
    <line x1="456" y1="216" x2="456" y2="222"/>
    <line x1="456" y1="258" x2="456" y2="264"/>
    <line x1="432" y1="240" x2="438" y2="240"/>
    <line x1="474" y1="240" x2="480" y2="240"/>
    <line x1="439" y1="223" x2="443" y2="227"/>
    <line x1="473" y1="223" x2="469" y2="227"/>
  </g>

  <!-- per-day top strip: temp °C (UIX-3), then weather/watering icons -->
  <!-- column centers: 85 + 26*i  (i 0..15), col width 26, left edge 72 -->
  <g font-size="8" text-anchor="middle" fill="#7b8492">
    <text x="85" y="300">18°</text>
    <text x="111" y="300">19°</text>
    <text x="137" y="300">17°</text>
    <text x="163" y="300">20°</text>
    <text x="189" y="300">22°</text>
    <text x="215" y="300">23°</text>
    <text x="241" y="300">24°</text>
    <text x="267" y="300">22°</text>
    <text x="293" y="300" font-weight="800" fill="#2f6fb0">21°</text>
    <text x="319" y="300">23°</text>
    <text x="345" y="300">25°</text>
    <text x="371" y="300">26°</text>
    <text x="397" y="300">21°</text>
    <text x="423" y="300">22°</text>
    <text x="449" y="300">24°</text>
    <text x="475" y="300">25°</text>
  </g>

  <!-- rain drops (rain in, UIX-3) : -6 day (i2) actual, +4 day (i12) forecast -->
  <g>
    <path d="M137,318 q5,7 0,12 q-5,-5 0,-12 Z" fill="#5aa0e0"/>
    <text x="137" y="346" font-size="7" text-anchor="middle" fill="#5aa0e0">6.4</text>
    <path d="M397,318 q5,7 0,12 q-5,-5 0,-12 Z" fill="#a9cdee"/>
    <text x="397" y="346" font-size="7" text-anchor="middle" fill="#9bbfe0">3.1</text>
  </g>

  <!-- watering applied (UIX-3 / CTR-4): -3 day (i5), toggled on -->
  <g>
    <circle cx="215" cy="324" r="5" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
    <line x1="211" y1="328" x2="208" y2="332" stroke="#2e7d32" stroke-width="1.3"/>
    <line x1="215" y1="329" x2="215" y2="334" stroke="#2e7d32" stroke-width="1.3"/>
    <line x1="219" y1="328" x2="222" y2="332" stroke="#2e7d32" stroke-width="1.3"/>
    <text x="215" y="346" font-size="7" text-anchor="middle" fill="#2e7d32">3.8</text>
  </g>

  <!-- ground surface line (field capacity = 100%, roots sit here, UIX-2/UIX-4) -->
  <line x1="72" y1="360" x2="488" y2="360" stroke="#9c8156" stroke-width="2"/>

  <!-- dry-soil band background (360=100% top → 720=0% wilting bottom) -->
  <rect x="72" y="360" width="416" height="360" fill="#efe6d6"/>

  <!-- continuous stepped water fill, no gaps (UIX-1) : past + today -->
  <path d="M72,720 L72,414 L98,414 L98,432 L124,432 L124,388.8 L150,388.8 L150,410.4 L176,410.4 L176,439.2 L202,439.2 L202,464.4 L228,464.4 L228,486 L254,486 L254,504 L280,504 L280,496.8 L306,496.8 L306,720 Z"
        fill="#a9d3f0"/>
  <!-- water fill : future projection (lighter) -->
  <path d="M306,720 L306,514.8 L332,514.8 L332,536.4 L358,536.4 L358,550.8 L384,550.8 L384,511.2 L410,511.2 L410,529.2 L436,529.2 L436,543.6 L462,543.6 L462,558 L488,558 L488,720 Z"
        fill="#d3ecfb"/>

  <!-- roots hanging from the surface (UIX-2) -->
  <g stroke="#8a6d3b" stroke-width="1" fill="none" opacity="0.55">
    <path d="M120,360 q-3,14 2,26"/>
    <path d="M200,360 q4,16 -2,30"/>
    <path d="M300,360 q-2,18 3,28"/>
    <path d="M400,360 q3,14 -2,24"/>
    <path d="M460,360 q-3,16 1,22"/>
  </g>

  <!-- threshold marker line (UIX-4): (1-p)=55% of available water -->
  <line x1="72" y1="522" x2="488" y2="522" stroke="#d98b2b" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="76" y="517" font-size="8" fill="#bf7a22">watering threshold · 55%</text>

  <!-- today highlight column + label (UIX-4) -->
  <rect x="280" y="360" width="26" height="360" fill="none" stroke="#2f6fb0" stroke-width="1.6"/>
  <rect x="280" y="490" width="26" height="14" fill="#2f6fb0"/>
  <text x="293" y="500" font-size="8" font-weight="700" text-anchor="middle" fill="#fff">62%</text>

  <!-- now divider (past | forecast) -->
  <line x1="306" y1="360" x2="306" y2="720" stroke="#2f6fb0" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  <text x="365" y="374" font-size="8" fill="#9bb0cb">forecast →</text>

  <!-- axis labels: % (left) -->
  <g font-size="7" fill="#aab2bd" text-anchor="end">
    <text x="69" y="363">100</text>
    <text x="69" y="525">55</text>
    <text x="69" y="722">0</text>
  </g>

  <!-- day labels under the soil (window: -8 … today … +7, DAT-2) -->
  <g font-size="7.5" text-anchor="middle" fill="#9aa3b0">
    <text x="85" y="736">-8</text>
    <text x="137" y="736">-6</text>
    <text x="189" y="736">-4</text>
    <text x="241" y="736">-2</text>
    <text x="293" y="736" font-weight="700" fill="#2f6fb0">now</text>
    <text x="345" y="736">+2</text>
    <text x="397" y="736">+4</text>
    <text x="449" y="736">+6</text>
  </g>
  <text x="280" y="756" font-size="8" text-anchor="middle" fill="#aab2bd">tap any day to water / un-water (CTR-4) — 8 days back · today · 7 ahead</text>

  <!-- mini legend (UIX-3) -->
  <g font-size="8" fill="#7b8492">
    <path d="M82,772 q4,6 0,10 q-4,-4 0,-10 Z" fill="#5aa0e0"/>
    <text x="92" y="781">rain in</text>
    <circle cx="150" cy="777" r="4" fill="none" stroke="#2e7d32" stroke-width="1.3"/>
    <text x="160" y="781">watering</text>
    <rect x="228" y="773" width="10" height="8" fill="#a9d3f0"/>
    <text x="244" y="781">soil water</text>
    <rect x="312" y="773" width="10" height="8" fill="#d3ecfb"/>
    <text x="328" y="781">projected</text>
  </g>

  <!-- ===== controls (UIX-7) ===== -->
  <line x1="64" y1="800" x2="496" y2="800" stroke="#e9edf2"/>

  <!-- planting type segmented (CTR-1) -->
  <text x="64" y="824" font-size="10" font-weight="700" fill="#6a7585">Planting</text>
  <g>
    <rect x="64" y="832" width="138" height="30" rx="8" fill="#eef2f7" stroke="#d4dae2"/>
    <text x="133" y="852" font-size="11" text-anchor="middle" fill="#5a6675">Turf</text>
    <rect x="208" y="832" width="138" height="30" rx="8" fill="#2f6fb0"/>
    <text x="277" y="852" font-size="11" font-weight="700" text-anchor="middle" fill="#fff">Flower bed</text>
    <rect x="352" y="832" width="144" height="30" rx="8" fill="#eef2f7" stroke="#d4dae2"/>
    <text x="424" y="852" font-size="11" text-anchor="middle" fill="#5a6675">Shrubs</text>
  </g>

  <!-- soil type segmented (CTR-2) -->
  <text x="64" y="888" font-size="10" font-weight="700" fill="#6a7585">Soil</text>
  <g>
    <rect x="64" y="896" width="100" height="30" rx="8" fill="#eef2f7" stroke="#d4dae2"/>
    <text x="114" y="916" font-size="10" text-anchor="middle" fill="#5a6675">Sand</text>
    <rect x="170" y="896" width="118" height="30" rx="8" fill="#2f6fb0"/>
    <text x="229" y="916" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">Sandy loam</text>
    <rect x="294" y="896" width="92" height="30" rx="8" fill="#eef2f7" stroke="#d4dae2"/>
    <text x="340" y="916" font-size="10" text-anchor="middle" fill="#5a6675">Loam</text>
    <rect x="392" y="896" width="104" height="30" rx="8" fill="#eef2f7" stroke="#d4dae2"/>
    <text x="444" y="916" font-size="10" text-anchor="middle" fill="#5a6675">Clay</text>
  </g>

  <!-- watering duration stepper (CTR-3 / UIX-7) -->
  <text x="64" y="952" font-size="10" font-weight="700" fill="#6a7585">Watering duration</text>
  <g>
    <rect x="288" y="938" width="40" height="32" rx="8" fill="#eef2f7" stroke="#d4dae2"/>
    <text x="308" y="960" font-size="18" text-anchor="middle" fill="#2f6fb0">−</text>
    <rect x="332" y="938" width="90" height="32" rx="8" fill="#fff" stroke="#d4dae2"/>
    <text x="377" y="959" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2937">60 min</text>
    <rect x="426" y="938" width="40" height="32" rx="8" fill="#eef2f7" stroke="#d4dae2"/>
    <text x="446" y="959" font-size="18" text-anchor="middle" fill="#2f6fb0">+</text>
  </g>
  <text x="64" y="960" font-size="8" fill="#aab2bd">= 3.8 mm dose per watered day</text>
</svg>
