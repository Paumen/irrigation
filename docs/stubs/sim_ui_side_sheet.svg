<svg xmlns="http://www.w3.org/2000/svg" width="470" height="840" viewBox="0 0 470 840" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- ===== stub: side panel docked beside the diagram canvas (U8/U17) ===== -->
  <!-- NOT the app. A static mock to react to the sim_ui.md spec before build. -->
  <!-- readings = round dials (watch); controls = linear sliders/select/toggle (set). -->
  <rect x="0" y="0" width="470" height="840" fill="#eef1f5"/>

  <text x="20" y="26" font-size="13" font-weight="700" fill="#0f172a">side-panel stub — item tapped: Z2 rotor</text>
  <text x="20" y="44" font-size="11" fill="#64748b">diagram is the persistent canvas · inspector docked to the side · readings as dials, controls as sliders</text>

  <!-- ===================== PHONE FRAME (diagram canvas) ===================== -->
  <rect x="20" y="58" width="360" height="762" rx="30" fill="#e9eef4" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ===== diagram column — the main view, stays visible (U6/U7/U8) ===== -->
  <text x="44" y="92" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">ZONE 2</text>
  <rect x="40" y="98" width="46" height="15" rx="7.5" fill="#e0e7ff"/><text x="63" y="109" font-size="8" font-weight="700" fill="#3730a3" text-anchor="middle">U6·U8</text>

  <!-- valve + trunk + heads -->
  <rect x="44" y="360" width="30" height="20" rx="5" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="59" y="374" font-size="9" font-weight="600" fill="#475569" text-anchor="middle">Z2</text>
  <path d="M 74 370 H 120 M 120 150 V 370" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <path d="M 120 150 h 12 M 120 235 h 12 M 120 320 h 12" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <!-- unselected heads -->
  <circle cx="120" cy="235" r="5" fill="#cbd5e1"/><text x="138" y="239" font-size="9" fill="#94a3b8">spray</text>
  <circle cx="120" cy="320" r="5" fill="#cbd5e1"/><text x="138" y="324" font-size="9" fill="#94a3b8">spray</text>
  <!-- selected rotor head -->
  <circle cx="120" cy="150" r="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <circle cx="120" cy="150" r="4" fill="#16a34a"/>
  <text x="138" y="146" font-size="9.5" font-weight="600" fill="#2563eb">rotor</text>
  <text x="138" y="158" font-size="8" fill="#94a3b8">tapped ▸</text>
  <!-- connector from selected item into the docked panel -->
  <path d="M 131 150 H 176" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="44" y="800" font-size="9" fill="#94a3b8">diagram stays the canvas — panel docks beside it</text>

  <!-- ===================== DOCKED SIDE PANEL ===================== -->
  <rect x="172" y="70" width="4" height="566" fill="#0f172a" opacity="0.06"/>
  <rect x="176" y="70" width="200" height="566" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===== identity (U9 status · U18 catalog id) ===== -->
  <text x="192" y="106" font-size="18" font-weight="700" fill="#0f172a">Z2 · rotor</text>
  <rect x="192" y="116" width="88" height="22" rx="11" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <circle cx="206" cy="127" r="4" fill="#16a34a"/>
  <text x="216" y="131" font-size="11" font-weight="600" fill="#15803d">watering</text>
  <rect x="320" y="118" width="46" height="14" rx="7" fill="#fde68a"/><text x="343" y="129" font-size="8" font-weight="700" fill="#92400e" text-anchor="middle">U9·U18</text>
  <text x="192" y="156" font-size="11" fill="#64748b">Hunter I-20-04-SS</text>
  <line x1="192" y1="166" x2="360" y2="166" stroke="#eef1f5" stroke-width="1.5"/>

  <!-- ===== coverage card (U14 coverage incl. throw · U15 precip) ===== -->
  <rect x="184" y="174" width="184" height="124" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="196" y="194" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">COVERAGE</text>
  <rect x="316" y="182" width="48" height="13" rx="6.5" fill="#bae6fd"/><text x="340" y="192" font-size="7.5" font-weight="700" fill="#075985" text-anchor="middle">U14·U15</text>

  <defs>
    <radialGradient id="wedge" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.12"/>
    </radialGradient>
  </defs>
  <!-- apex (208,244); RADIUS = throw. dashed = max range (12 m), fill = actual (9.4 m) -->
  <path d="M 208 244 L 210.96 210.1 A 34 34 0 0 1 210.96 277.9 Z" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
  <path d="M 208 244 L 210.35 217.1 A 27 27 0 0 1 210.35 270.9 Z" fill="url(#wedge)" stroke="#0ea5e9" stroke-width="1.1"/>
  <circle cx="208" cy="244" r="3.5" fill="#0ea5e9"/>

  <text x="266" y="226" font-size="10" fill="#64748b">throw</text>
  <text x="266" y="244" font-size="16" font-weight="700" fill="#0f172a">9.4 <tspan font-size="10" font-weight="500" fill="#64748b">m</tspan></text>
  <text x="266" y="248" font-size="7.5" fill="#94a3b8"> </text>
  <text x="266" y="270" font-size="10" fill="#64748b">precip</text>
  <text x="266" y="288" font-size="16" font-weight="700" fill="#0f172a">14 <tspan font-size="10" font-weight="500" fill="#64748b">mm/h</tspan></text>

  <!-- ===== state card — READINGS as dials (U17/U18, distinct from controls) ===== -->
  <rect x="184" y="306" width="184" height="116" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="196" y="326" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">STATE</text>
  <rect x="316" y="314" width="48" height="13" rx="6.5" fill="#bae6fd"/><text x="340" y="324" font-size="7.5" font-weight="700" fill="#075985" text-anchor="middle">U17·U18</text>

  <!-- pressure dial (0..5 bar, val 3.1) -->
  <text x="232" y="350" font-size="10" fill="#475569" text-anchor="middle">pressure</text>
  <path d="M 204 384 A 28 28 0 0 1 260 384" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 204 384 A 28 28 0 0 1 242.3 357.96" fill="none" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
  <text x="232" y="388" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">3.1</text>
  <text x="232" y="402" font-size="9" fill="#64748b" text-anchor="middle">bar</text>

  <!-- flow dial (span 0.4..1.1, val 0.74) -->
  <text x="318" y="350" font-size="10" fill="#475569" text-anchor="middle">flow</text>
  <path d="M 290 384 A 28 28 0 0 1 346 384" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 290 384 A 28 28 0 0 1 316.78 356.03" fill="none" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
  <text x="318" y="388" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">0.74</text>
  <text x="318" y="402" font-size="9" fill="#64748b" text-anchor="middle">m³/h</text>

  <!-- ===== controls card (U19) — linear, clearly settable ===== -->
  <rect x="184" y="430" width="184" height="156" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="196" y="450" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">CONTROLS</text>
  <rect x="334" y="438" width="30" height="13" rx="6.5" fill="#ddd6fe"/><text x="349" y="448" font-size="7.5" font-weight="700" fill="#5b21b6" text-anchor="middle">U19</text>

  <text x="196" y="474" font-size="11" fill="#334155">nozzle</text>
  <rect x="196" y="480" width="168" height="24" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="208" y="496" font-size="11" font-weight="600" fill="#0f172a">BL4.0</text>
  <path d="M 348 489 l 4 4 l 4 -4" fill="none" stroke="#64748b" stroke-width="1.4"/>

  <text x="196" y="528" font-size="11" fill="#334155">arc</text>
  <text x="360" y="528" font-size="11" font-weight="600" fill="#0f172a" text-anchor="end">170°</text>
  <rect x="196" y="536" width="168" height="5" rx="2.5" fill="#e2e8f0"/>
  <rect x="196" y="536" width="79" height="5" rx="2.5" fill="#2563eb"/>
  <circle cx="275" cy="538.5" r="8" fill="#2563eb" stroke="#fff" stroke-width="2"/>

  <text x="196" y="568" font-size="11" fill="#334155">head shutoff</text>
  <text x="288" y="568" font-size="10" fill="#16a34a" font-weight="600">open</text>
  <rect x="328" y="557" width="36" height="20" rx="10" fill="#16a34a"/>
  <circle cx="354" cy="567" r="7" fill="#ffffff"/>

  <text x="192" y="612" font-size="9.5" fill="#94a3b8">change a control → whole system re-solves (U20)</text>
</svg>
