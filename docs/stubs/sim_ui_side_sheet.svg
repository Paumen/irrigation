<svg xmlns="http://www.w3.org/2000/svg" width="470" height="840" viewBox="0 0 470 840" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- ===== stub: docked side sheet over a still-visible diagram (U8/U17) ===== -->
  <!-- NOT the app. A static mock to react to the sim_ui.md spec before build. -->
  <rect x="0" y="0" width="470" height="840" fill="#eef1f5"/>

  <text x="20" y="26" font-size="13" font-weight="700" fill="#0f172a">side-sheet stub — item tapped: Z2 rotor</text>
  <text x="20" y="44" font-size="11" fill="#64748b">static mock for sim_ui.md · light theme (U1) · phone portrait (U2) · diagram stays visible, sheet docked below</text>

  <!-- ===================== PHONE FRAME (diagram canvas) ===================== -->
  <rect x="20" y="58" width="360" height="762" rx="30" fill="#e9eef4" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ===== diagram strip — still visible above the sheet (U6/U7/U8) ===== -->
  <text x="44" y="92" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">ZONE 2</text>
  <!-- valve -->
  <rect x="44" y="120" width="30" height="20" rx="5" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="59" y="134" font-size="9" font-weight="600" fill="#475569" text-anchor="middle">Z2</text>
  <!-- trunk + branches -->
  <path d="M 74 130 H 150 M 150 112 V 168" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <path d="M 150 112 H 244 M 150 140 H 244 M 150 168 H 244" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <!-- unselected heads -->
  <circle cx="250" cy="140" r="5" fill="#cbd5e1"/>
  <circle cx="250" cy="168" r="5" fill="#cbd5e1"/>
  <text x="262" y="144" font-size="9" fill="#94a3b8">spray</text>
  <text x="262" y="172" font-size="9" fill="#94a3b8">spray</text>
  <!-- selected rotor head, highlighted -->
  <circle cx="250" cy="112" r="11" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <circle cx="250" cy="112" r="4" fill="#16a34a"/>
  <text x="266" y="116" font-size="9.5" font-weight="600" fill="#2563eb">rotor ◂ tapped</text>
  <text x="44" y="186" font-size="9" fill="#94a3b8">diagram stays in view — tapping an item opens the sheet below, no navigation away</text>

  <!-- ===================== DOCKED SHEET ===================== -->
  <rect x="20" y="196" width="360" height="624" rx="22" fill="#0f172a" opacity="0.06"/>
  <rect x="20" y="200" width="360" height="620" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <!-- grab handle (drag to expand/collapse the sheet) -->
  <rect x="180" y="212" width="40" height="5" rx="2.5" fill="#cbd5e1"/>

  <!-- ===== identity (U9 status · U18 catalog id) ===== -->
  <text x="44" y="250" font-size="21" font-weight="700" fill="#0f172a">Z2 · rotor</text>
  <rect x="276" y="236" width="92" height="24" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <circle cx="291" cy="248" r="4" fill="#16a34a"/>
  <text x="301" y="252" font-size="12" font-weight="600" fill="#15803d">watering</text>
  <text x="44" y="270" font-size="11.5" fill="#64748b">Hunter I-20-04-SS</text>

  <line x1="44" y1="280" x2="356" y2="280" stroke="#eef1f5" stroke-width="1.5"/>

  <!-- ===== coverage card (U14 coverage · U15 precip) — wedge only, no arc number ===== -->
  <rect x="36" y="290" width="328" height="132" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="52" y="312" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">COVERAGE</text>

  <defs>
    <radialGradient id="wedge" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.12"/>
    </radialGradient>
  </defs>
  <!-- apex (70,356); 170 deg fan opening right. RADIUS = throw. -->
  <!-- dashed envelope = catalog max range (12 m); fill = actual throw (9.4 m -> r 47/60) -->
  <path d="M 70 356 L 75.2 296.2 A 60 60 0 0 1 75.2 415.8 Z" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
  <path d="M 70 356 L 74.1 309.2 A 47 47 0 0 1 74.1 402.8 Z" fill="url(#wedge)" stroke="#0ea5e9" stroke-width="1.2"/>
  <circle cx="70" cy="356" r="4" fill="#0ea5e9"/>
  <!-- radial ruler along centerline: actual reach vs max -->
  <line x1="70" y1="356" x2="130" y2="356" stroke="#94a3b8" stroke-width="0.75" stroke-dasharray="2 2"/>
  <line x1="117" y1="350" x2="117" y2="362" stroke="#0369a1" stroke-width="1.5"/>
  <text x="134" y="359" font-size="8.5" fill="#94a3b8">12 m max</text>

  <text x="208" y="330" font-size="11" fill="#64748b">throw</text>
  <text x="208" y="350" font-size="18" font-weight="700" fill="#0f172a">9.4 <tspan font-size="12" font-weight="500" fill="#64748b">m</tspan></text>
  <text x="208" y="380" font-size="11" fill="#64748b">precip rate</text>
  <text x="208" y="400" font-size="18" font-weight="700" fill="#0f172a">14 <tspan font-size="12" font-weight="500" fill="#64748b">mm/h</tspan></text>

  <!-- ===== state readouts (U17 numbers · U18 read vs catalog) ===== -->
  <rect x="36" y="434" width="328" height="100" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="52" y="456" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">STATE</text>

  <text x="52" y="480" font-size="11.5" fill="#475569">pressure</text>
  <text x="200" y="480" font-size="15" font-weight="700" fill="#0f172a">3.1 <tspan font-size="11" font-weight="500" fill="#64748b">bar</tspan></text>
  <circle cx="338" cy="476" r="4" fill="#16a34a"/>

  <text x="52" y="508" font-size="11.5" fill="#475569">flow</text>
  <text x="200" y="508" font-size="15" font-weight="700" fill="#0f172a">0.74 <tspan font-size="11" font-weight="500" fill="#64748b">m³/h</tspan></text>
  <rect x="52" y="516" width="300" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="52" y="516" width="146" height="6" rx="3" fill="#93c5fd"/>
  <circle cx="198" cy="519" r="6" fill="#2563eb" stroke="#fff" stroke-width="1.5"/>

  <!-- ===== controls (U19) — sole home of arc & nozzle values ===== -->
  <rect x="36" y="546" width="328" height="168" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="52" y="568" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">CONTROLS</text>

  <text x="52" y="594" font-size="12" fill="#334155">nozzle</text>
  <rect x="216" y="580" width="136" height="26" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="228" y="597" font-size="12" font-weight="600" fill="#0f172a">BL4.0</text>
  <path d="M 336 590 l 4 4 l 4 -4" fill="none" stroke="#64748b" stroke-width="1.4"/>

  <text x="52" y="632" font-size="12" fill="#334155">arc</text>
  <text x="352" y="632" font-size="12" font-weight="600" fill="#0f172a" text-anchor="end">170°</text>
  <rect x="52" y="640" width="300" height="5" rx="2.5" fill="#e2e8f0"/>
  <rect x="52" y="640" width="142" height="5" rx="2.5" fill="#2563eb"/>
  <circle cx="194" cy="642.5" r="8" fill="#2563eb" stroke="#fff" stroke-width="2"/>

  <text x="52" y="680" font-size="12" fill="#334155">head shutoff</text>
  <text x="246" y="680" font-size="11" fill="#16a34a" font-weight="600">open</text>
  <rect x="312" y="668" width="40" height="22" rx="11" fill="#16a34a"/>
  <circle cx="341" cy="679" r="8" fill="#ffffff"/>

  <text x="44" y="744" font-size="10.5" fill="#94a3b8">change a control → whole system re-solves (U20)</text>

  <!-- ===================== ANNOTATION STRIP ===================== -->
  <g font-size="10" font-weight="700">
    <line x1="380" y1="140" x2="400" y2="140" stroke="#cbd5e1" stroke-dasharray="2 2"/>
    <rect x="400" y="130" width="56" height="20" rx="10" fill="#c7d2fe"/><text x="408" y="144" fill="#3730a3">U6·U8</text>

    <line x1="368" y1="252" x2="400" y2="252" stroke="#cbd5e1" stroke-dasharray="2 2"/>
    <rect x="400" y="242" width="62" height="20" rx="10" fill="#fde68a"/><text x="409" y="256" fill="#92400e">U9·U18</text>

    <line x1="364" y1="356" x2="400" y2="356" stroke="#cbd5e1" stroke-dasharray="2 2"/>
    <rect x="400" y="346" width="62" height="20" rx="10" fill="#bae6fd"/><text x="408" y="360" fill="#075985">U14·U15</text>

    <line x1="364" y1="484" x2="400" y2="484" stroke="#cbd5e1" stroke-dasharray="2 2"/>
    <rect x="400" y="474" width="62" height="20" rx="10" fill="#bae6fd"/><text x="408" y="488" fill="#075985">U17·U18</text>

    <line x1="364" y1="628" x2="400" y2="628" stroke="#cbd5e1" stroke-dasharray="2 2"/>
    <rect x="400" y="618" width="40" height="20" rx="10" fill="#ddd6fe"/><text x="411" y="632" fill="#5b21b6">U19</text>
  </g>
</svg>
