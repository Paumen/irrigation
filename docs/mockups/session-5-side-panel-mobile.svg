<svg xmlns="http://www.w3.org/2000/svg" width="520" height="1000" font-family="system-ui, sans-serif">
  <rect width="520" height="1000" fill="#e9ebef"/>
  <text x="260" y="32" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Side panel on a phone-portrait screen — diagram left, panel docked right</text>

  <!-- phone frame -->
  <rect x="45" y="55" width="430" height="900" rx="34" fill="#fff" stroke="#bcc2cb" stroke-width="3"/>
  <rect x="190" y="68" width="140" height="20" rx="10" fill="#dfe3e9"/><!-- notch -->

  <!-- app header (full width): SYSTEM summary -->
  <g>
    <rect x="60" y="100" width="400" height="44" rx="8" fill="#f3f6fb"/>
    <circle cx="78" cy="122" r="5" fill="#2e7d32"/>
    <text x="90" y="126" font-size="12" font-weight="600" fill="#2e3a4a">pump · 2.4 m³/h · 3.6 bar</text>
    <text x="448" y="118" font-size="11" text-anchor="end"><tspan fill="#3a78c8">●●</tspan><tspan fill="#c3ccd8">○○</tspan></text>
    <text x="448" y="134" font-size="9" text-anchor="end" fill="#9aa3b0">Z2 Z3 · Z4 Z5</text>
  </g>

  <!-- ===== main split ===== -->
  <!-- divider between diagram and panel -->
  <line x1="288" y1="152" x2="288" y2="936" stroke="#dde2e8" stroke-width="2"/>

  <!-- ===== DIAGRAM (left, ~56%) ===== -->
  <clipPath id="d2"><rect x="60" y="152" width="226" height="784" rx="6"/></clipPath>
  <g clip-path="url(#d2)">
    <rect x="60" y="152" width="226" height="784" fill="#f5f9ff"/>
    <text x="72" y="172" font-size="9" font-weight="700" letter-spacing="1" fill="#a7b4cc">DIAGRAM</text>

    <!-- wiring band -->
    <rect x="72" y="182" width="200" height="46" rx="5" fill="#fbf7ee" stroke="#e6dcc4"/>
    <rect x="82" y="194" width="44" height="22" rx="3" fill="#fff" stroke="#cbb46a"/>
    <text x="104" y="209" font-size="7" text-anchor="middle" fill="#8a7430">ctrl</text>
    <line x1="126" y1="205" x2="160" y2="205" stroke="#caa94a" stroke-width="2"/>
    <rect x="160" y="196" width="30" height="18" rx="3" fill="#fff" stroke="#cbb46a"/>
    <text x="175" y="209" font-size="6" text-anchor="middle" fill="#8a7430">relay</text>
    <line x1="190" y1="205" x2="216" y2="205" stroke="#caa94a" stroke-width="2" stroke-dasharray="4 3"/>
    <line x1="216" y1="205" x2="266" y2="205" stroke="#caa94a" stroke-width="2"/>
    <text x="240" y="222" font-size="7" text-anchor="middle" fill="#c0392b">break</text>

    <!-- manifold bar -->
    <rect x="80" y="260" width="18" height="520" rx="4" fill="#cfe0f5" stroke="#7fa0d8"/>
    <text x="89" y="796" font-size="8" text-anchor="middle" fill="#5a6b8c">manifold</text>

    <!-- Z2 selected -->
    <line x1="98" y1="296" x2="170" y2="296" stroke="#3a78c8" stroke-width="4"/>
    <rect x="128" y="287" width="22" height="18" rx="3" fill="#dff0ff" stroke="#3a78c8"/>
    <text x="139" y="300" font-size="7" text-anchor="middle" fill="#2f6fb0">V2</text>
    <circle cx="200" cy="296" r="12" fill="#bfe0c0" stroke="#2e7d32" stroke-width="2.5"/>
    <text x="200" y="300" font-size="9" text-anchor="middle" fill="#1f5e22">⟳</text>
    <circle cx="240" cy="282" r="8" fill="#cfeccf" stroke="#2e7d32"/>
    <circle cx="240" cy="312" r="8" fill="#cfeccf" stroke="#2e7d32"/>
    <circle cx="200" cy="296" r="20" fill="none" stroke="#2f6fb0" stroke-width="1.3" stroke-dasharray="3 3"/>
    <text x="106" y="290" font-size="8" fill="#3a78c8">Z2</text>

    <!-- Z3 -->
    <line x1="98" y1="376" x2="160" y2="376" stroke="#9fb4cf" stroke-width="2.5"/>
    <rect x="128" y="368" width="22" height="16" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
    <circle cx="190" cy="376" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="222" cy="376" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <text x="106" y="370" font-size="8" fill="#9aa3b0">Z3</text>

    <!-- Z4 -->
    <line x1="98" y1="456" x2="160" y2="456" stroke="#9fb4cf" stroke-width="2.5"/>
    <rect x="128" y="448" width="22" height="16" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
    <circle cx="184" cy="456" r="7" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="210" cy="456" r="7" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="236" cy="456" r="7" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="262" cy="456" r="7" fill="#e7ebf0" stroke="#9fb4cf"/>
    <text x="106" y="450" font-size="8" fill="#9aa3b0">Z4</text>

    <!-- Z5 -->
    <line x1="98" y1="536" x2="160" y2="536" stroke="#9fb4cf" stroke-width="2.5"/>
    <rect x="128" y="528" width="22" height="16" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
    <circle cx="190" cy="536" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="222" cy="536" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <text x="106" y="530" font-size="8" fill="#9aa3b0">Z5</text>

    <!-- Z1 manual -->
    <line x1="98" y1="612" x2="150" y2="612" stroke="#9fb4cf" stroke-width="2.5"/>
    <rect x="124" y="604" width="20" height="15" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
    <text x="106" y="606" font-size="8" fill="#9aa3b0">Z1 man</text>

    <!-- Z6 cap -->
    <line x1="98" y1="676" x2="134" y2="676" stroke="#9fb4cf" stroke-width="2.5"/>
    <text x="140" y="680" font-size="7" fill="#9aa3b0">Z6✕</text>

    <!-- supply bottom -->
    <line x1="80" y1="820" x2="272" y2="820" stroke="#7fa0d8" stroke-width="3"/>
    <circle cx="104" cy="820" r="7" fill="#cfe0f5" stroke="#7fa0d8"/>
    <text x="104" y="842" font-size="7" text-anchor="middle" fill="#5a6b8c">well</text>
    <rect x="176" y="810" width="34" height="20" rx="3" fill="#cfe0f5" stroke="#7fa0d8"/>
    <text x="193" y="824" font-size="7" text-anchor="middle" fill="#5a6b8c">pump</text>
  </g>

  <!-- ===== SIDE PANEL (right, ~44%, docked) ===== -->
  <g transform="translate(296,152)">
    <rect x="0" y="0" width="164" height="784" fill="#fafbfc"/>
    <!-- selected item -->
    <text x="8" y="24" font-size="13" font-weight="700" fill="#1f2937">Z2 rotor</text>
    <rect x="8" y="32" width="74" height="20" rx="10" fill="#e7f4e8"/>
    <circle cx="22" cy="42" r="4" fill="#2e7d32"/>
    <text x="31" y="46" font-size="10" fill="#2e7d32">watering</text>
    <text x="8" y="68" font-size="8" fill="#9aa3b0">Hunter I-20-04-SS</text>
    <line x1="8" y1="80" x2="156" y2="80" stroke="#e9edf2"/>

    <!-- LIVE -->
    <text x="8" y="100" font-size="8" font-weight="700" letter-spacing="1" fill="#8a93a0">LIVE</text>
    <text x="8" y="120" font-size="11" fill="#444">flow</text>
    <text x="156" y="120" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">1.04</text>
    <rect x="8" y="126" width="148" height="4" rx="2" fill="#e7ebf0"/>
    <rect x="8" y="126" width="118" height="4" rx="2" fill="#9fc0e8"/>
    <text x="8" y="142" font-size="7" fill="#aab2bd">m³/h · span 0.68–1.10</text>

    <text x="8" y="162" font-size="11" fill="#444">pressure</text>
    <text x="156" y="162" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">3.4</text>
    <rect x="8" y="168" width="148" height="4" rx="2" fill="#e7ebf0"/>
    <rect x="8" y="168" width="92" height="4" rx="2" fill="#9fc0e8"/>
    <text x="8" y="184" font-size="7" fill="#aab2bd">bar · working 1.5–4.5</text>

    <text x="8" y="206" font-size="11" fill="#444">throw</text>
    <text x="156" y="206" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">12.2 m</text>
    <text x="8" y="226" font-size="11" fill="#444">precip</text>
    <text x="156" y="226" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">31 mm/h</text>
    <line x1="8" y1="240" x2="156" y2="240" stroke="#e9edf2"/>

    <!-- CONTROLS -->
    <text x="8" y="260" font-size="8" font-weight="700" letter-spacing="1" fill="#8a93a0">CONTROLS</text>
    <text x="8" y="282" font-size="11" fill="#444">nozzle</text>
    <rect x="60" y="270" width="96" height="20" rx="10" fill="#f1f4f8" stroke="#d4dae2"/>
    <text x="72" y="284" font-size="11" fill="#2f6fb0">◂</text>
    <text x="108" y="284" font-size="10" text-anchor="middle" fill="#1f2937">BL4.0</text>
    <text x="146" y="284" font-size="11" text-anchor="end" fill="#2f6fb0">▸</text>

    <text x="8" y="312" font-size="11" fill="#444">arc</text>
    <text x="156" y="312" font-size="11" text-anchor="end" fill="#1f2937">170°</text>
    <text x="8" y="326" font-size="7" fill="#aab2bd">↳ set on diagram wedge (U22)</text>

    <text x="8" y="350" font-size="11" fill="#444">flo-stop</text>
    <rect x="120" y="339" width="36" height="18" rx="9" fill="#cfe6d0"/>
    <circle cx="147" cy="348" r="7" fill="#2e7d32"/>
    <line x1="8" y1="372" x2="156" y2="372" stroke="#e9edf2"/>

    <!-- IN/OUT -->
    <text x="8" y="392" font-size="8" font-weight="700" letter-spacing="1" fill="#8a93a0">IN / OUT</text>
    <text x="8" y="410" font-size="10" fill="#555">in 3.5 bar</text>
    <text x="8" y="426" font-size="10" fill="#555">out 1.04 → 170° fan</text>
  </g>
</svg>
