<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" font-family="system-ui, sans-serif">
  <rect width="720" height="440" fill="#f7f8fa"/>
  <text x="360" y="30" font-size="18" font-weight="700" text-anchor="middle" fill="#222">U14 + U15 + U9 + U22 — everything on one head. Too much?</text>

  <!-- LEFT: the maximal glyph -->
  <g transform="translate(190,250)">
    <!-- throw range ghost (max radius for nozzle family) -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#d7dde6" stroke-dasharray="3 4"/>
    <text x="0" y="-150" font-size="9" text-anchor="middle" fill="#9aa3b0">max range 12.5 m</text>
    <!-- arc wedge: 170 deg, radius scaled to throw 12.2/12.5 -->
    <path d="M 0 0 L 136.6 0 A 137 137 0 0 1 -136 -16 Z" fill="#79b0e8" fill-opacity="0.35" stroke="#4a86c8" stroke-width="1.5"/>
    <!-- drag handles on wedge edges (U22) -->
    <circle cx="136.6" cy="0" r="6" fill="#fff" stroke="#4a86c8" stroke-width="2"/>
    <circle cx="-136" cy="-16" r="6" fill="#fff" stroke="#4a86c8" stroke-width="2"/>
    <!-- head body + type icon + status -->
    <circle cx="0" cy="0" r="20" fill="#fff" stroke="#444" stroke-width="2"/>
    <text x="0" y="5" font-size="13" text-anchor="middle" fill="#333">⟳</text>
    <circle cx="15" cy="-15" r="6" fill="#2e7d32"/>
    <!-- labels crammed around -->
    <text x="0" y="40" font-size="11" font-weight="700" text-anchor="middle" fill="#222">BL4.0</text>
    <text x="0" y="56" font-size="10" text-anchor="middle" fill="#555">1.04 m³/h</text>
    <text x="0" y="72" font-size="10" text-anchor="middle" fill="#555">12.2 m · 31 mm/h</text>
    <text x="78" y="-70" font-size="9" text-anchor="middle" fill="#4a86c8">170° arc (drag)</text>
  </g>
  <text x="190" y="420" font-size="10" text-anchor="middle" fill="#666">wedge + handles + body + type + status + 4 labels</text>

  <!-- RIGHT: stripped, disclose-on-tap -->
  <g transform="translate(540,250)">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#e3e8ee" stroke-dasharray="2 4"/>
    <path d="M 0 0 L 117 0 A 117 117 0 0 1 -116 -14 Z" fill="#79b0e8" fill-opacity="0.30" stroke="#4a86c8" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="14" fill="#fff" stroke="#444" stroke-width="2"/>
    <circle cx="11" cy="-11" r="5" fill="#2e7d32"/>
    <text x="0" y="34" font-size="10" text-anchor="middle" fill="#555">1.04 m³/h</text>
  </g>
  <text x="540" y="420" font-size="10" text-anchor="middle" fill="#666">wedge + status + flow only; rest on tap (sheet)</text>

  <line x1="360" y1="70" x2="360" y2="400" stroke="#dde2e8"/>
</svg>
