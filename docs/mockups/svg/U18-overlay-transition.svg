<svg xmlns="http://www.w3.org/2000/svg" width="820" height="960" font-family="system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-3" dy="0" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>

    <!-- reusable full-width diagram (origin 0,0; ~320 x 740) -->
    <g id="diagram">
      <rect x="0" y="0" width="320" height="740" fill="#f5f9ff"/>
      <text x="12" y="18" font-size="9" font-weight="700" letter-spacing="1" fill="#a7b4cc">DIAGRAM</text>
      <!-- wiring band -->
      <rect x="10" y="28" width="300" height="44" rx="5" fill="#fbf7ee" stroke="#e6dcc4"/>
      <rect x="20" y="40" width="48" height="20" rx="3" fill="#fff" stroke="#cbb46a"/>
      <text x="44" y="54" font-size="8" text-anchor="middle" fill="#8a7430">ctrl</text>
      <line x1="68" y1="50" x2="110" y2="50" stroke="#caa94a" stroke-width="2"/>
      <rect x="110" y="42" width="34" height="16" rx="3" fill="#fff" stroke="#cbb46a"/>
      <text x="127" y="54" font-size="7" text-anchor="middle" fill="#8a7430">relay</text>
      <line x1="144" y1="50" x2="180" y2="50" stroke="#caa94a" stroke-width="2" stroke-dasharray="4 3"/>
      <line x1="180" y1="50" x2="300" y2="50" stroke="#caa94a" stroke-width="2"/>
      <text x="200" y="66" font-size="8" text-anchor="middle" fill="#c0392b">break</text>
      <!-- manifold -->
      <rect x="20" y="110" width="16" height="500" rx="4" fill="#cfe0f5" stroke="#7fa0d8"/>
      <text x="28" y="626" font-size="8" text-anchor="middle" fill="#5a6b8c">manifold</text>
      <!-- Z2 -->
      <line x1="36" y1="150" x2="120" y2="150" stroke="#3a78c8" stroke-width="4"/>
      <rect x="78" y="142" width="22" height="16" rx="3" fill="#dff0ff" stroke="#3a78c8"/>
      <text x="89" y="155" font-size="7" text-anchor="middle" fill="#2f6fb0">V2</text>
      <circle cx="160" cy="150" r="13" fill="#bfe0c0" stroke="#2e7d32" stroke-width="2.5"/>
      <text x="160" y="154" font-size="9" text-anchor="middle" fill="#1f5e22">⟳</text>
      <circle cx="210" cy="136" r="9" fill="#cfeccf" stroke="#2e7d32"/>
      <circle cx="210" cy="166" r="9" fill="#cfeccf" stroke="#2e7d32"/>
      <text x="44" y="144" font-size="8" fill="#3a78c8">Z2</text>
      <!-- Z3 -->
      <line x1="36" y1="240" x2="110" y2="240" stroke="#9fb4cf" stroke-width="2.5"/>
      <rect x="78" y="232" width="22" height="16" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
      <circle cx="150" cy="240" r="10" fill="#e7ebf0" stroke="#9fb4cf"/>
      <circle cx="186" cy="240" r="10" fill="#e7ebf0" stroke="#9fb4cf"/>
      <text x="44" y="234" font-size="8" fill="#9aa3b0">Z3</text>
      <!-- Z4 -->
      <line x1="36" y1="330" x2="110" y2="330" stroke="#9fb4cf" stroke-width="2.5"/>
      <rect x="78" y="322" width="22" height="16" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
      <circle cx="146" cy="330" r="8" fill="#e7ebf0" stroke="#9fb4cf"/>
      <circle cx="176" cy="330" r="8" fill="#e7ebf0" stroke="#9fb4cf"/>
      <circle cx="206" cy="330" r="8" fill="#e7ebf0" stroke="#9fb4cf"/>
      <circle cx="236" cy="330" r="8" fill="#e7ebf0" stroke="#9fb4cf"/>
      <text x="44" y="324" font-size="8" fill="#9aa3b0">Z4</text>
      <!-- Z5 -->
      <line x1="36" y1="420" x2="110" y2="420" stroke="#9fb4cf" stroke-width="2.5"/>
      <rect x="78" y="412" width="22" height="16" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
      <circle cx="150" cy="420" r="10" fill="#e7ebf0" stroke="#9fb4cf"/>
      <circle cx="186" cy="420" r="10" fill="#e7ebf0" stroke="#9fb4cf"/>
      <text x="44" y="414" font-size="8" fill="#9aa3b0">Z5</text>
      <!-- Z1 -->
      <line x1="36" y1="500" x2="96" y2="500" stroke="#9fb4cf" stroke-width="2.5"/>
      <rect x="70" y="492" width="20" height="15" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
      <text x="44" y="494" font-size="8" fill="#9aa3b0">Z1 man</text>
      <!-- Z6 -->
      <line x1="36" y1="560" x2="76" y2="560" stroke="#9fb4cf" stroke-width="2.5"/>
      <text x="84" y="564" font-size="7" fill="#9aa3b0">Z6✕</text>
      <!-- supply -->
      <line x1="20" y1="660" x2="300" y2="660" stroke="#7fa0d8" stroke-width="3"/>
      <circle cx="44" cy="660" r="7" fill="#cfe0f5" stroke="#7fa0d8"/>
      <text x="44" y="682" font-size="7" text-anchor="middle" fill="#5a6b8c">well</text>
      <rect x="150" y="650" width="34" height="20" rx="3" fill="#cfe0f5" stroke="#7fa0d8"/>
      <text x="167" y="664" font-size="7" text-anchor="middle" fill="#5a6b8c">pump</text>
    </g>
  </defs>

  <rect width="820" height="960" fill="#e9ebef"/>

  <!-- ============ PHONE A: nothing selected ============ -->
  <g>
    <text x="200" y="34" font-size="13" font-weight="700" text-anchor="middle" fill="#333">Nothing selected — diagram has the whole screen</text>
    <rect x="30" y="48" width="340" height="880" rx="32" fill="#fff" stroke="#bcc2cb" stroke-width="3"/>
    <rect x="160" y="60" width="80" height="14" rx="7" fill="#dfe3e9"/>
    <!-- system strip -->
    <rect x="44" y="86" width="312" height="40" rx="8" fill="#f3f6fb"/>
    <circle cx="62" cy="106" r="5" fill="#2e7d32"/>
    <text x="74" y="110" font-size="11" font-weight="600" fill="#2e3a4a">pump · 2.4 m³/h · 3.6 bar</text>
    <!-- diagram full width -->
    <g transform="translate(44,140)"><use href="#diagram"/></g>
    <text x="200" y="900" font-size="10" text-anchor="middle" fill="#9aa3b0">tap any item to inspect →</text>
  </g>

  <!-- ============ PHONE B: item selected, panel overlays ============ -->
  <g>
    <text x="620" y="34" font-size="13" font-weight="700" text-anchor="middle" fill="#333">Z2 tapped — panel slides in over the diagram</text>
    <rect x="450" y="48" width="340" height="880" rx="32" fill="#fff" stroke="#bcc2cb" stroke-width="3"/>
    <rect x="580" y="60" width="80" height="14" rx="7" fill="#dfe3e9"/>
    <rect x="464" y="86" width="312" height="40" rx="8" fill="#f3f6fb"/>
    <circle cx="482" cy="106" r="5" fill="#2e7d32"/>
    <text x="494" y="110" font-size="11" font-weight="600" fill="#2e3a4a">pump · 2.4 m³/h · 3.6 bar</text>
    <!-- same diagram, full width underneath -->
    <clipPath id="phoneB"><rect x="453" y="130" width="334" height="794" rx="6"/></clipPath>
    <g clip-path="url(#phoneB)">
      <g transform="translate(464,140)"><use href="#diagram"/></g>
      <!-- selection ring on Z2 rotor (160,150 in diagram coords -> +464,+140) -->
      <circle cx="624" cy="290" r="21" fill="none" stroke="#2f6fb0" stroke-width="1.5" stroke-dasharray="3 3"/>
      <!-- OVERLAY PANEL docked right, floating over diagram -->
      <g transform="translate(602,130)">
        <rect x="0" y="0" width="185" height="794" fill="#ffffff" filter="url(#shadow)"/>
        <rect x="0" y="0" width="185" height="794" fill="#ffffff"/>
        <!-- close affordance -->
        <text x="170" y="22" font-size="14" text-anchor="end" fill="#aab2bd">✕</text>
        <text x="14" y="26" font-size="13" font-weight="700" fill="#1f2937">Z2 rotor</text>
        <rect x="14" y="36" width="74" height="20" rx="10" fill="#e7f4e8"/>
        <circle cx="28" cy="46" r="4" fill="#2e7d32"/>
        <text x="37" y="50" font-size="10" fill="#2e7d32">watering</text>
        <text x="14" y="72" font-size="8" fill="#9aa3b0">Hunter I-20-04-SS</text>
        <line x1="14" y1="84" x2="171" y2="84" stroke="#e9edf2"/>

        <text x="14" y="104" font-size="8" font-weight="700" letter-spacing="1" fill="#8a93a0">LIVE</text>
        <text x="14" y="124" font-size="11" fill="#444">flow</text>
        <text x="171" y="124" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">1.04</text>
        <rect x="14" y="130" width="157" height="4" rx="2" fill="#e7ebf0"/>
        <rect x="14" y="130" width="125" height="4" rx="2" fill="#9fc0e8"/>
        <text x="14" y="146" font-size="7" fill="#aab2bd">m³/h · span 0.68–1.10</text>

        <text x="14" y="166" font-size="11" fill="#444">pressure</text>
        <text x="171" y="166" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">3.4</text>
        <rect x="14" y="172" width="157" height="4" rx="2" fill="#e7ebf0"/>
        <rect x="14" y="172" width="98" height="4" rx="2" fill="#9fc0e8"/>
        <text x="14" y="188" font-size="7" fill="#aab2bd">bar · working 1.5–4.5</text>

        <text x="14" y="210" font-size="11" fill="#444">throw</text>
        <text x="171" y="210" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">12.2 m</text>
        <text x="14" y="230" font-size="11" fill="#444">precip</text>
        <text x="171" y="230" font-size="11" font-weight="700" text-anchor="end" fill="#1f2937">31 mm/h</text>
        <line x1="14" y1="244" x2="171" y2="244" stroke="#e9edf2"/>

        <text x="14" y="264" font-size="8" font-weight="700" letter-spacing="1" fill="#8a93a0">CONTROLS</text>
        <text x="14" y="286" font-size="11" fill="#444">nozzle</text>
        <rect x="74" y="274" width="97" height="20" rx="10" fill="#f1f4f8" stroke="#d4dae2"/>
        <text x="86" y="288" font-size="11" fill="#2f6fb0">◂</text>
        <text x="122" y="288" font-size="10" text-anchor="middle" fill="#1f2937">BL4.0</text>
        <text x="161" y="288" font-size="11" text-anchor="end" fill="#2f6fb0">▸</text>
        <text x="14" y="316" font-size="11" fill="#444">arc</text>
        <text x="171" y="316" font-size="11" text-anchor="end" fill="#1f2937">170°</text>
        <text x="14" y="330" font-size="7" fill="#aab2bd">↳ set on diagram wedge (U22)</text>
        <text x="14" y="354" font-size="11" fill="#444">flo-stop</text>
        <rect x="135" y="343" width="36" height="18" rx="9" fill="#cfe6d0"/>
        <circle cx="162" cy="352" r="7" fill="#2e7d32"/>
        <line x1="14" y1="376" x2="171" y2="376" stroke="#e9edf2"/>
        <text x="14" y="396" font-size="8" font-weight="700" letter-spacing="1" fill="#8a93a0">IN / OUT</text>
        <text x="14" y="414" font-size="10" fill="#555">in 3.5 bar</text>
        <text x="14" y="430" font-size="10" fill="#555">out 1.04 → 170° fan</text>
      </g>
    </g>
  </g>
</svg>
