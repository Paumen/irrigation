<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" font-family="system-ui, sans-serif">
  <rect width="1120" height="760" fill="#eef0f3"/>
  <text x="560" y="28" font-size="15" font-weight="700" text-anchor="middle" fill="#222">Side panel docked beside the diagram (the diagram is the main view; panel sits to the side)</text>

  <!-- app frame -->
  <rect x="20" y="44" width="1080" height="700" rx="12" fill="#fff" stroke="#cdd2d9" stroke-width="2"/>

  <!-- ================= DIAGRAM (main view, left) ================= -->
  <clipPath id="diag"><rect x="22" y="46" width="736" height="696" rx="10"/></clipPath>
  <g clip-path="url(#diag)">
    <rect x="22" y="46" width="736" height="696" fill="#f4f8ff"/>
    <text x="44" y="74" font-size="11" font-weight="700" letter-spacing="1" fill="#9aa9c4">DIAGRAM</text>

    <!-- wiring band (top) -->
    <rect x="44" y="86" width="690" height="92" rx="6" fill="#fbf7ee" stroke="#e6dcc4"/>
    <text x="56" y="104" font-size="10" fill="#b39a55">wiring</text>
    <rect x="70" y="116" width="70" height="34" rx="4" fill="#fff" stroke="#cbb46a"/>
    <text x="105" y="137" font-size="9" text-anchor="middle" fill="#8a7430">controller</text>
    <line x1="140" y1="133" x2="260" y2="133" stroke="#caa94a" stroke-width="2"/>
    <rect x="260" y="118" width="46" height="30" rx="4" fill="#fff" stroke="#cbb46a"/>
    <text x="283" y="137" font-size="8" text-anchor="middle" fill="#8a7430">relay</text>
    <line x1="306" y1="133" x2="420" y2="133" stroke="#caa94a" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="430" y="137" font-size="9" fill="#c0392b">break</text>
    <line x1="470" y1="133" x2="710" y2="133" stroke="#caa94a" stroke-width="2"/>
    <text x="600" y="168" font-size="9" fill="#b39a55">shared common return →</text>

    <!-- manifold vertical bar -->
    <rect x="70" y="210" width="26" height="430" rx="5" fill="#cfe0f5" stroke="#7fa0d8"/>
    <text x="83" y="660" font-size="9" text-anchor="middle" fill="#5a6b8c">manifold</text>

    <!-- zone rows -->
    <!-- Z2 (selected) -->
    <line x1="96" y1="250" x2="260" y2="250" stroke="#3a78c8" stroke-width="5"/>
    <rect x="160" y="238" width="30" height="24" rx="4" fill="#dff0ff" stroke="#3a78c8"/>
    <text x="175" y="254" font-size="8" text-anchor="middle" fill="#2f6fb0">V2</text>
    <circle cx="320" cy="250" r="15" fill="#bfe0c0" stroke="#2e7d32" stroke-width="3"/>
    <text x="320" y="254" font-size="11" text-anchor="middle" fill="#1f5e22">⟳</text>
    <circle cx="380" cy="232" r="10" fill="#cfeccf" stroke="#2e7d32"/>
    <circle cx="380" cy="268" r="10" fill="#cfeccf" stroke="#2e7d32"/>
    <text x="262" y="244" font-size="9" fill="#3a78c8">Z2 ●</text>

    <!-- Z3 -->
    <line x1="96" y1="330" x2="250" y2="330" stroke="#9fb4cf" stroke-width="3"/>
    <rect x="160" y="318" width="30" height="24" rx="4" fill="#eef2f7" stroke="#9fb4cf"/>
    <text x="175" y="334" font-size="8" text-anchor="middle" fill="#8a93a0">V3</text>
    <circle cx="300" cy="330" r="11" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="340" cy="330" r="11" fill="#e7ebf0" stroke="#9fb4cf"/>
    <text x="200" y="324" font-size="9" fill="#9aa3b0">Z3</text>

    <!-- Z4 -->
    <line x1="96" y1="410" x2="250" y2="410" stroke="#9fb4cf" stroke-width="3"/>
    <rect x="160" y="398" width="30" height="24" rx="4" fill="#eef2f7" stroke="#9fb4cf"/>
    <text x="175" y="414" font-size="8" text-anchor="middle" fill="#8a93a0">V4</text>
    <circle cx="290" cy="410" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="324" cy="410" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="358" cy="410" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="392" cy="410" r="9" fill="#e7ebf0" stroke="#9fb4cf"/>
    <text x="200" y="404" font-size="9" fill="#9aa3b0">Z4</text>

    <!-- Z5 -->
    <line x1="96" y1="490" x2="250" y2="490" stroke="#9fb4cf" stroke-width="3"/>
    <rect x="160" y="478" width="30" height="24" rx="4" fill="#eef2f7" stroke="#9fb4cf"/>
    <text x="175" y="494" font-size="8" text-anchor="middle" fill="#8a93a0">V5</text>
    <circle cx="300" cy="490" r="11" fill="#e7ebf0" stroke="#9fb4cf"/>
    <circle cx="340" cy="490" r="11" fill="#e7ebf0" stroke="#9fb4cf"/>
    <text x="200" y="484" font-size="9" fill="#9aa3b0">Z5</text>

    <!-- Z1 manual -->
    <line x1="96" y1="560" x2="240" y2="560" stroke="#9fb4cf" stroke-width="3"/>
    <rect x="160" y="550" width="26" height="20" rx="3" fill="#eef2f7" stroke="#9fb4cf"/>
    <text x="173" y="564" font-size="7" text-anchor="middle" fill="#8a93a0">man</text>
    <text x="200" y="554" font-size="9" fill="#9aa3b0">Z1 manual</text>

    <!-- Z6 cap -->
    <line x1="96" y1="610" x2="150" y2="610" stroke="#9fb4cf" stroke-width="3"/>
    <text x="158" y="614" font-size="9" fill="#9aa3b0">Z6 ✕ cap</text>

    <!-- supply chain bottom -->
    <line x1="70" y1="690" x2="710" y2="690" stroke="#7fa0d8" stroke-width="4"/>
    <circle cx="120" cy="690" r="8" fill="#cfe0f5" stroke="#7fa0d8"/>
    <rect x="300" y="678" width="40" height="24" rx="4" fill="#cfe0f5" stroke="#7fa0d8"/>
    <text x="320" y="694" font-size="8" text-anchor="middle" fill="#5a6b8c">pump</text>
    <text x="120" y="716" font-size="8" text-anchor="middle" fill="#5a6b8c">well</text>
    <text x="640" y="694" font-size="9" fill="#5a6b8c">supply chain</text>

    <!-- selection ring callout -->
    <circle cx="320" cy="250" r="26" fill="none" stroke="#2f6fb0" stroke-width="1.5" stroke-dasharray="3 3"/>
  </g>
  <line x1="758" y1="46" x2="758" y2="742" stroke="#cdd2d9" stroke-width="2"/>

  <!-- ================= SIDE PANEL (right, docked) ================= -->
  <g transform="translate(758,46)">
    <rect x="0" y="0" width="342" height="696" fill="#fff"/>
    <rect x="0" y="0" width="342" height="696" fill="#fafbfc"/>

    <!-- SYSTEM strip -->
    <text x="22" y="34" font-size="10" font-weight="700" letter-spacing="1" fill="#8a93a0">SYSTEM</text>
    <circle cx="24" cy="54" r="5" fill="#2e7d32"/>
    <text x="36" y="58" font-size="12" fill="#333">pump running · primed</text>
    <text x="22" y="80" font-size="12" fill="#555">2.4 m³/h · 3.6 bar at manifold</text>
    <line x1="18" y1="96" x2="324" y2="96" stroke="#e9edf2"/>

    <!-- selected item -->
    <text x="22" y="122" font-size="15" font-weight="700" fill="#1f2937">Z2 · rotor</text>
    <text x="22" y="139" font-size="10" fill="#9aa3b0">Hunter I-20-04-SS</text>
    <rect x="244" y="108" width="80" height="22" rx="11" fill="#e7f4e8"/>
    <circle cx="260" cy="119" r="4" fill="#2e7d32"/>
    <text x="270" y="123" font-size="11" fill="#2e7d32">watering</text>

    <!-- live values -->
    <text x="22" y="168" font-size="10" font-weight="700" letter-spacing="1" fill="#8a93a0">LIVE  (vs catalog range)</text>
    <text x="22" y="192" font-size="12" fill="#444">flow</text>
    <text x="324" y="192" font-size="12" font-weight="700" text-anchor="end" fill="#1f2937">1.04 m³/h</text>
    <rect x="22" y="200" width="302" height="6" rx="3" fill="#e7ebf0"/>
    <rect x="22" y="200" width="242" height="6" rx="3" fill="#9fc0e8"/>
    <text x="22" y="220" font-size="9" fill="#9aa3b0">BL4.0 span 0.68–1.10 m³/h</text>

    <text x="22" y="246" font-size="12" fill="#444">pressure</text>
    <text x="324" y="246" font-size="12" font-weight="700" text-anchor="end" fill="#1f2937">3.4 bar</text>
    <rect x="22" y="254" width="302" height="6" rx="3" fill="#e7ebf0"/>
    <rect x="22" y="254" width="188" height="6" rx="3" fill="#9fc0e8"/>
    <text x="22" y="274" font-size="9" fill="#9aa3b0">working 1.5–4.5 bar</text>

    <text x="22" y="300" font-size="12" fill="#444">throw · precip</text>
    <text x="324" y="300" font-size="12" font-weight="700" text-anchor="end" fill="#1f2937">12.2 m · 31 mm/h</text>

    <line x1="18" y1="320" x2="324" y2="320" stroke="#e9edf2"/>

    <!-- controls -->
    <text x="22" y="344" font-size="10" font-weight="700" letter-spacing="1" fill="#8a93a0">CONTROLS</text>
    <text x="22" y="370" font-size="12" fill="#444">nozzle</text>
    <rect x="198" y="356" width="126" height="22" rx="11" fill="#f1f4f8" stroke="#d4dae2"/>
    <text x="214" y="371" font-size="13" fill="#2f6fb0">◂</text>
    <text x="261" y="371" font-size="12" text-anchor="middle" fill="#1f2937">BL4.0</text>
    <text x="308" y="371" font-size="13" text-anchor="end" fill="#2f6fb0">▸</text>

    <text x="22" y="404" font-size="12" fill="#444">arc</text>
    <text x="324" y="404" font-size="12" text-anchor="end" fill="#1f2937">170°</text>
    <text x="22" y="420" font-size="9" fill="#9aa3b0">↳ drag the wedge in the diagram (U22)</text>

    <text x="22" y="448" font-size="12" fill="#444">flo-stop</text>
    <rect x="280" y="436" width="44" height="22" rx="11" fill="#cfe6d0"/>
    <circle cx="313" cy="447" r="9" fill="#2e7d32"/>
    <text x="250" y="452" font-size="10" text-anchor="end" fill="#8a93a0">open</text>

    <line x1="18" y1="476" x2="324" y2="476" stroke="#e9edf2"/>
    <text x="22" y="500" font-size="10" font-weight="700" letter-spacing="1" fill="#8a93a0">IN / OUT</text>
    <text x="22" y="524" font-size="12" fill="#555">in  3.5 bar (riser)</text>
    <text x="22" y="544" font-size="12" fill="#555">out 1.04 m³/h → 170° fan</text>
  </g>
</svg>
