<svg xmlns="http://www.w3.org/2000/svg" width="820" height="660" font-family="system-ui, sans-serif">
  <rect width="820" height="660" fill="#f7f8fa"/>
  <text x="410" y="30" font-size="16" font-weight="700" text-anchor="middle" fill="#222">U8 tension — where do the numbers live on a phone? (pick one to react to)</text>

  <!-- OPTION A: split -->
  <g transform="translate(70,60)">
    <text x="150" y="-8" font-size="14" font-weight="700" text-anchor="middle" fill="#333">A — Split: diagram top, panel below</text>
    <rect x="0" y="0" width="300" height="540" rx="26" fill="#fff" stroke="#cfd4da" stroke-width="3"/>
    <!-- diagram region -->
    <rect x="14" y="16" width="272" height="300" rx="8" fill="#eef3ff" stroke="#b9c6e6"/>
    <text x="150" y="30" font-size="10" text-anchor="middle" fill="#5a6b8c">DIAGRAM (everything, cramped to ~55%)</text>
    <!-- crude schematic strokes -->
    <line x1="30" y1="120" x2="270" y2="120" stroke="#7fa0d8" stroke-width="3"/>
    <line x1="150" y1="120" x2="150" y2="170" stroke="#7fa0d8" stroke-width="3"/>
    <circle cx="60" cy="170" r="9" fill="#a9d3a9"/><circle cx="110" cy="170" r="9" fill="#a9d3a9"/>
    <circle cx="190" cy="170" r="9" fill="#a9d3a9"/><circle cx="240" cy="170" r="9" fill="#a9d3a9"/>
    <line x1="30" y1="210" x2="270" y2="210" stroke="#c2b27f" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="150" y="300" font-size="9" text-anchor="middle" fill="#99879c">11 heads + manifold + full wiring fight for this box</text>
    <!-- panel region -->
    <rect x="14" y="326" width="272" height="200" rx="8" fill="#fafbfc" stroke="#d8dde3"/>
    <text x="24" y="346" font-size="10" font-weight="700" fill="#444">PANEL (numbers, ~40%)</text>
    <g font-size="10" fill="#555">
      <text x="24" y="368">Z2 rotor BL4.0 · 1.04 m³/h · 12.2 m</text>
      <text x="24" y="386">Z2 spray MP3000 · 0.62 m³/h</text>
      <text x="24" y="404">pump 2.4 m³/h · 3.6 bar · primed</text>
      <text x="24" y="422">manifold 11.2 m · 3.4 bar</text>
      <text x="24" y="440">— tap an item to focus —</text>
    </g>
    <text x="150" y="500" font-size="9" text-anchor="middle" fill="#2e7d32">+ both always visible, no mode</text>
    <text x="150" y="516" font-size="9" text-anchor="middle" fill="#c0392b">− diagram squeezed; "beside" became "below"</text>
  </g>

  <!-- OPTION B: full-bleed + sheet -->
  <g transform="translate(450,60)">
    <text x="150" y="-8" font-size="14" font-weight="700" text-anchor="middle" fill="#333">B — Full diagram + tap-up sheet</text>
    <rect x="0" y="0" width="300" height="540" rx="26" fill="#fff" stroke="#cfd4da" stroke-width="3"/>
    <!-- diagram fills -->
    <rect x="14" y="16" width="272" height="510" rx="8" fill="#eef3ff" stroke="#b9c6e6"/>
    <text x="150" y="32" font-size="10" text-anchor="middle" fill="#5a6b8c">DIAGRAM (full height — the main view)</text>
    <line x1="30" y1="120" x2="270" y2="120" stroke="#7fa0d8" stroke-width="3"/>
    <line x1="150" y1="120" x2="150" y2="190" stroke="#7fa0d8" stroke-width="3"/>
    <circle cx="60" cy="200" r="11" fill="#a9d3a9"/><circle cx="110" cy="200" r="11" fill="#a9d3a9"/>
    <circle cx="190" cy="200" r="11" fill="#a9d3a9"/><circle cx="240" cy="200" r="11" fill="#a9d3a9"/>
    <line x1="30" y1="260" x2="270" y2="260" stroke="#c2b27f" stroke-width="2" stroke-dasharray="4 3"/>
    <line x1="30" y1="300" x2="270" y2="300" stroke="#7fa0d8" stroke-width="3"/>
    <!-- bottom sheet overlay -->
    <rect x="14" y="400" width="272" height="126" rx="12" fill="#ffffff" stroke="#b9c6e6" stroke-width="2" opacity="0.97"/>
    <rect x="135" y="408" width="30" height="4" rx="2" fill="#cbd2da"/>
    <text x="24" y="432" font-size="10" font-weight="700" fill="#444">Z2 rotor — tapped</text>
    <g font-size="10" fill="#555">
      <text x="24" y="452">1.04 m³/h · 12.2 m throw · 31 mm/h</text>
      <text x="24" y="470">nozzle BL4.0 ▸ · arc 170° ▸</text>
      <text x="24" y="488">watering ●</text>
    </g>
    <text x="150" y="514" font-size="9" text-anchor="middle" fill="#2e7d32">+ diagram stays primary (U8); sheet on demand</text>
  </g>

  <text x="410" y="630" font-size="10" text-anchor="middle" fill="#666">Spec says panel "beside" the diagram (U8). On portrait, beside ≈ impossible — A puts it below, B makes it an on-tap sheet. Which is the intent?</text>
</svg>
