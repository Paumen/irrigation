<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Soil-Balance — Wijchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E7E4DA; --ink:#3A352C; --faint:#8a8270;
    --surface:#5A4A33;
    /* UI chrome */
    --card:#FBFAF6; --line:#E0DBCD; --water:#1FA6BE;
    /* warm-accent palette — one tone per meaning */
    --today:#4F6B4A; --amber:#D98A2B; --rust:#B5471F;
    --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans: ui-sans-serif,"Inter","Segoe UI",system-ui,sans-serif;
    --serif: "Newsreader",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-text-size-adjust:100%}
  .key{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;
    font-family:var(--mono);font-size:12px;letter-spacing:.02em;color:var(--ink);padding:12px 12px 4px}
  .key b{color:var(--ink);font-weight:600;letter-spacing:.08em;text-transform:lowercase}
  .key span{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .sw{width:13px;height:13px;border-radius:6px;display:inline-block}
  .scene{position:relative;width:auto;margin:0}
  .axis{position:absolute;top:0;left:0;width:44px;height:100%;background:var(--card);z-index:3;pointer-events:none;
    border-right:1px solid var(--line)}
  .axis .lbl{position:absolute;left:3px;font-family:var(--mono);font-size:12px;color:var(--ink);letter-spacing:.02em;white-space:nowrap}
  .axis .tick{position:absolute;right:0;width:4px;border-top:1px solid var(--line)}
  .axis .water{color:var(--water)}
  .scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}
  /* always-visible custom scrollbar (native bars auto-hide on mobile) */
  .sbar{position:relative;height:9px;margin:8px 12px 0;background:var(--bg);border-radius:6px;touch-action:none}
  .sthumb{position:absolute;top:0;bottom:0;left:0;width:40px;min-width:28px;background:var(--faint);border-radius:6px;cursor:grab}
  .sthumb:active{cursor:grabbing;background:var(--faint)}
  svg{display:block;transition:opacity .7s ease}
  .grow{transition:transform .8s cubic-bezier(.2,.8,.2,1),opacity .7s ease}
  .booting svg{opacity:0}
  .booting .grow{transform:translateY(10px);opacity:0}
  @media (prefers-reduced-motion: reduce){
    svg,.grow{transition:none!important}.booting svg{opacity:1}.booting .grow{transform:none;opacity:1}
  }
  /* ===== app shell ===== */
  header.app{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 12px 12px}
  header.app h1{margin:0;font-size:20px;font-weight:600;letter-spacing:0;color:var(--today);display:flex;align-items:center;gap:8px}
  header.app .loc{font-family:var(--mono);font-size:12px;color:var(--faint);letter-spacing:.02em}
  .board{position:relative}
  /* ===== status headline (improvement #1) ===== */
  .status{margin:4px 12px 12px;padding:13px 20px 14px;background:var(--card);border:1px solid var(--bg);border-radius:18px}
  .status .kick{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .status .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
  .status .word{font-family:var(--serif);font-size:26px;font-weight:500;letter-spacing:0;line-height:1.1;margin-top:6px}
  .status .detail{font-size:14px;color:var(--ink);margin-top:8px;line-height:1.4}
  .status .metric{margin-top:10px;padding-top:10px;border-top:1px solid var(--bg)}
  .status .pct{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:0}
  .status .sub{font-size:12px;color:var(--faint)}
  .status .bar{position:relative;height:8px;background:var(--bg);border-radius:6px;margin-top:10px}
  .status .fill{position:absolute;top:0;bottom:0;left:0;border-radius:6px}
  .status .mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--rust)}
  .status .rfl{position:relative;height:13px}
  .status .rfl span{position:absolute;transform:translateX(-50%);font-family:var(--mono);font-size:12px;color:var(--rust);font-weight:700;top:1px;white-space:nowrap}
  .view{display:none}
  body[data-state="ok"] .view-ok{display:block}
  .view-loading,.view-error{flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;min-height:260px;padding:32px 24px}
  body[data-state="loading"] .view-loading{display:flex}
  body[data-state="error"] .view-error{display:flex}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--water);border-radius:50%;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .view-loading p,.view-error p{margin:0;font-family:var(--mono);font-size:12px;color:var(--faint);max-width:270px;line-height:1.65}
  .view-error .icon{width:38px;height:38px;border-radius:50%;background:var(--bg);color:var(--rust);display:grid;place-items:center;font-size:20px;font-weight:700}
  .view-error h2{margin:0;font-size:14px;color:var(--rust);font-weight:600}
  .btn{appearance:none;cursor:pointer;border:1px solid var(--today);background:var(--today);color:var(--card);font-family:var(--sans);font-size:14px;font-weight:600;line-height:1.1;padding:8px 16px;border-radius:999px}
  /* ===== controls — compact settings list: label left, connected segmented control right ===== */
  .controls{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);border-radius:14px;margin:10px 8px 18px;padding:2px 11px}
  .ctl{display:grid;grid-template-columns:auto 1fr;align-items:center;gap:9px 10px;padding:9px 0}
  .ctl + .ctl{border-top:1px solid var(--line)}
  .ctl .seg,.ctl .dur{justify-self:end}
  .ctl .lab{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
  /* segmented control — iOS sliding-thumb: active option rides a raised pill on an inset track (weight, not inversion) */
  .seg{display:inline-flex;gap:2px;padding:3px;border:1px solid var(--line);border-radius:999px;background:var(--line)}
  .seg button{appearance:none;cursor:pointer;border:0;background:transparent;color:var(--faint);font-family:var(--sans);font-size:13px;padding:5px 11px;line-height:1.1;border-radius:999px;white-space:nowrap;transition:.15s}
  .seg button:hover{color:var(--ink)}
  .seg button[aria-pressed="true"]{color:var(--today);font-weight:700;background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.18)}
  .dur{display:inline-flex;align-items:stretch;border:1px solid var(--line);border-radius:999px;background:var(--card);overflow:hidden}
  .dur button{appearance:none;cursor:pointer;width:34px;border:0;background:transparent;font-size:17px;color:var(--ink);display:grid;place-items:center;transition:.15s}
  .dur button:hover{color:var(--today);background:var(--line)}
  .dur .val{min-width:70px;padding:5px 0;border-left:1px solid var(--line);border-right:1px solid var(--line);display:flex;align-items:baseline;justify-content:center;gap:4px;font-family:var(--mono);color:var(--ink)}
  .dur .val b{font-size:14px;font-weight:600}.dur .val span{color:var(--faint);font-size:11px}
  .dur-hint{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:2px}
  /* ===== footer ===== */
  .app-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:12px 12px 24px;border-top:1px solid var(--line);margin-top:12px}
  .app-foot .coords{font-family:var(--mono);font-size:12px;color:var(--faint);letter-spacing:.02em}
  @media(min-width:560px){ .ctl .lab{min-width:132px;flex:none} }
</style>
</head>
<body class="booting" data-state="ok">
  <header class="app">
    <h1>Soil-Balance</h1>
    <span class="loc" id="locline">Flower bed · Wijchen</span>
  </header>
  <main>
    <div id="status" class="status"></div>
    <div class="board">
      <div class="view view-ok">
  <div class="scene" id="scene">
    <div class="scroll" id="scroll"></div>
  </div>

  <div class="sbar" id="sbar"><div class="sthumb" id="sthumb"></div></div>

  <div class="key">
    <span><i class="sw" style="background:linear-gradient(#E2965A,#B5471F)"></i>loss</span>
    <span><i class="sw" style="background:#3F7FA0"></i>rain</span>
    <span><i class="sw" style="background:#34BCD2"></i>watering</span>
    <span><i class="sw" style="background:linear-gradient(#34BCD2,#0C6478)"></i>water held</span>
  </div>

      </div><!-- /board -->

    <section class="controls">
      <div class="ctl"><div class="lab">Planting</div>
        <div class="seg" data-group="planting">
          <button>Turf</button>
          <button aria-pressed="true">Flower bed</button>
          <button>Shrubs</button>
        </div></div>
      <div class="ctl"><div class="lab">Soil</div>
        <div class="seg" data-group="soil">
          <button>Sand</button>
          <button aria-pressed="true">Sandy loam</button>
          <button>Loam</button>
          <button>Clay</button>
        </div></div>
      <div class="ctl"><div class="lab">Exposure</div>
        <div class="seg" data-group="sun">
          <button>Shade</button>
          <button>Half sun</button>
          <button aria-pressed="true">Full sun</button>
        </div></div>
      <div class="ctl"><div class="lab">Duration</div>
        <div class="dur">
          <button onclick="bumpDur(-15)" aria-label="less">−</button>
          <div class="val"><b id="durVal">60</b><span>min</span></div>
          <button onclick="bumpDur(15)" aria-label="more">+</button>
        </div>

      </div>
    </section>

  </main>


<script>
const TANK=39, DOSE=3.78, START=39, TODAY="2026-06-21";
const REFILL=TANK*0.5;        // refill point: water before plant-available water drops below this
const SVGMONO="ui-monospace,Menlo,Consolas,monospace";

// drivers: idx,date,wd,tmax,et0,rain
const RAW=[
 [4,"2026-06-11","Thu",16.6,2.53,5.3],[5,"2026-06-12","Fri",19.2,0.85,5.1],
 [6,"2026-06-13","Sat",17.4,2.69,0.3],[7,"2026-06-14","Sun",17.6,3.60,0.2],
 [8,"2026-06-15","Mon",19.0,3.19,0.0],[9,"2026-06-16","Tue",23.5,4.24,0.1],
 [10,"2026-06-17","Wed",23.8,2.90,0.2],[11,"2026-06-18","Thu",29.2,5.50,0.0],
 [12,"2026-06-19","Fri",33.7,5.62,3.4],[13,"2026-06-20","Sat",28.9,5.62,3.4],
 [14,"2026-06-21","Sun",29.7,5.39,0.0],[15,"2026-06-22","Mon",30.4,6.44,0.0],
 [16,"2026-06-23","Tue",27.2,5.62,0.0],[17,"2026-06-24","Wed",31.7,5.78,0.0],
 [18,"2026-06-25","Thu",33.5,6.42,0.0],[19,"2026-06-26","Fri",36.0,6.66,0.0],
 [20,"2026-06-27","Sat",31.4,5.65,1.8],[21,"2026-06-28","Sun",29.0,5.85,0.0],
 [22,"2026-06-29","Mon",32.6,5.89,3.6],[23,"2026-06-30","Tue",24.6,2.80,10.5],
 [24,"2026-07-01","Wed",18.1,1.42,18.3],[25,"2026-07-02","Thu",20.8,4.06,1.8],
 [26,"2026-07-03","Fri",19.8,3.66,2.4],[27,"2026-07-04","Sat",19.4,2.97,3.0],
 [28,"2026-07-05","Sun",29.2,5.98,0.0],
];
// sample watering plan (minutes) — edit/remove freely; levels recompute
let WATER_MIN=60;                            // a tap adds this many minutes (duration control)
let plan={7:WATER_MIN, 11:WATER_MIN};        // user-editable: day index -> minutes

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const ease=t=>t<0?0:t>1?1:t*t*(3-2*t);
// forward water balance from the current plan
function computeData(){
  let prev=START;
  return RAW.map((r,idx)=>{
    const [,date,wd,tmax,et0,rain]=r;
    const loss=0.9*et0, gain=0.8*rain, mins=plan[idx]||0, appMm=(mins/60)*DOSE;
    const level=clamp(prev - loss + gain + appMm, 0, TANK); prev=level;
    return {idx,date,wd,tmax,et0,rain,loss,gain,mins,appMm,level};
  });
}
let DATA=computeData();

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hx(c){c=c.replace('#','');return[parseInt(c.slice(0,2),16),parseInt(c.slice(2,4),16),parseInt(c.slice(4,6),16)];}
function hexLerp(a,b,t){const A=hx(a),B=hx(b);const m=i=>Math.round(lerp(A[i],B[i],clamp(t,0,1)));return`rgb(${m(0)},${m(1)},${m(2)})`;}
function ramp(stops,v){v=clamp(v,0,1);for(let i=0;i<stops.length-1;i++){const[p0,c0]=stops[i],[p1,c1]=stops[i+1];if(v<=p1){const t=(v-p0)/((p1-p0)||1);return hexLerp(c0,c1,t);}}return stops[stops.length-1][1];}
const rootColor =v=>ramp([[0,'#2A2620'],[0.10,'#56422E'],[0.30,'#8A6A3E'],[0.60,'#7E8A3E'],[1,'#4F7F4A']],v);
const plantColor=v=>ramp([[0,'#3A352C'],[0.10,'#9A7A3C'],[0.25,'#7E8A3E'],[0.55,'#4F7F4A'],[1,'#3F7A3B']],v);
const leafColor =v=>ramp([[0,'#67563C'],[0.25,'#9C8A45'],[0.6,'#6FA06A'],[1,'#5F9A5A']],v);
const sunCore   =h=>ramp([[0,'#E2965A'],[0.5,'#C25A2A'],[1,'#9E3712']],h);
function skyColor(t){return 'var(--bg)';}
function smooth(pts){if(pts.length<2)return'';let d=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6;const c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;}return d;}

/* geometry */
const H=380, SKY_TOP=20, SURF=160, SOIL_BOT=344, SOIL_D=SOIL_BOT-SURF;
const AX=0, PADR=12, ROOT_REACH=SOIL_D*0.5; // roots only reach halfway, fixed
// soil horizons (offset from SURF): litter, topsoil A, subsoil B, substratum C
function shade(hex,f){const[r,g,b]=hx(hex),m=v=>clamp(Math.round(v*f),0,255).toString(16).padStart(2,'0');return`#${m(r)}${m(g)}${m(b)}`;}
const HORIZ=[
  {y0:0,   y1:12,  fill:'#67563C', spn:0.9, peb:0},     // litter (dark organic)
  {y0:12,  y1:60,  fill:'#AC8856', spn:0.7, peb:0},     // topsoil A (warm loam)
  {y0:60,  y1:128, fill:'#8C5E3C', spn:0.55,peb:0.05},  // subsoil B (red-brown clay)
  {y0:128, y1:SOIL_D, fill:'#C6B488', spn:0.42,peb:0.12},// substratum C (pale sandy/gravel)
];
// edge line + mineral speckle are derived as darker shades of each horizon fill
HORIZ.forEach(h=>{h.edge=shade(h.fill,0.70); h.sp=shade(h.fill,0.82);});

function build(){
  const vw=Math.min(window.innerWidth,920);
  const dayW=clamp((vw-AX-PADR)/9,36,94);
  const N=DATA.length, W=AX+N*dayW+PADR;
  const cx=i=>AX+dayW*(i+0.5);
  const tableY=lv=>SOIL_BOT-(clamp(lv,0,TANK)/TANK)*SOIL_D;
  const todayIdx=DATA.findIndex(d=>d.date===TODAY);
  const R=(W-PADR);
  const refillY=tableY(REFILL);

  let defs=`
    <linearGradient id="aqua" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34BCD2" stop-opacity=".55"/>
      <stop offset="1" stop-color="#0C6478" stop-opacity=".82"/></linearGradient>
    <linearGradient id="fringe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34BCD2" stop-opacity="0"/>
      <stop offset="1" stop-color="#34BCD2" stop-opacity=".34"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E0A074" stop-opacity=".85"/>
      <stop offset="1" stop-color="#E0A074" stop-opacity="0"/></radialGradient>
    <linearGradient id="pour" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34BCD2" stop-opacity=".5"/>
      <stop offset="1" stop-color="#1FA6BE" stop-opacity=".16"/></linearGradient>
    <linearGradient id="wetE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34BCD2" stop-opacity=".34"/>
      <stop offset="0.55" stop-color="#34BCD2" stop-opacity=".2"/>
      <stop offset="1" stop-color="#34BCD2" stop-opacity=".06"/></linearGradient>`;

  /* sky + sun + rain + watering */
  let sky='',weather='',surfaceFx='',btns='';
  DATA.forEach(d=>{
    const x0=cx(d.idx)-dayW/2, heat=clamp((d.tmax-15)/(36-15),0,1);
    sky+=`<rect x="${x0.toFixed(1)}" y="${SKY_TOP}" width="${dayW.toFixed(1)}" height="${SURF-SKY_TOP}" fill="${skyColor(d.tmax)}"/>`;
    // heat shimmer on extreme days
    if(heat>0.78){
      const sc=hexLerp('#B5471F','#C25A2A',0.5);
      for(let s=0;s<3;s++){const yy=SKY_TOP+40+s*7;let p=`M ${x0+dayW*0.16} ${yy}`;for(let k=1;k<=5;k++){p+=` Q ${(x0+dayW*(0.16+0.14*k)-dayW*0.07).toFixed(1)} ${(yy+(k%2?-2.4:2.4)).toFixed(1)} ${(x0+dayW*(0.16+0.14*k)).toFixed(1)} ${yy}`;}
        weather+=`<path d="${p}" fill="none" stroke="${sc}" stroke-width="0.7" opacity="${(0.16-s*0.04).toFixed(2)}"/>`;}
    }
    // sun (saturated, punchy)
    const si=clamp((d.et0-1)/(6.5-1),0,1);
    if(si>0.04){
      const sx=x0+dayW*0.5, sy=SKY_TOP+24, rad=lerp(2.5,7.5,si), core=sunCore(heat);
      const gw=rad*lerp(2.1,3.4,heat);
      let rays='';const nr=Math.round(lerp(4,10,si));
      for(let k=0;k<nr;k++){const a=k/nr*Math.PI*2,r1=rad+2,r2=rad+lerp(2,9.5,si);
        rays+=`<line x1="${(sx+Math.cos(a)*r1).toFixed(1)}" y1="${(sy+Math.sin(a)*r1).toFixed(1)}" x2="${(sx+Math.cos(a)*r2).toFixed(1)}" y2="${(sy+Math.sin(a)*r2).toFixed(1)}" stroke="${core}" stroke-width="${lerp(0.7,1.7,si).toFixed(2)}" stroke-linecap="round"/>`;}
      weather+=`<g opacity="0.92">`
        +`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${gw.toFixed(1)}" fill="url(#glow)" opacity="${(0.2+heat*0.34).toFixed(2)}"/>`
        +rays
        +`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${rad.toFixed(1)}" fill="${core}" stroke="#9E3712" stroke-width="0.8"/></g>`;
    }
    // rain
    if(d.rain>0.05){
      const rng=mulberry32(900+d.idx), strands=Math.round(clamp(d.rain/1.0,3,16));
      let rg='';
      for(let k=0;k<strands;k++){const rx=x0+lerp(dayW*0.06,dayW*0.72,rng()),ry=SKY_TOP+lerp(26,165,rng());
        const len=lerp(10,22,Math.sqrt(clamp(d.rain/18,0,1)))*(0.7+rng()*0.6);
        rg+=`<line x1="${rx.toFixed(1)}" y1="${ry.toFixed(1)}" x2="${(rx-2.5).toFixed(1)}" y2="${(ry+len).toFixed(1)}" stroke="#3F7FA0" stroke-width="1.5" stroke-linecap="round" opacity="${(0.5+0.4*clamp(d.rain/12,0,1)).toFixed(2)}"/>`;}
      weather+=`<g class="grow" style="transition-delay:${d.idx*8}ms">${rg}</g>`;
    }
    // watering — a single droplet icon floats above the column; wet earth shows below (soil loop)
    if(d.mins>0){
      const dx=cx(d.idx), dy=SURF-60, dr=clamp(dayW*0.15,6,9);
      weather+=`<g class="grow" style="transition-delay:${d.idx*8}ms">${dropIcon(dx,dy,dr)}</g>`;
    }
  });

  /* soil horizons + texture */
  let soil=`<rect x="${AX}" y="${SURF}" width="${(R-AX).toFixed(1)}" height="${SOIL_D}" fill="${HORIZ[1].fill}"/>`;
  HORIZ.forEach((h,hi)=>{
    soil+=`<rect x="${AX}" y="${(SURF+h.y0).toFixed(1)}" width="${(R-AX).toFixed(1)}" height="${(h.y1-h.y0).toFixed(1)}" fill="${h.fill}"/>`;
    soil+=`<line x1="${AX}" y1="${(SURF+h.y0).toFixed(1)}" x2="${R.toFixed(1)}" y2="${(SURF+h.y0).toFixed(1)}" stroke="${h.edge}" stroke-width="0.6" opacity=".5"/>`;
    // mineral speckle
    const rng=mulberry32(40+hi), band=h.y1-h.y0, step=14;
    for(let x=AX+4;x<R-2;x+=step){
      if(rng()>h.spn) continue;
      const px=x+(rng()-0.5)*step, py=SURF+h.y0+rng()*band, r=lerp(0.5,1.4,rng());
      soil+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${r.toFixed(1)}" fill="${h.sp}" opacity="${(0.18+rng()*0.22).toFixed(2)}"/>`;
    }
    // pebbles
    if(h.peb>0){for(let x=AX+6;x<R-4;x+=26){if(rng()>h.peb*8)continue;const px=x+(rng()-0.5)*20,py=SURF+h.y0+lerp(0.2,0.8,rng())*band,rr=lerp(1.6,3.2,rng());
      soil+=`<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${rr.toFixed(1)}" ry="${(rr*0.7).toFixed(1)}" fill="${h.sp}" opacity=".5"/><ellipse cx="${(px-rr*0.3).toFixed(1)}" cy="${(py-rr*0.3).toFixed(1)}" rx="${(rr*0.4).toFixed(1)}" ry="${(rr*0.28).toFixed(1)}" fill="#FBFAF6" opacity=".12"/>`;}}
  });

  /* aquifer + capillary fringe + table + surface */
  const tablePts=[{x:AX,y:tableY(DATA[0].level)}];
  DATA.forEach(d=>tablePts.push({x:cx(d.idx),y:tableY(d.level)}));
  tablePts.push({x:R,y:tableY(DATA[N-1].level)});
  const tline=smooth(tablePts);
  const aqua=`${tline} L ${R.toFixed(1)} ${SOIL_BOT} L ${AX} ${SOIL_BOT} Z`;
  // fringe band (above table, ~16px, clipped to soil)
  const FR=16, fringeTop=tablePts.map(p=>({x:p.x,y:Math.max(SURF,p.y-FR)}));
  const fringe=`${smooth(tablePts)} L ${R.toFixed(1)} ${fringeTop[fringeTop.length-1].y.toFixed(1)} ${smoothRev(fringeTop)} Z`;
  soil+=`<path d="${aqua}" fill="url(#aqua)"/>`
     +`<path d="${fringe}" fill="url(#fringe)" opacity=".8"/>`;
  DATA.forEach(d=>{ if(d.mins>0) soil+=wetCol(cx(d.idx)-dayW/2, dayW, SURF); });
  soil+=`<path d="${tline}" fill="none" stroke="#1FA6BE" stroke-width="2.2"/>`
     +`<path d="${tline}" fill="none" stroke="#BDEAF1" stroke-width="0.8" opacity=".6"/>`;
  // sediment lines within saturated zone (subtle horizontal strata in water)
  // surface
  const surfPts=[{x:AX,y:SURF}];DATA.forEach(d=>{const j=(mulberry32(7+d.idx)()-0.5)*2.6;surfPts.push({x:cx(d.idx),y:SURF+j});});surfPts.push({x:R,y:SURF});
  soil+=`<path d="${smooth(surfPts)}" fill="none" stroke="var(--surface)" stroke-width="2.4"/>`
     +`<line x1="${AX}" y1="${refillY.toFixed(1)}" x2="${R.toFixed(1)}" y2="${refillY.toFixed(1)}" stroke="#FBFAF6" stroke-width="4.6" opacity="0.5"/>`
     +`<line x1="${AX}" y1="${refillY.toFixed(1)}" x2="${R.toFixed(1)}" y2="${refillY.toFixed(1)}" stroke="var(--rust)" stroke-width="2.8" stroke-dasharray="8 5"/>`
     +`<rect x="${(AX+3).toFixed(1)}" y="${(refillY-16).toFixed(1)}" width="40" height="14" rx="3" fill="var(--rust)"/>`
     +`<text x="${(AX+23).toFixed(1)}" y="${(refillY-9).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-family="${SVGMONO}" font-size="10" font-weight="700" fill="#FBFAF6" letter-spacing=".06em">refill</text>`;

  /* craquelure on parched columns */
  let cracks='';
  DATA.forEach(d=>{if(d.level>3)return;const rng=mulberry32(31+d.idx),x0=cx(d.idx)-dayW/2,dry=1-clamp(d.level/3,0,1);
    const nc=Math.round(lerp(2,4,dry));
    for(let k=0;k<nc;k++){let px=x0+lerp(dayW*0.15,dayW*0.85,rng()),py=SURF+2,seg=`M ${px.toFixed(1)} ${py.toFixed(1)}`;const steps=3+Math.floor(rng()*3);
      for(let s=0;s<steps;s++){px+=(rng()-0.5)*8;py+=lerp(5,13,rng());seg+=` L ${px.toFixed(1)} ${py.toFixed(1)}`;}
      cracks+=`<path d="${seg}" fill="none" stroke="#5A4A33" stroke-width="0.8" opacity="${(0.16+0.22*dry).toFixed(2)}"/>`;}});

  /* flora: roots (fixed length) + plant (varies) */
  let flora='';
  DATA.forEach(d=>{const x=cx(d.idx),sY=SURF+(mulberry32(7+d.idx)()-0.5)*2.6,v=clamp(d.level/TANK,0,1),rng=mulberry32(101+d.idx);
    flora+=`<g class="grow" style="transform-origin:${x.toFixed(1)}px ${sY.toFixed(1)}px;transition-delay:${d.idx*9}ms">`
      +roots(x,sY,v,rng)+plant(x,sY,v,rng)+`</g>`;});

  /* refs + ticks + today + hit targets */
  let ticks='';
  DATA.forEach(d=>{const x=cx(d.idx),isT=d.idx===todayIdx,fut=d.idx>todayIdx;
    const dc=isT?'var(--today)':'var(--ink)', wc=dc, bold=isT?' font-weight="700"':'';
    ticks+=`<text x="${x.toFixed(1)}" y="${SOIL_BOT+17}" text-anchor="middle" font-family="${SVGMONO}" font-size="12"${bold} fill="${dc}">${d.date.slice(8)}</text>`
       +`<text x="${x.toFixed(1)}" y="${SOIL_BOT+30}" text-anchor="middle" font-family="${SVGMONO}" font-size="12"${bold} fill="${wc}">${d.wd}</text>`;});
  const tx=cx(todayIdx);
  const NOW='var(--today)', fw=44, fh=15, fy=3;
  const today=
     `<rect x="${(tx-dayW/2).toFixed(1)}" y="${SKY_TOP}" width="${dayW.toFixed(1)}" height="${(SOIL_BOT-SKY_TOP).toFixed(1)}" fill="${NOW}" opacity="0.08"/>`
    +`<rect x="${(tx-dayW/2).toFixed(1)}" y="${SKY_TOP}" width="${dayW.toFixed(1)}" height="${(SOIL_BOT-SKY_TOP).toFixed(1)}" fill="none" stroke="${NOW}" stroke-width="1" stroke-dasharray="3 4" opacity="0.35"/>`
    +`<rect x="${(tx-fw/2).toFixed(1)}" y="${fy}" width="${fw}" height="${fh}" rx="7.5" fill="${NOW}"/>`
    +`<text x="${tx.toFixed(1)}" y="${(fy+fh/2).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-family="${SVGMONO}" font-size="10" font-weight="700" fill="#FBFAF6" letter-spacing=".1em">TODAY</text>`;
  // when to water: first day at/after today below the refill point
  let wantWater='', needIdx=-1;
  for(let k=todayIdx;k<N;k++){ if(DATA[k].level<REFILL){ needIdx=k; break; } }
  if(needIdx>todayIdx){
    const wx=cx(needIdx), ww=58, wy=fy, AMB='#D98A2B';
    wantWater=`<rect x="${(wx-dayW/2).toFixed(1)}" y="${SKY_TOP}" width="${dayW.toFixed(1)}" height="${(SOIL_BOT-SKY_TOP).toFixed(1)}" fill="#D98A2B" opacity=".14"/>`
      +`<rect x="${(wx-ww/2).toFixed(1)}" y="${wy}" width="${ww}" height="${fh}" rx="3.5" fill="${AMB}"/>`
      +`<polygon points="${(wx-3).toFixed(1)},${(wy+fh).toFixed(1)} ${(wx+3).toFixed(1)},${(wy+fh).toFixed(1)} ${wx.toFixed(1)},${(wy+fh+3.5).toFixed(1)}" fill="${AMB}"/>`
      +`<text x="${wx.toFixed(1)}" y="${(wy+fh/2).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-family="${SVGMONO}" font-size="10" font-weight="700" fill="#FBFAF6" letter-spacing=".03em">water by</text>`;
  }
  let hits='';DATA.forEach(d=>{hits+=`<rect class="hit" data-i="${d.idx}" x="${(cx(d.idx)-dayW/2).toFixed(1)}" y="${SKY_TOP}" width="${dayW.toFixed(1)}" height="${SOIL_BOT-SKY_TOP}" fill="transparent"/>`;});

  const svg=`<svg viewBox="0 0 ${W.toFixed(0)} ${H}" width="${W.toFixed(0)}" height="${H}" xmlns="http://www.w3.org/2000/svg" font-family="${'ui-sans-serif,system-ui,sans-serif'}">
    <defs>${defs}</defs>${sky}${weather}${btns}${soil}${cracks}${surfaceFx}${flora}${ticks}${today}${wantWater}${hits}</svg>`;
  return {svg,W,dayW,todayIdx,cx,tableY};
}
function smoothRev(pts){const r=pts.slice().reverse();let d='';for(let i=0;i<r.length;i++)d+=` L ${r[i].x.toFixed(1)} ${r[i].y.toFixed(1)}`;return d;}

/* single water-drop icon, centered at (cx,cy); r = radius of the round bottom */
function dropIcon(cx,cy,r){
  const topY=cy-2.1*r;
  const d=`M ${cx.toFixed(1)} ${topY.toFixed(1)} `
    +`C ${(cx+0.62*r).toFixed(1)} ${(cy-1.35*r).toFixed(1)} ${(cx+r).toFixed(1)} ${(cy-0.55*r).toFixed(1)} ${(cx+r).toFixed(1)} ${cy.toFixed(1)} `
    +`A ${r.toFixed(1)} ${r.toFixed(1)} 0 0 1 ${(cx-r).toFixed(1)} ${cy.toFixed(1)} `
    +`C ${(cx-r).toFixed(1)} ${(cy-0.55*r).toFixed(1)} ${(cx-0.62*r).toFixed(1)} ${(cy-1.35*r).toFixed(1)} ${cx.toFixed(1)} ${topY.toFixed(1)} Z`;
  return `<path d="${d}" fill="#34BCD2" stroke="#1FA6BE" stroke-width="1.3" stroke-linejoin="round"/>`
    +`<ellipse cx="${(cx-r*0.34).toFixed(1)}" cy="${(cy+r*0.02).toFixed(1)}" rx="${(r*0.2).toFixed(1)}" ry="${(r*0.42).toFixed(1)}" fill="#E8FAFD" opacity=".8"/>`;
}
/* per-day toggle: faint ring when off, bold green disc with a tiny can when on */
function btnSVG(cxp,y,on){
  if(on){return `<g class="grow"><circle cx="${cxp.toFixed(1)}" cy="${y}" r="8.4" fill="none" stroke="#4F6B4A" stroke-width="1" opacity=".28"/>`
    +`<circle cx="${cxp.toFixed(1)}" cy="${y}" r="6.6" fill="#4F6B4A"/>`
    +`<rect x="${(cxp-2.6).toFixed(1)}" y="${(y-1.4).toFixed(1)}" width="4.4" height="4.4" rx="0.8" fill="#FBFAF6"/>`
    +`<path d="M ${(cxp-2.6).toFixed(1)} ${(y-0.2).toFixed(1)} L ${(cxp-4.9).toFixed(1)} ${(y-1).toFixed(1)} L ${(cxp-4.9).toFixed(1)} ${(y+1).toFixed(1)} Z" fill="#FBFAF6"/>`
    +`<path d="M ${(cxp-1.4).toFixed(1)} ${(y-1.4).toFixed(1)} Q ${cxp.toFixed(1)} ${(y-3.3).toFixed(1)} ${(cxp+1.4).toFixed(1)} ${(y-1.4).toFixed(1)}" fill="none" stroke="#FBFAF6" stroke-width="0.8"/></g>`;}
  return `<circle cx="${cxp.toFixed(1)}" cy="${y}" r="5.4" fill="#FBFAF6" fill-opacity=".3" stroke="#5A4A33" stroke-width="1" opacity=".2"/>`;
}
/* darkened, saturated soil under a watered column */
function wetCol(x0,w,sY){
  return `<rect x="${x0.toFixed(1)}" y="${sY.toFixed(1)}" width="${w.toFixed(1)}" height="160" fill="url(#wetE)"/>`
    +`<rect x="${x0.toFixed(1)}" y="${sY.toFixed(1)}" width="${w.toFixed(1)}" height="3" fill="#34BCD2" opacity=".34"/>`;
}

function plant(x,sY,v,rng){
  const h=ease(clamp((v-0.08)/0.44,0,1));   // plant health: ~full above 52% tank, declines below
  if(h<0.07){const c='#3A352C';
    return `<path d="M ${x} ${sY} L ${(x-2).toFixed(1)} ${(sY-9)}" stroke="${c}" stroke-width="1.4" stroke-linecap="round"/>`
         +`<path d="M ${(x-1).toFixed(1)} ${(sY-6)} L ${(x+3).toFixed(1)} ${(sY-12)}" stroke="${c}" stroke-width="1.1" stroke-linecap="round"/>`;}
  const hgt=lerp(8,54,h),droop=clamp((0.45-h)/0.45,0,1);
  const tipX=x+lerp(0,16,droop)*(rng()<.5?-1:1)*0.6, tipY=sY-hgt+lerp(0,hgt*0.5,droop);
  const ctrlX=x+lerp(0,10,droop), ctrlY=sY-hgt*0.55, pc=plantColor(h), lc=leafColor(h);
  let s=`<path d="M ${x} ${sY} Q ${ctrlX.toFixed(1)} ${ctrlY.toFixed(1)} ${tipX.toFixed(1)} ${tipY.toFixed(1)}" fill="none" stroke="${pc}" stroke-width="${lerp(1.2,2.6,h).toFixed(2)}" stroke-linecap="round"/>`;
  const nl=Math.round(lerp(0,5,h));
  for(let k=0;k<nl;k++){
    if(nl===5&&k===4) continue;                // drop the top-right leaf on max-height flowers
    const t=lerp(0.28,0.92,(k+0.5)/Math.max(nl,1)),lx=lerp(x,tipX,t),ly=lerp(sY,tipY,t),side=(k%2===0)?1:-1,ll=lerp(5,11,h);
    const mxp=lx+side*ll*0.5,myp=ly+droop*ll*0.4;
    s+=`<ellipse cx="${mxp.toFixed(1)}" cy="${myp.toFixed(1)}" rx="${(ll*0.6).toFixed(1)}" ry="${(ll*0.32).toFixed(1)}" fill="${lc}" transform="rotate(${(side*lerp(18,40,h)+droop*20).toFixed(0)} ${mxp.toFixed(1)} ${myp.toFixed(1)})"/>`;}
  if(h>0.62){const fx=tipX,fy=tipY-1;for(let k=0;k<5;k++){const a=k/5*Math.PI*2;s+=`<circle cx="${(fx+Math.cos(a)*3.9).toFixed(1)}" cy="${(fy+Math.sin(a)*3.9).toFixed(1)}" r="2.6" fill="#FBFAF6" stroke="#8A8270" stroke-width="0.6"/>`;}s+=`<circle cx="${fx.toFixed(1)}" cy="${fy.toFixed(1)}" r="2.1" fill="#AF6E4B"/>`;}
  else if(h>0.42){s+=`<ellipse cx="${tipX.toFixed(1)}" cy="${(tipY-1).toFixed(1)}" rx="2.8" ry="3.9" fill="${hexLerp('#9C8A45','#FBFAF6',(h-0.42)/0.2)}"/>`;}
  return s;
}

function roots(x,sY,v,rng){
  const h=ease(clamp((v-0.08)/0.44,0,1));      // same health curve as the plant above
  const dead=h<0.08;
  const depth=ROOT_REACH+(rng()-0.5)*8;        // FIXED length (organic jitter only)
  const col=rootColor(h), wMain=lerp(0.8,2.8,h);
  // taproot
  let pts=[{x,y:sY}];const segs=5;
  for(let k=1;k<=segs;k++){const t=k/segs;pts.push({x:x+(rng()-0.5)*(dead?8:4),y:sY+depth*t});}
  let s=`<path d="${dead?jag(pts):smooth(pts)}" fill="none" stroke="${col}" stroke-width="${wMain.toFixed(2)}" stroke-linecap="round" opacity="${dead?0.85:1}"/>`;
  // laterals (count = health, length modest/fixed)
  const nl=Math.round(lerp(1,5,h));
  const lats=[];
  for(let k=0;k<nl;k++){const startT=lerp(0.18,0.82,(k+0.4)/nl),sx=x+(rng()-0.5)*4,sy0=sY+depth*startT,dir=(rng()<0.5?-1:1);
    const ex=sx+dir*lerp(7,16,rng()), ey=sy0+lerp(8,22,rng()), mx=(sx+ex)/2+dir*4, my=(sy0+ey)/2;
    lats.push({sx,sy0,ex,ey,mx,my,dir});
    if(dead) s+=`<path d="M ${sx.toFixed(1)} ${sy0.toFixed(1)} L ${mx.toFixed(1)} ${my.toFixed(1)} L ${ex.toFixed(1)} ${ey.toFixed(1)}" fill="none" stroke="${col}" stroke-width="${(wMain*0.5).toFixed(2)}" stroke-linecap="round" opacity=".8"/>`;
    else s+=`<path d="M ${sx.toFixed(1)} ${sy0.toFixed(1)} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}" fill="none" stroke="${col}" stroke-width="${(wMain*0.55).toFixed(2)}" stroke-linecap="round"/>`;}
  // fine root hairs (detail) — density by health, none when dead
  if(h>0.2){
    const hairC=rootColor(clamp(h+0.05,0,1)), nh=Math.round(lerp(0,5,h));
    pts.slice(1).forEach((p)=>{for(let k=0;k<nh;k++){if(rng()>0.6)continue;const side=rng()<0.5?-1:1,hl=lerp(2,5,h);
      s+=`<line x1="${p.x.toFixed(1)}" y1="${p.y.toFixed(1)}" x2="${(p.x+side*hl).toFixed(1)}" y2="${(p.y+lerp(1,4,rng())).toFixed(1)}" stroke="${hairC}" stroke-width="0.5" opacity="${(0.4+0.3*h).toFixed(2)}"/>`;}});
    lats.forEach(L=>{for(let k=0;k<nh;k++){if(rng()>0.55)continue;const t=rng(),hx2=lerp(L.sx,L.ex,t),hy2=lerp(L.sy0,L.ey,t),hl=lerp(1.5,4,h);
      s+=`<line x1="${hx2.toFixed(1)}" y1="${hy2.toFixed(1)}" x2="${(hx2+L.dir*hl).toFixed(1)}" y2="${(hy2+lerp(0.5,2.5,rng())).toFixed(1)}" stroke="${hairC}" stroke-width="0.45" opacity="${(0.35+0.3*h).toFixed(2)}"/>`;}});
  }
  return s;
}
function jag(pts){let d=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;for(let i=1;i<pts.length;i++)d+=` L ${pts[i].x.toFixed(1)} ${pts[i].y.toFixed(1)}`;return d;}

/* mount + interactivity */
const scroll=document.getElementById('scroll'),sbar=document.getElementById('sbar'),sthumb=document.getElementById('sthumb');
let G, booted=false;
function pct(y){return (y/H*100).toFixed(2);}
/* status headline — gives the verdict before the chart (improvement #1) */
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const dlabel=d=>`${MON[+d.date.slice(5,7)-1]} ${+d.date.slice(8,10)}`;
function renderStatus(){
  const ti=DATA.findIndex(d=>d.date===TODAY), tl=DATA[ti].level;
  const pct=Math.round(tl/TANK*100), thPos=REFILL/TANK*100, N=DATA.length;
  let firstBelow=-1; for(let k=ti;k<N;k++){ if(DATA[k].level<REFILL){firstBelow=k;break;} }
  const RUST='#B5471F',AMBER='#D98A2B',GREEN='#4F6B4A';
  let word,color,kick;
  if(tl<=0.05){ word='Water today'; color=RUST; kick='Refill point reached'; }
  else if(tl<REFILL){ word='Water now'; color=RUST; kick='Below refill point'; }
  else {                                   // above refill — always name the days out
    let dd, plus=''; if(firstBelow>=0){ dd=firstBelow-ti; } else { dd=(N-1)-ti; plus='+'; }
    word = dd===1 ? 'Water tomorrow' : `Water in ${dd}${plus} days`;
    color = dd>=2 ? GREEN : AMBER;         // today/now rust, tomorrow amber, 2+ days green
    kick='Above refill point';
  }
  document.getElementById('status').innerHTML=
    `<div class="kick"><span class="dot" style="background:${color};box-shadow:0 0 0 4px ${color}22"></span>${kick}</div>`
   +`<div class="word" style="color:${color}">${word}</div>`
   +`<div class="metric"><div style="display:flex;align-items:baseline;gap:8px">`
   +`<span class="pct" style="color:${color}">${pct}<span style="font-size:14px;color:var(--faint)">%</span></span>`
   +`<span class="sub">${Math.round(tl)} / ${TANK} mm held</span></div>`
   +`<div class="bar"><span class="fill" style="width:${clamp(pct,0,100)}%;background:${color}"></span>`
   +`<span class="mark" style="left:${thPos}%" title="refill point"></span></div></div>`;
}
function render(){
  G=build();
  scroll.innerHTML=G.svg;
  renderStatus();
  wireHits();
  requestAnimationFrame(syncBar);
  if(!booted){scroll.scrollLeft=Math.max(0,G.cx(G.todayIdx)-G.dayW*1.4-AX);booted=true;requestAnimationFrame(()=>document.body.classList.remove('booting'));}
}
function rerender(){const sl=scroll.scrollLeft;render();scroll.scrollLeft=sl;}
function toggleWater(i){
  if(plan[i]) delete plan[i]; else plan[i]=WATER_MIN;
  DATA=computeData();
  rerender();
}
function wireHits(){
  scroll.querySelector('svg').querySelectorAll('.hit').forEach(h=>{
    const i=+h.dataset.i; h.style.cursor='pointer';
    h.addEventListener('click',()=>toggleWater(i));
  });
}
let rt;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(rerender,180);});

/* custom scrollbar — reflects + drives the chart's horizontal scroll */
function syncBar(){
  const cw=scroll.clientWidth, sw=scroll.scrollWidth, tw=sbar.clientWidth;
  if(sw<=cw+1){ sbar.style.visibility='hidden'; return; }
  sbar.style.visibility='visible';
  const thumbW=Math.max(28, tw*cw/sw), maxLeft=tw-thumbW, maxScroll=sw-cw;
  sthumb.style.width=thumbW+'px';
  sthumb.style.left=(maxScroll>0?(scroll.scrollLeft/maxScroll)*maxLeft:0)+'px';
}
scroll.addEventListener('scroll',syncBar,{passive:true});
let _drag=false,_x0=0,_l0=0;
sthumb.addEventListener('pointerdown',e=>{_drag=true;_x0=e.clientX;_l0=parseFloat(sthumb.style.left)||0;sthumb.setPointerCapture(e.pointerId);e.preventDefault();});
sthumb.addEventListener('pointermove',e=>{ if(!_drag)return;
  const tw=sbar.clientWidth,thumbW=sthumb.offsetWidth,maxLeft=tw-thumbW,maxScroll=scroll.scrollWidth-scroll.clientWidth;
  scroll.scrollLeft=maxLeft>0?(clamp(_l0+(e.clientX-_x0),0,maxLeft)/maxLeft)*maxScroll:0; });
sthumb.addEventListener('pointerup',()=>{_drag=false;});
sbar.addEventListener('pointerdown',e=>{ if(e.target===sthumb)return;
  const r=sbar.getBoundingClientRect(),tw=sbar.clientWidth,thumbW=sthumb.offsetWidth,maxLeft=tw-thumbW,maxScroll=scroll.scrollWidth-scroll.clientWidth;
  scroll.scrollLeft=maxLeft>0?(clamp(e.clientX-r.left-thumbW/2,0,maxLeft)/maxLeft)*maxScroll:0; });
