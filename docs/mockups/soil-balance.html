<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Soil-Balance — Wijchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#ecebe3;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#3a3d33}
  @keyframes sb-rise{from{transform:translateY(102%)}to{transform:translateY(0)}}
  @keyframes sb-fade{from{opacity:0}to{opacity:1}}
  .serif{font-family:'Newsreader',serif}
  button{font-family:inherit}
  @media (prefers-reduced-motion: reduce){
    [data-anim]{animation:none!important}
  }
</style>
</head>
<body>
<div id="app" style="max-width:430px;margin:0 auto;min-height:100vh;background:#f6f4ec;position:relative;display:flex;flex-direction:column;color:#3a3d33;overflow:hidden"></div>

<script>
/* =========================================================================
   Soil-Balance — self-contained port of "Soil Balance.dc.html".
   Forward soil-water balance over a 4-week window, with a status hero,
   a stacked-layer / water-table / cores chart, and tap-to-water sheets.
   ========================================================================= */

/* ---- inputs (editable in the settings sheet) ---- */
const PROPS = { thresholdPct: 50, sprinklerRate: 3.78, defaultMinutes: 60 };

const RAW = [
  ["2026-06-04","Thursday",18.2,1.94,6],["2026-06-05","Friday",16.8,2.34,2.2],
  ["2026-06-06","Saturday",19.5,2.6,0.7],["2026-06-07","Sunday",18.9,2.43,0.3],
  ["2026-06-08","Monday",22.1,2.4,1.1],["2026-06-09","Tuesday",17.3,2.73,6.9],
  ["2026-06-10","Wednesday",17,3.15,6.2],["2026-06-11","Thursday",16.6,2.53,5.3],
  ["2026-06-12","Friday",19.2,0.85,5.1],["2026-06-13","Saturday",17.4,2.69,0.3],
  ["2026-06-14","Sunday",17.6,3.6,0.2],["2026-06-15","Monday",19,3.19,0],
  ["2026-06-16","Tuesday",23.5,4.24,0.1],["2026-06-17","Wednesday",23.8,2.9,0.2],
  ["2026-06-18","Thursday",29.2,5.5,0],["2026-06-19","Friday",33.7,5.62,3.4],
  ["2026-06-20","Saturday",28.9,5.62,3.4],["2026-06-21","Sunday",29.7,5.39,0],
  ["2026-06-22","Monday",30.4,6.44,0],["2026-06-23","Tuesday",27.2,5.62,0],
  ["2026-06-24","Wednesday",31.7,5.78,0],["2026-06-25","Thursday",33.5,6.42,0],
  ["2026-06-26","Friday",36,6.66,0],["2026-06-27","Saturday",31.4,5.65,1.8],
  ["2026-06-28","Sunday",29,5.85,0],["2026-06-29","Monday",32.6,5.89,3.6],
  ["2026-06-30","Tuesday",24.6,2.8,10.5],["2026-07-01","Wednesday",18.1,1.42,18.3],
  ["2026-07-02","Thursday",20.8,4.06,1.8],["2026-07-03","Friday",19.8,3.66,2.4],
  ["2026-07-04","Saturday",19.4,2.97,3],["2026-07-05","Sunday",29.2,5.98,0]
];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const KC = 0.9, TANK = 39, RAIN_EFF = 0.8, TODAY = 17;          // TODAY -> 2026-06-21
const X0 = 16, DAYW = 34, SURFACE = 58, BLOCKH = 196;
const BB = SURFACE + BLOCKH, PPM = BLOCKH / TANK;               // px per mm

/* ---- colours ---- */
const C_RED = "#bb5836", C_RUST = "#c2683f", C_AMBER = "#c0923c", C_GREEN = "#5b8a52";

/* ---- state ---- */
let state = { chartStyle:"layers", plan:{}, dose:PROPS.sprinklerRate, selectedDay:null, settingsOpen:false };
try { const l = JSON.parse(localStorage.getItem("soilbalance.v1")||"{}");
  if(l.plan) state.plan=l.plan; if(l.dose) state.dose=l.dose; if(l.chartStyle) state.chartStyle=l.chartStyle;
} catch(e){}
function persist(){ try{ localStorage.setItem("soilbalance.v1", JSON.stringify({plan:state.plan,dose:state.dose,chartStyle:state.chartStyle})); }catch(e){} }

/* ---- helpers ---- */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
const mm=v=>Math.round(v);                                       // every mm quantity shows as an integer
const defaultMins=()=>PROPS.defaultMinutes;
const threshFrac=()=>PROPS.thresholdPct/100;
const wy=L=>BB-(L/TANK)*BLOCKH;
const ds=date=>`${MONTHS[parseInt(date.slice(5,7),10)-1]} ${parseInt(date.slice(8,10),10)}`;
function crust(temp){ const t=clamp((temp-16)/20,0,1),c=[206,192,161],w=[208,156,92];
  return `rgb(${lerp(c[0],w[0],t)},${lerp(c[1],w[1],t)},${lerp(c[2],w[2],t)})`; }

function recompute(plan,dose){
  const rate=dose/60, out=[]; let prev=TANK;
  for(let i=0;i<RAW.length;i++){ const r=RAW[i], start=prev;
    const loss=r[3]*KC, gain=r[4]*RAIN_EFF, mins=plan[i]||0, applied=rate*mins;
    let level=clamp(start+gain-loss+applied,0,TANK);
    out.push({i,date:r[0],weekday:r[1],temp:r[2],et0:r[3],rain:r[4],start,loss,gain,mins,applied,level});
    prev=level;
  }
  return out;
}

/* ---- status hero ---- */
function buildHero(series,base){
  const thV=TANK*threshFrac(), threshPos=threshFrac()*100, n=series.length;
  const tl=series[TODAY].level, pct=Math.round(tl/TANK*100);
  let firstBelow=null; for(let i=TODAY;i<n;i++){ if(series[i].level<thV){firstBelow=i;break;} }
  let planDry=null; for(let i=TODAY;i<n;i++){ if(series[i].level<=0.05){planDry=series[i];break;} }
  let baseDry=null; for(let i=TODAY;i<n;i++){ if(base[i].level<=0.05){baseDry=base[i];break;} }

  // Title carries the timing; the subtitle is a single short line.
  let word,color,kicker,detail;
  if(tl<=0.05){
    word="Water today"; color=C_RED; kicker="Empty";
    detail="Root zone is empty — water as soon as you can.";
  } else if(tl<thV){
    word="Water now"; color=C_RUST; kicker="Below refill line";
    detail = planDry ? `Trending down — dry by ${ds(planDry.date)} without water.`
                     : "Past the refill line — time to top up.";
  } else if(firstBelow!==null){
    const dd=firstBelow-TODAY;
    word = dd===1 ? "Water tomorrow" : `Water in ${dd} days`;
    color = dd<=2 ? C_AMBER : C_GREEN; kicker="Above refill line";
    detail = `Reaches the refill line ${ds(series[firstBelow].date)}.`;
  } else {
    word="Holding steady"; color=C_GREEN; kicker="Above refill line";
    detail="Stays above the refill line all window.";
  }
  const halo=color+"22";

  const plan=state.plan, hasPlan=Object.keys(plan).length>0;
  let planChip="";
  if(hasPlan){
    const cnt=Object.keys(plan).length, total=series.reduce((a,d)=>a+d.applied,0);
    const cmp = baseDry ? ` Without it, dry by ${ds(baseDry.date)}.` : "";
    const txt=`Plan: ${cnt} watering${cnt===1?"":"s"}, +${mm(total)} mm.${cmp}`;
    planChip=`<div style="margin-top:13px;display:flex;align-items:center;gap:10px;background:#f0f5ec;border:1px solid #dfead7;border-radius:12px;padding:9px 11px">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5C8 1.5 3 6 3 9.5a5 5 0 0 0 10 0C13 6 8 1.5 8 1.5Z" fill="#5b8a52"/></svg>
      <div style="flex:1;font-size:12.5px;color:#46613e;line-height:1.4">${txt}</div>
      <button data-act="clearPlan" style="border:none;background:none;color:#7d9a73;font-size:12px;font-weight:600;cursor:pointer;padding:2px 4px">Clear</button>
    </div>`;
  }

  // Metric row: % leads (it's the scannable headline), mm is secondary, the
  // bar carries a labelled refill marker — no more mm-left / %-right split.
  return `<div style="margin:4px 16px 0;padding:18px 18px 16px;background:#fbfaf4;border:1px solid #ece7d8;border-radius:18px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="width:9px;height:9px;border-radius:50%;background:${color};box-shadow:0 0 0 4px ${halo}"></span>
      <span style="font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#a3a494;font-weight:600">${kicker}</span>
    </div>
    <div class="serif" style="font-size:34px;line-height:1.04;font-weight:500;color:${color}">${word}</div>
    <div style="font-size:14px;color:#5d6051;margin-top:7px;line-height:1.45">${detail}</div>

    <div style="margin-top:14px;padding-top:13px;border-top:1px solid #efebdd">
      <div style="display:flex;align-items:baseline;gap:8px">
        <span class="serif" style="font-size:30px;font-weight:600;color:${color};line-height:1">${pct}<span style="font-size:15px;font-weight:500;color:#a3a494">%</span></span>
        <span style="font-size:12.5px;color:#a3a494">${mm(tl)} of ${TANK} mm in root zone</span>
      </div>
      <div style="position:relative;margin-top:10px;height:9px;background:#eee9da;border-radius:5px">
        <div style="position:absolute;top:0;bottom:0;left:0;width:${clamp(pct,0,100)}%;background:${color};border-radius:5px"></div>
        <div style="position:absolute;top:-3px;bottom:-3px;left:${threshPos}%;width:2px;background:#bf8a4e"></div>
        <div style="position:absolute;top:12px;left:${threshPos}%;transform:translateX(-50%);font-size:9.5px;color:#a9793c;font-weight:600;white-space:nowrap">refill ${mm(thV)} mm</div>
      </div>
      <div style="height:14px"></div>
    </div>
    ${planChip}
  </div>`;
}

/* ---- chart ---- */
function tabStyle(active){
  const base="border:none;border-radius:7px;padding:6px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;";
  return base+(active?"background:#fbfaf4;color:#5b8a52;box-shadow:0 1px 2px rgba(0,0,0,0.08)":"background:transparent;color:#9a9b8c");
}
function buildChart(series,base){
  const cs=state.chartStyle, isCores=cs==="cores", isTable=cs==="table", isLayers=cs==="layers", notCores=!isCores;
  const thF=threshFrac(), thV=TANK*thF, threshY=BB-thF*BLOCKH, n=series.length;
  const blockRight=X0+n*DAYW, chartW=X0*2+n*DAYW;

  let prevMonth=null;
  const days=series.map((d,i)=>{
    const x=X0+i*DAYW, cx=x+DAYW/2, w=wy(d.level), fillH=BB-w;
    const mNum=parseInt(d.date.slice(5,7),10), isMonthStart=mNum!==prevMonth; prevMonth=mNum;
    const wk=(d.weekday==="Saturday"||d.weekday==="Sunday");
    let greenH=d.applied*PPM; if(greenH>fillH) greenH=fillH;
    let blueH=d.rain*RAIN_EFF*PPM; const bAvail=fillH-greenH; if(blueH>bAvail) blueH=bAvail<0?0:bAvail;
    let lossH=d.loss*PPM; const above=w-SURFACE; if(lossH>above) lossH=above<0?0:above;
    const soilX=isCores?x+3.5:x, soilW=isCores?DAYW-7:DAYW;
    return {i,x,cx,xEnd:x+DAYW,wy:w,fillH,
      coreX:x+3.5,coreW:DAYW-7,waterRx:Math.min(7,fillH/2),
      soilX,soilW,soilXEnd:soilX+soilW,crust:crust(d.temp),
      hasGreen:greenH>0.6,greenY:w,greenH, hasBlue:blueH>0.6,blueY:w+greenH,blueH,
      hasLoss:lossH>0.6,lossY:w-lossH,lossH,
      isToday:i===TODAY,selected:state.selectedDay===i,
      dd:String(parseInt(d.date.slice(8,10),10)),wd1:d.weekday[0],
      wdColor:wk?"#c2b79a":"#a8a896",ddColor:i===TODAY?"#5b8a52":"#7d7e6f",ddWeight:i===TODAY?700:500,
      isMonthStart,monthLabel:MONTHS[mNum-1].toUpperCase()};
  });

  const firstX=X0, lastX=X0+n*DAYW;
  const top=days.map(d=>`L ${d.cx} ${d.wy}`).join(" ");
  const areaPath=`M ${firstX} ${BB} L ${firstX} ${days[0].wy} ${top} L ${lastX} ${days[n-1].wy} L ${lastX} ${BB} Z`;
  const linePath=`M ${firstX} ${days[0].wy} ${top} L ${lastX} ${days[n-1].wy}`;
  const baseTop=base.map(b=>`L ${X0+b.i*DAYW+DAYW/2} ${wy(b.level)}`).join(" ");
  const baselinePath=`M ${firstX} ${wy(base[0].level)} ${baseTop} L ${lastX} ${wy(base[n-1].level)}`;
  const strata=[0.24,0.48,0.72].map(f=>SURFACE+BLOCKH*f);
  const hasPlan=Object.keys(state.plan).length>0;
  const todayPillX=X0+TODAY*DAYW+(DAYW-42)/2;

  let s="";
  // dry soil base + strata
  if(notCores){
    s+=`<rect x="${X0}" y="58" width="${n*DAYW}" height="196" fill="url(#sbDry)"/>`;
    strata.forEach(y=>{ s+=`<line x1="${X0}" y1="${y}" x2="${blockRight}" y2="${y}" stroke="#cdbf9f" stroke-width="1" stroke-dasharray="1 5" opacity="0.7"/>`; });
  }
  // water-table area
  if(isTable){ s+=`<path d="${areaPath}" fill="url(#sbMoist)"/><path d="${linePath}" fill="none" stroke="#4f8068" stroke-width="2" stroke-linejoin="round"/>`; }
  // per-day
  days.forEach(d=>{
    if(d.isToday) s+=`<rect x="${d.x}" y="18" width="${DAYW}" height="236" fill="#5b8a52" opacity="0.08"/>`;
    if(isCores){ s+=`<rect x="${d.coreX}" y="58" width="${d.coreW}" height="196" rx="7" fill="url(#sbDry)"/>`
      +`<rect x="${d.coreX}" y="${d.wy}" width="${d.coreW}" height="${d.fillH}" rx="${d.waterRx}" fill="url(#sbMoist)"/>`; }
    if(isLayers){ s+=`<rect x="${d.x}" y="${d.wy}" width="${DAYW}" height="${d.fillH}" fill="url(#sbMoist)"/>`
      +`<line x1="${d.x}" y1="${d.wy}" x2="${d.xEnd}" y2="${d.wy}" stroke="#4f8068" stroke-width="1.4"/>`; }
    s+=`<rect x="${d.soilX}" y="58" width="${d.soilW}" height="5" fill="${d.crust}"/>`;
    if(d.hasLoss) s+=`<rect x="${d.soilX}" y="${d.lossY}" width="${d.soilW}" height="${d.lossH}" fill="#d49a4e" opacity="0.5"/>`
      +`<line x1="${d.soilX}" y1="${d.lossY}" x2="${d.soilXEnd}" y2="${d.lossY}" stroke="#c2863a" stroke-width="1.2" stroke-dasharray="2.5 2"/>`;
    if(d.hasBlue)  s+=`<rect x="${d.soilX}" y="${d.blueY}" width="${d.soilW}" height="${d.blueH}" fill="#6f9bb8" opacity="0.92"/>`;
    if(d.hasGreen) s+=`<rect x="${d.soilX}" y="${d.greenY}" width="${d.soilW}" height="${d.greenH}" fill="#4f9e6a"/>`;
    if(d.selected) s+=`<rect x="${d.x}" y="18" width="${DAYW}" height="236" rx="5" fill="none" stroke="#5b8a52" stroke-width="1.6"/>`;
    s+=`<text x="${d.cx}" y="272" text-anchor="middle" font-family="Hanken Grotesk" font-size="9" font-weight="600" fill="${d.wdColor}" letter-spacing="0.04em">${d.wd1}</text>`
      +`<text x="${d.cx}" y="286" text-anchor="middle" font-family="Hanken Grotesk" font-size="11" font-weight="${d.ddWeight}" fill="${d.ddColor}">${d.dd}</text>`;
    if(d.isMonthStart) s+=`<text x="${d.x}" y="32" font-family="Hanken Grotesk" font-size="9" font-weight="700" fill="#bdbda9" letter-spacing="0.12em">${d.monthLabel}</text>`;
    s+=`<rect class="hit" data-i="${d.i}" x="${d.x}" y="16" width="${DAYW}" height="240" fill="transparent" style="cursor:pointer"/>`;
  });
  if(notCores) s+=`<line x1="${X0}" y1="58" x2="${blockRight}" y2="58" stroke="#b09a72" stroke-width="1.4"/>`;
  if(hasPlan)  s+=`<path d="${baselinePath}" fill="none" stroke="#9a9b8c" stroke-width="1.6" stroke-dasharray="3 4" opacity="0.7"/>`;
  // threshold
  s+=`<line x1="${X0}" y1="${threshY}" x2="${blockRight}" y2="${threshY}" stroke="#bf8a4e" stroke-width="1.5" stroke-dasharray="5 4"/>`
    +`<rect x="${X0}" y="${threshY-19}" width="78" height="16" rx="8" fill="#f6efe0"/>`
    +`<text x="${X0+7}" y="${threshY-8}" font-family="Hanken Grotesk" font-size="9.5" font-weight="700" fill="#a9793c" letter-spacing="0.04em">REFILL · ${mm(thV)}mm</text>`;
  // today pill
  s+=`<rect x="${todayPillX}" y="6" width="42" height="15" rx="7.5" fill="#5b8a52"/>`
    +`<text x="${todayPillX+21}" y="16.5" text-anchor="middle" font-family="Hanken Grotesk" font-size="9" font-weight="700" fill="#fff" letter-spacing="0.06em">TODAY</text>`;

  const legend=`<div style="display:flex;flex-wrap:wrap;gap:14px;padding:8px 16px 4px;font-size:11px;color:#8c8d7f">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:11px;border-radius:3px;background:linear-gradient(#94baa4,#5c8b72)"></span>Soil water</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:7px;border-radius:2px;background:#6f9bb8"></span>Rain in</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:7px;border-radius:2px;background:#4f9e6a"></span>Watering</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:7px;border-radius:2px;background:#d49a4e;opacity:0.6"></span>ET lost</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:0;border-top:1.6px dashed #bf8a4e"></span>Refill line</span>
  </div>`;

  return `<div style="margin:14px 16px 0;background:#fbfaf4;border:1px solid #ece7d8;border-radius:18px;padding:14px 0 6px;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px;gap:10px">
      <div style="font-size:13px;font-weight:600;color:#6b6e5d">Moisture, last 4 weeks &amp; ahead</div>
      <div style="display:flex;background:#eee9da;border-radius:9px;padding:3px;gap:2px">
        <button data-act="setLayers" style="${tabStyle(isLayers)}">Layers</button>
        <button data-act="setTable" style="${tabStyle(isTable)}">Water&nbsp;table</button>
        <button data-act="setCores" style="${tabStyle(isCores)}">Cores</button>
      </div>
    </div>
    <div id="chartScroll" style="overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:2px">
      <svg width="${chartW}" height="300" style="display:block">
        <defs>
          <linearGradient id="sbMoist" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#94baa4"/><stop offset="1" stop-color="#5c8b72"/></linearGradient>
          <linearGradient id="sbDry" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ebe2cd"/><stop offset="1" stop-color="#dccfb1"/></linearGradient>
        </defs>
        ${s}
      </svg>
    </div>
    ${legend}
  </div>
  <div style="text-align:center;font-size:12.5px;color:#a3a494;padding:14px 24px 22px;line-height:1.5">Tap any day to water it — ${defaultMins()} min by default. The dashed line shows where the soil heads without your plan.</div>`;
}

/* ---- watering sheet ---- */
function buildSheet(series){
  const sd=state.selectedDay; if(sd===null) return "";
  const rate=state.dose/60, d=series[sd], mins=state.plan[sd]||0;
  const thV=TANK*threshFrac();
  const kind = sd<TODAY?"Recorded · past": sd===TODAY?"Today":"Planned · upcoming";
  const kindColor = sd<TODAY?"#9a9b8c": sd===TODAY?"#5b8a52":"#8a9bb0";
  const endColor = d.level<thV?"#c2683f":"#5b8a52";

  const stats=`<div style="display:flex;gap:8px;margin-top:14px">
    <div style="flex:1;background:#f4f1e7;border-radius:11px;padding:9px 11px"><div style="font-size:10px;color:#a3a494;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Max temp</div><div style="font-size:16px;font-weight:700;margin-top:2px">${Math.round(d.temp)}°</div></div>
    <div style="flex:1;background:#f4f1e7;border-radius:11px;padding:9px 11px"><div style="font-size:10px;color:#a3a494;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Rain</div><div style="font-size:16px;font-weight:700;margin-top:2px;color:#5b7f9a">${mm(d.rain)}<span style="font-size:11px;color:#a3a494;font-weight:500"> mm</span></div></div>
    <div style="flex:1;background:#f4f1e7;border-radius:11px;padding:9px 11px"><div style="font-size:10px;color:#a3a494;text-transform:uppercase;letter-spacing:.06em;font-weight:600">ET loss</div><div style="font-size:16px;font-weight:700;margin-top:2px;color:#b88a4a">${mm(d.et0*KC)}<span style="font-size:11px;color:#a3a494;font-weight:500"> mm</span></div></div>
  </div>`;

  let ctrl;
  if(mins===0){
    ctrl=`<button data-act="quick" style="width:100%;border:none;background:#5b8a52;color:#fff;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 1.5C8 1.5 3 6 3 9.5a5 5 0 0 0 10 0C13 6 8 1.5 8 1.5Z" fill="#fff"/></svg>
        Water ${defaultMins()} min</button>
      <div style="text-align:center;font-size:11.5px;color:#7d9a73;margin-top:9px">Applies ${mm(rate*defaultMins())} mm · fine-tune in steps of 15 after</div>`;
  } else {
    ctrl=`<div style="display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-size:13px;font-weight:600;color:#46613e">Watering duration</div><div style="font-size:11.5px;color:#7d9a73;margin-top:1px">Adds ${mm(rate*mins)} mm of water</div></div>
        <div style="display:flex;align-items:center;gap:12px">
          <button data-act="stepDown" style="width:40px;height:40px;border-radius:50%;border:1.5px solid #c4d6ba;background:#fff;color:#5b8a52;font-size:22px;font-weight:600;cursor:pointer;line-height:1">−</button>
          <div style="min-width:62px;text-align:center"><div style="font-size:24px;font-weight:700;color:#3a3d33;line-height:1">${mins}</div><div style="font-size:10px;color:#a3a494;margin-top:1px">minutes</div></div>
          <button data-act="stepUp" style="width:40px;height:40px;border-radius:50%;border:1.5px solid #c4d6ba;background:#fff;color:#5b8a52;font-size:22px;font-weight:600;cursor:pointer;line-height:1">+</button>
        </div>
      </div>
      <button data-act="remove" style="width:100%;margin-top:14px;border:1px solid #e6d3c8;background:#fbf5f1;border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:#b06a45;cursor:pointer">Remove watering</button>`;
  }

  return `<div data-act="closeSheet" data-anim style="position:absolute;inset:0;background:rgba(40,42,34,0.32);animation:sb-fade .2s ease;z-index:20"></div>
    <div data-anim style="position:absolute;left:0;right:0;bottom:0;background:#fbfaf4;border-radius:22px 22px 0 0;padding:8px 20px 24px;box-shadow:0 -10px 40px rgba(0,0,0,0.16);animation:sb-rise .24s cubic-bezier(.2,.8,.2,1);z-index:21">
      <div style="width:38px;height:4px;border-radius:2px;background:#ddd8c8;margin:6px auto 16px"></div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div><div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:${kindColor};font-weight:700">${kind}</div>
        <div class="serif" style="font-size:21px;font-weight:500;margin-top:2px;color:#4a4d40">${d.weekday}, ${ds(d.date)}</div></div>
        <button data-act="closeSheet" style="border:none;background:#eee9da;width:32px;height:32px;border-radius:50%;cursor:pointer;color:#7d7e6f;font-size:16px;line-height:1;flex:none">✕</button>
      </div>
      ${stats}
      <div style="margin-top:18px;background:#f0f5ec;border:1px solid #dfead7;border-radius:16px;padding:16px">${ctrl}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:0 4px">
        <span style="font-size:12.5px;color:#8c8d7f">Soil at end of day</span>
        <span style="font-size:15px;font-weight:700;color:${endColor}">${mm(d.level)} mm · ${Math.round(d.level/TANK*100)}%</span>
      </div>
      <button data-act="closeSheet" style="width:100%;margin-top:16px;border:none;background:#5b8a52;color:#fff;border-radius:13px;padding:14px;font-size:15px;font-weight:600;cursor:pointer">Done</button>
    </div>`;
}

/* ---- settings sheet ---- */
function buildSettings(){
  if(!state.settingsOpen) return "";
  const rate=state.dose/60;
  return `<div data-act="closeSettings" data-anim style="position:absolute;inset:0;background:rgba(40,42,34,0.32);animation:sb-fade .2s ease;z-index:20"></div>
    <div data-anim style="position:absolute;left:0;right:0;bottom:0;background:#fbfaf4;border-radius:22px 22px 0 0;padding:8px 20px 24px;box-shadow:0 -10px 40px rgba(0,0,0,0.16);animation:sb-rise .24s cubic-bezier(.2,.8,.2,1);z-index:21">
      <div style="width:38px;height:4px;border-radius:2px;background:#ddd8c8;margin:6px auto 16px"></div>
      <div class="serif" style="font-size:21px;font-weight:500;color:#4a4d40">Sprinkler</div>
      <div style="font-size:12.5px;color:#8c8d7f;margin-top:2px;line-height:1.4">How much water your sprinkler delivers. Each watering applies rate × minutes.</div>
      <div style="margin-top:16px;background:#f4f1e7;border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-size:13px;font-weight:600;color:#5d6051">Delivery rate</div><div style="font-size:11.5px;color:#a3a494;margin-top:1px">${mm(rate*defaultMins())} mm per ${defaultMins()} min</div></div>
        <div style="display:flex;align-items:center;gap:12px">
          <button data-act="doseDown" style="width:40px;height:40px;border-radius:50%;border:1.5px solid #ddd6c4;background:#fff;color:#7d7e6f;font-size:22px;cursor:pointer;line-height:1">−</button>
          <div style="min-width:74px;text-align:center"><div style="font-size:22px;font-weight:700;line-height:1">${state.dose.toFixed(1)}</div><div style="font-size:10px;color:#a3a494;margin-top:1px">mm / hour</div></div>
          <button data-act="doseUp" style="width:40px;height:40px;border-radius:50%;border:1.5px solid #ddd6c4;background:#fff;color:#7d7e6f;font-size:22px;cursor:pointer;line-height:1">+</button>
        </div>
      </div>
      <button data-act="closeSettings" style="width:100%;margin-top:16px;border:none;background:#5b8a52;color:#fff;border-radius:13px;padding:14px;font-size:15px;font-weight:600;cursor:pointer">Done</button>
    </div>`;
}

/* ---- actions ---- */
function setStyle(s){ state.chartStyle=s; persist(); render(); }
function openDay(i){ if(!state.plan[i]) state.plan[i]=defaultMins(); state.selectedDay=i; persist(); render(); }
function closeSheet(){ state.selectedDay=null; render(); }
function step(delta){ const sd=state.selectedDay; if(sd===null) return;
  let m=clamp((state.plan[sd]||0)+delta,0,240); if(m===0) delete state.plan[sd]; else state.plan[sd]=m; persist(); render(); }
function quick(){ const sd=state.selectedDay; if(sd===null) return; state.plan[sd]=defaultMins(); persist(); render(); }
function remove(){ const sd=state.selectedDay; if(sd===null) return; delete state.plan[sd]; persist(); render(); }
function clearPlan(){ state.plan={}; persist(); render(); }
function setDose(delta){ state.dose=clamp(Math.round((state.dose+delta)*100)/100,0.6,12); persist(); render(); }

const ACTIONS={ setLayers:()=>setStyle("layers"), setTable:()=>setStyle("table"), setCores:()=>setStyle("cores"),
  closeSheet, stepUp:()=>step(15), stepDown:()=>step(-15), quick, remove, clearPlan,
  openSettings:()=>{state.settingsOpen=true;render();}, closeSettings:()=>{state.settingsOpen=false;render();},
  doseUp:()=>setDose(0.5), doseDown:()=>setDose(-0.5) };

/* ---- render ---- */
let booted=false;
function render(){
  const series=recompute(state.plan,state.dose), base=recompute({},state.dose);
  const prevScroll = document.getElementById("chartScroll");
  const sx = prevScroll ? prevScroll.scrollLeft : null;

  const app=document.getElementById("app");
  app.innerHTML=`
    <header style="padding:18px 20px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
      <div>
        <div style="display:flex;align-items:center;gap:7px">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 14C8 8 11 4 14 3C14 9 11 13 8 14Z" fill="#5b8a52"/><path d="M8 14C8 9 5.5 5.5 2.5 4.8C2.5 9.5 5 13 8 14Z" fill="#7aa26f"/><path d="M8 15V9" stroke="#5b8a52" stroke-width="1.4" stroke-linecap="round"/></svg>
          <span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a9b8c;font-weight:600;white-space:nowrap">Soil balance</span>
        </div>
        <div class="serif" style="font-size:18px;font-weight:500;margin-top:3px;color:#4a4d40">Vormersesluisweg 3A</div>
        <div style="font-size:12px;color:#a3a494;margin-top:1px">Wijchen · one zone</div>
      </div>
      <button data-act="openSettings" style="border:1px solid #e2ddcd;background:#fbfaf4;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;margin-top:2px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7d7e6f" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </header>
    ${buildHero(series,base)}
    ${buildChart(series,base)}
    ${buildSheet(series)}
    ${buildSettings()}`;

  // restore / initialise chart scroll
  const sc=document.getElementById("chartScroll");
  if(sc){
    if(sx!==null){ sc.scrollLeft=sx; }
    else if(!booted){ requestAnimationFrame(()=>{ const tx=X0+TODAY*DAYW; sc.scrollLeft=Math.max(0,tx-sc.clientWidth*0.5); }); booted=true; }
  }
  wire();
}
function wire(){
  document.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click",e=>{
      if(el.dataset.act==="closeSheet"||el.dataset.act==="closeSettings"){ if(e.target!==el) return; }
      const fn=ACTIONS[el.dataset.act]; if(fn){ e.stopPropagation(); fn(); }
    });
  });
  document.querySelectorAll(".hit").forEach(h=>{ h.addEventListener("click",()=>openDay(+h.dataset.i)); });
}
render();
</script>
</body>
</html>
