schema: irrigation-system
assumed_system_pressure_bar: 3.0

types:
  source.well:      { fanout: 1, description: "water source (aquifer / borehole)", location: well }
  pump.well:        { fanout: 1, description: water + power source, model: "DAB Jet", installed: "2023-06", location: well, max_bar: 4.8, max_flow_m3h: 3.8 }
  hose.32:          { fanout: 1, description: "32 mm, 3 mm wall", installed: "2020-08", location: in_ground, material: LDPE, max_bar: 6.3 }
  hose.25:          { fanout: 1, description: "25 mm, 2.7 mm wall", installed: "2020-08", location: in_ground, material: LDPE, max_bar: 6 }
  hose.16:          { fanout: 1, description: "16 mm, 3 mm wall", installed: "2020-08", location: in_ground, material: LDPE, max_bar: 6.3 }
  fitting.joint:    { fanout: 1, max_bar: 10 }
  fitting.swing:    { fanout: 1, description: articulated, location: in_ground, max_bar: 10.2,
                      by_feeds: { head.rotor: { model: "Hunter SJ 3/4x3/4", max_flow_m3h: 2.3, price_eu: 5 },
                                  head.spray: { model: "Hunter SJ 3/4x1/2", max_flow_m3h: 1.8 } } }
  fitting.tee:      { fanout: 2, max_bar: 10 }
  fitting.manifold: { fanout: 6, model: "LEV 6-way distributor", installed: "2020-08", location: valve_box, price_eu: 150, max_bar: 10, max_flow_m3h: 7, material: hard plastic, connection: '1" swivel nut female thread' }
  fitting.cap:      { fanout: 0, max_bar: 10 }
  valve.auto:       { fanout: 1, description: opened electrically, model: "Hunter PGV-101G", installed: "2020-08", location: valve_box, price_eu: 25, min_bar: 1.5, max_bar: 10.3, min_flow_m3h: 0.1, max_flow_m3h: 9.0, min_ohm: 20, max_ohm: 60, features: [bleed_screw, flow_control] }
  valve.manual:     { fanout: 1, description: opened by hand }
  head.rotor:       { fanout: 1, takes: nozzle.rotor, description: "gear-driven, long radius", model: "Hunter I-20-04-SS", installed: "2020-08", location: in_ground, price_eu: 25, inlet: '3/4"', features: [radius_setscrew, FloStop, stainless_steel_riser] }
  head.spray:       { fanout: 1, takes: nozzle.rotator, description: fixed-fan pop-up, model: "Hunter Pro-Spray PRS40", installed: "2020-08", location: in_ground, price_eu: 25, inlet: '1/2"', regulated_bar: 2.76 }
  nozzle.rotor:     { fanout: 0, description: fits a rotor body }
  nozzle.rotator:   { fanout: 0, description: rotary streams; fits a spray body }
  nozzle.stream:    { fanout: 0, description: single stream }
  controller:       { description: "230V powered, 24V output", model: "RainMachine HD-16 TOUCH", installed: "2020-08", location: house }
  relay:            { description: 24V coil switches 230V to pump, model: "Hunter PSR-22", installed: "2020-08", location: shed, price_eu: 100, terminals: [coil, coil, contact_in, contact_out], closes_contact_when: coil_energized }

feeds:
  MAIN.source.well.01:      {to: [MAIN.pump.well.01]}
  MAIN.pump.well.01:        {to: [MAIN.fitting.joint.01], height_m: 7.2}
  MAIN.fitting.joint.01:    {to: [MAIN.hose.32.01]}
  MAIN.hose.32.01:          {to: [MAIN.fitting.joint.02], length_m: 20}
  MAIN.fitting.joint.02:    {to: [MAIN.fitting.manifold.01]}
  MAIN.fitting.manifold.01: {to: [Z1.fitting.joint.01, Z2.fitting.joint.01, Z3.fitting.joint.01, Z4.fitting.joint.01, Z5.fitting.joint.01, Z6.fitting.cap.01], height_m: 11.2}

  Z1.fitting.joint.01:  {to: [Z1.valve.auto.01]}
  Z1.valve.auto.01:     {to: [Z1.fitting.joint.02], height_m: 11.2}
  Z1.fitting.joint.02:  {to: [Z1.hose.25.01]}
  Z1.hose.25.01:        {to: [Z1.fitting.tee.01], length_m: 8}
  Z1.fitting.tee.01:    {to: [Z1.hose.25.02, Z1.hose.25.03]}
  Z1.hose.25.02:        {to: [Z1.fitting.joint.03], length_m: 7}
  Z1.fitting.joint.03:  {to: [Z1.fitting.swing.01]}
  Z1.fitting.swing.01:  {to: [Z1.head.spray.01]}
  Z1.head.spray.01:     {to: [Z1.nozzle.rotator.01]}
  Z1.nozzle.rotator.01: {to: [], height_m: 10.5, nozzle: "MP3000", arc_deg: 270}
  Z1.hose.25.03:        {to: [Z1.fitting.tee.02], length_m: 3}
  Z1.fitting.tee.02:    {to: [Z1.fitting.swing.02, Z1.hose.25.04]}
  Z1.fitting.swing.02:  {to: [Z1.head.rotor.01]}
  Z1.head.rotor.01:     {to: [Z1.nozzle.rotor.01]}
  Z1.nozzle.rotor.01:   {to: [], height_m: 11.6, nozzle: "4.0 blue", arc_deg: 170}
  Z1.hose.25.04:        {to: [Z1.fitting.joint.04], length_m: 17}
  Z1.fitting.joint.04:  {to: [Z1.fitting.swing.03]}
  Z1.fitting.swing.03:  {to: [Z1.head.spray.02]}
  Z1.head.spray.02:     {to: [Z1.nozzle.rotator.02]}
  Z1.nozzle.rotator.02: {to: [], height_m: 11.4, nozzle: "MP2000", arc_deg: 180}

  Z2.fitting.joint.01:  {to: [Z2.valve.auto.01]}
  Z2.valve.auto.01:     {to: [Z2.fitting.joint.02], height_m: 11.2}
  Z2.fitting.joint.02:  {to: [Z2.hose.25.01]}
  Z2.hose.25.01:        {to: [Z2.fitting.tee.01], length_m: 2}
  Z2.fitting.tee.01:    {to: [Z2.hose.25.02, Z2.hose.25.03]}
  Z2.hose.25.02:        {to: [Z2.fitting.joint.03], length_m: 1}
  Z2.fitting.joint.03:  {to: [Z2.fitting.swing.01]}
  Z2.fitting.swing.01:  {to: [Z2.head.rotor.01]}
  Z2.head.rotor.01:     {to: [Z2.nozzle.rotor.01]}
  Z2.nozzle.rotor.01:   {to: [], height_m: 11.1, nozzle: "2.5 blue", arc_deg: 150}
  Z2.hose.25.03:        {to: [Z2.fitting.joint.04], length_m: 9}
  Z2.fitting.joint.04:  {to: [Z2.fitting.swing.02]}
  Z2.fitting.swing.02:  {to: [Z2.head.rotor.02]}
  Z2.head.rotor.02:     {to: [Z2.nozzle.rotor.02]}
  Z2.nozzle.rotor.02:   {to: [], height_m: 11.2, nozzle: "5.0 blue", arc_deg: 270}

  Z3.fitting.joint.01:  {to: [Z3.valve.auto.01]}
  Z3.valve.auto.01:     {to: [Z3.fitting.joint.02], height_m: 11.2}
  Z3.fitting.joint.02:  {to: [Z3.hose.25.01]}
  Z3.hose.25.01:        {to: [Z3.fitting.tee.01], length_m: 20}
  Z3.fitting.tee.01:    {to: [Z3.hose.25.02, Z3.hose.25.03]}
  Z3.hose.25.02:        {to: [Z3.fitting.joint.03], length_m: 3}
  Z3.fitting.joint.03:  {to: [Z3.fitting.swing.01]}
  Z3.fitting.swing.01:  {to: [Z3.head.rotor.01]}
  Z3.head.rotor.01:     {to: [Z3.nozzle.rotor.01]}
  Z3.nozzle.rotor.01:   {to: [], height_m: 10.2, nozzle: "5.0 blue", arc_deg: 270}
  Z3.hose.25.03:        {to: [Z3.fitting.joint.04], length_m: 12}
  Z3.fitting.joint.04:  {to: [Z3.fitting.swing.02]}
  Z3.fitting.swing.02:  {to: [Z3.head.rotor.02]}
  Z3.head.rotor.02:     {to: [Z3.nozzle.rotor.02]}
  Z3.nozzle.rotor.02:   {to: [], height_m: 10.5, nozzle: "2.5 blue", arc_deg: 180}

  Z4.fitting.joint.01:  {to: [Z4.valve.auto.01]}
  Z4.valve.auto.01:     {to: [Z4.fitting.joint.02], height_m: 11.2}
  Z4.fitting.joint.02:  {to: [Z4.hose.25.01]}
  Z4.hose.25.01:        {to: [Z4.fitting.tee.01], length_m: 9}
  Z4.fitting.tee.01:    {to: [Z4.hose.25.02, Z4.hose.25.03]}
  Z4.hose.25.02:        {to: [Z4.fitting.joint.03], length_m: 2}
  Z4.fitting.joint.03:  {to: [Z4.fitting.swing.01]}
  Z4.fitting.swing.01:  {to: [Z4.head.spray.01]}
  Z4.head.spray.01:     {to: [Z4.nozzle.rotator.01]}
  Z4.nozzle.rotator.01: {to: [], height_m: 11.3, nozzle: "MP3000", arc_deg: 270}
  Z4.hose.25.03:        {to: [Z4.fitting.tee.02], length_m: 8}
  Z4.fitting.tee.02:    {to: [Z4.hose.25.04, Z4.hose.25.05]}
  Z4.hose.25.04:        {to: [Z4.fitting.swing.02], length_m: 6}
  Z4.fitting.swing.02:  {to: [Z4.head.spray.02]}
  Z4.head.spray.02:     {to: [Z4.nozzle.rotator.02]}
  Z4.nozzle.rotator.02: {to: [], height_m: 12.0, nozzle: "MP1000", arc_deg: 210}
  Z4.hose.25.05:        {to: [Z4.fitting.joint.04], length_m: 19}
  Z4.fitting.joint.04:  {to: [Z4.fitting.swing.03]}
  Z4.fitting.swing.03:  {to: [Z4.head.spray.03]}
  Z4.head.spray.03:     {to: [Z4.nozzle.rotator.03]}
  Z4.nozzle.rotator.03: {to: [], height_m: 12.0, nozzle: "MP2000", arc_deg: 270}

  Z5.fitting.joint.01:  {to: [Z5.hose.16.01]}
  Z5.hose.16.01:        {to: [Z5.fitting.joint.02], length_m: 10}
  Z5.fitting.joint.02:  {to: [Z5.hose.16.02]}
  Z5.hose.16.02:        {to: [Z5.valve.manual.01], length_m: 10}
  Z5.valve.manual.01:   {to: [Z5.hose.16.03], height_m: 12.2}
  Z5.hose.16.03:        {to: [Z5.nozzle.stream.01], length_m: 10}
  Z5.nozzle.stream.01:  {to: [], height_m: 12.2}

  Z6.fitting.cap.01:    {to: []}

wires:
  MAIN.pump.well.01:   [live_pump, neutral]
  MAIN.controller.01:  [live, neutral, signal_relay, signal_1, signal_2, signal_3, signal_4, relay_common, valve_common]
  MAIN.relay.01:       [signal_relay, relay_common, live, live_pump]
  Z1.valve.auto.01:    [signal_1, valve_common]
  Z2.valve.auto.01:    [signal_2, valve_common]
  Z3.valve.auto.01:    [signal_3, valve_common]
  Z4.valve.auto.01:    [signal_4, valve_common]

cable_runs:
  controller_to_valve_box: 10
  controller_to_relay: 10

location_descriptions:
  house:     indoor — main residence
  shed:      indoor — outbuilding housing the pump start relay
  well:      outdoor — underground water source housing the pump
  valve_box: outdoor — in-ground enclosure containing the manifold and 4 zone solenoid valves
  in_ground: outdoor — buried in lawn/garden

system_metadata:
  area: Netherlands, Wijchen

control_paths:
  - {via: [touchscreen],                              to: controller}
  - {via: [mobile_app, home_wifi],                    to: controller}
  - {via: [mobile_app, rainmachine_cloud, home_wifi], to: controller}

settings:
  programs:
    - {name: all_zones_sequential, scope: Z1–Z4 (all valve.auto zones), run: one at a time}
    - {name: single_zone,          scope: one of Z1–Z4}
    - {name: pump_start_only,      scope: MAIN.relay.01 only — drives pump for manual Z5}
  pump_start_to_valve_start_delay_s: 5

system_design_choices:
  backflow_preventer:   well is isolated from drinking water
  master_valve:         pump is controller-triggered and provides the leak-limiting shutoff a master valve would add
  flow_meter:           programs run one zone at a time; sensor adds failure modes; diagnostic value can be inferred from other observations
  pressure_meter:       programs run one zone at a time; sensor adds failure modes; diagnostic value can be inferred from other observations
  manual_shutoff_valve: pump on/off is the primary shutoff (Z5's valve.manual is a zone control, not a system shutoff)
  zone_1_head_mix_rationale: rotor for lawn, MP rotators for flower beds (different precipitation rates)
