# ==============================
# Irrigation System Setup
# Format:  YAML 1.2
# ==============================
system:
  type: in-ground
  area: Netherlands, Wijchen          # for climate/seasonal context

# ---------------------------
# Equipment
# ---------------------------
equipment:

  controller:
    model: RainMachine HD-16 TOUCH
    installed_yyyy_mm: 2020-08
    location: indoor house
    interfaces: [touchscreen, wifi, mobile_app, remote_via_wifi]
    notes: |
      Cloud-connected.

  pump_start_relay:
    model: Hunter PSR 52
    installed_yyyy_mm: 2020-08
    location: indoor shed
    input: 24V from controller
    output: 230V to pump
    notes: |
      Switches power to well pump before any zone activation.
      Different location than valve box.

  pump:
    type: well_pump
    model: DAB Jet               
    installed_yyyy_mm: 2023-06         # original 2003 pump replaced
    location: well
    input: 230V from pump start relay
    flow_rating_m3h: 3.8     
    pressure_rating_bar: 4.8  
    acts_as_shutoff: true  

  zone_valves:
    model: Hunter PGV-101G
    installed_yyyy_mm: 2026-05         
    location: outdoor valvebox
    input: 24V from controller
    count: 4
    type: globe
    features: [bleed_screw, flow_control]
    notes: |
      Solenoid resistance spec: 20-60 ohm

  heads_rotors:
    model: Hunter I-20-04-SS
    installed_yyyy_mm: 2020-08
    location: outdoor in-ground
    features: [Radius setscrew, FloStop, Stainless steel riser]
    type: pop-up

  heads_spray_bodies_mp:
    model: Hunter Pro-Spray PRS40 
    installed_yyyy_mm: 2020-08
    location: outdoor in-ground
    features: [40 PSI pressure-regulated]  # Optimal for MP Rotator
    type: pop-up
  
# ---------------------------
# Zones (automated)
# ---------------------------
zones:
  - id: 1
    heads:
      i20_rotors: 1
      mp_rotators: 2
      flow_rating_m3h: 2.2
      notes: |
        mixing heads is deliberate for different precipitation needs for lawn vs flower beds.

  - id: 2
    heads:
      i20_rotors: 2
      mp_rotators: 0
      flow_rating_m3h: 2.0

  - id: 3
    heads:
      i20_rotors: 2
      mp_rotators: 0
      flow_rating_m3h: 2.0

  - id: 4
    heads:
      i20_rotors: 0
      mp_rotators: 3
      flow_rating_m3h: 1.5

# ---------------------------
# Piping (hydraulic)
# ---------------------------
piping:

  main_line:
    from: pump
    to: valve_box
    size_mm: 32
    material: Polyethylene LDPE 3mm
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    length_m: 20
    notes: |
      zero freeze damage historically
  
  zone_laterals:
    from: valve_box
    to: zone_heads
    size_mm: 25
    material: Polyethylene LDPE 3mm 
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    notes: |
      zero freeze damage historically

  manual_line:
    from: valve_box           # unvalved tee off the manifold (no shutoff at the tee)
    to: manual_valve          # ball valve at the hose outlet end
    size_mm: 16
    material: Polyethylene LDPE 3mm
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    notes: |
      To use the manual valve the pump is started via the controller. Assuming all solenoid valves are shut, the manual hose fills with water, and can be opened and hose end.
      
# ---------------------------
# Wiring
# ---------------------------
wiring:

  high_voltage_230v:
    - {from: mains, to: controller}
    - {from: mains, to: pump_start_relay}
    - {from: pump_start_relay, to: pump}

  low_voltage_24v:
    - {from: controller, to: pump_start_relay, signal: pump_start}
    - {from: controller, to: pump_start_relay, signal: common_psr}
    - {from: controller, to: valve_box,        signal: zone_1}
    - {from: controller, to: valve_box,        signal: zone_2}
    - {from: controller, to: valve_box,        signal: zone_3}
    - {from: controller, to: valve_box,        signal: zone_4}
    - {from: controller, to: valve_box,        signal: common_zones}

  cable_runs:
    controller_to_valve_box_m: 10
    controller_to_psr_m: 10

# ---------------------------
# Control paths (signal flow from user to system)
# ---------------------------
control_paths:
  - source: user
    via: [touchscreen]
    target: controller
  - source: user
    via: [phone_app, home_wifi]
    target: controller
  - source: user
    via: [phone_app, rainmachine_cloud, home_wifi]
    target: controller

# ---------------------------
# Settings
# ---------------------------
settings:

  programs: [run all zones sequentially, run each zone individually, pump start only]
  pump_start_to_valve_start_delay_s: 5

# ---------------------------
# System Design Choices
# ---------------------------
system_design_choices:

  - back_flow_preventer_installed: false # well is completely isolated from drinking water.
  - master_valve_installed: false # pump is purely controller-triggered, and provides the leak-limiting shutoff a master valve would add. 
  - flow_meter_installed: false # max one zone runs at a time, pump is purely controller-triggered, sensor itself adds failure mode(s), diagnostic value inferable elsewhere.
  - pressure_meter_installed: false # max one zone runs at a time, pump is purely controller-triggered, sensor itself adds failure mode(s), diagnostic value inferable elsewhere.


