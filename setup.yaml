# Irrigation System Specification
# Wijchen, Netherlands — installed 2020-08
# Describes equipment, topology, wiring, control paths, and design choices.

conventions:
  units:
    height_m:               meters above sea level (NAP — Dutch ordnance datum)
    flow_rating_m3h:        cubic meters per hour (equipment capacity)
    flow_demand_m3h:        cubic meters per hour (theoretical demand, sum of nozzle ratings)
    expected_flow_m3h:      cubic meters per hour (per-head computed from flow_model)
    pressure_rating_bar:    bar (equipment capacity)
    length_m:               meters
    installed_yyyy_mm:      ISO 8601 year-month
    price_eu:               euros (reference/replacement cost)
  identifiers:
    zone_id:     integer; 1..4 are automatic, 5 is manual
    head_naming: model (e.g. "I-20") or model+series (e.g. "MP3000")

locations:
  house:      indoor — main residence
  shed:       indoor — outbuilding housing the pump start relay
  well:       outdoor — underground water source housing the pump
  valve_box:  outdoor — in-ground enclosure containing the manifold and 4 zone solenoid valves
  in_ground:  outdoor — buried in lawn/garden

system:
  type: in-ground
  area: Netherlands, Wijchen
  zones_automatic: 4
  zones_manual: 1
  water_source: well_pump

flow_model:
  assumed_system_pressure_bar: 3.0
  mp_rotator_regulated_pressure_psi: 40

equipment:

  controller:
    model: RainMachine HD-16 TOUCH
    installed_yyyy_mm: 2020-08
    location: house
    interfaces: [touchscreen, wifi, mobile_app]

  pump_start_relay:
    model: Hunter PSR-22 (24V to 1-phase 230V)
    installed_yyyy_mm: 2020-08
    price_eu: 100
    location: shed

  pump:
    type: well_pump
    model: DAB Jet
    installed_yyyy_mm: 2023-06
    location: well
    height_m: 7.2
    flow_rating_m3h: 3.8
    pressure_rating_bar: 4.8

  manifold:
    model: LEV 6-way distributor
    installed_yyyy_mm: 2020-08
    price_eu: 150
    location: valve_box
    inlets: 1
    outlets: 6
    outlet_usage:
      zone_1_valve: 1
      zone_2_valve: 1
      zone_3_valve: 1
      zone_4_valve: 1
      manual_line:  1
      capped:       1
    connection: 1" swivel nut, female thread
    flow_rating_m3h: 7
    pressure_rating_bar: 10
    material: hard plastic

  zone_valves:
    model: Hunter PGV-101G
    installed_yyyy_mm: 2020-08
    price_eu: 25
    location: valve_box
    height_m: 11.2
    count: 4
    type: globe
    min_pressure_bar: 1.5
    max_pressure_bar: 10.3
    min_flow_m3h: 0.1
    max_flow_m3h: 9.0
    features: [bleed_screw, flow_control]
    solenoid_resistance_ohm: {min: 20, max: 60}

  swing_joints_rotor:
    model: Hunter SJ swing joint, 3/4" male both ends
    price_eu: 5
    location: in_ground
    connects: zone lateral to I-20 rotor inlet
    flow_rating_m3h: 2.3
    pressure_rating_bar: 10.2

  swing_joints_mp:
    model: Hunter SJ swing joint, 3/4" to 1/2" male both ends
    location: in_ground
    connects: zone lateral to MP rotator spray-body inlet
    flow_rating_m3h: 1.8
    pressure_rating_bar: 10.2

  heads_rotors:
    model: Hunter I-20-04-SS
    price_eu: 25
    installed_yyyy_mm: 2020-08
    location: in_ground
    inlet: 3/4"
    type: pop-up
    features: [radius_setscrew, FloStop, stainless_steel_riser]

  heads_spray_bodies_mp:
    model: Hunter Pro-Spray PRS40
    price_eu: 25
    installed_yyyy_mm: 2020-08
    location: in_ground
    inlet: 1/2"
    type: pop-up
    features: [pressure_regulated_40psi]

zones:

  - id: 1
    type: automatic
    flow_demand_m3h: 1.69
    heads:
      i20_rotors:  1
      mp_rotators: 2
    head_mix_rationale: rotor for lawn, MP rotators for flower beds (different precipitation rates)
    lateral_layout:
      tee_1:
        hose_a: {head: MP3000, arc_deg: 270, height_m: 10.5, length_m: 15, expected_flow_m3h: 0.62}
        hose_b:
          tee_2:
            hose_a: {head: I-20,   nozzle: "4.0 blue", arc_deg: 170, height_m: 11.6, length_m: 12, expected_flow_m3h: 0.90}
            hose_b: {head: MP2000, arc_deg: 180,                     height_m: 11.4, length_m: 28, expected_flow_m3h: 0.17}

  - id: 2
    type: automatic
    flow_demand_m3h: 1.68
    heads:
      i20_rotors:  2
      mp_rotators: 0
    lateral_layout:
      tee_1:
        hose_a: {head: I-20, nozzle: "2.5 blue", arc_deg: 150, height_m: 11.1, length_m: 3,  expected_flow_m3h: 0.54}
        hose_b: {head: I-20, nozzle: "5.0 blue", arc_deg: 270, height_m: 11.2, length_m: 11, expected_flow_m3h: 1.14}

  - id: 3
    type: automatic
    flow_demand_m3h: 1.68
    heads:
      i20_rotors:  2
      mp_rotators: 0
    lateral_layout:
      tee_1:
        hose_a: {head: I-20, nozzle: "5.0 blue", arc_deg: 270, height_m: 10.2, length_m: 23, expected_flow_m3h: 1.14}
        hose_b: {head: I-20, nozzle: "2.5 blue", arc_deg: 180, height_m: 10.5, length_m: 32, expected_flow_m3h: 0.54}

  - id: 4
    type: automatic
    flow_demand_m3h: 0.97
    heads:
      i20_rotors:  0
      mp_rotators: 3
    lateral_layout:
      tee_1:
        hose_a: {head: MP3000, arc_deg: 270, height_m: 11.3, length_m: 11, expected_flow_m3h: 0.62}
        hose_b:
          tee_2:
            hose_a: {head: MP1000, arc_deg: 210, height_m: 12.0, length_m: 23, expected_flow_m3h: 0.10}
            hose_b: {head: MP2000, arc_deg: 270, height_m: 12.0, length_m: 36, expected_flow_m3h: 0.25}

  - id: 5
    type: manual
    terminates_at: manual_valve

piping:

  main_line:
    from: pump
    to: valve_box
    size_mm: 32
    material: polyethylene LDPE, 3mm wall
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    length_m: 20
    fittings:
      - 32mm PE 10bar to 1" male thread

  zone_laterals:
    from: valve_box
    to: heads (per zone)
    size_mm: 25
    material: polyethylene LDPE, 2.7mm wall
    pressure_rating_bar: 6
    installed_yyyy_mm: 2020-08
    fittings:
      - 25mm to 25mm connection (x4)
      - 1" male thread to 25mm PE 10bar (x4)
      - 25mm tee (x6)
      - 25mm to 3/4" PE 10bar fitting

  manual_line:
    from: valve_box
    to: manual_valve
    size_mm: 16
    material: polyethylene LDPE, 3mm wall
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    fittings:
      - 1" male thread to 16mm PE 10bar

wiring:

  high_voltage_230v:
    - {from: mains,            to: controller}
    - {from: mains,            to: pump_start_relay}
    - {from: pump_start_relay, to: pump}

  low_voltage_24v:
    - {from: controller, to: pump_start_relay, signal: pump_start}
    - {from: controller, to: pump_start_relay, signal: common_psr,    role: shared neutral return for pump_start_relay}
    - {from: controller, to: valve_box,        signal: zone_1}
    - {from: controller, to: valve_box,        signal: zone_2}
    - {from: controller, to: valve_box,        signal: zone_3}
    - {from: controller, to: valve_box,        signal: zone_4}
    - {from: controller, to: valve_box,        signal: common_zones,  role: shared neutral return for all 4 zone solenoids}

  cable_runs:
    controller_to_valve_box_m: 10
    controller_to_pump_start_relay_m: 10

control_paths:
  - {source: user, via: [touchscreen],                             target: controller}
  - {source: user, via: [phone_app, home_wifi],                    target: controller}
  - {source: user, via: [phone_app, rainmachine_cloud, home_wifi], target: controller}

settings:
  programs:
    - {name: all_zones_sequential, scope: all automatic zones}
    - {name: single_zone,          scope: one automatic zone}
    - {name: pump_start_only,      scope: pump_start_relay only (used for zone 5)}
  pump_start_to_valve_start_delay_s: 5

system_design_choices:
  back_flow_preventer:
    installed: false
    rationale: well is isolated from drinking water
  master_valve:
    installed: false
    rationale: pump is controller-triggered and provides the leak-limiting shutoff a master valve would add
  flow_meter:
    installed: false
    rationale: programs run one zone at a time; sensor adds failure modes; diagnostic value can be inferred from other observations
  pressure_meter:
    installed: false
    rationale: programs run one zone at a time; sensor adds failure modes; diagnostic value can be inferred from other observations
  manual_shutoff_valve:
    installed: false
    rationale: pump on/off serves as the primary shutoff
