# ==============================
# Irrigation System Setup
# Format:  YAML 1.2
# ==============================
system:
  type: in-ground
  area: Netherlands, Wijchen          # for climate/seasonal context

# ---------------------------
# Equipment
# ---------------------------
equipment:

  controller:
    model: RainMachine HD-16 TOUCH
    installed_yyyy_mm: 2020-08
    location: indoor house
    interfaces: [touchscreen, wifi, mobile_app, remote_via_wifi]
    notes: |
      Cloud-connected.

  pump_start_relay:
    model: Hunter PSR 52
    installed_yyyy_mm: 2020-08
    location: indoor shed
    input: 24V from controller
    output: 230V to pump
    notes: |
      Switches power to well pump before any zone activation.
      Different location than valve box.

  pump:
    type: well_pump
    model: DAB Jet               
    installed_yyyy_mm: 2023-06         # original 2003 pump replaced
    location: well
    input: 230V from pump start relay
    flow_rating_m3h: 3.8     
    pressure_rating_bar: 4.8  
    acts_as_shutoff: true  

  manifold:
    model: LEV 6-way manifold distributor
    location: outdoor valvebox
    type: distributor
    inlets: 1                          # main line enters the end
    outlets: 6                         # 4 zone valves + manual line; 1 spare, capped
    connection: 1" swivel nut, female thread
    flow_rating_m3h: 7                 # max
    pressure_rating_bar: 10            # max working
    material: hard plastic
    notes: |
      Distribution block in the valve box. Main line connects to the single end inlet;
      the four zone valves and the manual line tee off the side outlets.
      The unused sixth outlet is closed with a polyethylene end cap.

  zone_valves:
    model: Hunter PGV-101G
    installed_yyyy_mm: 2026-05         
    location: outdoor valvebox
    input: 24V from controller
    count: 4
    type: globe
    min_pressure_bar: 1.5
    max_pressure_bar: 10.3
    min_flow_m3h: 0.1
    max_flow_m3h: 9.0
    features: [bleed_screw, flow_control]
    notes: |
      Solenoid resistance spec: 20-60 ohm

  swing_joints_rotor:
    model: Hunter SJ swing joint, 3/4" male both ends
    location: outdoor in-ground
    connects: zone hose to I-20 rotor inlet
    flow_rating_m3h: 2.3
    pressure_rating_bar: 10.2

  swing_joints_mp:
    model: Hunter SJ swing joint, 3/4" to 1/2" male both ends
    location: outdoor in-ground
    connects: zone hose to MP rotator spray-body inlet
    flow_rating_m3h: 1.8
    pressure_rating_bar: 10.2

  heads_rotors:
    model: Hunter I-20-04-SS
    installed_yyyy_mm: 2020-08
    location: outdoor in-ground
    inlet: 3/4"
    features: [Radius setscrew, FloStop, Stainless steel riser]
    type: pop-up

  heads_spray_bodies_mp:
    model: Hunter Pro-Spray PRS40
    installed_yyyy_mm: 2020-08
    location: outdoor in-ground
    inlet: 1/2"
    features: [40 PSI pressure-regulated]  # Optimal for MP Rotator
    type: pop-up
  
# ---------------------------
# Zones (automated)
# ---------------------------
zones:
  # lateral_layout: branch tree from the valve outlet. Each tee (T-split) feeds two
  # hoses; a hose ends in a head or in the next tee. Each head sits on its own swing
  # joint, dead-ended. Leaf = {head, arc_deg, height_m, length_m}: head is an I-20
  # rotor (-> 3/4" SJ) or a Hunter MP Rotator nozzle MP2000/MP3000 (-> 3/4"-1/2" SJ);
  # arc_deg is the set arc; height_m is elevation vs the valve box (+ above / - below);
  # length_m is hose run length from the valve box to the head.
  - id: 1
    heads:
      i20_rotors: 1
      mp_rotators: 2
      flow_rating_m3h: 2.2
      notes: |
        mixing heads is deliberate for different precipitation needs for lawn vs flower beds.
    lateral_layout:
      tee_1:                # at valve outlet
        hose_a: {head: MP3000, arc_deg: 270, height_m: -2, length_m: 15}
        hose_b:
          tee_2:
            hose_a: {head: I-20, arc_deg: 180, height_m: 1, length_m: 10}
            hose_b: {head: MP2000, arc_deg: 180, height_m: 3, length_m: 15}

  - id: 2
    heads:
      i20_rotors: 2
      mp_rotators: 0
      flow_rating_m3h: 2.0
    lateral_layout:
      tee_1:                # at valve outlet
        hose_a: {head: I-20, arc_deg: 160, height_m: 0, length_m: 5}
        hose_b: {head: I-20, arc_deg: 270, height_m: 0, length_m: 10}

  - id: 3
    heads:
      i20_rotors: 2
      mp_rotators: 0
      flow_rating_m3h: 2.0
    lateral_layout:
      tee_1:                # at valve outlet
        hose_a: {head: I-20, arc_deg: 270, height_m: -3, length_m: 25}
        hose_b: {head: I-20, arc_deg: 180, height_m: -2, length_m: 35}

  - id: 4
    heads:
      i20_rotors: 0
      mp_rotators: 3
      flow_rating_m3h: 1.5
    lateral_layout:
      tee_1:                # at valve outlet
        hose_a: {head: MP3000, arc_deg: 270, height_m: 1, length_m: 20}
        hose_b:
          tee_2:
            hose_a: {head: MP2000, arc_deg: 180, height_m: 2, length_m: 30}
            hose_b: {head: MP2000, arc_deg: 180, height_m: 3, length_m: 40}

# ---------------------------
# Piping (hydraulic)
# ---------------------------
piping:

  main_line:
    from: pump
    to: valve_box
    size_mm: 32
    material: Polyethylene LDPE 3mm
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    length_m: 20
    fittings:
      - PE 10 bar, 32 mm to 1" male thread    # main line into manifold inlet
    notes: |
      zero freeze damage historically

  zone_laterals:
    from: valve_box
    to: zone_heads
    size_mm: 25
    material: Polyethylene LDPE 3mm
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    fittings:
      - 25 mm to 25 mm connection, 4x             # manifold outlet to valve inlet
      - PE 10 bar, 1" male thread to 25 mm, 4x    # valve outlet to zone hose
      - 25 mm tee, 6x                             # T-splits; per-zone arrangement in zones[].lateral_layout
      - PE 10 bar, 25 mm to 3/4" fitting          # zone hose to swing joint (one per head)
    notes: |
      zero freeze damage historically

  manual_line:
    from: valve_box           # unvalved tee off the manifold (no shutoff at the tee)
    to: manual_valve          # ball valve at the hose outlet end
    size_mm: 16
    material: Polyethylene LDPE 3mm
    pressure_rating_bar: 6.3
    installed_yyyy_mm: 2020-08
    fittings:
      - PE 10 bar, 1" male thread to 16 mm    # manifold outlet to manual line
    notes: |
      To use the manual valve the pump is started via the controller. Assuming all solenoid valves are shut, the manual hose fills with water, and can be opened and hose end.
      
# ---------------------------
# Wiring
# ---------------------------
wiring:

  high_voltage_230v:
    - {from: mains, to: controller}
    - {from: mains, to: pump_start_relay}
    - {from: pump_start_relay, to: pump}

  low_voltage_24v:
    - {from: controller, to: pump_start_relay, signal: pump_start}
    - {from: controller, to: pump_start_relay, signal: common_psr}
    - {from: controller, to: valve_box,        signal: zone_1}
    - {from: controller, to: valve_box,        signal: zone_2}
    - {from: controller, to: valve_box,        signal: zone_3}
    - {from: controller, to: valve_box,        signal: zone_4}
    - {from: controller, to: valve_box,        signal: common_zones}

  cable_runs:
    controller_to_valve_box_m: 10
    controller_to_psr_m: 10

# ---------------------------
# Control paths (signal flow from user to system)
# ---------------------------
control_paths:
  - source: user
    via: [touchscreen]
    target: controller
  - source: user
    via: [phone_app, home_wifi]
    target: controller
  - source: user
    via: [phone_app, rainmachine_cloud, home_wifi]
    target: controller

# ---------------------------
# Settings
# ---------------------------
settings:

  programs: [run all zones sequentially, run each zone individually, pump start only]
  pump_start_to_valve_start_delay_s: 5

# ---------------------------
# System Design Choices
# ---------------------------
system_design_choices:

  - back_flow_preventer_installed: false # well is completely isolated from drinking water.
  - master_valve_installed: false # pump is purely controller-triggered, and provides the leak-limiting shutoff a master valve would add. 
  - flow_meter_installed: false # max one zone runs at a time, pump is purely controller-triggered, sensor itself adds failure mode(s), diagnostic value inferable elsewhere.
  - pressure_meter_installed: false # max one zone runs at a time, pump is purely controller-triggered, sensor itself adds failure mode(s), diagnostic value inferable elsewhere.


