# Effort scoring for the irrigation troubleshooting engine.
#
# Each question is assigned a level (1..6). Higher level = lower effort
# for the homeowner = bigger boost to the discriminator (more attractive
# to ask early). The engine adds `level * weight` to D, alongside the
# spread and breadth terms.
#
# Edit this file to retune. Run `npm run export-effort` to regenerate
# effort.js (browser) and effort.json (Python).

# Weight applied to each question's level when computing D.
# Chosen so that a max-effort question (level 6) contributes ~30, on
# par with the maximum breadth term (21 causes * 1.5 = 31.5) and the
# maximum spread observed in the catalogue.
weight: 5.0

levels:
  6:
    name: easy-recollection
    description: >
      Recent and repeated. User already knows the answer from memory
      because the system did the thing this week, or the data is
      already on hand (e.g. install dates in setup.yaml). No walking,
      no waiting, no comparison.
  5:
    name: walk-observe
    description: >
      Walk through the garden while the system runs and easily see or
      hear what's happening at a head, hose, or meter that already
      exists. Single obvious signal, no instruments.
  4:
    name: observe-or-recall-hard
    description: >
      Either stand at a specific spot during a cycle and watch/listen
      for multiple signals, wait for the system to settle, compare
      two states — or recall a distant, one-off event (a storm last
      month, a service visit weeks ago) and reason about behaviour
      before vs after. Mentally or physically deliberate.
  3:
    name: minor-manual
    description: >
      Light hands-on work — open the controller cabinet or valve box,
      run a manual cycle, turn a bleed screw, swap an app setting.
      No tools beyond what's already at the controller.
  2:
    name: tools-or-disassembly
    description: >
      Use a multimeter for voltage or resistance, or open a valve to
      inspect internals. Requires a tool, care not to damage parts,
      and knowing where to probe.
  1:
    name: significant-labor
    description: >
      Install missing hardware (e.g. a flow meter), swap parts with a
      known-good spare, dig up hoses, or call in a professional.
      Requires spares, plumbing skill, or significant time.

# Per-question effort level. Levels reference the table above.
questions:
  Q1: 6   # Scope of failure — they already know which zones fail
  Q2: 5   # Water leaving rotors — visual check at the heads while running
  Q3: 5   # Pump behaviour — listen at the pump while running
  Q4: 3   # App vs controller — start the system both ways and compare
  Q5: 3   # Manual hose flow — open the manual hose at the pump and look
  Q6: 4   # Sound at valve activation — stand at the valve box during a cycle
  Q7: 6   # Did restarting help — recall from earlier attempts
  Q8: 6   # Progression pattern — recall how the issue started
  Q9: 6   # Equipment ages — already in setup.yaml; confirm from memory
  Q10: 4  # Recent service or work — recall a distant one-off and reason before/after
  Q11: 4  # Storms, freeze, outages, pests — recall a distant one-off and reason before/after
  Q12: 3  # Manual bleed screw open — open valve box, turn the solenoid
  Q13: 2  # Controller voltage during call — multimeter at terminals
  Q14: 2  # Resistance slots in controller — multimeter at terminals
  Q15: 2  # Solenoid coil resistance — multimeter at the solenoid
  Q16: 1  # Swap valve with known-good — requires a spare and plumbing
  Q17: 2  # Open each valve and inspect — disassembly, no plumbing change
  Q18: 5  # Visible water or wet ground — walk the route and look
  Q19: 1  # Flow meter reading — no meter installed (setup.yaml), would need to install one
