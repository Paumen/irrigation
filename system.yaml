electrical:
  S2_source.socket:   {to: [S2_wiring.230v_1]}
  S2_wiring.230v_1:   {to: [S2_relay.pumpstart.line]}
  # Relay: 230v switched path (line -> contact -> load), gated by the 24v coil
  S2_relay.pumpstart.line:        {to: [S2_relay.pumpstart.contact]}
  S2_relay.pumpstart.contact:     {to: [S2_relay.pumpstart.load]}
  S2_relay.pumpstart.load:        {to: [S2_wiring.230v_2]}
  S2_relay.pumpstart.coil_in:     {to: [S2_relay.pumpstart.coil]}
  S2_relay.pumpstart.coil:        {to: [S2_relay.pumpstart.coil_common]}
  S2_relay.pumpstart.coil_common: {}
  S2_wiring.230v_2:   {to: [S1_source.socket]}
  # Pump motor winding sits across the 230v line/neutral
  S1_source.socket:          {to: [S1_pump.jet.motor_line]}
  S1_pump.jet.motor_line:    {to: [S1_pump.jet.motor_winding]}
  S1_pump.jet.motor_winding: {to: [S1_pump.jet.motor_neutral]}
  S1_pump.jet.motor_neutral: {}

  O1_source.socket:   {to: [O1_wiring.230v_1]}
  O1_wiring.230v_1:   {to: [O1_control.controller.line]}
  # Controller: 230v primary -> step-down transformer -> 24v station/common outputs
  O1_control.controller.line: {to: [O1_control.controller.transformer]}
  O1_control.controller.transformer:
    to: [D1_wiring.24v/signal_z2, D1_wiring.24v/signal_z3, D1_wiring.24v/signal_z4,
         D1_wiring.24v/signal_z5, D1_wiring.24v/common,
         S2_wiring.24v/signal, S2_wiring.24v/common]
  S2_wiring.24v:
    to:
      signal: [S2_relay.pumpstart.coil_in]
      common: [S2_relay.pumpstart.coil_common]
  D1_wiring.24v:
    to:
      signal_z2: [O1_wiring.splice_1]
      signal_z3: [O1_wiring.splice_2]
      signal_z4: [O1_wiring.splice_3]
      signal_z5: [O1_wiring.splice_4]
      common:    [O1_wiring.splice_8]
  O1_wiring.splice_1: {to: [Z2_valve.auto.coil]}  
  O1_wiring.splice_2: {to: [Z3_valve.auto.coil]}   
  O1_wiring.splice_4: {to: [Z5_valve.auto.coil]}   
  O1_wiring.splice_3: {to: [Z4_valve.auto.coil]}  
  Z2_valve.auto.coil: {to: [O1_wiring.splice_5]}
  Z3_valve.auto.coil: {to: [O1_wiring.splice_6]}
  Z5_valve.auto.coil: {to: [O1_wiring.splice_7]}
  Z4_valve.auto.coil: {to: [O1_wiring.splice_8]}
  O1_wiring.splice_5: {to: [O1_wiring.common_1]}   
  O1_wiring.common_1: {to: [O1_wiring.splice_6]}
  O1_wiring.splice_6: {to: [O1_wiring.common_2]}
  O1_wiring.common_2: {to: [O1_wiring.splice_7]}
  O1_wiring.splice_7: {to: [O1_wiring.common_3]}
  O1_wiring.common_3: {to: [O1_wiring.splice_8]}
  O1_wiring.splice_8: {}

