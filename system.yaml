system_metadata:
  area: Netherlands, Wijchen

system:
  required: [installed_yyyy]
  required_all_except:
    - {fields: [interfaces, price], exempt: [source]}

category:
  head:      {requires_one: [nozzle, bore_mm]}
  enclosure: {}
  joint:     {loss: k, requires: [max_bar, material]}
  hose:      {loss: hz, requires: [od_mm, id_mm, wall_mm, max_bar]}
  pump:      {requires: [max_outlet_bar]}
  relay:     {}
  source:    {}
  valve:     {loss: Kv_else_k, requires_one: [Kv, k]}
  wiring:    {}
  control:   {requires: [v_outlet]}

interface_types:
  bm1:    {joint: BSP,         size: G1,   gender: M, seal: teflon}
  bf1:    {joint: BSP,         size: G1,   gender: F, seal: teflon}
  bm34:   {joint: BSP,         size: G3/4, gender: M, seal: teflon}
  bf34:   {joint: BSP,         size: G3/4, gender: F, seal: teflon}
  bm12:   {joint: BSP,         size: G1/2, gender: M, seal: teflon}
  bf12:   {joint: BSP,         size: G1/2, gender: F, seal: teflon}
  c16:    {joint: compress, size: "∅16", gender: F, seal: comp-ring}
  c25:    {joint: compress, size: "∅25", gender: F, seal: comp-ring}
  c32:    {joint: compress, size: "∅32", gender: F, seal: comp-ring}
  cm16:   {joint: compress, size: "∅16", gender: M, seal: comp-ring}
  cm25:   {joint: compress, size: "∅25", gender: M, seal: comp-ring}
  cm32:   {joint: compress, size: "∅32", gender: M, seal: comp-ring}
  sm1:    {joint: swivel-union, size: G1,   gender: M, seal: hose}
  sf1:    {joint: swivel-union, size: G1,   gender: F, seal: washer}
  barb25:  {joint: barb,        size: "∅25", gender: M, seal: clamp}
  barbf25: {joint: barb,        size: "∅25", gender: F, seal: clamp}
  ac_line: {domain: 230v}
  ac_neutral: {domain: 230v}
  ac_earth: {domain: 230v}
  sig_24v: {domain: 24v}
  com_24v: {domain: 24v}

defaults:
  items:  {installed_yyyy: 2020}
  hose:   {roughness_mm: 0.0015, hz_c: 150, price_eur_m: 2, max_bar: 6}
  joint:  {material: plastic, price_eur: 5, max_bar: 10, k: 0.1}
  wiring: {price_eur_m: 2}
  spring: {material: stainless steel}

items:

  source.well:
    installed_yyyy: 1713
    states:
      wet: {}
      dry: {}

  source.socket:
    interfaces: [ac_line, ac_neutral, ac_earth]
    states:
      live: {}
      dead: {}
    items:
      line: {}
      neutral: {}
      earth: {}

  pump.jet:
    installed_yyyy: 2023
    price_eur: 350
    model: "DAB AQUAJET 132 M"
    max_outlet_bar: 4.7
    interfaces: [bf1, bf1, ac_line, ac_neutral, ac_earth]
    states:
      primed:
        needs: ["joint.hosetail_plastic = wet", "body/priming_chamber = wet"]
      unprimed:
        needs_any: ["joint.hosetail_plastic = dry", "body/priming_chamber = dry"]
      pressurised:
        needs: ["relay.pumpstart/load = live", "pump.jet = primed"]
      unpressurised:
        needs_any: ["relay.pumpstart/load = dead", "pump.jet = unprimed"]
      body/priming_chamber:
        wet: {}
        dry: {}
    items:
      tank_hose:
        to: tank
      tank:
        model: "DAB 20 L diaphragm tank"
        volume_l: 20
        items:
          shell:     {material: steel}
          bladder:   {material: rubber}
          pre_charge: {}
          air_charge: {feature: true}
          draw_down:  {feature: true}
      body:
        material: plastic
        items:
          venturi:   {to: body/impeller}
          impeller:  {to: body/diffuser, material: plastic}
          diffuser:  {to: /tank_hose, material: plastic}
          mech_seal: {material: ceramic}
          priming_cap: {}
          recirculation_passage: {feature: true}
          priming_chamber:     {feature: true}
      motor:
        items:
          line: {to: motor/winding}
          winding: {to: motor/neutral, material: copper}
          capacitor: {}
          thermal_protector: {}
          neutral: {}
          earth: {}

  control.controller:
    price_eur: 200
    model: "RainMachine HD-12 TOUCH"
    interfaces: [ac_line, ac_neutral, com_24v, sig_24v, sig_24v, sig_24v, sig_24v, sig_24v, sig_24v, com_24v, sig_24v, sig_24v, sig_24v, sig_24v, sig_24v, sig_24v]
    states:
      transformer:
        live: {needs: ["source.socket = live"]}
        dead: {needs: ["source.socket = dead"]}
      terminals/common:
        live: {needs: ["transformer = live"]}
        dead: {needs: ["transformer = dead"]}
      terminals/port:
        live: {needs: ["transformer = live"]}
        dead: {}
    items:
      line: {to: transformer/line}
      neutral: {to: transformer/neutral}
      transformer:
        v_outlet: 24
        items:
          line: {to: transformer/winding}
          neutral: {}
          winding: {to: terminals/common}
      terminals:
        items:
          ac_line:  {count: 2}
          common: {count: 2}
          port:     {count: 12}

  relay.pumpstart:
    price_eur: 100
    model: "Hunter PSR-22"
    interfaces: [ac_line, ac_neutral, ac_earth, sig_24v, com_24v]
    states:
      coil:
        live: {needs: ["control.controller/terminals/port = live", "control.controller/terminals/common = live"]}
        dead: {needs_any: ["control.controller/terminals/port = dead", "control.controller/terminals/common = dead"]}
      load:
        live: {needs: ["coil = live", "source.socket = live"]}
        dead: {needs_any: ["coil = dead", "source.socket = dead"]}
    items:
      coil_in:     {to: coil}
      coil: {to: coil_common}
      coil_common: {}
      contact:     {to: load}
      line: {to: contact}
      load:        {}
      neutral: {}
      earth: {}

  wiring.230v:
    interfaces: [ac_line, ac_neutral, ac_earth, ac_line, ac_neutral, ac_earth]
    items:
      line: {}
      neutral: {}
      earth: {}

  wiring.24v.bundle:
    interfaces: [24v, 24v, 24v, 24v, 24v]

  wiring.24:
    interfaces: [24v, 24v]

  hose.suction.set:
    price_eur: 50
    items:
      valve.foot.set:
        installed_yyyy: 2026
        items:
          valve.foot:
            price_eur: 15
            material: brass
            k: 2.5
            interfaces: [bm1, bf1]
            states:
              wet: {needs: ["joint.strainer = wet"]}
              dry: {needs: ["joint.strainer = dry"]}
          joint.strainer:
            price_eur: 10
            k: 1.0
            interfaces: [bf1]
            states:
              wet: {needs: ["source.well = wet"]}
              dry: {needs: ["source.well = dry"]}
          joint.hosetail_brass:
            price_eur: 5
            material: brass
            k: 0.9
            interfaces: [bm1, barb25]
            states:
              wet: {needs: ["valve.foot = wet"]}
              dry: {needs: ["valve.foot = dry"]}
      hose.suction:
        installed_yyyy: 2023
        price_eur_m: 5
        material: PVC
        od_mm: 25
        wall_mm: 0.5
        id_mm: 24
        max_bar: 5
        interfaces: [barbf25, barbf25]
        states:
          wet: {needs: ["joint.hosetail_brass = wet"]}
          dry: {needs: ["joint.hosetail_brass = dry"]}
      clamp:
        installed_yyyy: 2026
        price_eur: 1
        count: 2
      joint.hosetail_plastic:
        installed_yyyy: 2023
        price_eur: 5
        max_bar: 6
        k: 0.9
        interfaces: [barb25, bm1]
        states:
          wet: {needs: ["hose.suction = wet"]}
          dry: {needs: ["hose.suction = dry"]}

  hose.ldpe16:
    material: LDPE
    od_mm: 16
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}
    wall_mm: 2
    id_mm: 12
    interfaces: [cm16, cm16]

  hose.ldpe25:
    material: LDPE
    od_mm: 25
    wall_mm: 2.7
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}
    id_mm: 19.6
    interfaces: [cm25, cm25]

  hose.ldpe32:
    material: LDPE
    od_mm: 32
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}
    wall_mm: 3
    id_mm: 26
    interfaces: [cm32, cm32]

  joint.bm1c32:
    interfaces: [bm1, c32]
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}

  joint.c32c32:
    interfaces: [c32, c32]
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}

  joint.bm1c25:
    interfaces: [bm1, c25]
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}

  joint.c25bf34:
    interfaces: [c25, bf34]
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}

  joint.c16c16:
    interfaces: [c16, c16]
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}

  joint.c32sm1:
    max_bar: 10
    k: 0.1
    material: brass
    interfaces: [c32, sm1]
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}

  joint.sm1bm1:
    material: brass
    interfaces: [sm1, bm1]
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}

  joint.sm1c16:
    material: brass
    interfaces: [sm1, c16]
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}

  joint.sj34x12:
    bends: 4
    bore_mm: 13
    k: 3.5
    model: "Hunter sj 3/4x1/2"
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}
    interfaces: [bm34, bm12]

  joint.sj34x34:
    bends: 4
    bore_mm: 19
    k: 2.5
    model: "Hunter sj 3/4x3/4"
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}
    interfaces: [bm34, bm34]

  joint.tee:
    price_eur: 10
    bends: 1
    k: 0.9
    interfaces: [c25, c25, c25]
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}

  joint.tee_c25bf34:
    price_eur: 10
    bends: 1
    k: 0.9
    interfaces: [c25, bf34, c25]
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}

  joint.manifold:
    price_eur: 150
    bore_mm: 25
    max_bar: 10
    bends: 1
    k: 1.5
    model: "LEV 6-way distributor"
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}
