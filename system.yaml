system_metadata:
  area: Netherlands, Wijchen

system:
  required: [installed_yyyy]
  required_all_except:
    - {fields: [interfaces, price], exempt: [source]}

category:
  head:      {requires_one: [nozzle, bore_mm]}
  enclosure: {}
  joint:     {loss: k, requires: [max_bar, material]}
  hose:      {loss: hz, requires: [od_mm, id_mm, wall_mm, max_bar]}
  pump:      {requires: [max_outlet_bar]}
  relay:     {}
  source:    {}
  valve:     {loss: Kv_else_k, requires_one: [Kv, k]}
  wiring:    {}
  control:   {requires: [v_outlet]}

interface_types:
  bm1:    {joint: BSP,         size: G1,   gender: M, seal: teflon}
  bf1:    {joint: BSP,         size: G1,   gender: F, seal: teflon}
  bm34:   {joint: BSP,         size: G3/4, gender: M, seal: teflon}
  bf34:   {joint: BSP,         size: G3/4, gender: F, seal: teflon}
  bm12:   {joint: BSP,         size: G1/2, gender: M, seal: teflon}
  bf12:   {joint: BSP,         size: G1/2, gender: F, seal: teflon}
  c16:    {joint: compress, size: "∅16", gender: F, seal: comp-ring}
  c25:    {joint: compress, size: "∅25", gender: F, seal: comp-ring}
  c32:    {joint: compress, size: "∅32", gender: F, seal: comp-ring}
  cm16:   {joint: compress, size: "∅16", gender: M, seal: comp-ring}
  cm25:   {joint: compress, size: "∅25", gender: M, seal: comp-ring}
  cm32:   {joint: compress, size: "∅32", gender: M, seal: comp-ring}
  sm1:    {joint: swivel-union, size: G1,   gender: M, seal: hose}
  sf1:    {joint: swivel-union, size: G1,   gender: F, seal: washer}
  barb25:  {joint: barb,        size: "∅25", gender: M, seal: clamp}
  barbf25: {joint: barb,        size: "∅25", gender: F, seal: clamp}
  ac_line: {domain: 230v}
  ac_neutral: {domain: 230v}
  ac_earth: {domain: 230v}
  sig_24v: {domain: 24v}
  com_24v: {domain: 24v}

