water:
  # Suction side: well -> strainer mesh -> foot check valve -> pump
  S1_source.well:            {to: [S1_joint.strainer.mesh], h_m: 5.6}
  S1_joint.strainer.mesh:    {to: [S1_valve.foot.disc], h_m: 4.2}
  S1_valve.foot.disc:        {to: [S1_valve.foot.seat], h_m: 4.8}
  S1_valve.foot.seat:        {to: [S1_joint.hosetail_brass], h_m: 4.8}
  S1_joint.hosetail_brass:   {to: [S1_hose.suction], h_m: 4.2}
  S1_hose.suction:           {to: [S1_joint.hosetail_plastic], l_m: 4, h_m: 4.2}
  S1_joint.hosetail_plastic: {to: [S1_pump.jet.priming_chamber], h_m: 8.2}

  # Jet pump wet path: priming chamber -> venturi -> impeller -> diffuser,
  # with the venturi recirculation loop and the diaphragm tank teed off the discharge
  S1_pump.jet.priming_chamber: {to: [S1_pump.jet.venturi], h_m: 8.2}
  S1_pump.jet.venturi:         {to: [S1_pump.jet.impeller], h_m: 8.2}
  S1_pump.jet.impeller:        {to: [S1_pump.jet.diffuser], h_m: 8.2}
  S1_pump.jet.diffuser:        {to: [S1_joint.bm1c32, S1_pump.jet.recirc, S1_pump.jet.tank_hose], h_m: 8.2}
  S1_pump.jet.recirc:          {to: [S1_pump.jet.venturi], h_m: 8.2}
  S1_pump.jet.tank_hose:       {to: [S1_pump.jet.tank], h_m: 8.2}
  S1_pump.jet.tank:            {h_m: 8.2}

  S1_hose.ldpe32:  {to: [S1_joint.c32c32], l_m: 2, h_m: 8.2}
  S1_joint.bm1c32: {to: [S1_hose.ldpe32], h_m: 8.2}
  S1_joint.c32c32: {to: [D1_hose.ldpe32], h_m: 8.2}

  D1_hose.ldpe32: {to: [D1_joint.c32sm1], l_m: 20, h_m: 8.2}

  D1_joint.c32sm1: {to: [D1_joint.manifold], h_m: 11.2}
  D1_joint.manifold:
    to: [Z2_joint.sm1bm1, Z3_joint.sm1bm1, Z5_joint.sm1bm1,
         Z4_joint.sm1bm1, Z1_joint.sm1c16, Z6_joint.cap]
    h_m: 11.2

  # --- Zone 2 ---
  # Auto valve internals: main seat path + pilot loop (metering port fills the bonnet
  # chamber; solenoid pilot or bleed screw vents it to the downstream chamber)
  Z2_joint.sm1bm1: {to: [Z2_valve.auto.upstream_chamber], h_m: 11.2}
  Z2_valve.auto.upstream_chamber:   {to: [Z2_valve.auto.seat, Z2_valve.auto.metering_port], h_m: 11.2}
  Z2_valve.auto.seat:               {to: [Z2_valve.auto.downstream_chamber], h_m: 11.2}
  Z2_valve.auto.metering_port:      {to: [Z2_valve.auto.bonnet_chamber], h_m: 11.2}
  Z2_valve.auto.bonnet_chamber:     {to: [Z2_valve.auto.sol_entry, Z2_valve.auto.bleed_screw], h_m: 11.2}
  Z2_valve.auto.sol_entry:          {to: [Z2_valve.auto.sol_plunger], h_m: 11.2}
  Z2_valve.auto.sol_plunger:        {to: [Z2_valve.auto.sol_exhaust], h_m: 11.2}
  Z2_valve.auto.sol_exhaust:        {to: [Z2_valve.auto.downstream_chamber], h_m: 11.2}
  Z2_valve.auto.bleed_screw:        {to: [Z2_valve.auto.downstream_chamber], h_m: 11.2}
  Z2_valve.auto.downstream_chamber: {to: [Z2_joint.bm1c25], h_m: 11.2}
  Z2_joint.bm1c25: {to: [Z2_hose.ldpe25_1], h_m: 11.2}
  Z2_joint.c25bf34_1: {to: [Z2_joint.sj34x12_1], h_m: 10.6, gr: riser_1}
  Z2_joint.c25bf34_2: {to: [Z2_joint.sj34x12_2], h_m: 11.4, gr: riser_3}
  Z2_joint.sj34x12_1: {to: [Z2_head.spray_1.check_valve], h_m: 10.6, gr: riser_1}
  Z2_joint.sj34x12_2: {to: [Z2_head.spray_2.check_valve], h_m: 11.4, gr: riser_3}
  Z2_joint.sj34x34:   {to: [Z2_head.rotor.check_valve], h_m: 11.6, gr: riser_2}
  Z2_joint.tee_1: {to: [Z2_hose.ldpe25_2, Z2_hose.ldpe25_3], h_m: 11.2}
  Z2_joint.tee_c25bf34: {to: [Z2_joint.sj34x34, Z2_hose.ldpe25_4], h_m: 11.4}
  Z2_hose.ldpe25_1: {to: [Z2_joint.tee_1], l_m: 8, h_m: 11.2}
  Z2_hose.ldpe25_2: {to: [Z2_joint.c25bf34_1], l_m: 8, h_m: 10.6}
  Z2_hose.ldpe25_3: {to: [Z2_joint.tee_c25bf34], l_m: 4, h_m: 11.4}
  Z2_hose.ldpe25_4: {to: [Z2_joint.c25bf34_2], l_m: 18, h_m: 11.2}
  # Head internals: check valve -> riser -> (regulator) -> filter -> nozzle
  Z2_head.rotor.check_valve: {to: [Z2_head.rotor.riser], h_m: 11.6, gr: riser_2}
  Z2_head.rotor.riser:       {to: [Z2_head.rotor.filter], h_m: 11.6, gr: riser_2}
  Z2_head.rotor.filter:      {to: [Z2_head.rotor.nozzle], h_m: 11.6, gr: riser_2}
  Z2_head.rotor.nozzle:      {nozzle: "BL4.0", arc: 170, h_m: 11.6, gr: riser_2}
  Z2_head.spray_1.check_valve: {to: [Z2_head.spray_1.regulator], h_m: 10.6, gr: riser_1}
  Z2_head.spray_1.regulator:   {to: [Z2_head.spray_1.riser], h_m: 10.6, gr: riser_1}
  Z2_head.spray_1.riser:       {to: [Z2_head.spray_1.nozzle], h_m: 10.6, gr: riser_1}
  Z2_head.spray_1.nozzle:      {nozzle: "MP3000", arc: 270, h_m: 10.6, gr: riser_1}
  Z2_head.spray_2.check_valve: {to: [Z2_head.spray_2.regulator], h_m: 11.4, gr: riser_3}
  Z2_head.spray_2.regulator:   {to: [Z2_head.spray_2.riser], h_m: 11.4, gr: riser_3}
  Z2_head.spray_2.riser:       {to: [Z2_head.spray_2.nozzle], h_m: 11.4, gr: riser_3}
  Z2_head.spray_2.nozzle:      {nozzle: "MP2000", arc: 180, h_m: 11.4, gr: riser_3}

  # --- Zone 3 ---
  Z3_joint.sm1bm1: {to: [Z3_valve.auto.upstream_chamber], h_m: 11.2}
  Z3_valve.auto.upstream_chamber:   {to: [Z3_valve.auto.seat, Z3_valve.auto.metering_port], h_m: 11.2}
  Z3_valve.auto.seat:               {to: [Z3_valve.auto.downstream_chamber], h_m: 11.2}
  Z3_valve.auto.metering_port:      {to: [Z3_valve.auto.bonnet_chamber], h_m: 11.2}
  Z3_valve.auto.bonnet_chamber:     {to: [Z3_valve.auto.sol_entry, Z3_valve.auto.bleed_screw], h_m: 11.2}
  Z3_valve.auto.sol_entry:          {to: [Z3_valve.auto.sol_plunger], h_m: 11.2}
  Z3_valve.auto.sol_plunger:        {to: [Z3_valve.auto.sol_exhaust], h_m: 11.2}
  Z3_valve.auto.sol_exhaust:        {to: [Z3_valve.auto.downstream_chamber], h_m: 11.2}
