  joint.cap:
    price_eur: 5
    k: 0
    max_bar: 10
    interfaces: [sm1]
    states:
      pressurised:   {needs: ["pump.jet = pressurised"]}
      unpressurised: {needs: ["pump.jet = unpressurised"]}

  valve.auto:
    installed_yyyy: 2026
    price_eur: 25
    max_bar: 10
    min_bar: 1.5
    Kv: 6.0
    model: "Hunter PGV-101G"
    states:
      open:   {needs: ["bonnet/flow_control = open", "diaphragm = up"]}
      closed: {needs_any: ["bonnet/flow_control = closed", "diaphragm = down"]}
      diaphragm:
        up:   {needs: ["joint.sm1bm1 = pressurised", "bonnet/chamber = unpressurised"]}
        down: {needs_any: ["joint.sm1bm1 = unpressurised", "bonnet/chamber = pressurised"]}
      bonnet/chamber:
        unpressurised: {needs_any: ["solenoid/pilot_seat = open", "bonnet/bleed_screw = open"]}
        pressurised:   {needs: ["solenoid/pilot_seat = closed", "bonnet/bleed_screw = closed"]}
      solenoid/pilot_seat:
        open:   {needs: ["solenoid/plunger = up"]}
        closed: {needs: ["solenoid/plunger = down"]}
      solenoid/plunger:
        up:   {needs: ["solenoid/coil = live"]}
        down: {needs: ["solenoid/coil = dead"]}
      solenoid/coil:
        live: {needs: ["control.controller/terminals/port = live", "control.controller/terminals/common = live"]}
        dead: {needs_any: ["control.controller/terminals/port = dead", "control.controller/terminals/common = dead"]}
      bonnet/flow_control: {open: {}, closed: {}}
      bonnet/bleed_screw:  {closed: {}, open: {}}

    interfaces: [bf1, bf1, sig_24v, sig_24v]
    items:
      body:
        material: plastic
        items:
          seat: {to: downstream_chamber}
          upstream_chamber:   {to: seat, feature: true}
          downstream_chamber: {feature: true}
      diaphragm:
        to: body/seat
        material: rubber
        items:
          spring: {}
          metering_port: {to: bonnet/chamber, feature: true}
      bonnet:
        material: plastic
        items:
          chamber:      {to: solenoid/entry, feature: true}
          bleed_screw:  {control: true}
          flow_control: {control: true}
          bonnet_cap:   {}
          bonnet_screws: {}
      solenoid:
        model: "Hunter 458200 (24 VAC)"
        control: true
        items:
          entry:    {to: solenoid/plunger, feature: true}
          plunger:
            to: solenoid/exhaust
            items:
              spring: {}
          exhaust:  {to: body/downstream_chamber, feature: true}
          pilot_seat: {feature: true}
          24v_1:    {to: solenoid/coil}
          coil: {to: 24v_2, ohm: [20, 60], material: copper}
          24v_2:    {}

  valve.manual:
    price_eur: 5
    max_bar: 10
    Kv: 6.0
    material: plastic
    interfaces: [bf12, bf12]
    states:
      open:   {needs: ["handle = open"]}
      closed: {needs: ["handle = closed"]}
      handle: {open: {}, closed: {}}
    items:
      seat: {}
      ball:      {}
      stem:      {}
      stem_oring: {material: rubber}
      handle:    {control: true}

  head.rotor:
    price_eur: 25
    model: "Hunter I-20-04-SS"
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}
      watering:      {needs: ["head.rotor = pressurised", "flo_stop = open"]}
      off:           {needs_any: ["head.rotor = unpressurised", "flo_stop = closed"]}
      flo_stop: {open: {}, closed: {}}
    interfaces: [bf34]
    material: plastic
    items:
      check_valve:   {to: riser}
      riser:         {to: filter, }
      riser_seal:    {material: rubber}
      spring:        {}
      gear:          {material: plastic}
      filter:        {to: nozzle}
      nozzle:        {control: true}
      arc:           {control: true}
      flo_stop:      {control: true}

  head.spray:
    price_eur: 25
    regulated_bar: 2.8
    model: "Hunter Pro-Spray PRS40"
    states:
      pressurised:   {needs: ["pump.jet = pressurised", "valve.auto = open"]}
      unpressurised: {needs_any: ["pump.jet = unpressurised", "valve.auto = closed"]}
    interfaces: [bf12]
    material: plastic
    items:
      cap:            {}
      check_valve:    {to: regulator}
      regulator:      {to: riser}
      riser:          {to: nozzle}
      wiper_seal:     {material: rubber}
      spring: {}
      flush_plug:     {}
      nozzle: {control: true}

  enclosure.valvebox:
    price_eur: 150
    model: "valve box jumbo"
    states: {}
    material: plastic
    interfaces: []
    items:
      enclosure: {}
      lid:       {}

