name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Stylelint (CSS)
        run: npm run lint:css
      - name: paumen-lint (markup contract)
        run: npm run lint:markup
