# Deploy the whole repo as the GitHub Pages artifact. The simulator entry point is
# sim/index.html; serving the full repo keeps the root YAMLs reachable at ../graph.yaml
# etc. (single source of truth, no copies). Requires repo Settings -> Pages ->
# Source: GitHub Actions (a one-time manual step — already enabled on this repo).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; a newer push supersedes a queued one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
