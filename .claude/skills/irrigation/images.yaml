    caption: This system's actual pump-start wiring — the controller's COM and MV terminals (lower closeup) feed the PSR relay's 24 VAC coil; the relay contact switches the 230 V Schuko mains to the DAB pump. EU colours — brown = live, blue = neutral, green/yellow = earth.
    subjects: [relay, wiring, controller, pump]
    legend: {top: "relay contact — 230 V mains in (Schuko plug) → load out to pump", middle: "green/yellow = earth, blue = neutral, brown = live", bottom: "controller terminals COM · MV · 1 · 2 — MV+COM drive the relay coil"}
    failure_modes: [F4]
    questions: [Q20]
    relates: ground-truth wiring for the homeowner's setup. Controller terminals are COM, MV, 1, 2…; the master-valve output (MV) drives the relay coil exactly like a valve, sharing the single COM common. The pump runs on its own switched 230 V mains, not the controller's 24 VAC. Confirms IMG.controller-instruction-master-valve-wiring on the real hardware.
    used_in: [relay.md, wiring.md]

