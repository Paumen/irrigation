  # ── sensor ──────────────────────────────────────────────────────────────────
  IMG.sensor-instruction-rain-freeze-wiring:
    file: media/sensor-instruction-rain-freeze-wiring.png
    caption: Rain / freeze "click" sensor wired in series with the common — the sensor's two wires sit between the valves' common and a C terminal, so when it trips it breaks the common and stops every zone. No separate power needed.
    subjects: [controller, wiring]
    failure_modes: [F2, F1]
    relates: reference/upgrade wiring — NOT fitted on this system (rain-skip already comes from weather/ET over Wi-Fi). One sensor at a time, rain OR flow. Vendor diagram is HD-12; applies to the HD-16.
    used_in: [controller.md]

  IMG.sensor-instruction-flow-sensor-wiring:
    file: media/sensor-instruction-flow-sensor-wiring.png
    caption: Two-wire (reed-type) flow sensor wired to the flow input — no polarity, it's a magnet-driven open/close switch. HD-12/16 captures pulses up to 2 Hz (3 clicks/second); above that it under-reports flow.
    subjects: [controller, wiring]
    failure_modes: [F2, F1]
    relates: reference/upgrade wiring — NOT fitted on this system (flow meter is a deliberate opt-out in context.yaml's `system_design_choices`). One sensor at a time, rain OR flow. Software setup (clicks-per-m³) is in app.md. Vendor diagram is HD-12; applies to the HD-16.
    used_in: [controller.md]

