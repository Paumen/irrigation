    file: media/head-rotor-instruction-nozzle-install-step-3.jpg
    caption: Rotor nozzle install — step 3 — turn the radius reduction / nozzle adjustment screw a quarter turn clockwise to lock the nozzle in place. More than a quarter turn reduces the radius.
