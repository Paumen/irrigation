# Image manifest — every picture in media/, keyed IMG.<category>_<type>_<kind>_<descriptor>
# (the key always equals its filename). One separator throughout: "_".
#   category/type  come straight from setup.yaml's types: catalog (head.rotor, valve.auto,
#                  nozzle.rotator, fitting.swing, pump.well). The type segment appears only when that
#                  category has sub-types there; leaf categories (controller, relay) and things not in
#                  the catalog (gauge, multimeter, sensor, wiring) carry no type. A model is never a
#                  category or type — it only ever appears in the descriptor.
#   kind           product     = the equipment/tool shown as-is (descriptor = model group + identifiers)
#                  breakdown   = cutaway / exploded / callout / parts-list (descriptor = what's shown;
#                                always carries a legend: part-callout key)
#                  instruction = a hands-on step / test / adjustment (descriptor = the action)
#                  icon        = UI glyph, datasheet = vendor PDF (category-level; no type, no descriptor split)
# Find one by subjects:, questions: (engine Q-ids) or causes: (F-codes), then surface it with
# SendUserFile using the manifest caption:. file: is relative to this folder; pass an absolute path
# that resolves or the send fails silently. subjects/causes/questions mark where an image applies —
# a guide, not a limit. legend = part-callout key (breakdowns). relates = extra context. used_in = docs embedding it.

