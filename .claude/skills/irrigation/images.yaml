    file: media/head-rotor-instruction-nozzle-install-step-1.jpg
    caption: Rotor nozzle install — step 1 — insert the plastic end of the Hunter adjustment wrench into the lifting socket on the rotor cap and turn 90°. Pulling up on the riser then opens access to the nozzle port.
