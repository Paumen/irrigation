# Image manifest — every surfaceable picture in media/, keyed IMG.<filename-stem> (key always equals its file).
#
# Naming convention (image-side equipment families, aligned with graph.yaml's `kinds`):
#   <category>[-<type>]-<role>-<descriptor>
#   • category — an equipment family (head, valve, nozzle, fitting, hose, pump, controller, relay)
#                plus wiring, and the non-system buckets tool (gauge/multimeter), sensor, and
#                app (mobile-app / WebUI screenshots, paired with knowledge/app.md).
#   • type     — the sub-type segment, present only where the image depicts one
#                (head-rotor, valve-auto, nozzle-rotator, fitting-swing). Models are NOT types.
#   • role     — what kind of asset it is:
#                  product     = photo/render of real equipment; descriptor is model + variant.
#                  instruction = an action to perform; descriptor is the action (+ -step-N).
#                  breakdown   = internal anatomy (exploded / cutaway / callouts / part inspection);
#                                descriptor is what's broken down, and the entry carries a legend:.
#   (icons and the vendor datasheet PDF live in media/ but are not indexed here.
#    Animations ARE indexed — both .gif and .mp4 video. A video can't inline-render as
#    markdown, so surface it with SendUserFile only; entries carry media: video to flag this.)
#
# Find one by subjects:, questions: (engine Q-ids) or failure_modes: (F-codes), then surface it with
# SendUserFile using the manifest caption:. file: is relative to this folder; pass an absolute path
# that resolves or the send fails silently. subjects/failure_modes/questions mark where an image applies —
# a guide, not a limit. legend = part-callout key for breakdown images. relates = extra context.
# used_in = docs embedding it.
#
# When sharing images/files, always pass the `files` array on the first SendUserFile call — never
# emit a bare invocation with no arguments. An empty call fails validation with "required parameter
# `files` is missing" and just adds noise before the retry.
#
# procedures: — a TASK axis, orthogonal to subjects:. subjects: groups by the part a picture shows;
# procedures: groups by the JOB a picture is needed for, which routinely spans several subjects. A
# valve install touches the valve, the manifold swivel nut (subjects: valve), a poly-hose adapter
# (subjects: hoses) and waterproof connectors (subjects: wiring) — a subjects-only scan keyed on
# "valve" silently drops the hose and wiring fittings that are half the job. When walking a
# procedure, pull the whole set by its procedures: tag, not by the part the user named. Current
# tags: valve_install. Add a tag here (and to the relevant entries) when documenting a new job.

images:

  # ── controller ──────────────────────────────────────────────────────────────
  IMG.controller-product-rainmachine-similar:
    file: media/controller-product-rainmachine-similar.jpg
    caption: A similar RainMachine model (Mini-12, 12 zone terminals) — illustrative only; the homeowner's actual controller is the HD-16 TOUCH, which has the same touchscreen-and-terminal layout with 16 zone outputs.
    subjects: [controller]
    relates: illustrative stand-in; not the homeowner's exact model — caption must say "similar" not "your controller"
    used_in: [playbooks/identify.md]

  IMG.controller-instruction-probe-placement:
    file: media/controller-instruction-probe-placement.jpg
    caption: Illustrated probe placement at the controller terminals — red lead on the station terminal, black lead on C / COM, ET bar chart visible above.
    subjects: [controller, wiring]
    failure_modes: [F2, F2.1, F2.8, F2.5, F2.6]
    questions: [Q13, Q14]
    relates: stylised explainer for the controller voltage / field-wire resistance check; pairs with the real Stanley FATMAX photo
    used_in: [playbooks/parts.md]

  IMG.controller-breakdown-et-schedule:
    file: media/controller-breakdown-et-schedule.jpg
    caption: Illustrated weather-aware controller — sun/cloud/rain icons drive a daily run-length bar chart; terminals P, C, 1–4, C, R below.
    subjects: [controller]
    legend: {icons: "sun / cloud / rain — weather inputs that scale daily run length", P: pump / master-valve start, C: common, "1–4": zone station outputs, R: relay}
    relates: ET-based scheduling and rain-skip behaviour; useful when explaining what the RainMachine does automatically
    used_in: [playbooks/parts.md, playbooks/upgrades.md]

  IMG.controller-instruction-wiring-diagram-12zone:
    file: media/controller-instruction-wiring-diagram-12zone.png
    caption: RainMachine HD-12 full wiring diagram — 24VAC adapter to the power terminals, each zone valve's control wire to its numbered station terminal, all commons to a C terminal, and a master valve on its own output (Valve 1). The HD-16 is identical with 16 zone terminals.
    subjects: [controller, wiring]
    failure_modes: [F2, F3]
    relates: orientation diagram for the whole terminal block before wiring; on this system zones 1–4 are valves and one further output drives the PSR-22 relay. Vendor diagram is the HD-12; applies to the homeowner's HD-16.
    used_in: [controller.md]

  IMG.controller-instruction-master-valve-wiring:
    file: media/controller-instruction-master-valve-wiring.png
    caption: Master valve / pump wiring on the Touch HD-12/16 — one solenoid lead to the master-valve station terminal, the other to C, exactly like a zone valve. On this system that output instead feeds the PSR-22 pump start relay coil rather than an inline MV solenoid.
    subjects: [controller, wiring, relay]
    failure_modes: [F2, F4]
    relates: how a zone output assigned as Master Valve / Pump is wired; pairs with the app-side IMG.app-instruction-zone1-master-valve toggle and relay.md. Vendor diagram is HD-12; applies to the HD-16.
    used_in: [controller.md]

  # ── app / control (mobile app · WebUI) ───────────────────────────────────────
  IMG.app-instruction-zone1-master-valve:
    file: media/app-instruction-zone1-master-valve.png
    caption: Zone settings in the RainMachine app — the "Master Valve (Pump)" toggle (here ON) with "Before program starts" and "After program ends" timing, which keep the master-valve output on a little early/late around each program.
    subjects: [controller]
    failure_modes: [F1, F2]
    relates: the app-side switch that assigns a zone as master valve / pump; on this system that output drives the PSR-22 relay. Wiring counterpart is IMG.controller-instruction-master-valve-wiring.
    used_in: [app.md]

  IMG.app-instruction-valve-testing:
    file: media/app-instruction-valve-testing.png
    caption: The app's Valve Testing screen — a play button per zone to run each one on demand ("Next Watering — Never" until scheduled); the quickest software check that a zone's valve actually opens.
    subjects: [controller]
    failure_modes: [F1]
    relates: first move in the zone-won't-turn-on check — if a zone runs here but not on schedule it's logic (app.md), not hardware
    used_in: [app.md]

  IMG.app-instruction-webui-sensors:
    file: media/app-instruction-webui-sensors.png
    caption: WebUI (my.rainmachine.com) Settings → Sensors — the Rain Sensor section above and the Flow Meter Sensor section below, with "Use hardware flow meter" ticked and the clicks-per-unit rate entered. Two RESET buttons zero consumption (left) / clear last-leak date (right).
    subjects: [controller]
    failure_modes: [F1]
    relates: software setup for a rain or flow sensor; neither fitted on this system (reference only). Wiring is in controller.md. US app uses gallons, EU app uses m³.
    used_in: [app.md]

  IMG.app-instruction-flow-clicks-setup:
    file: media/app-instruction-flow-clicks-setup.png
    caption: Android app sequence to enable a flow sensor — Sensors → Flow Sensor → set Active, then enter "Flow clicks per m³" (EU units; e.g. 2640 from the meter's datasheet).
    subjects: [controller]
    failure_modes: [F1]
    relates: the mobile-app path for the same flow-meter setup as the WebUI shot IMG.app-instruction-webui-sensors; reference only (no flow meter fitted here)
    used_in: [app.md]

  # ── fitting · swing ─────────────────────────────────────────────────────────
  IMG.fitting-swing-product:
    file: media/fitting-swing-product.jpg
    caption: Pre-assembled Hunter Pro-Adjustable swing joint — two 90° elbows joined by a straight nipple with male threads on each end; absorbs side movement and lets you set head height to grade without re-cutting the hose.
    subjects: [heads, hoses]
    relates: rotor install / replacement; reduces side stress when a head is kicked or stepped on
    used_in: [playbooks/parts.md]

  IMG.fitting-swing-instruction-rotor-install:
    file: media/fitting-swing-instruction-rotor-install.jpg
    caption: Cross-section illustration — pop-up rotor installed via a swing joint onto a buried hose; head sits flush with grade, swing joint hidden in the soil.
    subjects: [heads, hoses]
    failure_modes: [F9, F9.1.1, F9.3, F9.1.2]
    relates: rotor install reference; pair with IMG.fitting-swing-product for "what it is" + "how it sits in the soil"
    used_in: [playbooks/parts.md]

  IMG.fitting-swing-product-sj712:
    file: media/fitting-swing-product-sj712.jpg
    caption: Hunter SJ-712 swing joint (≈30 cm, male × male) — two pre-set 90° elbows on a straight riser; this is the swing-joint line the homeowner actually runs (graph.yaml's `swing.34x34`/`swing.34x12`, "Hunter SJ"), 3/4×3/4 under rotors and 3/4×1/2 under spray bodies.
    subjects: [heads, hoses]
    relates: closer match to this homeowner's swing joints than the generic IMG.fitting-swing-product; sets head height to grade and absorbs side load. From a retailer listing screenshot (phone/browser chrome visible).
    used_in: [playbooks/parts.md]

  # ── fitting · joint (couplings / nipples / adapters) ─────────────────────────
  IMG.fitting-joint-product-double-nipple:
    file: media/fitting-joint-product-double-nipple.webp
    caption: Black poly double nipple — male thread on both ends with a hex middle; screws two female-thread fittings together (e.g. a manifold swivel-nut outlet to a valve inlet). A plain `joint` coupling, rated to ~10 bar.
    subjects: [hoses, valve]
    procedures: [valve_install]
    relates: realises the many `joint` nodes in graph.yaml; spare for re-plumbing the valve box — the male × male nipple into the valve inlet (teflon on the thread)
    used_in: [playbooks/parts.md]

  IMG.fitting-joint-product-compression-male:
    file: media/fitting-joint-product-compression-male.jpg
    caption: PE compression × male-thread adapter — green compression nut grips the poly hose (push in, hand-tighten the nut), tapered male thread on the other end. Joins buried 25 or 32 mm hose to a threaded fitting without glue or heat.
    subjects: [hoses]
    procedures: [valve_install]
    relates: a joint between a hose run and a threaded part (valve, swing joint, manifold); the compression end must match the hose OD — the bare-thread (grip-sealed) outlet joint to the hose.25 poly run; filed under hoses, so a valve-keyed scan misses it without the procedures tag
    used_in: [playbooks/parts.md]

  IMG.fitting-product-teflon-tape:
    file: media/fitting-product-teflon-tape.jpg
    caption: Teflon tape (label "PTFE THREAD SEALING 751-3", 12 mm × 12 m × 0.1 mm) — the white Teflon tape you wrap on a male thread before it screws into a female port. Tape OR paste, never both; 3 full turns in the screw-in direction.
    subjects: [valve, hoses]
    procedures: [valve_install]
    failure_modes: [F7]
    relates: the Teflon-tape consumable for a valve/fitting install; goes only on threads that seal on the thread, never on a washer- or compression-sealed joint
    used_in: [valve.md]

  # ── fitting · manifold ───────────────────────────────────────────────────────
  IMG.fitting-manifold-product-lev-6way:
    file: media/fitting-manifold-product-lev-6way.jpg
    caption: LEV 6-way distributor manifold — a single barred header with six 1" swivel-nut female outlets (rubber sealing washers shown loose); the trunk feeds it and each outlet runs to one zone valve. This is the homeowner's manifold (graph.yaml's `manifold` kind).
    subjects: [valve, hoses]
    procedures: [valve_install]
    relates: the MAIN → Z1…Z6 fan-out point in the valve box; swivel nuts let a single valve come off without disturbing the others — the bare-thread (washer-sealed) inlet joint
    used_in: [playbooks/identify.md, playbooks/parts.md]

