# Image manifest — every surfaceable picture in media/, keyed IMG.<filename-stem> (key always equals its file).
#
# Naming convention (mirrors setup.yaml's category.type taxonomy):
#   <category>[-<type>]-<role>-<descriptor>
#   • category — a setup.yaml family (head, valve, nozzle, fitting, hose, pump, controller, relay)
#                plus wiring, and the non-system buckets tool (gauge/multimeter) and sensor.
#   • type     — the setup.yaml second segment, present only where the image depicts one
#                (head-rotor, valve-auto, nozzle-rotator, fitting-swing). Models are NOT types.
#   • role     — what kind of asset it is:
#                  product     = photo/render of real equipment; descriptor is model + variant.
#                  instruction = an action to perform; descriptor is the action (+ -step-N).
#                  breakdown   = internal anatomy (exploded / cutaway / callouts / part inspection);
#                                descriptor is what's broken down, and the entry carries a legend:.
#   (icons and the vendor datasheet PDF live in media/ but are not indexed here.)
#
# Find one by subjects:, questions: (engine Q-ids) or causes: (F-codes), then surface it with
# SendUserFile using the manifest caption:. file: is relative to this folder; pass an absolute path
# that resolves or the send fails silently. subjects/causes/questions mark where an image applies —
# a guide, not a limit. legend = part-callout key for breakdown images. relates = extra context.
# used_in = docs embedding it.

