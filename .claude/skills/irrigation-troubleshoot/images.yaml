# Image manifest
#
# Maps every binary in media/ to a stable ID, a normalized caption, and the subjects /
# root-cause areas / engine questions it serves. Docs embed images by path (media/<file>);
# this file is the lookup an agent uses to find the right image to surface to the homeowner.
#
# Conventions:
#   subjects  -> which knowledge/ docs the image belongs to
#   causes    -> root-cause codes the image helps with; carries BOTH the area code (e.g. F7)
#                and the specific-cause codes under it (e.g. F7.1.1, F7.1.2) so lookups by
#                either level work without a separate area↔cause mapping.
#   questions -> engine question ids (Q*) the image supports, where applicable
#   relates   -> free-text note about the install/operation context, when useful
#   used_in   -> docs that currently embed it (empty = available but not yet embedded)
#
# Dropped as duplicate: valves-work_0__1_.gif — same parts-callout drawing as valves-work_0.gif.
# Dropped as duplicate: 1000381424.png — byte-identical to 1000381423.png (distance-to-controller).
# Excluded (PSR-B booster, not fitted / removed from scope): 1000381417-1000381421.png.

